name: Deploy Documentation to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:  # Allow manual trigger

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install Zensical
        run: pip install zensical

      - name: Copy content to docs directory
        run: |
          mkdir -p site/docs
          cp -r contents/book1 site/docs/
          cp -r contents/book2 site/docs/
          cp -r contents/book3 site/docs/
          cp -r contents/frontmatter site/docs/
          cp -r contents/appendices site/docs/
          cp contents/frontmatter/home.md site/docs/index.md
          cp scripts/zensical.toml site/
          find site | sort

      - name: Build documentation
        working-directory: site
        run: zensical build --clean -f zensical.toml

      - name: Show files
        run: |
          pwd  
          find . | sort

      - name: Configure Pages
        uses: actions/configure-pages@v4

      - name: Upload pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./site/_site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
