name: Deploy Documentation to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:  # Allow manual trigger

# Prevents multiple concurrent deployments
concurrency:
  group: "pages"
  cancel-in-progress: true

permissions: {}

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read    
    steps:
      - name: Checkout repository
        uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@83679a892e2d95755f2dac6acb0bfd1e9ac5d548 # v6.1.0
        with:
          python-version: '3.x'

      - name: Install Zensical
        run: |
          python -m pip install --upgrade pip
          pip install zensical==0.0.16

      - name: Copy content to docs directory
        run: |
          mkdir -p site/docs/stylesheets
          cp -r contents/book1 site/docs/
          cp -r contents/book2 site/docs/
          cp -r contents/book3 site/docs/
          cp -r contents/frontmatter site/docs/
          cp -r contents/appendices site/docs/
          cp contents/frontmatter/home.md site/docs/index.md
          cp scripts/zensical.toml site/
          cp scripts/extra.css site/docs/stylesheets/

      - name: Replace fonts in SVG files
        run: |
          find site/docs/ -name "*.svg" | while read -r svgfile; do
            sed -i 's/font-family="[^"]*"/font-family="Roboto, Arial, sans-serif"/g' "$svgfile"
          done

      - name: Build documentation
        working-directory: site
        run: zensical build --clean -f zensical.toml

      - name: Copy PDFs to site
        run: |
          mkdir -p site/_site
          if ls dist/*.pdf 1> /dev/null 2>&1; then
            cp dist/*.pdf site/_site/
            echo "Copied PDFs to site/_site/"
          else
            echo "Warning: No PDF files found in dist/"
          fi

      - name: Configure Pages
        uses: actions/configure-pages@983d7736d9b0ae728b81ab479565c72886d7745b  # v5.0.0

      - name: Upload pages artifact
        uses: actions/upload-pages-artifact@7b1f4a764d45c48632c6b24a0339c27f5614fb0b  # v4.0.0
        with:
          path: ./site/_site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      pages: write      # To deploy to Pages
      id-token: write   # To verify the deployment originates from a secure source (OIDC)    
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@d6db90164ac5ed86f2b6aed7e0febac5b3c0c03e # v4.0.5
