name: PR Validation Checks

on:
  pull_request:
    branches: [main]
    paths:
      - 'contents/**'
      - 'scripts/**'
      - '.github/workflows/pr-checks.yml'
  workflow_dispatch:

jobs:
  # Get list of changed markdown files for targeted checks
  changed-files:
    runs-on: ubuntu-latest
    outputs:
      md_files: ${{ steps.changed.outputs.md_files }}
      md_files_exist: ${{ steps.changed.outputs.md_files_exist }}
      all_files: ${{ steps.changed.outputs.all_files }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0

      - name: Get changed files
        id: changed
        env:
          BASE_REF: ${{ github.base_ref }}
        run: |
          # Validate BASE_REF contains only safe characters (alphanumeric, dash, underscore, slash, dot)
          if [[ ! "$BASE_REF" =~ ^[a-zA-Z0-9/_.-]+$ ]]; then
            echo "::error::Invalid base_ref detected"
            exit 1
          fi

          # Get changed markdown files
          MD_FILES=$(git diff --name-only "origin/${BASE_REF}...HEAD" -- '*.md' | grep -E '^contents/' || true)

          if [ -n "$MD_FILES" ]; then
            echo "md_files_exist=true" >> $GITHUB_OUTPUT
            # Convert to space-separated for some tools
            echo "md_files<<EOF" >> $GITHUB_OUTPUT
            echo "$MD_FILES" >> $GITHUB_OUTPUT
            echo "EOF" >> $GITHUB_OUTPUT
          else
            echo "md_files_exist=false" >> $GITHUB_OUTPUT
            echo "md_files=" >> $GITHUB_OUTPUT
          fi

          # Get all changed files
          ALL_FILES=$(git diff --name-only "origin/${BASE_REF}...HEAD")
          echo "all_files<<EOF" >> $GITHUB_OUTPUT
          echo "$ALL_FILES" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

  # Markdown linting
  markdown-lint:
    needs: changed-files
    if: needs.changed-files.outputs.md_files_exist == 'true'
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Run markdownlint
        uses: DavidAnson/markdownlint-cli2-action@07035fd053f7be764496c0f8d8f9f41f98305101 # v22
        with:
          globs: ${{ needs.changed-files.outputs.md_files }}
          config: .github/workflows/.markdownlint-cli2.jsonc

  # Spell checking
  spell-check:
    needs: changed-files
    if: needs.changed-files.outputs.md_files_exist == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Run cspell
        uses: streetsidesoftware/cspell-action@26602fcdd72301b7f0dcc55023344f193389b9bf # v6
        with:
          files: ${{ needs.changed-files.outputs.md_files }}
          config: .github/workflows/cspell.json
          inline: warning
          strict: false

  # URL validation on changed files
  url-validation:
    needs: changed-files
    if: needs.changed-files.outputs.md_files_exist == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: '3.x'

      - name: Install dependencies
        run: pip install requests

      - name: Validate URLs in changed files
        env:
          MD_FILES: ${{ needs.changed-files.outputs.md_files }}
        run: |
          # Create a temporary directory with just the changed files
          mkdir -p /tmp/changed_files

          # Read files from env var, validating each path
          echo "$MD_FILES" | while IFS= read -r file; do
            # Skip empty lines
            [ -z "$file" ] && continue
            # Validate path contains only safe characters and is under contents/
            if [[ ! "$file" =~ ^contents/[a-zA-Z0-9/_.-]+\.md$ ]]; then
              echo "::warning::Skipping invalid file path: $file"
              continue
            fi
            if [ -f "$file" ]; then
              # Preserve directory structure
              mkdir -p "/tmp/changed_files/$(dirname "$file")"
              cp "$file" "/tmp/changed_files/$file"
            fi
          done

          # Run URL validation on changed files only
          python scripts/verify_urls.py --root /tmp/changed_files --timeout 15 --workers 5
        continue-on-error: true

  # Image reference validation
  image-validation:
    needs: changed-files
    if: needs.changed-files.outputs.md_files_exist == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Validate image references
        env:
          MD_FILES: ${{ needs.changed-files.outputs.md_files }}
        run: |
          EXIT_CODE=0

          # Read files from env var, validating each path
          echo "$MD_FILES" | while IFS= read -r file; do
            # Skip empty lines
            [ -z "$file" ] && continue
            # Validate path contains only safe characters and is under contents/
            if [[ ! "$file" =~ ^contents/[a-zA-Z0-9/_.-]+\.md$ ]]; then
              echo "::warning::Skipping invalid file path: $file"
              continue
            fi
            if [ -f "$file" ]; then
              # Extract image references and check if files exist
              DIR=$(dirname "$file")

              # Find markdown image syntax: ![alt](path)
              grep -oP '!\[[^\]]*\]\(\K[^)]+' "$file" 2>/dev/null | while IFS= read -r img_path; do
                # Skip URLs
                if [[ "$img_path" =~ ^https?:// ]]; then
                  continue
                fi

                # Resolve relative path
                if [[ "$img_path" =~ ^/ ]]; then
                  FULL_PATH="$img_path"
                else
                  FULL_PATH="$DIR/$img_path"
                fi

                # Normalize path
                FULL_PATH=$(realpath -m "$FULL_PATH" 2>/dev/null || echo "$FULL_PATH")

                if [ ! -f "$FULL_PATH" ]; then
                  echo "::error file=$file::Missing image: $img_path"
                  EXIT_CODE=1
                fi
              done
            fi
          done

          exit $EXIT_CODE

  # Internal link validation
  internal-links:
    needs: changed-files
    if: needs.changed-files.outputs.md_files_exist == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Validate internal links
        env:
          MD_FILES: ${{ needs.changed-files.outputs.md_files }}
        run: |
          EXIT_CODE=0

          # Read files from env var, validating each path
          echo "$MD_FILES" | while IFS= read -r file; do
            # Skip empty lines
            [ -z "$file" ] && continue
            # Validate path contains only safe characters and is under contents/
            if [[ ! "$file" =~ ^contents/[a-zA-Z0-9/_.-]+\.md$ ]]; then
              echo "::warning::Skipping invalid file path: $file"
              continue
            fi
            if [ -f "$file" ]; then
              DIR=$(dirname "$file")

              # Find markdown links to .md files: [text](path.md) or [text](path.md#anchor)
              grep -oP '\[[^\]]*\]\(\K[^)]+\.md[^)]*' "$file" 2>/dev/null | while IFS= read -r link; do
                # Remove anchor if present
                LINK_PATH="${link%%#*}"

                # Skip URLs
                if [[ "$LINK_PATH" =~ ^https?:// ]]; then
                  continue
                fi

                # Resolve relative path
                if [[ "$LINK_PATH" =~ ^/ ]]; then
                  FULL_PATH="$LINK_PATH"
                else
                  FULL_PATH="$DIR/$LINK_PATH"
                fi

                # Normalize path
                FULL_PATH=$(realpath -m "$FULL_PATH" 2>/dev/null || echo "$FULL_PATH")

                if [ ! -f "$FULL_PATH" ]; then
                  echo "::error file=$file::Broken internal link: $link"
                  EXIT_CODE=1
                fi
              done
            fi
          done

          exit $EXIT_CODE

  # File naming convention check
  naming-convention:
    needs: changed-files
    if: needs.changed-files.outputs.md_files_exist == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Check file naming conventions
        env:
          MD_FILES: ${{ needs.changed-files.outputs.md_files }}
        run: |
          EXIT_CODE=0

          # Read files from env var, validating each path
          echo "$MD_FILES" | while IFS= read -r file; do
            # Skip empty lines
            [ -z "$file" ] && continue
            # Validate path contains only safe characters and is under contents/
            if [[ ! "$file" =~ ^contents/[a-zA-Z0-9/_.-]+\.md$ ]]; then
              echo "::warning::Skipping invalid file path: $file"
              continue
            fi

            BASENAME=$(basename "$file")
            DIR=$(dirname "$file")

            # Check chapter files match ch-X.Y.md pattern
            if [[ "$DIR" =~ chapter-([0-9]+) ]]; then
              CHAPTER_NUM="${BASH_REMATCH[1]}"

              # Allow README.md and index.md in chapter dirs
              if [[ "$BASENAME" == "README.md" ]] || [[ "$BASENAME" == "index.md" ]]; then
                continue
              fi

              # Check pattern: ch-X.Y.md where X matches directory number
              if [[ ! "$BASENAME" =~ ^ch-${CHAPTER_NUM}\.[0-9]+\.md$ ]]; then
                echo "::warning file=$file::File naming: Expected ch-${CHAPTER_NUM}.Y.md pattern"
              fi
            fi
          done

          exit $EXIT_CODE

  # GitHub Actions security linting
  workflow-security:
    runs-on: ubuntu-latest
    permissions:
      security-events: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1
        with:
          persist-credentials: false

      - name: Run zizmor
        uses: zizmorcore/zizmor-action@135698455da5c3b3e55f73f4419e481ab68cdd95 # v0.4.1
        with:
          args: --format sarif .github/workflows/

  # Build validation - ensure docs site compiles
  build-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: '3.x'

      - name: Install Zensical
        run: pip install zensical==0.0.16

      - name: Prepare docs directory
        run: |
          mkdir -p site/docs/stylesheets
          cp -r contents/book1 site/docs/
          cp -r contents/book2 site/docs/
          cp -r contents/book3 site/docs/
          cp -r contents/frontmatter site/docs/
          cp -r contents/appendices site/docs/
          cp contents/frontmatter/home.md site/docs/index.md
          cp scripts/zensical.toml site/
          cp scripts/extra.css site/docs/stylesheets/

      - name: Build documentation
        working-directory: site
        run: zensical build --clean -f zensical.toml

  # Summary job that requires all checks
  validation-summary:
    needs: [markdown-lint, spell-check, url-validation, image-validation, internal-links, naming-convention, workflow-security, build-check]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Check validation results
        env:
          MARKDOWN_LINT_RESULT: ${{ needs.markdown-lint.result }}
          SPELL_CHECK_RESULT: ${{ needs.spell-check.result }}
          URL_VALIDATION_RESULT: ${{ needs.url-validation.result }}
          IMAGE_VALIDATION_RESULT: ${{ needs.image-validation.result }}
          INTERNAL_LINKS_RESULT: ${{ needs.internal-links.result }}
          NAMING_CONVENTION_RESULT: ${{ needs.naming-convention.result }}
          WORKFLOW_SECURITY_RESULT: ${{ needs.workflow-security.result }}
          BUILD_CHECK_RESULT: ${{ needs.build-check.result }}
        run: |
          echo "## PR Validation Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          # Check each job result
          if [ "$MARKDOWN_LINT_RESULT" == "failure" ]; then
            echo "❌ Markdown linting failed" >> $GITHUB_STEP_SUMMARY
          elif [ "$MARKDOWN_LINT_RESULT" == "skipped" ]; then
            echo "⏭️ Markdown linting skipped (no .md changes)" >> $GITHUB_STEP_SUMMARY
          else
            echo "✅ Markdown linting passed" >> $GITHUB_STEP_SUMMARY
          fi

          if [ "$SPELL_CHECK_RESULT" == "failure" ]; then
            echo "❌ Spell check failed" >> $GITHUB_STEP_SUMMARY
          elif [ "$SPELL_CHECK_RESULT" == "skipped" ]; then
            echo "⏭️ Spell check skipped (no .md changes)" >> $GITHUB_STEP_SUMMARY
          else
            echo "✅ Spell check passed" >> $GITHUB_STEP_SUMMARY
          fi

          if [ "$URL_VALIDATION_RESULT" == "failure" ]; then
            echo "⚠️ URL validation had issues (non-blocking)" >> $GITHUB_STEP_SUMMARY
          elif [ "$URL_VALIDATION_RESULT" == "skipped" ]; then
            echo "⏭️ URL validation skipped (no .md changes)" >> $GITHUB_STEP_SUMMARY
          else
            echo "✅ URL validation passed" >> $GITHUB_STEP_SUMMARY
          fi

          if [ "$IMAGE_VALIDATION_RESULT" == "failure" ]; then
            echo "❌ Image validation failed" >> $GITHUB_STEP_SUMMARY
          elif [ "$IMAGE_VALIDATION_RESULT" == "skipped" ]; then
            echo "⏭️ Image validation skipped (no .md changes)" >> $GITHUB_STEP_SUMMARY
          else
            echo "✅ Image validation passed" >> $GITHUB_STEP_SUMMARY
          fi

          if [ "$INTERNAL_LINKS_RESULT" == "failure" ]; then
            echo "❌ Internal link validation failed" >> $GITHUB_STEP_SUMMARY
          elif [ "$INTERNAL_LINKS_RESULT" == "skipped" ]; then
            echo "⏭️ Internal link validation skipped (no .md changes)" >> $GITHUB_STEP_SUMMARY
          else
            echo "✅ Internal link validation passed" >> $GITHUB_STEP_SUMMARY
          fi

          if [ "$NAMING_CONVENTION_RESULT" == "failure" ]; then
            echo "⚠️ Naming convention warnings" >> $GITHUB_STEP_SUMMARY
          elif [ "$NAMING_CONVENTION_RESULT" == "skipped" ]; then
            echo "⏭️ Naming convention check skipped (no .md changes)" >> $GITHUB_STEP_SUMMARY
          else
            echo "✅ Naming convention check passed" >> $GITHUB_STEP_SUMMARY
          fi

          if [ "$WORKFLOW_SECURITY_RESULT" == "failure" ]; then
            echo "❌ Workflow security check failed" >> $GITHUB_STEP_SUMMARY
          else
            echo "✅ Workflow security check passed" >> $GITHUB_STEP_SUMMARY
          fi

          if [ "$BUILD_CHECK_RESULT" == "failure" ]; then
            echo "❌ Build check failed" >> $GITHUB_STEP_SUMMARY
          else
            echo "✅ Build check passed" >> $GITHUB_STEP_SUMMARY
          fi
