[project.theme]
features = [
  "navigation.tabs",
  "navigation.sections",
  "navigation.expand",
  "navigation.indexes",
  "navigation.path",
  "navigation.breadcrumbs",
  "navigation.top",
  "navigation.footer",
  "search.suggest",
  "search.highlight",
  "content.action.edit",
  "content.tooltips",
  "content.code.copy",
  "content.footnote.tooltips"
]

[project.theme.font]
text = "Roboto"
code = "Roboto Mono"

[[project.theme.palette]]
media = "(prefers-color-scheme)"
toggle.icon = "lucide/sun-moon"
toggle.name = "Switch to light mode"

# Palette toggle for light mode
[[project.theme.palette]]
media = "(prefers-color-scheme: light)"
scheme = "default"
toggle.icon = "lucide/sun"
