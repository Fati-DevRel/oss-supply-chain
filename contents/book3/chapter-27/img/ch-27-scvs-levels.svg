<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 520" font-family="Libertinus Sans">
  <defs>
    <linearGradient id="level1Bg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#4a7c59"/>
      <stop offset="100%" style="stop-color:#3a6248"/>
    </linearGradient>
    <linearGradient id="level2Bg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#c9a227"/>
      <stop offset="100%" style="stop-color:#a8881e"/>
    </linearGradient>
    <linearGradient id="level3Bg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#8b1a1a"/>
      <stop offset="100%" style="stop-color:#6b1515"/>
    </linearGradient>
        <filter id="shadow" x="-10%" y="-10%" width="120%" height="130%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="2" result="blur"/>
      <feOffset in="blur" dx="1" dy="2" result="offsetBlur"/>
      <feFlood flood-color="#000000" flood-opacity="0.5" result="color"/>
      <feComposite in="color" in2="offsetBlur" operator="in" result="shadow"/>
      <feMerge>
        <feMergeNode in="shadow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Title -->
  <text x="400" y="30" text-anchor="middle" font-size="18" font-weight="bold" fill="#1e3a5f">OWASP SCVS (Software Component Verification Standard)</text>
  <text x="400" y="50" text-anchor="middle" font-size="11" fill="#666">Progressive Levels for Supply Chain Security Maturity</text>

  <!-- Level 1 -->
  <g transform="translate(40, 70)">
    <rect x="0" y="0" width="230" height="430" rx="8" fill="url(#level1Bg)" filter="url(#shadow)"/>

    <text x="115" y="30" text-anchor="middle" font-size="16" font-weight="bold" fill="white">Level 1</text>
    <text x="115" y="50" text-anchor="middle" font-size="12" fill="#d0f0d0">FOUNDATIONAL</text>

    <line x1="20" y1="65" x2="210" y2="65" stroke="rgba(255,255,255,0.3)"/>

    <text x="20" y="90" font-size="10" font-weight="bold" fill="white">Purpose:</text>
    <text x="20" y="105" font-size="9" fill="#e0f8e0">Basic supply chain hygiene</text>
    <text x="20" y="120" font-size="9" fill="#e0f8e0">suitable for all software</text>

    <line x1="20" y1="140" x2="210" y2="140" stroke="rgba(255,255,255,0.2)"/>

    <text x="20" y="160" font-size="10" font-weight="bold" fill="white">Requirements:</text>

    <circle cx="25" cy="180" r="3" fill="#d0f0d0"/>
    <text x="35" y="184" font-size="9" fill="#e0f8e0">Maintain SBOM</text>

    <circle cx="25" cy="200" r="3" fill="#d0f0d0"/>
    <text x="35" y="204" font-size="9" fill="#e0f8e0">Use known, reputable sources</text>

    <circle cx="25" cy="220" r="3" fill="#d0f0d0"/>
    <text x="35" y="224" font-size="9" fill="#e0f8e0">Identify known vulnerabilities</text>

    <circle cx="25" cy="240" r="3" fill="#d0f0d0"/>
    <text x="35" y="244" font-size="9" fill="#e0f8e0">Basic provenance verification</text>

    <circle cx="25" cy="260" r="3" fill="#d0f0d0"/>
    <text x="35" y="264" font-size="9" fill="#e0f8e0">Document build systems</text>

    <circle cx="25" cy="280" r="3" fill="#d0f0d0"/>
    <text x="35" y="284" font-size="9" fill="#e0f8e0">Component inventory exists</text>

    <line x1="20" y1="305" x2="210" y2="305" stroke="rgba(255,255,255,0.2)"/>

    <text x="20" y="330" font-size="10" font-weight="bold" fill="white">Suitable For:</text>
    <text x="20" y="350" font-size="9" fill="#e0f8e0">All software projects</text>
    <text x="20" y="365" font-size="9" fill="#e0f8e0">Minimum baseline</text>

    <rect x="20" y="390" width="190" height="25" rx="4" fill="rgba(255,255,255,0.15)"/>
    <text x="115" y="407" text-anchor="middle" font-size="10" font-weight="bold" fill="white">Effort: Days to Weeks</text>
  </g>

  <!-- Level 2 -->
  <g transform="translate(285, 70)">
    <rect x="0" y="0" width="230" height="430" rx="8" fill="url(#level2Bg)" filter="url(#shadow)"/>

    <text x="115" y="30" text-anchor="middle" font-size="16" font-weight="bold" fill="white">Level 2</text>
    <text x="115" y="50" text-anchor="middle" font-size="12" fill="#fff8e0">STANDARD</text>

    <line x1="20" y1="65" x2="210" y2="65" stroke="rgba(255,255,255,0.3)"/>

    <text x="20" y="90" font-size="10" font-weight="bold" fill="white">Purpose:</text>
    <text x="20" y="105" font-size="9" fill="#fff8e0">Industry best practice for</text>
    <text x="20" y="120" font-size="9" fill="#fff8e0">most commercial software</text>

    <line x1="20" y1="140" x2="210" y2="140" stroke="rgba(255,255,255,0.2)"/>

    <text x="20" y="160" font-size="10" font-weight="bold" fill="white">Requirements (L1 plus):</text>

    <circle cx="25" cy="180" r="3" fill="#fff8e0"/>
    <text x="35" y="184" font-size="9" fill="#fff8e0">Automated dependency analysis</text>

    <circle cx="25" cy="200" r="3" fill="#fff8e0"/>
    <text x="35" y="204" font-size="9" fill="#fff8e0">License compliance verification</text>

    <circle cx="25" cy="220" r="3" fill="#fff8e0"/>
    <text x="35" y="224" font-size="9" fill="#fff8e0">Component update processes</text>

    <circle cx="25" cy="240" r="3" fill="#fff8e0"/>
    <text x="35" y="244" font-size="9" fill="#fff8e0">Vulnerability response SLA</text>

    <circle cx="25" cy="260" r="3" fill="#fff8e0"/>
    <text x="35" y="264" font-size="9" fill="#fff8e0">Integrity verification</text>

    <circle cx="25" cy="280" r="3" fill="#fff8e0"/>
    <text x="35" y="284" font-size="9" fill="#fff8e0">Machine-readable SBOM</text>

    <line x1="20" y1="305" x2="210" y2="305" stroke="rgba(255,255,255,0.2)"/>

    <text x="20" y="330" font-size="10" font-weight="bold" fill="white">Suitable For:</text>
    <text x="20" y="350" font-size="9" fill="#fff8e0">Commercial software</text>
    <text x="20" y="365" font-size="9" fill="#fff8e0">Enterprise applications</text>

    <rect x="20" y="390" width="190" height="25" rx="4" fill="rgba(255,255,255,0.15)"/>
    <text x="115" y="407" text-anchor="middle" font-size="10" font-weight="bold" fill="white">Effort: Weeks to Months</text>
  </g>

  <!-- Level 3 -->
  <g transform="translate(530, 70)">
    <rect x="0" y="0" width="230" height="430" rx="8" fill="url(#level3Bg)" filter="url(#shadow)"/>

    <text x="115" y="30" text-anchor="middle" font-size="16" font-weight="bold" fill="white">Level 3</text>
    <text x="115" y="50" text-anchor="middle" font-size="12" fill="#ffcccc">ADVANCED</text>

    <line x1="20" y1="65" x2="210" y2="65" stroke="rgba(255,255,255,0.3)"/>

    <text x="20" y="90" font-size="10" font-weight="bold" fill="white">Purpose:</text>
    <text x="20" y="105" font-size="9" fill="#f0d0d0">High-assurance environments</text>
    <text x="20" y="120" font-size="9" fill="#f0d0d0">where compromise is severe</text>

    <line x1="20" y1="140" x2="210" y2="140" stroke="rgba(255,255,255,0.2)"/>

    <text x="20" y="160" font-size="10" font-weight="bold" fill="white">Requirements (L2 plus):</text>

    <circle cx="25" cy="180" r="3" fill="#ffcccc"/>
    <text x="35" y="184" font-size="9" fill="#f0d0d0">Cryptographic verification</text>

    <circle cx="25" cy="200" r="3" fill="#ffcccc"/>
    <text x="35" y="204" font-size="9" fill="#f0d0d0">Comprehensive provenance</text>

    <circle cx="25" cy="220" r="3" fill="#ffcccc"/>
    <text x="35" y="224" font-size="9" fill="#f0d0d0">Transitive dep. analysis</text>

    <circle cx="25" cy="240" r="3" fill="#ffcccc"/>
    <text x="35" y="244" font-size="9" fill="#f0d0d0">Reproducible builds</text>

    <circle cx="25" cy="260" r="3" fill="#ffcccc"/>
    <text x="35" y="264" font-size="9" fill="#f0d0d0">Security assessment beyond CVE</text>

    <circle cx="25" cy="280" r="3" fill="#ffcccc"/>
    <text x="35" y="284" font-size="9" fill="#f0d0d0">Signed SBOMs</text>

    <line x1="20" y1="305" x2="210" y2="305" stroke="rgba(255,255,255,0.2)"/>

    <text x="20" y="330" font-size="10" font-weight="bold" fill="white">Suitable For:</text>
    <text x="20" y="350" font-size="9" fill="#f0d0d0">Critical infrastructure</text>
    <text x="20" y="365" font-size="9" fill="#f0d0d0">Financial, healthcare, defense</text>

    <rect x="20" y="390" width="190" height="25" rx="4" fill="rgba(255,255,255,0.15)"/>
    <text x="115" y="407" text-anchor="middle" font-size="10" font-weight="bold" fill="white">Effort: Months</text>
  </g>
</svg>