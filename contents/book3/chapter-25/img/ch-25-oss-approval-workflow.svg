<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 650" font-family="Libertinus Sans">
  <defs>
    <linearGradient id="autoGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#48bb78"/>
      <stop offset="100%" style="stop-color:#38a169"/>
    </linearGradient>
    <linearGradient id="reviewGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ed8936"/>
      <stop offset="100%" style="stop-color:#dd6b20"/>
    </linearGradient>
    <linearGradient id="blockGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#fc8181"/>
      <stop offset="100%" style="stop-color:#e53e3e"/>
    </linearGradient>
        <filter id="shadow" x="-10%" y="-10%" width="120%" height="130%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="2" result="blur"/>
      <feOffset in="blur" dx="1" dy="2" result="offsetBlur"/>
      <feFlood flood-color="#000000" flood-opacity="0.5" result="color"/>
      <feComposite in="color" in2="offsetBlur" operator="in" result="shadow"/>
      <feMerge>
        <feMergeNode in="shadow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <marker id="arrow" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">
      <polygon points="0 0, 10 4, 0 8" fill="#718096"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="900" height="650" fill="#f7fafc"/>

  <!-- Title -->
  <text x="450" y="35" text-anchor="middle" font-size="20" font-weight="bold" fill="#1a202c">Open Source Dependency Approval Workflow</text>
  <text x="450" y="55" text-anchor="middle" font-size="12" fill="#718096">Risk-tiered automated and manual approval process</text>

  <!-- Flowchart -->
  <g transform="translate(450, 85)">
    <!-- Developer adds dependency -->
    <g transform="translate(-80, 0)">
      <rect x="0" y="0" width="160" height="50" rx="25" fill="#4a5568" filter="url(#shadow)"/>
      <text x="80" y="30" text-anchor="middle" font-size="11" font-weight="bold" fill="white">Developer adds</text>
      <text x="80" y="43" text-anchor="middle" font-size="9" fill="#e2e8f0">dependency</text>
    </g>

    <!-- Arrow -->
    <line x1="0" y1="50" x2="0" y2="75" stroke="#718096" stroke-width="2" marker-end="url(#arrow)"/>

    <!-- Automated checks -->
    <g transform="translate(-100, 80)">
      <rect x="0" y="0" width="200" height="60" rx="6" fill="#bee3f8" stroke="#3182ce" stroke-width="2" filter="url(#shadow)"/>
      <text x="100" y="22" text-anchor="middle" font-size="11" font-weight="bold" fill="#2a4365">Automated Checks</text>
      <text x="100" y="38" text-anchor="middle" font-size="9" fill="#4a5568">SCA scan: License, CVEs,</text>
      <text x="100" y="50" text-anchor="middle" font-size="9" fill="#4a5568">Maintenance, Adoption</text>
    </g>

    <!-- Arrow and decision -->
    <line x1="0" y1="140" x2="0" y2="170" stroke="#718096" stroke-width="2"/>

    <!-- Decision diamond -->
    <g transform="translate(-50, 175)">
      <polygon points="50,0 100,35 50,70 0,35" fill="#f7fafc" stroke="#4a5568" stroke-width="2" filter="url(#shadow)"/>
      <text x="50" y="32" text-anchor="middle" font-size="10" font-weight="bold" fill="#2d3748">Risk</text>
      <text x="50" y="45" text-anchor="middle" font-size="10" font-weight="bold" fill="#2d3748">Level?</text>
    </g>

    <!-- Three branches -->
    <!-- Low Risk - Left branch (Auto-approve) -->
    <line x1="-50" y1="210" x2="-200" y2="210" stroke="#38a169" stroke-width="2"/>
    <line x1="-200" y1="210" x2="-200" y2="280" stroke="#38a169" stroke-width="2" marker-end="url(#arrow)"/>
    <text x="-125" y="200" text-anchor="middle" font-size="9" font-weight="bold" fill="#38a169">LOW</text>

    <g transform="translate(-280, 285)">
      <rect x="0" y="0" width="160" height="60" rx="6" fill="url(#autoGrad)" filter="url(#shadow)"/>
      <text x="80" y="22" text-anchor="middle" font-size="11" font-weight="bold" fill="white">Auto-Approved</text>
      <text x="80" y="38" text-anchor="middle" font-size="9" fill="#e2e8f0">Permissive license</text>
      <text x="80" y="50" text-anchor="middle" font-size="9" fill="#e2e8f0">No vulnerabilities</text>
    </g>

    <!-- Medium Risk - Straight down (Manual review) -->
    <line x1="0" y1="245" x2="0" y2="280" stroke="#dd6b20" stroke-width="2" marker-end="url(#arrow)"/>
    <text x="40" y="265" text-anchor="start" font-size="9" font-weight="bold" fill="#dd6b20">MEDIUM</text>

    <g transform="translate(-80, 285)">
      <rect x="0" y="0" width="160" height="60" rx="6" fill="url(#reviewGrad)" filter="url(#shadow)"/>
      <text x="80" y="22" text-anchor="middle" font-size="11" font-weight="bold" fill="white">Manual Review</text>
      <text x="80" y="38" text-anchor="middle" font-size="9" fill="#fefcbf">Copyleft license, or</text>
      <text x="80" y="50" text-anchor="middle" font-size="9" fill="#fefcbf">maintenance concerns</text>
    </g>

    <!-- High Risk - Right branch (Blocked) -->
    <line x1="50" y1="210" x2="200" y2="210" stroke="#e53e3e" stroke-width="2"/>
    <line x1="200" y1="210" x2="200" y2="280" stroke="#e53e3e" stroke-width="2" marker-end="url(#arrow)"/>
    <text x="125" y="200" text-anchor="middle" font-size="9" font-weight="bold" fill="#e53e3e">HIGH/BLOCKED</text>

    <g transform="translate(120, 285)">
      <rect x="0" y="0" width="160" height="60" rx="6" fill="url(#blockGrad)" filter="url(#shadow)"/>
      <text x="80" y="22" text-anchor="middle" font-size="11" font-weight="bold" fill="white">Blocked</text>
      <text x="80" y="38" text-anchor="middle" font-size="9" fill="#fefcbf">Prohibited license, or</text>
      <text x="80" y="50" text-anchor="middle" font-size="9" fill="#fefcbf">critical vulnerabilities</text>
    </g>

    <!-- Proceed from auto-approve -->
    <line x1="-200" y1="345" x2="-200" y2="380" stroke="#38a169" stroke-width="2" marker-end="url(#arrow)"/>
    <g transform="translate(-280, 385)">
      <rect x="0" y="0" width="160" height="40" rx="20" fill="#c6f6d5" stroke="#38a169" stroke-width="2"/>
      <text x="80" y="25" text-anchor="middle" font-size="11" font-weight="bold" fill="#22543d">Proceed</text>
    </g>

    <!-- Manual review decision -->
    <line x1="0" y1="345" x2="0" y2="375" stroke="#718096" stroke-width="2"/>
    <g transform="translate(-40, 380)">
      <polygon points="40,0 80,30 40,60 0,30" fill="#f7fafc" stroke="#dd6b20" stroke-width="2"/>
      <text x="40" y="35" text-anchor="middle" font-size="9" font-weight="bold" fill="#7b341e">Approved?</text>
    </g>

    <line x1="-40" y1="410" x2="-120" y2="410" stroke="#38a169" stroke-width="2"/>
    <line x1="-120" y1="410" x2="-120" y2="460" stroke="#38a169" stroke-width="2" marker-end="url(#arrow)"/>
    <text x="-80" y="400" text-anchor="middle" font-size="8" fill="#38a169">YES</text>

    <g transform="translate(-200, 465)">
      <rect x="0" y="0" width="160" height="40" rx="20" fill="#c6f6d5" stroke="#38a169" stroke-width="2"/>
      <text x="80" y="25" text-anchor="middle" font-size="11" font-weight="bold" fill="#22543d">Proceed</text>
    </g>

    <line x1="40" y1="410" x2="120" y2="410" stroke="#e53e3e" stroke-width="2"/>
    <line x1="120" y1="410" x2="120" y2="460" stroke="#e53e3e" stroke-width="2" marker-end="url(#arrow)"/>
    <text x="80" y="400" text-anchor="middle" font-size="8" fill="#e53e3e">NO</text>

    <!-- Blocked leads to exception process -->
    <line x1="200" y1="345" x2="200" y2="380" stroke="#718096" stroke-width="2" marker-end="url(#arrow)"/>

    <g transform="translate(40, 465)">
      <rect x="0" y="0" width="160" height="40" rx="6" fill="#f3e8ff" stroke="#9f7aea" stroke-width="2"/>
      <text x="80" y="25" text-anchor="middle" font-size="10" font-weight="bold" fill="#553c9a">Exception Process</text>
    </g>

    <g transform="translate(120, 385)">
      <rect x="0" y="0" width="160" height="60" rx="6" fill="#f3e8ff" stroke="#9f7aea" stroke-width="2"/>
      <text x="80" y="22" text-anchor="middle" font-size="10" font-weight="bold" fill="#553c9a">Exception Request</text>
      <text x="80" y="38" text-anchor="middle" font-size="9" fill="#6b46c1">Business justification</text>
      <text x="80" y="50" text-anchor="middle" font-size="9" fill="#6b46c1">Risk mitigation plan</text>
    </g>
  </g>

  <!-- Auto-approval criteria box -->
  <g transform="translate(30, 430)">
    <rect x="0" y="0" width="220" height="200" rx="8" fill="white" stroke="#38a169" stroke-width="2" filter="url(#shadow)"/>
    <rect x="0" y="0" width="220" height="30" rx="8" fill="#38a169"/>
    <rect x="0" y="22" width="220" height="8" fill="#38a169"/>
    <text x="110" y="20" text-anchor="middle" font-size="11" font-weight="bold" fill="white">Auto-Approval Criteria</text>

    <g transform="translate(15, 45)">
      <text x="0" y="0" font-size="9" font-weight="bold" fill="#22543d">License:</text>
      <text x="0" y="14" font-size="8" fill="#4a5568">MIT, Apache-2.0, BSD-2/3, ISC</text>

      <text x="0" y="35" font-size="9" font-weight="bold" fill="#22543d">Security:</text>
      <text x="0" y="49" font-size="8" fill="#4a5568">No critical/high CVEs</text>

      <text x="0" y="70" font-size="9" font-weight="bold" fill="#22543d">Maintenance:</text>
      <text x="0" y="84" font-size="8" fill="#4a5568">Commit in last 2 years</text>
      <text x="0" y="96" font-size="8" fill="#4a5568">At least 1 contributor</text>

      <text x="0" y="117" font-size="9" font-weight="bold" fill="#22543d">Adoption:</text>
      <text x="0" y="131" font-size="8" fill="#4a5568">1000+ weekly downloads</text>
      <text x="0" y="143" font-size="8" fill="#4a5568">10+ dependent packages</text>
    </g>
  </g>

  <!-- Manual review triggers box -->
  <g transform="translate(650, 430)">
    <rect x="0" y="0" width="220" height="200" rx="8" fill="white" stroke="#dd6b20" stroke-width="2" filter="url(#shadow)"/>
    <rect x="0" y="0" width="220" height="30" rx="8" fill="#dd6b20"/>
    <rect x="0" y="22" width="220" height="8" fill="#dd6b20"/>
    <text x="110" y="20" text-anchor="middle" font-size="11" font-weight="bold" fill="white">Manual Review Triggers</text>

    <g transform="translate(15, 45)">
      <circle cx="5" cy="4" r="3" fill="#dd6b20"/>
      <text x="15" y="8" font-size="8" fill="#4a5568">Copyleft license (GPL, LGPL)</text>

      <circle cx="5" cy="24" r="3" fill="#dd6b20"/>
      <text x="15" y="28" font-size="8" fill="#4a5568">License not in approved list</text>

      <circle cx="5" cy="44" r="3" fill="#dd6b20"/>
      <text x="15" y="48" font-size="8" fill="#4a5568">Package < 6 months old</text>

      <circle cx="5" cy="64" r="3" fill="#dd6b20"/>
      <text x="15" y="68" font-size="8" fill="#4a5568">< 100 downloads/week</text>

      <circle cx="5" cy="84" r="3" fill="#dd6b20"/>
      <text x="15" y="88" font-size="8" fill="#4a5568">No commits in 2+ years</text>

      <circle cx="5" cy="104" r="3" fill="#dd6b20"/>
      <text x="15" y="108" font-size="8" fill="#4a5568">Recent ownership change</text>

      <circle cx="5" cy="124" r="3" fill="#dd6b20"/>
      <text x="15" y="128" font-size="8" fill="#4a5568">Name similar to popular pkg</text>

      <circle cx="5" cy="144" r="3" fill="#dd6b20"/>
      <text x="15" y="148" font-size="8" fill="#4a5568">Critical vulnerabilities exist</text>
    </g>
  </g>
</svg>