<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 480" font-family="Libertinus Sans">
  <defs>
    <linearGradient id="criticalGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#8b1a1a"/>
      <stop offset="100%" style="stop-color:#a82828"/>
    </linearGradient>
    <linearGradient id="highGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#c76a1d"/>
      <stop offset="100%" style="stop-color:#d98a40"/>
    </linearGradient>
    <linearGradient id="mediumGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#c9a227"/>
      <stop offset="100%" style="stop-color:#dbb84a"/>
    </linearGradient>
    <linearGradient id="lowGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#4a7c59"/>
      <stop offset="100%" style="stop-color:#6b9c73"/>
    </linearGradient>
        <filter id="shadow" x="-10%" y="-10%" width="120%" height="130%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="2" result="blur"/>
      <feOffset in="blur" dx="1" dy="2" result="offsetBlur"/>
      <feFlood flood-color="#000000" flood-opacity="0.5" result="color"/>
      <feComposite in="color" in2="offsetBlur" operator="in" result="shadow"/>
      <feMerge>
        <feMergeNode in="shadow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Title -->
  <text x="400" y="35" text-anchor="middle" font-size="20" font-weight="bold" fill="#1e3a5f">Vendor Tiering by Criticality</text>
  <text x="400" y="55" text-anchor="middle" font-size="12" fill="#666">Allocate assessment effort proportionally to vendor risk</text>

  <!-- Header Row -->
  <rect x="30" y="75" width="110" height="40" rx="4" fill="#1e3a5f"/>
  <text x="85" y="100" text-anchor="middle" font-size="12" font-weight="bold" fill="white">Tier</text>

  <rect x="145" y="75" width="200" height="40" rx="4" fill="#1e3a5f"/>
  <text x="245" y="100" text-anchor="middle" font-size="12" font-weight="bold" fill="white">Criteria</text>

  <rect x="350" y="75" width="420" height="40" rx="4" fill="#1e3a5f"/>
  <text x="560" y="100" text-anchor="middle" font-size="12" font-weight="bold" fill="white">Assessment Approach</text>

  <!-- Critical Tier -->
  <rect x="30" y="120" width="110" height="85" rx="4" fill="url(#criticalGrad)" filter="url(#shadow)"/>
  <text x="85" y="155" text-anchor="middle" font-size="14" font-weight="bold" fill="white">CRITICAL</text>
  <text x="85" y="175" text-anchor="middle" font-size="10" fill="#ffcccc">Highest Risk</text>

  <rect x="145" y="120" width="200" height="85" rx="4" fill="#fef2f2" stroke="#e5c4c4"/>
  <text x="155" y="142" font-size="10" fill="#333">Core business systems</text>
  <text x="155" y="158" font-size="10" fill="#333">Customer-facing applications</text>
  <text x="155" y="174" font-size="10" fill="#333">Contains sensitive data</text>
  <text x="155" y="190" font-size="10" fill="#333">Hard to replace</text>

  <rect x="350" y="120" width="420" height="85" rx="4" fill="#fef2f2" stroke="#e5c4c4"/>
  <text x="360" y="142" font-size="10" fill="#333">Full assessment, on-site possible</text>
  <text x="360" y="158" font-size="10" fill="#333">Active SBOM tracking and security ratings</text>
  <text x="360" y="174" font-size="10" fill="#333">Real-time alerts and continuous monitoring</text>
  <text x="360" y="190" font-size="10" fill="#333">Contractual requirements, executive relationship, annual re-assessment</text>

  <!-- High Tier -->
  <rect x="30" y="210" width="110" height="85" rx="4" fill="url(#highGrad)" filter="url(#shadow)"/>
  <text x="85" y="245" text-anchor="middle" font-size="14" font-weight="bold" fill="white">HIGH</text>
  <text x="85" y="265" text-anchor="middle" font-size="10" fill="#ffe8d0">Elevated Risk</text>

  <rect x="145" y="210" width="200" height="85" rx="4" fill="#fef8f0" stroke="#e5d8c4"/>
  <text x="155" y="232" font-size="10" fill="#333">Important functions</text>
  <text x="155" y="248" font-size="10" fill="#333">Significant data access</text>
  <text x="155" y="264" font-size="10" fill="#333">Moderate replacement difficulty</text>
  <text x="155" y="280" font-size="10" fill="#333">Some integration depth</text>

  <rect x="350" y="210" width="420" height="85" rx="4" fill="#fef8f0" stroke="#e5d8c4"/>
  <text x="360" y="232" font-size="10" fill="#333">Detailed questionnaire with remote interview</text>
  <text x="360" y="248" font-size="10" fill="#333">Security ratings and breach monitoring</text>
  <text x="360" y="264" font-size="10" fill="#333">Contractual requirements</text>
  <text x="360" y="280" font-size="10" fill="#333">Re-assessment every 18 months</text>

  <!-- Medium Tier -->
  <rect x="30" y="300" width="110" height="85" rx="4" fill="url(#mediumGrad)" filter="url(#shadow)"/>
  <text x="85" y="335" text-anchor="middle" font-size="14" font-weight="bold" fill="white">MEDIUM</text>
  <text x="85" y="355" text-anchor="middle" font-size="10" fill="#fff8e0">Moderate Risk</text>

  <rect x="145" y="300" width="200" height="85" rx="4" fill="#fefef2" stroke="#e5e5c4"/>
  <text x="155" y="322" font-size="10" fill="#333">Standard business functions</text>
  <text x="155" y="338" font-size="10" fill="#333">Limited data access</text>
  <text x="155" y="354" font-size="10" fill="#333">Alternatives available</text>
  <text x="155" y="370" font-size="10" fill="#333">Moderate integration</text>

  <rect x="350" y="300" width="420" height="85" rx="4" fill="#fefef2" stroke="#e5e5c4"/>
  <text x="360" y="322" font-size="10" fill="#333">Standard questionnaire with evidence review</text>
  <text x="360" y="338" font-size="10" fill="#333">Security ratings and periodic spot-checks</text>
  <text x="360" y="354" font-size="10" fill="#333">Basic contractual requirements</text>
  <text x="360" y="370" font-size="10" fill="#333">Re-assessment every 2 years</text>

  <!-- Low Tier -->
  <rect x="30" y="390" width="110" height="85" rx="4" fill="url(#lowGrad)" filter="url(#shadow)"/>
  <text x="85" y="425" text-anchor="middle" font-size="14" font-weight="bold" fill="white">LOW</text>
  <text x="85" y="445" text-anchor="middle" font-size="10" fill="#d0f0d0">Lower Risk</text>

  <rect x="145" y="390" width="200" height="85" rx="4" fill="#f2fef4" stroke="#c4e5c8"/>
  <text x="155" y="412" font-size="10" fill="#333">Minor functions</text>
  <text x="155" y="428" font-size="10" fill="#333">No sensitive access</text>
  <text x="155" y="444" font-size="10" fill="#333">Easily replaced</text>
  <text x="155" y="460" font-size="10" fill="#333">Minimal integration</text>

  <rect x="350" y="390" width="420" height="85" rx="4" fill="#f2fef4" stroke="#c4e5c8"/>
  <text x="360" y="412" font-size="10" fill="#333">Abbreviated questionnaire</text>
  <text x="360" y="428" font-size="10" fill="#333">Breach monitoring only</text>
  <text x="360" y="444" font-size="10" fill="#333">Spot checks as needed</text>
  <text x="360" y="460" font-size="10" fill="#333">Re-assessment every 3 years or on renewal</text>
</svg>