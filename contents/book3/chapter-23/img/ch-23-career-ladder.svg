<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" font-family="Libertinus Sans">
  <defs>
    <linearGradient id="icGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#2d5a87"/>
      <stop offset="100%" style="stop-color:#4a7c9c"/>
    </linearGradient>
    <linearGradient id="mgmtGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#7a4a87"/>
      <stop offset="100%" style="stop-color:#9a6aa7"/>
    </linearGradient>
        <filter id="shadow" x="-10%" y="-10%" width="120%" height="130%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="2" result="blur"/>
      <feOffset in="blur" dx="1" dy="2" result="offsetBlur"/>
      <feFlood flood-color="#000000" flood-opacity="0.5" result="color"/>
      <feComposite in="color" in2="offsetBlur" operator="in" result="shadow"/>
      <feMerge>
        <feMergeNode in="shadow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#888"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="400" y="35" text-anchor="middle" font-size="20" font-weight="bold" fill="#1e3a5f">Supply Chain Security Career Progression</text>

  <!-- Individual Contributor Track - Left Side -->
  <text x="200" y="70" text-anchor="middle" font-size="14" font-weight="bold" fill="#2d5a87">Individual Contributor Track</text>

  <!-- IC Level 1: Junior -->
  <rect x="80" y="90" width="240" height="55" rx="5" fill="url(#icGrad)" filter="url(#shadow)"/>
  <text x="200" y="112" text-anchor="middle" font-size="12" font-weight="bold" fill="white">Junior Analyst</text>
  <text x="200" y="128" text-anchor="middle" font-size="10" fill="#cce0ff">(0-2 years)</text>
  <text x="200" y="140" text-anchor="middle" font-size="9" fill="#e0f0ff">Learn fundamentals, handle routine tasks</text>

  <!-- Arrow up -->
  <line x1="200" y1="145" x2="200" y2="160" stroke="#888" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- IC Level 2: Mid -->
  <rect x="80" y="165" width="240" height="55" rx="5" fill="url(#icGrad)" filter="url(#shadow)"/>
  <text x="200" y="187" text-anchor="middle" font-size="12" font-weight="bold" fill="white">Analyst / Engineer</text>
  <text x="200" y="203" text-anchor="middle" font-size="10" fill="#cce0ff">(2-5 years)</text>
  <text x="200" y="215" text-anchor="middle" font-size="9" fill="#e0f0ff">Independent contributor, handle complex issues</text>

  <!-- Arrow up -->
  <line x1="200" y1="220" x2="200" y2="235" stroke="#888" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- IC Level 3: Senior -->
  <rect x="80" y="240" width="240" height="55" rx="5" fill="url(#icGrad)" filter="url(#shadow)"/>
  <text x="200" y="262" text-anchor="middle" font-size="12" font-weight="bold" fill="white">Senior Engineer</text>
  <text x="200" y="278" text-anchor="middle" font-size="10" fill="#cce0ff">(5-8 years)</text>
  <text x="200" y="290" text-anchor="middle" font-size="9" fill="#e0f0ff">Technical leader, mentor others</text>

  <!-- Arrow up -->
  <line x1="200" y1="295" x2="200" y2="310" stroke="#888" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- IC Level 4: Staff -->
  <rect x="80" y="315" width="240" height="55" rx="5" fill="url(#icGrad)" filter="url(#shadow)"/>
  <text x="200" y="337" text-anchor="middle" font-size="12" font-weight="bold" fill="white">Staff / Principal Engineer</text>
  <text x="200" y="353" text-anchor="middle" font-size="10" fill="#cce0ff">(8+ years)</text>
  <text x="200" y="365" text-anchor="middle" font-size="9" fill="#e0f0ff">Organizational influence, architecture</text>

  <!-- Arrow up -->
  <line x1="200" y1="370" x2="200" y2="385" stroke="#888" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- IC Level 5: Distinguished -->
  <rect x="80" y="390" width="240" height="55" rx="5" fill="url(#icGrad)" filter="url(#shadow)"/>
  <text x="200" y="412" text-anchor="middle" font-size="12" font-weight="bold" fill="white">Distinguished Engineer / Fellow</text>
  <text x="200" y="428" text-anchor="middle" font-size="10" fill="#cce0ff">(Industry Leader)</text>
  <text x="200" y="440" text-anchor="middle" font-size="9" fill="#e0f0ff">Industry influence, strategic direction</text>

  <!-- Management Track - Right Side -->
  <text x="600" y="70" text-anchor="middle" font-size="14" font-weight="bold" fill="#7a4a87">Management Track</text>

  <!-- Tech Foundation -->
  <rect x="480" y="90" width="240" height="55" rx="5" fill="#e8e0f0" stroke="#9a6aa7" stroke-width="1"/>
  <text x="600" y="112" text-anchor="middle" font-size="12" font-weight="bold" fill="#7a4a87">Technical Foundation</text>
  <text x="600" y="128" text-anchor="middle" font-size="10" fill="#8a5a97">(5+ years IC experience)</text>
  <text x="600" y="140" text-anchor="middle" font-size="9" fill="#666">Strong technical background required</text>

  <!-- Arrow up -->
  <line x1="600" y1="145" x2="600" y2="160" stroke="#888" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Mgmt Level 1: Team Lead -->
  <rect x="480" y="165" width="240" height="55" rx="5" fill="url(#mgmtGrad)" filter="url(#shadow)"/>
  <text x="600" y="187" text-anchor="middle" font-size="12" font-weight="bold" fill="white">Team Lead</text>
  <text x="600" y="203" text-anchor="middle" font-size="10" fill="#e8d0f0">Small team leadership</text>
  <text x="600" y="215" text-anchor="middle" font-size="9" fill="#f0e8f8">Hands-on plus coordination</text>

  <!-- Arrow up -->
  <line x1="600" y1="220" x2="600" y2="235" stroke="#888" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Mgmt Level 2: Manager -->
  <rect x="480" y="240" width="240" height="55" rx="5" fill="url(#mgmtGrad)" filter="url(#shadow)"/>
  <text x="600" y="262" text-anchor="middle" font-size="12" font-weight="bold" fill="white">Manager</text>
  <text x="600" y="278" text-anchor="middle" font-size="10" fill="#e8d0f0">Team management</text>
  <text x="600" y="290" text-anchor="middle" font-size="9" fill="#f0e8f8">Program ownership, stakeholder engagement</text>

  <!-- Arrow up -->
  <line x1="600" y1="295" x2="600" y2="310" stroke="#888" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Mgmt Level 3: Sr Manager / Director -->
  <rect x="480" y="315" width="240" height="55" rx="5" fill="url(#mgmtGrad)" filter="url(#shadow)"/>
  <text x="600" y="337" text-anchor="middle" font-size="12" font-weight="bold" fill="white">Senior Manager / Director</text>
  <text x="600" y="353" text-anchor="middle" font-size="10" fill="#e8d0f0">Multiple teams or large program</text>
  <text x="600" y="365" text-anchor="middle" font-size="9" fill="#f0e8f8">Executive engagement</text>

  <!-- Arrow up -->
  <line x1="600" y1="370" x2="600" y2="385" stroke="#888" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Mgmt Level 4: VP / CISO -->
  <rect x="480" y="390" width="240" height="55" rx="5" fill="url(#mgmtGrad)" filter="url(#shadow)"/>
  <text x="600" y="412" text-anchor="middle" font-size="12" font-weight="bold" fill="white">VP / CISO</text>
  <text x="600" y="428" text-anchor="middle" font-size="10" fill="#e8d0f0">Organizational leadership</text>
  <text x="600" y="440" text-anchor="middle" font-size="9" fill="#f0e8f8">Strategy, board engagement</text>

  <!-- Crossover Arrow from IC Senior to Team Lead -->
  <path d="M 320 267 Q 400 190 480 192" fill="none" stroke="#888" stroke-width="1.5" stroke-dasharray="4,2" marker-end="url(#arrow)"/>
  <text x="400" y="215" text-anchor="middle" font-size="9" fill="#666">Transition</text>
  <text x="400" y="227" text-anchor="middle" font-size="9" fill="#666">opportunity</text>

  <!-- Legend Box -->
  <rect x="50" y="460" width="700" height="35" rx="4" fill="#f8f8f8" stroke="#e0e0e0"/>
  <rect x="70" y="472" width="12" height="12" rx="2" fill="url(#icGrad)"/>
  <text x="88" y="482" font-size="10" fill="#444">Individual Contributor</text>
  <rect x="220" y="472" width="12" height="12" rx="2" fill="url(#mgmtGrad)"/>
  <text x="238" y="482" font-size="10" fill="#444">Management</text>
  <line x1="370" y1="478" x2="400" y2="478" stroke="#888" stroke-width="1.5" stroke-dasharray="4,2"/>
  <text x="408" y="482" font-size="10" fill="#444">Career transition path</text>
</svg>