<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 550">
  <defs>
        <filter id="shadow" x="-10%" y="-10%" width="120%" height="130%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="2" result="blur"/>
      <feOffset in="blur" dx="1" dy="2" result="offsetBlur"/>
      <feFlood flood-color="#000000" flood-opacity="0.5" result="color"/>
      <feComposite in="color" in2="offsetBlur" operator="in" result="shadow"/>
      <feMerge>
        <feMergeNode in="shadow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="900" height="550" fill="#F8FAFC"/>

  <!-- Title -->
  <text x="450" y="35" font-family="Libertinus Sans" font-size="22" font-weight="bold" fill="#1E293B" text-anchor="middle">Measuring Training Effectiveness</text>
  <text x="450" y="55" font-family="Libertinus Sans" font-size="13" fill="#64748B" text-anchor="middle">Kirkpatrick Model adapted for supply chain security training</text>

  <!-- Level 1: Reaction -->
  <g filter="url(#shadow)">
    <rect x="50" y="90" width="380" height="95" rx="8" fill="#3B82F6"/>
    <text x="70" y="120" font-family="Libertinus Sans" font-size="16" font-weight="bold" fill="white">Level 1: Reaction</text>
    <text x="70" y="142" font-family="Libertinus Sans" font-size="11" fill="#DBEAFE">Did participants find the training valuable?</text>
    <text x="70" y="162" font-family="Libertinus Sans" font-size="10" fill="#BFDBFE">- Post-session surveys (NPS scores)</text>
    <text x="70" y="177" font-family="Libertinus Sans" font-size="10" fill="#BFDBFE">- Engagement metrics (completion rates, time spent)</text>
  </g>

  <!-- Level 1 Metrics -->
  <g filter="url(#shadow)">
    <rect x="470" y="90" width="380" height="95" rx="8" fill="white" stroke="#3B82F6" stroke-width="2"/>
    <text x="490" y="115" font-family="Libertinus Sans" font-size="12" font-weight="bold" fill="#3B82F6">Sample Metrics</text>
    <text x="490" y="138" font-family="Libertinus Sans" font-size="10" fill="#475569">- Satisfaction score: Target 4.0+/5.0</text>
    <text x="490" y="153" font-family="Libertinus Sans" font-size="10" fill="#475569">- Completion rate: Target 90%+</text>
    <text x="490" y="168" font-family="Libertinus Sans" font-size="10" fill="#475569">- Relevance rating: "Would recommend" 80%+</text>
  </g>

  <!-- Level 2: Learning -->
  <g filter="url(#shadow)">
    <rect x="50" y="200" width="380" height="95" rx="8" fill="#8B5CF6"/>
    <text x="70" y="230" font-family="Libertinus Sans" font-size="16" font-weight="bold" fill="white">Level 2: Learning</text>
    <text x="70" y="252" font-family="Libertinus Sans" font-size="11" fill="#E9D5FF">Did participants acquire the intended knowledge?</text>
    <text x="70" y="272" font-family="Libertinus Sans" font-size="10" fill="#DDD6FE">- Pre/post knowledge assessments</text>
    <text x="70" y="287" font-family="Libertinus Sans" font-size="10" fill="#DDD6FE">- Practical skill demonstrations, capture-the-flag</text>
  </g>

  <!-- Level 2 Metrics -->
  <g filter="url(#shadow)">
    <rect x="470" y="200" width="380" height="95" rx="8" fill="white" stroke="#8B5CF6" stroke-width="2"/>
    <text x="490" y="225" font-family="Libertinus Sans" font-size="12" font-weight="bold" fill="#8B5CF6">Sample Metrics</text>
    <text x="490" y="248" font-family="Libertinus Sans" font-size="10" fill="#475569">- Knowledge gain: 30%+ improvement pre-to-post</text>
    <text x="490" y="263" font-family="Libertinus Sans" font-size="10" fill="#475569">- Assessment pass rate: 85%+ achieve passing score</text>
    <text x="490" y="278" font-family="Libertinus Sans" font-size="10" fill="#475569">- Skill certification: 70%+ complete practical exam</text>
  </g>

  <!-- Level 3: Behavior -->
  <g filter="url(#shadow)">
    <rect x="50" y="310" width="380" height="95" rx="8" fill="#F59E0B"/>
    <text x="70" y="340" font-family="Libertinus Sans" font-size="16" font-weight="bold" fill="white">Level 3: Behavior</text>
    <text x="70" y="362" font-family="Libertinus Sans" font-size="11" fill="#FEF3C7">Are participants applying what they learned?</text>
    <text x="70" y="382" font-family="Libertinus Sans" font-size="10" fill="#FDE68A">- Observed practice changes (code reviews, PR patterns)</text>
    <text x="70" y="397" font-family="Libertinus Sans" font-size="10" fill="#FDE68A">- Tool adoption rates, security finding resolution</text>
  </g>

  <!-- Level 3 Metrics -->
  <g filter="url(#shadow)">
    <rect x="470" y="310" width="380" height="95" rx="8" fill="white" stroke="#F59E0B" stroke-width="2"/>
    <text x="490" y="335" font-family="Libertinus Sans" font-size="12" font-weight="bold" fill="#F59E0B">Sample Metrics</text>
    <text x="490" y="358" font-family="Libertinus Sans" font-size="10" fill="#475569">- Dependency pinning adoption: 50%+ increase</text>
    <text x="490" y="373" font-family="Libertinus Sans" font-size="10" fill="#475569">- Security issues in code review: 25%+ more caught</text>
    <text x="490" y="388" font-family="Libertinus Sans" font-size="10" fill="#475569">- Incident reporting: 40%+ increase in reports</text>
  </g>

  <!-- Level 4: Results -->
  <g filter="url(#shadow)">
    <rect x="50" y="420" width="380" height="95" rx="8" fill="#10B981"/>
    <text x="70" y="450" font-family="Libertinus Sans" font-size="16" font-weight="bold" fill="white">Level 4: Results</text>
    <text x="70" y="472" font-family="Libertinus Sans" font-size="11" fill="#D1FAE5">What organizational outcomes resulted?</text>
    <text x="70" y="492" font-family="Libertinus Sans" font-size="10" fill="#A7F3D0">- Security incident reduction</text>
    <text x="70" y="507" font-family="Libertinus Sans" font-size="10" fill="#A7F3D0">- Vulnerability remediation time, compliance scores</text>
  </g>

  <!-- Level 4 Metrics -->
  <g filter="url(#shadow)">
    <rect x="470" y="420" width="380" height="95" rx="8" fill="white" stroke="#10B981" stroke-width="2"/>
    <text x="490" y="445" font-family="Libertinus Sans" font-size="12" font-weight="bold" fill="#10B981">Sample Metrics</text>
    <text x="490" y="468" font-family="Libertinus Sans" font-size="10" fill="#475569">- Supply chain incidents: 30%+ reduction YoY</text>
    <text x="490" y="483" font-family="Libertinus Sans" font-size="10" fill="#475569">- MTTR for vulnerabilities: 20%+ improvement</text>
    <text x="490" y="498" font-family="Libertinus Sans" font-size="10" fill="#475569">- Audit findings: 40%+ fewer supply chain issues</text>
  </g>

  <!-- Difficulty/Value indicator -->
  <text x="30" y="130" font-family="Libertinus Sans" font-size="9" fill="#64748B" transform="rotate(-90 30 130)">Easy to Measure</text>
  <text x="30" y="470" font-family="Libertinus Sans" font-size="9" fill="#64748B" transform="rotate(-90 30 470)">Hard but Valuable</text>

  <!-- Arrow indicating difficulty progression -->
  <defs>
    <marker id="arrowDown" markerWidth="10" markerHeight="7" refX="5" refY="0" orient="auto">
      <polygon points="0 0, 10 0, 5 7" fill="#64748B"/>
    </marker>
  </defs>
  <line x1="20" y1="100" x2="20" y2="500" stroke="#64748B" stroke-width="2" marker-end="url(#arrowDown)"/>
</svg>
