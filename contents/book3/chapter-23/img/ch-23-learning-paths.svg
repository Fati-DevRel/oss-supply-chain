<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 550" font-family="Libertinus Sans">
  <defs>
    <linearGradient id="phase1Grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#2d5a87"/>
      <stop offset="100%" style="stop-color:#4a7c9c"/>
    </linearGradient>
    <linearGradient id="phase2Grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#4a7c59"/>
      <stop offset="100%" style="stop-color:#6b9c73"/>
    </linearGradient>
    <linearGradient id="phase3Grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#c9a227"/>
      <stop offset="100%" style="stop-color:#dbb84a"/>
    </linearGradient>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#999"/>
    </marker>
        <filter id="shadow" x="-10%" y="-10%" width="120%" height="130%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="2" result="blur"/>
      <feOffset in="blur" dx="1" dy="2" result="offsetBlur"/>
      <feFlood flood-color="#000000" flood-opacity="0.5" result="color"/>
      <feComposite in="color" in2="offsetBlur" operator="in" result="shadow"/>
      <feMerge>
        <feMergeNode in="shadow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Title -->
  <text x="400" y="30" text-anchor="middle" font-size="20" font-weight="bold" fill="#1e3a5f">Learning Paths to Supply Chain Security Expertise</text>

  <!-- Path 1: Security Professional -->
  <text x="400" y="65" text-anchor="middle" font-size="15" font-weight="bold" fill="#2d5a87">Path 1: Security Professional to Supply Chain Security</text>

  <!-- Phase 1 -->
  <rect x="50" y="85" width="220" height="160" rx="6" fill="url(#phase1Grad)" filter="url(#shadow)"/>
  <text x="160" y="108" text-anchor="middle" font-size="12" font-weight="bold" fill="white">Phase 1: Development Foundations</text>
  <text x="160" y="125" text-anchor="middle" font-size="10" fill="#cce0ff">(2-3 months)</text>
  <line x1="70" y1="135" x2="250" y2="135" stroke="rgba(255,255,255,0.3)" stroke-width="1"/>
  <text x="65" y="155" font-size="10" fill="white">Learn a programming language</text>
  <text x="65" y="172" font-size="10" fill="white">Understand build systems</text>
  <text x="65" y="189" font-size="10" fill="white">Practice contributing to OSS</text>
  <text x="65" y="206" font-size="10" fill="white">Study CI/CD pipeline design</text>

  <!-- Arrow 1-2 -->
  <line x1="270" y1="165" x2="290" y2="165" stroke="#999" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Phase 2 -->
  <rect x="295" y="85" width="220" height="160" rx="6" fill="url(#phase2Grad)" filter="url(#shadow)"/>
  <text x="405" y="108" text-anchor="middle" font-size="12" font-weight="bold" fill="white">Phase 2: Supply Chain Specifics</text>
  <text x="405" y="125" text-anchor="middle" font-size="10" fill="#d0f0d0">(3-4 months)</text>
  <line x1="310" y1="135" x2="495" y2="135" stroke="rgba(255,255,255,0.3)" stroke-width="1"/>
  <text x="305" y="155" font-size="10" fill="white">Study attack patterns and incidents</text>
  <text x="305" y="172" font-size="10" fill="white">Learn SBOM formats (CycloneDX, SPDX)</text>
  <text x="305" y="189" font-size="10" fill="white">Understand SLSA framework</text>
  <text x="305" y="206" font-size="10" fill="white">Practice with SCA tools</text>

  <!-- Arrow 2-3 -->
  <line x1="515" y1="165" x2="535" y2="165" stroke="#999" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Phase 3 -->
  <rect x="540" y="85" width="220" height="160" rx="6" fill="url(#phase3Grad)" filter="url(#shadow)"/>
  <text x="650" y="108" text-anchor="middle" font-size="12" font-weight="bold" fill="white">Phase 3: Applied Expertise</text>
  <text x="650" y="125" text-anchor="middle" font-size="10" fill="#fff8e0">(ongoing)</text>
  <line x1="555" y1="135" x2="740" y2="135" stroke="rgba(255,255,255,0.3)" stroke-width="1"/>
  <text x="550" y="155" font-size="10" fill="white">Lead security initiatives</text>
  <text x="550" y="172" font-size="10" fill="white">Respond to real incidents</text>
  <text x="550" y="189" font-size="10" fill="white">Contribute to tooling or standards</text>
  <text x="550" y="206" font-size="10" fill="white">Teach and mentor others</text>

  <!-- Path 2: Developer -->
  <text x="400" y="280" text-anchor="middle" font-size="15" font-weight="bold" fill="#4a7c59">Path 2: Developer to Supply Chain Security</text>

  <!-- Phase 1 -->
  <rect x="50" y="300" width="220" height="160" rx="6" fill="url(#phase1Grad)" filter="url(#shadow)"/>
  <text x="160" y="323" text-anchor="middle" font-size="12" font-weight="bold" fill="white">Phase 1: Security Foundations</text>
  <text x="160" y="340" text-anchor="middle" font-size="10" fill="#cce0ff">(2-3 months)</text>
  <line x1="70" y1="350" x2="250" y2="350" stroke="rgba(255,255,255,0.3)" stroke-width="1"/>
  <text x="65" y="370" font-size="10" fill="white">Complete OpenSSF training</text>
  <text x="65" y="387" font-size="10" fill="white">Study vulnerability types and exploits</text>
  <text x="65" y="404" font-size="10" fill="white">Learn threat modeling approaches</text>
  <text x="65" y="421" font-size="10" fill="white">Understand risk assessment</text>

  <!-- Arrow 1-2 -->
  <line x1="270" y1="380" x2="290" y2="380" stroke="#999" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Phase 2 -->
  <rect x="295" y="300" width="220" height="160" rx="6" fill="url(#phase2Grad)" filter="url(#shadow)"/>
  <text x="405" y="323" text-anchor="middle" font-size="12" font-weight="bold" fill="white">Phase 2: Supply Chain Focus</text>
  <text x="405" y="340" text-anchor="middle" font-size="10" fill="#d0f0d0">(3-4 months)</text>
  <line x1="310" y1="350" x2="495" y2="350" stroke="rgba(255,255,255,0.3)" stroke-width="1"/>
  <text x="305" y="370" font-size="10" fill="white">Deep dive into ecosystem security</text>
  <text x="305" y="387" font-size="10" fill="white">Study build integrity and provenance</text>
  <text x="305" y="404" font-size="10" fill="white">Learn vulnerability management</text>
  <text x="305" y="421" font-size="10" fill="white">Practice security architecture review</text>

  <!-- Arrow 2-3 -->
  <line x1="515" y1="380" x2="535" y2="380" stroke="#999" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Phase 3 -->
  <rect x="540" y="300" width="220" height="160" rx="6" fill="url(#phase3Grad)" filter="url(#shadow)"/>
  <text x="650" y="323" text-anchor="middle" font-size="12" font-weight="bold" fill="white">Phase 3: Integration</text>
  <text x="650" y="340" text-anchor="middle" font-size="10" fill="#fff8e0">(ongoing)</text>
  <line x1="555" y1="350" x2="740" y2="350" stroke="rgba(255,255,255,0.3)" stroke-width="1"/>
  <text x="550" y="370" font-size="10" fill="white">Bridge security and development</text>
  <text x="550" y="387" font-size="10" fill="white">Lead with development context</text>
  <text x="550" y="404" font-size="10" fill="white">Mentor developers on security</text>
  <text x="550" y="421" font-size="10" fill="white">Contribute to security tooling</text>

  <!-- Legend -->
  <rect x="50" y="490" width="700" height="50" rx="4" fill="#f8f8f8" stroke="#ddd"/>
  <rect x="70" y="508" width="14" height="14" rx="2" fill="url(#phase1Grad)"/>
  <text x="90" y="519" font-size="10" fill="#444">Foundational Phase</text>

  <rect x="230" y="508" width="14" height="14" rx="2" fill="url(#phase2Grad)"/>
  <text x="250" y="519" font-size="10" fill="#444">Skill Development Phase</text>

  <rect x="420" y="508" width="14" height="14" rx="2" fill="url(#phase3Grad)"/>
  <text x="440" y="519" font-size="10" fill="#444">Applied/Ongoing Phase</text>

  <text x="600" y="519" font-size="10" fill="#666" font-style="italic">Total journey: 1+ years</text>
</svg>