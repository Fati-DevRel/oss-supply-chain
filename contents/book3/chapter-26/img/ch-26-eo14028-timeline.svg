<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 850 400" font-family="Libertinus Sans">
  <defs>
    <linearGradient id="timelineGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#1e3a5f"/>
      <stop offset="100%" style="stop-color:#2d5a87"/>
    </linearGradient>
        <filter id="shadow" x="-10%" y="-10%" width="120%" height="130%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="2" result="blur"/>
      <feOffset in="blur" dx="1" dy="2" result="offsetBlur"/>
      <feFlood flood-color="#000000" flood-opacity="0.5" result="color"/>
      <feComposite in="color" in2="offsetBlur" operator="in" result="shadow"/>
      <feMerge>
        <feMergeNode in="shadow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Title -->
  <text x="425" y="30" text-anchor="middle" font-size="18" font-weight="bold" fill="#1e3a5f">Executive Order 14028 Implementation Timeline</text>
  <text x="425" y="50" text-anchor="middle" font-size="11" fill="#666">Key Milestones for Software Supply Chain Security Requirements</text>

  <!-- Main timeline line -->
  <line x1="50" y1="170" x2="800" y2="170" stroke="#1e3a5f" stroke-width="4"/>

  <!-- Year markers -->
  <line x1="100" y1="165" x2="100" y2="175" stroke="#1e3a5f" stroke-width="3"/>
  <text x="100" y="195" text-anchor="middle" font-size="11" font-weight="bold" fill="#1e3a5f">2021</text>

  <line x1="280" y1="165" x2="280" y2="175" stroke="#1e3a5f" stroke-width="3"/>
  <text x="280" y="195" text-anchor="middle" font-size="11" font-weight="bold" fill="#1e3a5f">2022</text>

  <line x1="460" y1="165" x2="460" y2="175" stroke="#1e3a5f" stroke-width="3"/>
  <text x="460" y="195" text-anchor="middle" font-size="11" font-weight="bold" fill="#1e3a5f">2023</text>

  <line x1="640" y1="165" x2="640" y2="175" stroke="#1e3a5f" stroke-width="3"/>
  <text x="640" y="195" text-anchor="middle" font-size="11" font-weight="bold" fill="#1e3a5f">2024</text>

  <!-- Milestone 1: EO Signed -->
  <circle cx="100" cy="170" r="8" fill="#c9a227" stroke="white" stroke-width="2"/>
  <line x1="100" y1="162" x2="100" y2="90" stroke="#c9a227" stroke-width="2"/>
  <rect x="30" y="65" width="140" height="25" rx="4" fill="#c9a227"/>
  <text x="100" y="82" text-anchor="middle" font-size="10" font-weight="bold" fill="white">May 12, 2021</text>
  <text x="100" y="55" text-anchor="middle" font-size="9" fill="#333">EO 14028 Signed</text>

  <!-- Milestone 2: NTIA SBOM -->
  <circle cx="160" cy="170" r="8" fill="#4a7c59" stroke="white" stroke-width="2"/>
  <line x1="160" y1="178" x2="160" y2="240" stroke="#4a7c59" stroke-width="2"/>
  <rect x="90" y="240" width="140" height="25" rx="4" fill="#4a7c59"/>
  <text x="160" y="257" text-anchor="middle" font-size="10" font-weight="bold" fill="white">July 12, 2021</text>
  <text x="160" y="280" text-anchor="middle" font-size="9" fill="#333">NTIA SBOM Minimum</text>
  <text x="160" y="293" text-anchor="middle" font-size="9" fill="#333">Elements Published</text>

  <!-- Milestone 3: NIST SSDF -->
  <circle cx="310" cy="170" r="8" fill="#2d5a87" stroke="white" stroke-width="2"/>
  <line x1="310" y1="162" x2="310" y2="90" stroke="#2d5a87" stroke-width="2"/>
  <rect x="240" y="65" width="140" height="25" rx="4" fill="#2d5a87"/>
  <text x="310" y="82" text-anchor="middle" font-size="10" font-weight="bold" fill="white">Feb 4, 2022</text>
  <text x="310" y="55" text-anchor="middle" font-size="9" fill="#333">NIST SSDF 1.1 Published</text>

  <!-- Milestone 4: OMB M-22-18 -->
  <circle cx="400" cy="170" r="8" fill="#8b5a87" stroke="white" stroke-width="2"/>
  <line x1="400" y1="178" x2="400" y2="240" stroke="#8b5a87" stroke-width="2"/>
  <rect x="330" y="240" width="140" height="25" rx="4" fill="#8b5a87"/>
  <text x="400" y="257" text-anchor="middle" font-size="10" font-weight="bold" fill="white">Sep 14, 2022</text>
  <text x="400" y="280" text-anchor="middle" font-size="9" fill="#333">OMB M-22-18 Issued</text>

  <!-- Milestone 5: OMB M-23-16 -->
  <circle cx="510" cy="170" r="8" fill="#5a7c8b" stroke="white" stroke-width="2"/>
  <line x1="510" y1="162" x2="510" y2="90" stroke="#5a7c8b" stroke-width="2"/>
  <rect x="440" y="65" width="140" height="25" rx="4" fill="#5a7c8b"/>
  <text x="510" y="82" text-anchor="middle" font-size="10" font-weight="bold" fill="white">June 9, 2023</text>
  <text x="510" y="55" text-anchor="middle" font-size="9" fill="#333">OMB M-23-16</text>
  <text x="510" y="42" text-anchor="middle" font-size="9" fill="#333">Extended Timelines</text>

  <!-- Milestone 6: CISA Attestation Form -->
  <circle cx="620" cy="170" r="8" fill="#c76a1d" stroke="white" stroke-width="2"/>
  <line x1="620" y1="178" x2="620" y2="240" stroke="#c76a1d" stroke-width="2"/>
  <rect x="550" y="240" width="140" height="25" rx="4" fill="#c76a1d"/>
  <text x="620" y="257" text-anchor="middle" font-size="10" font-weight="bold" fill="white">Mar 11, 2024</text>
  <text x="620" y="280" text-anchor="middle" font-size="9" fill="#333">CISA Final</text>
  <text x="620" y="293" text-anchor="middle" font-size="9" fill="#333">Attestation Form</text>

  <!-- Milestone 7: Critical Software Deadline -->
  <circle cx="700" cy="170" r="8" fill="#8b1a1a" stroke="white" stroke-width="2"/>
  <line x1="700" y1="162" x2="700" y2="90" stroke="#8b1a1a" stroke-width="2"/>
  <rect x="630" y="65" width="140" height="25" rx="4" fill="#8b1a1a"/>
  <text x="700" y="82" text-anchor="middle" font-size="10" font-weight="bold" fill="white">Sep 14, 2024</text>
  <text x="700" y="55" text-anchor="middle" font-size="9" fill="#333">Attestation Required</text>
  <text x="700" y="42" text-anchor="middle" font-size="9" fill="#333">for All Software</text>

  <!-- Legend -->
  <rect x="50" y="330" width="750" height="55" rx="4" fill="#f8f8f8" stroke="#e0e0e0"/>
  <text x="70" y="350" font-size="11" font-weight="bold" fill="#1e3a5f">Key Provisions:</text>

  <circle cx="80" cy="368" r="4" fill="#c9a227"/>
  <text x="92" y="372" font-size="9" fill="#333">Section 4: Supply Chain Security</text>

  <circle cx="260" cy="368" r="4" fill="#4a7c59"/>
  <text x="272" y="372" font-size="9" fill="#333">Section 10: SBOM Requirements</text>

  <circle cx="450" cy="368" r="4" fill="#2d5a87"/>
  <text x="462" y="372" font-size="9" fill="#333">SSDF Attestation Framework</text>

  <circle cx="640" cy="368" r="4" fill="#8b1a1a"/>
  <text x="652" y="372" font-size="9" fill="#333">Compliance Deadlines</text>
</svg>