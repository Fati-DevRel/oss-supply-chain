<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 600" font-family="Libertinus Sans">
  <defs>
        <filter id="shadow" x="-10%" y="-10%" width="120%" height="130%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="2" result="blur"/>
      <feOffset in="blur" dx="1" dy="2" result="offsetBlur"/>
      <feFlood flood-color="#000000" flood-opacity="0.5" result="color"/>
      <feComposite in="color" in2="offsetBlur" operator="in" result="shadow"/>
      <feMerge>
        <feMergeNode in="shadow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="900" height="600" fill="#F8FAFC"/>

  <!-- Title -->
  <text x="450" y="32" text-anchor="middle" font-size="18" font-weight="bold" fill="#1E293B">Typosquatting Techniques Matrix</text>
  <text x="450" y="52" text-anchor="middle" font-size="11" fill="#64748B">Common methods attackers use to create convincing package name variations</text>

  <!-- Grid of technique cards -->

  <!-- Row 1 -->
  <!-- Card 1: Character Omission -->
  <g filter="url(#shadow)" transform="translate(50, 80)">
    <rect x="0" y="0" width="260" height="140" rx="8" fill="white" stroke="#E2E8F0"/>
    <rect x="0" y="0" width="260" height="40" rx="8" fill="#DC2626"/>
    <rect x="0" y="32" width="260" height="8" fill="#DC2626"/>
    <text x="130" y="26" text-anchor="middle" font-size="12" font-weight="bold" fill="white">Character Omission</text>

    <text x="20" y="60" font-size="10" fill="#64748B">Missing a character from the name</text>

    <text x="20" y="85" font-size="10" font-weight="600" fill="#1E293B">Legitimate:</text>
    <text x="90" y="85" font-size="10" font-family="Libertinus Mono" fill="#059669">requests</text>

    <text x="20" y="105" font-size="10" font-weight="600" fill="#1E293B">Typosquat:</text>
    <text x="90" y="105" font-size="10" font-family="Libertinus Mono" fill="#DC2626">reqests</text>
    <text x="155" y="105" font-size="9" fill="#64748B">(missing 'u')</text>

    <text x="20" y="130" font-size="9" fill="#64748B">Common with long package names</text>
  </g>

  <!-- Card 2: Character Addition -->
  <g filter="url(#shadow)" transform="translate(320, 80)">
    <rect x="0" y="0" width="260" height="140" rx="8" fill="white" stroke="#E2E8F0"/>
    <rect x="0" y="0" width="260" height="40" rx="8" fill="#F59E0B"/>
    <rect x="0" y="32" width="260" height="8" fill="#F59E0B"/>
    <text x="130" y="26" text-anchor="middle" font-size="12" font-weight="bold" fill="white">Character Addition</text>

    <text x="20" y="60" font-size="10" fill="#64748B">Extra character inserted</text>

    <text x="20" y="85" font-size="10" font-weight="600" fill="#1E293B">Legitimate:</text>
    <text x="90" y="85" font-size="10" font-family="Libertinus Mono" fill="#059669">lodash</text>

    <text x="20" y="105" font-size="10" font-weight="600" fill="#1E293B">Typosquat:</text>
    <text x="90" y="105" font-size="10" font-family="Libertinus Mono" fill="#DC2626">loadash</text>
    <text x="155" y="105" font-size="9" fill="#64748B">(extra 'a')</text>

    <text x="20" y="130" font-size="9" fill="#64748B">Doubles letters or adds silent chars</text>
  </g>

  <!-- Card 3: Character Substitution -->
  <g filter="url(#shadow)" transform="translate(590, 80)">
    <rect x="0" y="0" width="260" height="140" rx="8" fill="white" stroke="#E2E8F0"/>
    <rect x="0" y="0" width="260" height="40" rx="8" fill="#8B5CF6"/>
    <rect x="0" y="32" width="260" height="8" fill="#8B5CF6"/>
    <text x="130" y="26" text-anchor="middle" font-size="12" font-weight="bold" fill="white">Character Substitution</text>

    <text x="20" y="60" font-size="10" fill="#64748B">Replace with visually similar char</text>

    <text x="20" y="85" font-size="10" font-weight="600" fill="#1E293B">Legitimate:</text>
    <text x="90" y="85" font-size="10" font-family="Libertinus Mono" fill="#059669">colorama</text>

    <text x="20" y="105" font-size="10" font-weight="600" fill="#1E293B">Typosquat:</text>
    <text x="90" y="105" font-size="10" font-family="Libertinus Mono" fill="#DC2626">co1orama</text>
    <text x="160" y="105" font-size="9" fill="#64748B">(1 for l)</text>

    <text x="20" y="130" font-size="9" fill="#64748B">0/O, 1/l/I, rn/m common swaps</text>
  </g>

  <!-- Row 2 -->
  <!-- Card 4: Keyboard Proximity -->
  <g filter="url(#shadow)" transform="translate(50, 235)">
    <rect x="0" y="0" width="260" height="140" rx="8" fill="white" stroke="#E2E8F0"/>
    <rect x="0" y="0" width="260" height="40" rx="8" fill="#3B82F6"/>
    <rect x="0" y="32" width="260" height="8" fill="#3B82F6"/>
    <text x="130" y="26" text-anchor="middle" font-size="12" font-weight="bold" fill="white">Keyboard Proximity</text>

    <text x="20" y="60" font-size="10" fill="#64748B">Adjacent keys on keyboard</text>

    <text x="20" y="85" font-size="10" font-weight="600" fill="#1E293B">Legitimate:</text>
    <text x="90" y="85" font-size="10" font-family="Libertinus Mono" fill="#059669">django</text>

    <text x="20" y="105" font-size="10" font-weight="600" fill="#1E293B">Typosquat:</text>
    <text x="90" y="105" font-size="10" font-family="Libertinus Mono" fill="#DC2626">djamgo</text>
    <text x="155" y="105" font-size="9" fill="#64748B">('m' near 'n')</text>

    <text x="20" y="130" font-size="9" fill="#64748B">Exploits typing errors</text>
  </g>

  <!-- Card 5: Transposition -->
  <g filter="url(#shadow)" transform="translate(320, 235)">
    <rect x="0" y="0" width="260" height="140" rx="8" fill="white" stroke="#E2E8F0"/>
    <rect x="0" y="0" width="260" height="40" rx="8" fill="#059669"/>
    <rect x="0" y="32" width="260" height="8" fill="#059669"/>
    <text x="130" y="26" text-anchor="middle" font-size="12" font-weight="bold" fill="white">Transposition</text>

    <text x="20" y="60" font-size="10" fill="#64748B">Swapped adjacent characters</text>

    <text x="20" y="85" font-size="10" font-weight="600" fill="#1E293B">Legitimate:</text>
    <text x="90" y="85" font-size="10" font-family="Libertinus Mono" fill="#059669">jquery</text>

    <text x="20" y="105" font-size="10" font-weight="600" fill="#1E293B">Typosquat:</text>
    <text x="90" y="105" font-size="10" font-family="Libertinus Mono" fill="#DC2626">jqeury</text>
    <text x="155" y="105" font-size="9" fill="#64748B">('e' and 'u')</text>

    <text x="20" y="130" font-size="9" fill="#64748B">Fast typing leads to swaps</text>
  </g>

  <!-- Card 6: Separator Confusion -->
  <g filter="url(#shadow)" transform="translate(590, 235)">
    <rect x="0" y="0" width="260" height="140" rx="8" fill="white" stroke="#E2E8F0"/>
    <rect x="0" y="0" width="260" height="40" rx="8" fill="#EC4899"/>
    <rect x="0" y="32" width="260" height="8" fill="#EC4899"/>
    <text x="130" y="26" text-anchor="middle" font-size="12" font-weight="bold" fill="white">Separator Confusion</text>

    <text x="20" y="60" font-size="10" fill="#64748B">Hyphen vs underscore vs nothing</text>

    <text x="20" y="85" font-size="10" font-weight="600" fill="#1E293B">Legitimate:</text>
    <text x="90" y="85" font-size="10" font-family="Libertinus Mono" fill="#059669">python-dateutil</text>

    <text x="20" y="105" font-size="10" font-weight="600" fill="#1E293B">Typosquat:</text>
    <text x="90" y="105" font-size="10" font-family="Libertinus Mono" fill="#DC2626">python_dateutil</text>

    <text x="20" y="130" font-size="9" fill="#64748B">Registry normalization varies</text>
  </g>

  <!-- Row 3 -->
  <!-- Card 7: Pluralization -->
  <g filter="url(#shadow)" transform="translate(50, 390)">
    <rect x="0" y="0" width="260" height="140" rx="8" fill="white" stroke="#E2E8F0"/>
    <rect x="0" y="0" width="260" height="40" rx="8" fill="#14B8A6"/>
    <rect x="0" y="32" width="260" height="8" fill="#14B8A6"/>
    <text x="130" y="26" text-anchor="middle" font-size="12" font-weight="bold" fill="white">Pluralization</text>

    <text x="20" y="60" font-size="10" fill="#64748B">Adding or removing 's'</text>

    <text x="20" y="85" font-size="10" font-weight="600" fill="#1E293B">Legitimate:</text>
    <text x="90" y="85" font-size="10" font-family="Libertinus Mono" fill="#059669">request</text>

    <text x="20" y="105" font-size="10" font-weight="600" fill="#1E293B">Typosquat:</text>
    <text x="90" y="105" font-size="10" font-family="Libertinus Mono" fill="#DC2626">requests</text>
    <text x="165" y="105" font-size="9" fill="#64748B">(or vice versa)</text>

    <text x="20" y="130" font-size="9" fill="#64748B">Memory recall errors</text>
  </g>

  <!-- Card 8: Brand Variations -->
  <g filter="url(#shadow)" transform="translate(320, 390)">
    <rect x="0" y="0" width="260" height="140" rx="8" fill="white" stroke="#E2E8F0"/>
    <rect x="0" y="0" width="260" height="40" rx="8" fill="#6366F1"/>
    <rect x="0" y="32" width="260" height="8" fill="#6366F1"/>
    <text x="130" y="26" text-anchor="middle" font-size="12" font-weight="bold" fill="white">Brand Variations</text>

    <text x="20" y="60" font-size="10" fill="#64748B">Similar-sounding variations</text>

    <text x="20" y="85" font-size="10" font-weight="600" fill="#1E293B">Legitimate:</text>
    <text x="90" y="85" font-size="10" font-family="Libertinus Mono" fill="#059669">tensorflow</text>

    <text x="20" y="105" font-size="10" font-weight="600" fill="#1E293B">Typosquat:</text>
    <text x="90" y="105" font-size="10" font-family="Libertinus Mono" fill="#DC2626">tensor-flow</text>

    <text x="20" y="130" font-size="9" fill="#64748B">Exploits uncertain naming</text>
  </g>

  <!-- Card 9: Combosquatting -->
  <g filter="url(#shadow)" transform="translate(590, 390)">
    <rect x="0" y="0" width="260" height="140" rx="8" fill="white" stroke="#E2E8F0"/>
    <rect x="0" y="0" width="260" height="40" rx="8" fill="#0F172A"/>
    <rect x="0" y="32" width="260" height="8" fill="#0F172A"/>
    <text x="130" y="26" text-anchor="middle" font-size="12" font-weight="bold" fill="white">Combosquatting</text>

    <text x="20" y="60" font-size="10" fill="#64748B">Adding plausible prefixes/suffixes</text>

    <text x="20" y="85" font-size="10" font-weight="600" fill="#1E293B">Legitimate:</text>
    <text x="90" y="85" font-size="10" font-family="Libertinus Mono" fill="#059669">aws-sdk</text>

    <text x="20" y="105" font-size="10" font-weight="600" fill="#1E293B">Typosquat:</text>
    <text x="90" y="105" font-size="10" font-family="Libertinus Mono" fill="#DC2626">aws-sdk-js</text>

    <text x="20" y="130" font-size="9" fill="#64748B">Looks like official variant</text>
  </g>

  <!-- Statistics footer -->
  <g transform="translate(50, 545)">
    <rect x="0" y="0" width="800" height="40" rx="6" fill="#F1F5F9" stroke="#E2E8F0"/>
    <text x="400" y="25" text-anchor="middle" font-size="11" fill="#475569">
      Research shows 5-20% of developers will install a typosquatted package when presented with a convincing variation
    </text>
  </g>
</svg>
