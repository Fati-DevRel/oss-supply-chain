<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 520" font-family="Libertinus Sans">
  <defs>
        <filter id="shadow" x="-10%" y="-10%" width="120%" height="130%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="2" result="blur"/>
      <feOffset in="blur" dx="1" dy="2" result="offsetBlur"/>
      <feFlood flood-color="#000000" flood-opacity="0.5" result="color"/>
      <feComposite in="color" in2="offsetBlur" operator="in" result="shadow"/>
      <feMerge>
        <feMergeNode in="shadow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <marker id="arrowDown" markerWidth="10" markerHeight="10" refX="5" refY="10" orient="auto">
      <path d="M0,0 L10,0 L5,10 z" fill="#64748B"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="900" height="520" fill="#F8FAFC"/>

  <!-- Title -->
  <text x="450" y="32" text-anchor="middle" font-size="18" font-weight="bold" fill="#1E293B">Package Resolution Priority by Ecosystem</text>
  <text x="450" y="52" text-anchor="middle" font-size="11" fill="#64748B">How package managers decide which registry to use</text>

  <!-- npm Column -->
  <g transform="translate(60, 80)">
    <g filter="url(#shadow)">
      <rect x="0" y="0" width="250" height="50" rx="8" fill="#CB3837"/>
      <text x="125" y="32" text-anchor="middle" font-size="16" font-weight="bold" fill="white">npm / Node.js</text>
    </g>

    <!-- Priority boxes -->
    <rect x="0" y="65" width="250" height="390" rx="6" fill="white" stroke="#E2E8F0"/>

    <!-- Step 1 -->
    <g transform="translate(15, 80)">
      <rect x="0" y="0" width="220" height="55" rx="4" fill="#DCFCE7" stroke="#86EFAC"/>
      <circle cx="20" cy="27" r="14" fill="#22C55E"/>
      <text x="20" y="32" text-anchor="middle" font-size="12" font-weight="bold" fill="white">1</text>
      <text x="130" y="22" text-anchor="middle" font-size="11" font-weight="600" fill="#166534">Lockfile</text>
      <text x="130" y="38" text-anchor="middle" font-size="9" fill="#15803D">package-lock.json</text>
      <text x="130" y="50" text-anchor="middle" font-size="8" fill="#15803D">Exact version + integrity</text>
    </g>

    <path d="M 125 150 L 125 165" stroke="#64748B" stroke-width="2" marker-end="url(#arrowDown)" fill="none"/>

    <!-- Step 2 -->
    <g transform="translate(15, 155)">
      <rect x="0" y="0" width="220" height="55" rx="4" fill="#DBEAFE" stroke="#93C5FD"/>
      <circle cx="20" cy="27" r="14" fill="#3B82F6"/>
      <text x="20" y="32" text-anchor="middle" font-size="12" font-weight="bold" fill="white">2</text>
      <text x="130" y="22" text-anchor="middle" font-size="11" font-weight="600" fill="#1E40AF">.npmrc Registry</text>
      <text x="130" y="38" text-anchor="middle" font-size="9" fill="#2563EB">registry=https://...</text>
      <text x="130" y="50" text-anchor="middle" font-size="8" fill="#2563EB">Scoped or default</text>
    </g>

    <path d="M 125 225 L 125 240" stroke="#64748B" stroke-width="2" marker-end="url(#arrowDown)" fill="none"/>

    <!-- Step 3 -->
    <g transform="translate(15, 230)">
      <rect x="0" y="0" width="220" height="55" rx="4" fill="#FEF3C7" stroke="#FDE68A"/>
      <circle cx="20" cy="27" r="14" fill="#F59E0B"/>
      <text x="20" y="32" text-anchor="middle" font-size="12" font-weight="bold" fill="white">3</text>
      <text x="130" y="22" text-anchor="middle" font-size="11" font-weight="600" fill="#92400E">Scope Mapping</text>
      <text x="130" y="38" text-anchor="middle" font-size="9" fill="#D97706">@org:registry=url</text>
      <text x="130" y="50" text-anchor="middle" font-size="8" fill="#D97706">Per-scope overrides</text>
    </g>

    <path d="M 125 300 L 125 315" stroke="#64748B" stroke-width="2" marker-end="url(#arrowDown)" fill="none"/>

    <!-- Step 4 -->
    <g transform="translate(15, 305)">
      <rect x="0" y="0" width="220" height="55" rx="4" fill="#FEE2E2" stroke="#FECACA"/>
      <circle cx="20" cy="27" r="14" fill="#DC2626"/>
      <text x="20" y="32" text-anchor="middle" font-size="12" font-weight="bold" fill="white">4</text>
      <text x="130" y="22" text-anchor="middle" font-size="11" font-weight="600" fill="#991B1B">Default: npmjs.com</text>
      <text x="130" y="38" text-anchor="middle" font-size="9" fill="#DC2626">Public registry fallback</text>
      <text x="130" y="50" text-anchor="middle" font-size="8" fill="#DC2626">RISK: Confusion possible!</text>
    </g>
  </g>

  <!-- Python/pip Column -->
  <g transform="translate(330, 80)">
    <g filter="url(#shadow)">
      <rect x="0" y="0" width="250" height="50" rx="8" fill="#3776AB"/>
      <text x="125" y="32" text-anchor="middle" font-size="16" font-weight="bold" fill="white">pip / Python</text>
    </g>

    <!-- Priority boxes -->
    <rect x="0" y="65" width="250" height="390" rx="6" fill="white" stroke="#E2E8F0"/>

    <!-- Step 1 -->
    <g transform="translate(15, 80)">
      <rect x="0" y="0" width="220" height="55" rx="4" fill="#DCFCE7" stroke="#86EFAC"/>
      <circle cx="20" cy="27" r="14" fill="#22C55E"/>
      <text x="20" y="32" text-anchor="middle" font-size="12" font-weight="bold" fill="white">1</text>
      <text x="130" y="22" text-anchor="middle" font-size="11" font-weight="600" fill="#166534">Lockfile</text>
      <text x="130" y="38" text-anchor="middle" font-size="9" fill="#15803D">requirements.txt hashes</text>
      <text x="130" y="50" text-anchor="middle" font-size="8" fill="#15803D">--require-hashes</text>
    </g>

    <path d="M 125 150 L 125 165" stroke="#64748B" stroke-width="2" marker-end="url(#arrowDown)" fill="none"/>

    <!-- Step 2 -->
    <g transform="translate(15, 155)">
      <rect x="0" y="0" width="220" height="55" rx="4" fill="#DBEAFE" stroke="#93C5FD"/>
      <circle cx="20" cy="27" r="14" fill="#3B82F6"/>
      <text x="20" y="32" text-anchor="middle" font-size="12" font-weight="bold" fill="white">2</text>
      <text x="130" y="22" text-anchor="middle" font-size="11" font-weight="600" fill="#1E40AF">--index-url</text>
      <text x="130" y="38" text-anchor="middle" font-size="9" fill="#2563EB">Primary index override</text>
      <text x="130" y="50" text-anchor="middle" font-size="8" fill="#2563EB">pip.conf [global] index-url</text>
    </g>

    <path d="M 125 225 L 125 240" stroke="#64748B" stroke-width="2" marker-end="url(#arrowDown)" fill="none"/>

    <!-- Step 3 -->
    <g transform="translate(15, 230)">
      <rect x="0" y="0" width="220" height="55" rx="4" fill="#FEF3C7" stroke="#FDE68A"/>
      <circle cx="20" cy="27" r="14" fill="#F59E0B"/>
      <text x="20" y="32" text-anchor="middle" font-size="12" font-weight="bold" fill="white">3</text>
      <text x="130" y="22" text-anchor="middle" font-size="11" font-weight="600" fill="#92400E">--extra-index-url</text>
      <text x="130" y="38" text-anchor="middle" font-size="9" fill="#D97706">Additional indexes</text>
      <text x="130" y="50" text-anchor="middle" font-size="8" fill="#D97706">BOTH checked!</text>
    </g>

    <path d="M 125 300 L 125 315" stroke="#64748B" stroke-width="2" marker-end="url(#arrowDown)" fill="none"/>

    <!-- Step 4 -->
    <g transform="translate(15, 305)">
      <rect x="0" y="0" width="220" height="55" rx="4" fill="#FEE2E2" stroke="#FECACA"/>
      <circle cx="20" cy="27" r="14" fill="#DC2626"/>
      <text x="20" y="32" text-anchor="middle" font-size="12" font-weight="bold" fill="white">4</text>
      <text x="130" y="22" text-anchor="middle" font-size="11" font-weight="600" fill="#991B1B">Default: PyPI</text>
      <text x="130" y="38" text-anchor="middle" font-size="9" fill="#DC2626">Highest version wins</text>
      <text x="130" y="50" text-anchor="middle" font-size="8" fill="#DC2626">HIGH RISK: Confusion!</text>
    </g>
  </g>

  <!-- Maven Column -->
  <g transform="translate(600, 80)">
    <g filter="url(#shadow)">
      <rect x="0" y="0" width="250" height="50" rx="8" fill="#C71A36"/>
      <text x="125" y="32" text-anchor="middle" font-size="16" font-weight="bold" fill="white">Maven / Java</text>
    </g>

    <!-- Priority boxes -->
    <rect x="0" y="65" width="250" height="390" rx="6" fill="white" stroke="#E2E8F0"/>

    <!-- Step 1 -->
    <g transform="translate(15, 80)">
      <rect x="0" y="0" width="220" height="55" rx="4" fill="#DCFCE7" stroke="#86EFAC"/>
      <circle cx="20" cy="27" r="14" fill="#22C55E"/>
      <text x="20" y="32" text-anchor="middle" font-size="12" font-weight="bold" fill="white">1</text>
      <text x="130" y="22" text-anchor="middle" font-size="11" font-weight="600" fill="#166534">Local Repository</text>
      <text x="130" y="38" text-anchor="middle" font-size="9" fill="#15803D">~/.m2/repository</text>
      <text x="130" y="50" text-anchor="middle" font-size="8" fill="#15803D">Cached artifacts</text>
    </g>

    <path d="M 125 150 L 125 165" stroke="#64748B" stroke-width="2" marker-end="url(#arrowDown)" fill="none"/>

    <!-- Step 2 -->
    <g transform="translate(15, 155)">
      <rect x="0" y="0" width="220" height="55" rx="4" fill="#DBEAFE" stroke="#93C5FD"/>
      <circle cx="20" cy="27" r="14" fill="#3B82F6"/>
      <text x="20" y="32" text-anchor="middle" font-size="12" font-weight="bold" fill="white">2</text>
      <text x="130" y="22" text-anchor="middle" font-size="11" font-weight="600" fill="#1E40AF">pom.xml Repos</text>
      <text x="130" y="38" text-anchor="middle" font-size="9" fill="#2563EB">In declaration order</text>
      <text x="130" y="50" text-anchor="middle" font-size="8" fill="#2563EB">First match wins</text>
    </g>

    <path d="M 125 225 L 125 240" stroke="#64748B" stroke-width="2" marker-end="url(#arrowDown)" fill="none"/>

    <!-- Step 3 -->
    <g transform="translate(15, 230)">
      <rect x="0" y="0" width="220" height="55" rx="4" fill="#FEF3C7" stroke="#FDE68A"/>
      <circle cx="20" cy="27" r="14" fill="#F59E0B"/>
      <text x="20" y="32" text-anchor="middle" font-size="12" font-weight="bold" fill="white">3</text>
      <text x="130" y="22" text-anchor="middle" font-size="11" font-weight="600" fill="#92400E">settings.xml</text>
      <text x="130" y="38" text-anchor="middle" font-size="9" fill="#D97706">Mirrors, profiles</text>
      <text x="130" y="50" text-anchor="middle" font-size="8" fill="#D97706">Global overrides</text>
    </g>

    <path d="M 125 300 L 125 315" stroke="#64748B" stroke-width="2" marker-end="url(#arrowDown)" fill="none"/>

    <!-- Step 4 -->
    <g transform="translate(15, 305)">
      <rect x="0" y="0" width="220" height="55" rx="4" fill="#FEE2E2" stroke="#FECACA"/>
      <circle cx="20" cy="27" r="14" fill="#DC2626"/>
      <text x="20" y="32" text-anchor="middle" font-size="12" font-weight="bold" fill="white">4</text>
      <text x="130" y="22" text-anchor="middle" font-size="11" font-weight="600" fill="#991B1B">Maven Central</text>
      <text x="130" y="38" text-anchor="middle" font-size="9" fill="#DC2626">Default fallback</text>
      <text x="130" y="50" text-anchor="middle" font-size="8" fill="#DC2626">GroupId protects</text>
    </g>
  </g>

  <!-- Legend -->
  <g transform="translate(60, 485)">
    <rect x="0" y="0" width="790" height="25" rx="4" fill="#F1F5F9"/>
    <circle cx="20" cy="12" r="6" fill="#22C55E"/>
    <text x="32" y="16" font-size="9" fill="#475569">Safe (locked)</text>
    <circle cx="130" cy="12" r="6" fill="#3B82F6"/>
    <text x="142" y="16" font-size="9" fill="#475569">Configurable</text>
    <circle cx="240" cy="12" r="6" fill="#F59E0B"/>
    <text x="252" y="16" font-size="9" fill="#475569">Fallback</text>
    <circle cx="330" cy="12" r="6" fill="#DC2626"/>
    <text x="342" y="16" font-size="9" fill="#475569">Risk (public default)</text>
    <text x="500" y="16" font-size="9" font-style="italic" fill="#64748B">Note: pip --extra-index-url is particularly dangerous - both indexes are checked!</text>
  </g>
</svg>
