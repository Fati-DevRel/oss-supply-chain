<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 600" font-family="Libertinus Sans">
  <defs>
    <linearGradient id="privateGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#059669;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#047857;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="publicGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#DC2626;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#B91C1C;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="devGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#3B82F6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2563EB;stop-opacity:1" />
    </linearGradient>
    <marker id="arrowGreen" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#059669"/>
    </marker>
    <marker id="arrowRed" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#DC2626"/>
    </marker>
    <marker id="arrowBlue" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#3B82F6"/>
    </marker>
        <filter id="shadow" x="-10%" y="-10%" width="120%" height="130%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="2" result="blur"/>
      <feOffset in="blur" dx="1" dy="2" result="offsetBlur"/>
      <feFlood flood-color="#000000" flood-opacity="0.5" result="color"/>
      <feComposite in="color" in2="offsetBlur" operator="in" result="shadow"/>
      <feMerge>
        <feMergeNode in="shadow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="900" height="600" fill="#F8FAFC"/>

  <!-- Title -->
  <text x="450" y="32" text-anchor="middle" font-size="18" font-weight="bold" fill="#1E293B">Dependency Confusion Attack</text>
  <text x="450" y="52" text-anchor="middle" font-size="11" fill="#64748B">When public packages override internal dependencies</text>

  <!-- Left side: Normal Resolution -->
  <g transform="translate(50, 80)">
    <rect x="0" y="0" width="380" height="240" rx="8" fill="#D1FAE5" stroke="#A7F3D0" stroke-width="2"/>
    <text x="190" y="25" text-anchor="middle" font-size="14" font-weight="bold" fill="#065F46">EXPECTED: Internal Resolution</text>

    <!-- Developer -->
    <g filter="url(#shadow)">
      <rect x="20" y="50" width="100" height="60" rx="6" fill="url(#devGrad)"/>
      <text x="70" y="75" text-anchor="middle" font-size="10" font-weight="600" fill="white">Developer</text>
      <text x="70" y="90" text-anchor="middle" font-size="8" fill="white">npm install</text>
    </g>

    <!-- Arrow to internal -->
    <path d="M 125 80 L 170 80" stroke="#059669" stroke-width="2" marker-end="url(#arrowGreen)" fill="none"/>
    <text x="147" y="72" font-size="8" fill="#059669">1</text>

    <!-- Internal Registry -->
    <g filter="url(#shadow)">
      <rect x="180" y="45" width="160" height="70" rx="6" fill="url(#privateGrad)"/>
      <text x="260" y="70" text-anchor="middle" font-size="10" font-weight="600" fill="white">Private Registry</text>
      <text x="260" y="85" text-anchor="middle" font-size="8" fill="white">@company/core-lib</text>
      <text x="260" y="100" text-anchor="middle" font-size="8" fill="white">v1.0.0</text>
    </g>

    <!-- Arrow back to developer -->
    <path d="M 260 120 L 260 160 L 70 160 L 70 115" stroke="#059669" stroke-width="2" marker-end="url(#arrowGreen)" fill="none"/>
    <text x="165" y="152" font-size="8" fill="#059669">2. Trusted package</text>

    <!-- Success indicator -->
    <circle cx="70" cy="200" r="20" fill="#22C55E"/>
    <text x="70" y="206" text-anchor="middle" font-size="16" fill="white">OK</text>
    <text x="160" y="205" font-size="10" fill="#065F46">Internal package used correctly</text>
  </g>

  <!-- Right side: Attack Scenario -->
  <g transform="translate(470, 80)">
    <rect x="0" y="0" width="380" height="240" rx="8" fill="#FEE2E2" stroke="#FECACA" stroke-width="2"/>
    <text x="190" y="25" text-anchor="middle" font-size="14" font-weight="bold" fill="#991B1B">ATTACK: Confusion Exploit</text>

    <!-- Developer -->
    <g filter="url(#shadow)">
      <rect x="20" y="50" width="100" height="60" rx="6" fill="url(#devGrad)"/>
      <text x="70" y="75" text-anchor="middle" font-size="10" font-weight="600" fill="white">Developer</text>
      <text x="70" y="90" text-anchor="middle" font-size="8" fill="white">npm install</text>
    </g>

    <!-- Arrow to public (skipping internal) -->
    <path d="M 125 65 L 170 45" stroke="#DC2626" stroke-width="2" stroke-dasharray="5,3" fill="none"/>
    <text x="147" y="45" font-size="8" fill="#DC2626">1</text>

    <!-- Internal Registry (bypassed) -->
    <g opacity="0.4">
      <rect x="180" y="35" width="80" height="35" rx="4" fill="#9CA3AF" stroke="#6B7280"/>
      <text x="220" y="55" text-anchor="middle" font-size="8" fill="#4B5563">Private</text>
      <text x="220" y="65" text-anchor="middle" font-size="7" fill="#4B5563">(bypassed)</text>
    </g>

    <!-- Public Registry -->
    <g filter="url(#shadow)">
      <rect x="270" y="35" width="90" height="50" rx="6" fill="url(#publicGrad)"/>
      <text x="315" y="55" text-anchor="middle" font-size="10" font-weight="600" fill="white">npmjs.com</text>
      <text x="315" y="70" text-anchor="middle" font-size="8" fill="white">v99.0.0</text>
    </g>

    <!-- Arrow to public from dev -->
    <path d="M 125 80 L 265 60" stroke="#DC2626" stroke-width="2" marker-end="url(#arrowRed)" fill="none"/>

    <!-- Arrow back with malicious package -->
    <path d="M 315 90 L 315 160 L 70 160 L 70 115" stroke="#DC2626" stroke-width="2" marker-end="url(#arrowRed)" fill="none"/>
    <text x="200" y="152" font-size="8" fill="#DC2626">2. MALICIOUS package!</text>

    <!-- Danger indicator -->
    <circle cx="70" cy="200" r="20" fill="#DC2626"/>
    <text x="70" y="208" text-anchor="middle" font-size="18" fill="white">!</text>
    <text x="160" y="205" font-size="10" fill="#991B1B">Attacker's package installed</text>
  </g>

  <!-- Middle explanation: Why it happens -->
  <g filter="url(#shadow)">
    <rect x="50" y="340" width="800" height="110" rx="8" fill="white" stroke="#E2E8F0"/>
    <text x="450" y="365" text-anchor="middle" font-size="13" font-weight="bold" fill="#1E293B">Why Dependency Confusion Works</text>

    <g transform="translate(70, 385)">
      <rect x="0" y="0" width="230" height="50" rx="4" fill="#FEF3C7" stroke="#FDE68A"/>
      <text x="115" y="20" text-anchor="middle" font-size="10" font-weight="600" fill="#92400E">Higher Version Wins</text>
      <text x="115" y="35" text-anchor="middle" font-size="9" fill="#D97706">Package managers prefer</text>
      <text x="115" y="47" text-anchor="middle" font-size="9" fill="#D97706">v99.0.0 over v1.0.0</text>
    </g>

    <g transform="translate(330, 385)">
      <rect x="0" y="0" width="230" height="50" rx="4" fill="#E0E7FF" stroke="#C7D2FE"/>
      <text x="115" y="20" text-anchor="middle" font-size="10" font-weight="600" fill="#3730A3">Public Registry Priority</text>
      <text x="115" y="35" text-anchor="middle" font-size="9" fill="#6366F1">Some configs check public</text>
      <text x="115" y="47" text-anchor="middle" font-size="9" fill="#6366F1">registry before private</text>
    </g>

    <g transform="translate(590, 385)">
      <rect x="0" y="0" width="230" height="50" rx="4" fill="#FEE2E2" stroke="#FECACA"/>
      <text x="115" y="20" text-anchor="middle" font-size="10" font-weight="600" fill="#991B1B">Name Collision</text>
      <text x="115" y="35" text-anchor="middle" font-size="9" fill="#DC2626">Internal package names</text>
      <text x="115" y="47" text-anchor="middle" font-size="9" fill="#DC2626">are not reserved publicly</text>
    </g>
  </g>

  <!-- Bottom: Prevention strategies -->
  <g filter="url(#shadow)">
    <rect x="50" y="470" width="800" height="110" rx="8" fill="#D1FAE5" stroke="#A7F3D0"/>
    <text x="450" y="495" text-anchor="middle" font-size="13" font-weight="bold" fill="#065F46">Prevention Strategies</text>

    <g transform="translate(70, 510)">
      <circle cx="10" cy="10" r="6" fill="#059669"/>
      <text x="24" y="14" font-size="10" fill="#065F46">Use scoped packages (@company/)</text>
    </g>

    <g transform="translate(70, 535)">
      <circle cx="10" cy="10" r="6" fill="#059669"/>
      <text x="24" y="14" font-size="10" fill="#065F46">Register internal names on public registries</text>
    </g>

    <g transform="translate(70, 560)">
      <circle cx="10" cy="10" r="6" fill="#059669"/>
      <text x="24" y="14" font-size="10" fill="#065F46">Configure registry priority correctly</text>
    </g>

    <g transform="translate(400, 510)">
      <circle cx="10" cy="10" r="6" fill="#059669"/>
      <text x="24" y="14" font-size="10" fill="#065F46">Use lockfiles with integrity hashes</text>
    </g>

    <g transform="translate(400, 535)">
      <circle cx="10" cy="10" r="6" fill="#059669"/>
      <text x="24" y="14" font-size="10" fill="#065F46">Block external packages with internal names</text>
    </g>

    <g transform="translate(400, 560)">
      <circle cx="10" cy="10" r="6" fill="#059669"/>
      <text x="24" y="14" font-size="10" fill="#065F46">Audit and monitor dependency resolution</text>
    </g>
  </g>
</svg>
