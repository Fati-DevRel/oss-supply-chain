<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 950 720" font-family="Libertinus Sans">
  <defs>
        <filter id="tableShadow" x="-10%" y="-10%" width="120%" height="130%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="2" result="blur"/>
      <feOffset in="blur" dx="1" dy="2" result="offsetBlur"/>
      <feFlood flood-color="#000000" flood-opacity="0.5" result="color"/>
      <feComposite in="color" in2="offsetBlur" operator="in" result="shadow"/>
      <feMerge>
        <feMergeNode in="shadow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="950" height="720" fill="#f7fafc"/>

  <!-- Title -->
  <text x="475" y="35" text-anchor="middle" font-size="20" font-weight="600" fill="#1a365d">
    Major Package Ecosystem Comparison
  </text>
  <text x="475" y="55" text-anchor="middle" font-size="12" fill="#718096">
    Security features, governance, and characteristics across language ecosystems
  </text>

