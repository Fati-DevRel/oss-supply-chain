<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 400" font-family="Libertinus Sans">
  <defs>
    <linearGradient id="barGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#e53e3e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#c53030;stop-opacity:1" />
    </linearGradient>
        <filter id="barShadow" x="-10%" y="-10%" width="120%" height="130%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="2" result="blur"/>
      <feOffset in="blur" dx="1" dy="2" result="offsetBlur"/>
      <feFlood flood-color="#000000" flood-opacity="0.5" result="color"/>
      <feComposite in="color" in2="offsetBlur" operator="in" result="shadow"/>
      <feMerge>
        <feMergeNode in="shadow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="700" height="400" fill="#f7fafc"/>

  <!-- Title -->
  <text x="350" y="30" text-anchor="middle" font-size="18" font-weight="600" fill="#1a365d">
    Malicious Package Discovery Growth
  </text>
  <text x="350" y="50" text-anchor="middle" font-size="12" fill="#718096">
    Annual count of malicious packages identified (Source: Sonatype 2024)
  </text>

  <!-- Y-axis -->
  <line x1="100" y1="80" x2="100" y2="320" stroke="#4a5568" stroke-width="2"/>
  <text x="40" y="200" text-anchor="middle" font-size="11" fill="#4a5568" transform="rotate(-90, 40, 200)">
    Malicious Packages (thousands)
  </text>

  <!-- Y-axis labels -->
  <g font-size="10" fill="#718096" text-anchor="end">
    <text x="90" y="84">500K+</text>
    <line x1="95" y1="80" x2="100" y2="80" stroke="#718096"/>

    <text x="90" y="140">400K</text>
    <line x1="95" y1="136" x2="100" y2="136" stroke="#718096"/>

    <text x="90" y="196">300K</text>
    <line x1="95" y1="192" x2="100" y2="192" stroke="#718096"/>

    <text x="90" y="252">200K</text>
    <line x1="95" y1="248" x2="100" y2="248" stroke="#718096"/>

    <text x="90" y="308">100K</text>
    <line x1="95" y1="304" x2="100" y2="304" stroke="#718096"/>

    <text x="90" y="324">0</text>
  </g>

  <!-- Grid lines -->
  <g stroke="#e2e8f0" stroke-width="1">
    <line x1="100" y1="80" x2="620" y2="80"/>
    <line x1="100" y1="136" x2="620" y2="136"/>
    <line x1="100" y1="192" x2="620" y2="192"/>
    <line x1="100" y1="248" x2="620" y2="248"/>
    <line x1="100" y1="304" x2="620" y2="304"/>
  </g>

  <!-- X-axis -->
  <line x1="100" y1="320" x2="620" y2="320" stroke="#4a5568" stroke-width="2"/>

  <!-- Bars (approximate heights based on growth trend to 512K in 2024) -->
  <!-- 2019: ~30K -->
  <g filter="url(#barShadow)">
    <rect x="130" y="306" width="60" height="14" rx="2" fill="url(#barGrad)"/>
    <text x="160" y="340" text-anchor="middle" font-size="11" fill="#4a5568">2019</text>
    <text x="160" y="300" text-anchor="middle" font-size="9" fill="#e53e3e">~30K</text>
  </g>

  <!-- 2020: ~50K -->
  <g filter="url(#barShadow)">
    <rect x="210" y="296" width="60" height="24" rx="2" fill="url(#barGrad)"/>
    <text x="240" y="340" text-anchor="middle" font-size="11" fill="#4a5568">2020</text>
    <text x="240" y="290" text-anchor="middle" font-size="9" fill="#e53e3e">~50K</text>
  </g>

  <!-- 2021: ~80K -->
  <g filter="url(#barShadow)">
    <rect x="290" y="281" width="60" height="39" rx="2" fill="url(#barGrad)"/>
    <text x="320" y="340" text-anchor="middle" font-size="11" fill="#4a5568">2021</text>
    <text x="320" y="275" text-anchor="middle" font-size="9" fill="#e53e3e">~80K</text>
  </g>

  <!-- 2022: ~130K -->
  <g filter="url(#barShadow)">
    <rect x="370" y="256" width="60" height="64" rx="2" fill="url(#barGrad)"/>
    <text x="400" y="340" text-anchor="middle" font-size="11" fill="#4a5568">2022</text>
    <text x="400" y="250" text-anchor="middle" font-size="9" fill="#e53e3e">~130K</text>
  </g>

  <!-- 2023: ~200K -->
  <g filter="url(#barShadow)">
    <rect x="450" y="223" width="60" height="97" rx="2" fill="url(#barGrad)"/>
    <text x="480" y="340" text-anchor="middle" font-size="11" fill="#4a5568">2023</text>
    <text x="480" y="217" text-anchor="middle" font-size="9" fill="#e53e3e">~200K</text>
  </g>

  <!-- 2024: 512K -->
  <g filter="url(#barShadow)">
    <rect x="530" y="74" width="60" height="246" rx="2" fill="url(#barGrad)"/>
    <text x="560" y="340" text-anchor="middle" font-size="11" fill="#4a5568">2024</text>
    <text x="560" y="68" text-anchor="middle" font-size="10" font-weight="600" fill="#c53030">512K</text>
  </g>

  <!-- Growth annotation -->
  <g>
    <path d="M 490 150 Q 510 120 540 95" stroke="#c53030" stroke-width="2" fill="none" stroke-dasharray="4,2"/>
    <text x="430" y="145" font-size="11" fill="#c53030" font-weight="600">+156%</text>
    <text x="430" y="158" font-size="9" fill="#718096">YoY growth</text>
  </g>

  <!-- Cumulative total box -->
  <g transform="translate(520, 355)">
    <rect x="0" y="0" width="160" height="35" rx="4" fill="#fff" stroke="#c53030" stroke-width="1"/>
    <text x="80" y="15" text-anchor="middle" font-size="9" fill="#718096">Cumulative total since 2019:</text>
    <text x="80" y="30" text-anchor="middle" font-size="12" font-weight="600" fill="#c53030">704,000+ packages</text>
  </g>
</svg>
