<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 600" font-family="Libertinus Sans">
  <defs>
    <filter id="nodeShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="2" result="blur"/>
      <feOffset in="blur" dx="1" dy="2" result="offsetBlur"/>
      <feFlood flood-color="#000000" flood-opacity="0.5" result="color"/>
      <feComposite in="color" in2="offsetBlur" operator="in" result="shadow"/>
      <feMerge>
        <feMergeNode in="shadow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <marker id="trustArrow" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#718096"/>
    </marker>
    <marker id="trustArrowBlue" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#3182ce"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="900" height="600" fill="#f7fafc"/>

  <!-- Title -->
  <text x="450" y="35" text-anchor="middle" font-size="18" font-weight="600" fill="#1a365d">
    Key Actors in the Software Supply Chain
  </text>
  <text x="450" y="55" text-anchor="middle" font-size="12" fill="#718096">
    Arrows indicate direction of trust flow and artifact delivery
  </text>

  <!-- Central: Package being built -->
  <g filter="url(#actorShadow)">
    <circle cx="450" cy="300" r="50" fill="#2d3748"/>
    <text x="450" y="295" text-anchor="middle" font-size="12" font-weight="600" fill="#fff">SOFTWARE</text>
    <text x="450" y="310" text-anchor="middle" font-size="12" font-weight="600" fill="#fff">ARTIFACT</text>
  </g>

  <!-- Maintainers -->
  <g filter="url(#actorShadow)" transform="translate(150, 150)">
    <rect x="0" y="0" width="140" height="80" rx="8" fill="#3182ce"/>
    <text x="70" y="28" text-anchor="middle" font-size="13" font-weight="600" fill="#fff">Maintainers</text>
    <line x1="15" y1="38" x2="125" y2="38" stroke="rgba(255,255,255,0.3)"/>
    <text x="70" y="55" text-anchor="middle" font-size="9" fill="#bee3f8">Review contributions</text>
    <text x="70" y="68" text-anchor="middle" font-size="9" fill="#bee3f8">Make release decisions</text>
  </g>
  <path d="M 290 200 Q 370 250 400 280" stroke="#3182ce" stroke-width="2" fill="none" marker-end="url(#trustArrowBlue)"/>

  <!-- Contributors -->
  <g filter="url(#actorShadow)" transform="translate(80, 320)">
    <rect x="0" y="0" width="140" height="80" rx="8" fill="#48bb78"/>
    <text x="70" y="28" text-anchor="middle" font-size="13" font-weight="600" fill="#fff">Contributors</text>
    <line x1="15" y1="38" x2="125" y2="38" stroke="rgba(255,255,255,0.3)"/>
    <text x="70" y="55" text-anchor="middle" font-size="9" fill="#c6f6d5">Submit code, docs</text>
    <text x="70" y="68" text-anchor="middle" font-size="9" fill="#c6f6d5">May be pseudonymous</text>
  </g>
  <path d="M 220 350 Q 260 320 220 200" stroke="#48bb78" stroke-width="2" fill="none" marker-end="url(#trustArrow)"/>
  <text x="195" y="275" font-size="9" fill="#4a5568" transform="rotate(-60, 195, 275)">trust granted</text>

  <!-- Build Systems -->
  <g filter="url(#actorShadow)" transform="translate(610, 150)">
    <rect x="0" y="0" width="140" height="80" rx="8" fill="#ed8936"/>
    <text x="70" y="28" text-anchor="middle" font-size="13" font-weight="600" fill="#fff">Build Systems</text>
    <line x1="15" y1="38" x2="125" y2="38" stroke="rgba(255,255,255,0.3)"/>
    <text x="70" y="55" text-anchor="middle" font-size="9" fill="#feebc8">CI/CD providers</text>
    <text x="70" y="68" text-anchor="middle" font-size="9" fill="#feebc8">Transform source to binary</text>
  </g>
  <path d="M 610 200 Q 530 250 500 280" stroke="#ed8936" stroke-width="2" fill="none" marker-end="url(#trustArrow)"/>

  <!-- Package Registries -->
  <g filter="url(#actorShadow)" transform="translate(610, 320)">
    <rect x="0" y="0" width="140" height="80" rx="8" fill="#e53e3e"/>
    <text x="70" y="28" text-anchor="middle" font-size="13" font-weight="600" fill="#fff">Registries</text>
    <line x1="15" y1="38" x2="125" y2="38" stroke="rgba(255,255,255,0.3)"/>
    <text x="70" y="55" text-anchor="middle" font-size="9" fill="#fed7d7">npm, PyPI, Maven</text>
    <text x="70" y="68" text-anchor="middle" font-size="9" fill="#fed7d7">Identity verification</text>
  </g>
  <path d="M 500 310 Q 540 340 610 360" stroke="#e53e3e" stroke-width="2" fill="none" marker-end="url(#trustArrow)"/>

  <!-- Security Researchers -->
  <g filter="url(#actorShadow)" transform="translate(150, 450)">
    <rect x="0" y="0" width="140" height="80" rx="8" fill="#9f7aea"/>
    <text x="70" y="28" text-anchor="middle" font-size="13" font-weight="600" fill="#fff">Security</text>
    <text x="70" y="42" text-anchor="middle" font-size="13" font-weight="600" fill="#fff">Researchers</text>
    <line x1="15" y1="52" x2="125" y2="52" stroke="rgba(255,255,255,0.3)"/>
    <text x="70" y="68" text-anchor="middle" font-size="9" fill="#e9d8fd">Find vulnerabilities</text>
  </g>
  <path d="M 290 480 Q 370 400 420 340" stroke="#9f7aea" stroke-width="2" fill="none" stroke-dasharray="5,3"/>
  <text x="310" y="420" font-size="9" fill="#6b46c1">audit</text>

  <!-- Consumers -->
  <g filter="url(#actorShadow)" transform="translate(380, 470)">
    <rect x="0" y="0" width="140" height="80" rx="8" fill="#38b2ac"/>
    <text x="70" y="28" text-anchor="middle" font-size="13" font-weight="600" fill="#fff">Consumers</text>
    <line x1="15" y1="38" x2="125" y2="38" stroke="rgba(255,255,255,0.3)"/>
    <text x="70" y="55" text-anchor="middle" font-size="9" fill="#b2f5ea">Enterprises, developers</text>
    <text x="70" y="68" text-anchor="middle" font-size="9" fill="#b2f5ea">Integrate into apps</text>
  </g>
  <path d="M 680 420 Q 600 470 520 490" stroke="#38b2ac" stroke-width="2" fill="none" marker-end="url(#trustArrow)"/>
  <text x="610" y="465" font-size="9" fill="#4a5568">download</text>

  <!-- Distributors -->
  <g filter="url(#actorShadow)" transform="translate(610, 450)">
    <rect x="0" y="0" width="140" height="80" rx="8" fill="#dd6b20"/>
    <text x="70" y="28" text-anchor="middle" font-size="13" font-weight="600" fill="#fff">Distributors</text>
    <line x1="15" y1="38" x2="125" y2="38" stroke="rgba(255,255,255,0.3)"/>
    <text x="70" y="55" text-anchor="middle" font-size="9" fill="#feebc8">Linux distros, CDNs</text>
    <text x="70" y="68" text-anchor="middle" font-size="9" fill="#feebc8">Repackage, mirror</text>
  </g>
  <path d="M 750 400 L 750 450" stroke="#dd6b20" stroke-width="2" fill="none"/>
  <path d="M 680 450 L 680 400 L 750 400" stroke="#e53e3e" stroke-width="2" fill="none" marker-end="url(#trustArrow)"/>

  <!-- Trust flow annotations -->
  <g font-size="10" fill="#718096">
    <text x="340" y="240">code</text>
    <text x="540" y="240">build</text>
    <text x="560" y="330">publish</text>
  </g>

  <!-- Legend -->
  <g transform="translate(30, 80)">
    <rect x="0" y="0" width="120" height="90" rx="4" fill="#fff" stroke="#e2e8f0"/>
    <text x="60" y="20" text-anchor="middle" font-size="10" font-weight="600" fill="#2d3748">Legend</text>
    <line x1="10" y1="30" x2="110" y2="30" stroke="#e2e8f0"/>
    <line x1="15" y1="48" x2="45" y2="48" stroke="#718096" stroke-width="2" marker-end="url(#trustArrow)"/>
    <text x="55" y="52" font-size="9" fill="#4a5568">Trust/artifact flow</text>
    <line x1="15" y1="68" x2="45" y2="68" stroke="#718096" stroke-width="2" stroke-dasharray="5,3"/>
    <text x="55" y="72" font-size="9" fill="#4a5568">Audit/review</text>
  </g>

  <!-- Vulnerability callout -->
  <g transform="translate(730, 80)">
    <rect x="0" y="0" width="140" height="80" rx="4" fill="#fff3cd" stroke="#f59e0b"/>
    <text x="70" y="22" text-anchor="middle" font-size="10" font-weight="600" fill="#92400e">Vulnerability Points</text>
    <line x1="10" y1="30" x2="130" y2="30" stroke="#f59e0b"/>
    <text x="10" y="48" font-size="9" fill="#78350f">Each actor = trust decision</text>
    <text x="10" y="62" font-size="9" fill="#78350f">Each handoff = attack surface</text>
  </g>
</svg>
