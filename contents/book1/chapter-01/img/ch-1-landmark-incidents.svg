<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 380" font-family="Libertinus Sans">
  <defs>
        <filter id="incidentShadow" x="-10%" y="-10%" width="120%" height="130%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="2" result="blur"/>
      <feOffset in="blur" dx="1" dy="2" result="offsetBlur"/>
      <feFlood flood-color="#000000" flood-opacity="0.5" result="color"/>
      <feComposite in="color" in2="offsetBlur" operator="in" result="shadow"/>
      <feMerge>
        <feMergeNode in="shadow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <linearGradient id="severityGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#f56565;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#c53030;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="900" height="380" fill="#f7fafc"/>

  <!-- Title -->
  <text x="450" y="30" text-anchor="middle" font-size="18" font-weight="600" fill="#1a365d">
    Landmark Supply Chain Security Incidents
  </text>
  <text x="450" y="50" text-anchor="middle" font-size="12" fill="#718096">
    Each incident revealed different dimensions of supply chain risk
  </text>

  <!-- Timeline axis -->
  <line x1="80" y1="200" x2="820" y2="200" stroke="#2d3748" stroke-width="3"/>
  <polygon points="820,200 808,194 808,206" fill="#2d3748"/>

  <!-- Year markers -->
  <g font-size="11" fill="#4a5568" text-anchor="middle">
    <line x1="180" y1="195" x2="180" y2="205" stroke="#4a5568" stroke-width="2"/>
    <text x="180" y="220">2020</text>

    <line x1="400" y1="195" x2="400" y2="205" stroke="#4a5568" stroke-width="2"/>
    <text x="400" y="220">2021</text>

    <line x1="620" y1="195" x2="620" y2="205" stroke="#4a5568" stroke-width="2"/>
    <text x="620" y="220">2024</text>
  </g>

  <!-- SolarWinds Incident -->
  <g filter="url(#incidentShadow)">
    <circle cx="180" cy="200" r="15" fill="#e53e3e"/>
    <rect x="60" y="70" width="240" height="110" rx="8" fill="#fff" stroke="#e53e3e" stroke-width="2"/>

    <text x="180" y="92" text-anchor="middle" font-size="14" font-weight="600" fill="#c53030">SOLARWINDS</text>
    <text x="180" y="108" text-anchor="middle" font-size="10" fill="#718096">December 2020</text>
    <line x1="75" y1="115" x2="285" y2="115" stroke="#fed7d7"/>

    <text x="75" y="132" font-size="10" fill="#2d3748" font-weight="500">Attack Type:</text>
    <text x="160" y="132" font-size="10" fill="#4a5568">Build system compromise</text>

    <text x="75" y="148" font-size="10" fill="#2d3748" font-weight="500">Impact:</text>
    <text x="120" y="148" font-size="10" fill="#4a5568">18,000 customers affected</text>

    <text x="75" y="164" font-size="10" fill="#2d3748" font-weight="500">Attribution:</text>
    <text x="145" y="164" font-size="10" fill="#4a5568">Russian SVR (alleged)</text>

    <!-- Connector -->
    <line x1="180" y1="180" x2="180" y2="185" stroke="#e53e3e" stroke-width="2"/>
  </g>

  <!-- Log4Shell Incident -->
  <g filter="url(#incidentShadow)">
    <circle cx="400" cy="200" r="15" fill="#dd6b20"/>
    <rect x="280" y="235" width="240" height="120" rx="8" fill="#fff" stroke="#dd6b20" stroke-width="2"/>

    <text x="400" y="257" text-anchor="middle" font-size="14" font-weight="600" fill="#c05621">LOG4SHELL</text>
    <text x="400" y="273" text-anchor="middle" font-size="10" fill="#718096">December 2021 (CVE-2021-44228)</text>
    <line x1="295" y1="280" x2="505" y2="280" stroke="#feebc8"/>

    <text x="295" y="297" font-size="10" fill="#2d3748" font-weight="500">Attack Type:</text>
    <text x="378" y="297" font-size="10" fill="#4a5568">Ubiquitous vulnerability</text>

    <text x="295" y="313" font-size="10" fill="#2d3748" font-weight="500">Impact:</text>
    <text x="340" y="313" font-size="10" fill="#4a5568">Millions of systems exposed</text>

    <text x="295" y="329" font-size="10" fill="#2d3748" font-weight="500">Challenge:</text>
    <text x="358" y="329" font-size="10" fill="#4a5568">Deep transitive dep</text>

    <text x="295" y="345" font-size="10" fill="#2d3748" font-weight="500">Quote:</text>
    <text x="335" y="345" font-size="9" fill="#718096" font-style="italic">"Most serious in my career"</text>

    <!-- Connector -->
    <line x1="400" y1="215" x2="400" y2="235" stroke="#dd6b20" stroke-width="2"/>
  </g>

  <!-- XZ Utils Incident -->
  <g filter="url(#incidentShadow)">
    <circle cx="620" cy="200" r="15" fill="#805ad5"/>
    <rect x="500" y="70" width="240" height="110" rx="8" fill="#fff" stroke="#805ad5" stroke-width="2"/>

    <text x="620" y="92" text-anchor="middle" font-size="14" font-weight="600" fill="#6b46c1">XZ UTILS</text>
    <text x="620" y="108" text-anchor="middle" font-size="10" fill="#718096">March 2024</text>
    <line x1="515" y1="115" x2="725" y2="115" stroke="#e9d8fd"/>

    <text x="515" y="132" font-size="10" fill="#2d3748" font-weight="500">Attack Type:</text>
    <text x="595" y="132" font-size="10" fill="#4a5568">Social engineering</text>

    <text x="515" y="148" font-size="10" fill="#2d3748" font-weight="500">Duration:</text>
    <text x="570" y="148" font-size="10" fill="#4a5568">2+ years of infiltration</text>

    <text x="515" y="164" font-size="10" fill="#2d3748" font-weight="500">Detection:</text>
    <text x="575" y="164" font-size="10" fill="#4a5568">Fortunate accident</text>

    <!-- Connector -->
    <line x1="620" y1="180" x2="620" y2="185" stroke="#805ad5" stroke-width="2"/>
  </g>

  <!-- Key lessons box -->
  <g transform="translate(680, 260)">
    <rect x="0" y="0" width="190" height="100" rx="6" fill="#fff3cd" stroke="#f59e0b" stroke-width="1"/>
    <text x="95" y="20" text-anchor="middle" font-size="11" font-weight="600" fill="#92400e">Key Lessons</text>
    <line x1="15" y1="30" x2="175" y2="30" stroke="#f59e0b"/>
    <text x="15" y="48" font-size="9" fill="#78350f">Build systems are targets</text>
    <text x="15" y="62" font-size="9" fill="#78350f">Transitive deps hide risk</text>
    <text x="15" y="76" font-size="9" fill="#78350f">Trust can be manufactured</text>
    <text x="15" y="90" font-size="9" fill="#78350f">Detection is often luck</text>
  </g>
</svg>
