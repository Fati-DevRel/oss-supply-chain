    <rect x="125" y="390" width="45" height="20" rx="2" fill="#9f7aea"/>
    <rect x="180" y="390" width="45" height="20" rx="2" fill="#9f7aea"/>
    <rect x="235" y="390" width="45" height="20" rx="2" fill="#9f7aea"/>
    <rect x="290" y="390" width="45" height="20" rx="2" fill="#9f7aea"/>
    <rect x="345" y="390" width="45" height="20" rx="2" fill="#9f7aea"/>
    <rect x="400" y="390" width="45" height="20" rx="2" fill="#9f7aea"/>
    <rect x="455" y="390" width="45" height="20" rx="2" fill="#9f7aea"/>
    <rect x="510" y="390" width="45" height="20" rx="2" fill="#9f7aea"/>
