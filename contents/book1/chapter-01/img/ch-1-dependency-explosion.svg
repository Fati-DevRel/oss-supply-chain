<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" font-family="Libertinus Sans">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#fff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#fff;stop-opacity:1" />
    </linearGradient>
    <filter id="nodeShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="2" result="blur"/>
      <feOffset in="blur" dx="1" dy="2" result="offsetBlur"/>
      <feFlood flood-color="#000000" flood-opacity="0.5" result="color"/>
      <feComposite in="color" in2="offsetBlur" operator="in" result="shadow"/>
      <feMerge>
        <feMergeNode in="shadow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#718096"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="800" height="500" fill="url(#bgGrad)"/>

  <!-- Title -->
  <text x="400" y="30" text-anchor="middle" font-size="18" font-weight="600" fill="#1a365d">
    The Dependency Explosion: From One Command to 1,400+ Packages
  </text>

  <!-- Command box -->
  <g filter="url(#nodeShadow)">
    <rect x="250" y="50" width="300" height="40" rx="6" fill="#2d3748"/>
    <text x="400" y="75" text-anchor="middle" font-size="13" fill="#68d391" font-family="Libertinus Mono">
      npx create-react-app my-app
    </text>
  </g>

  <!-- Arrow from command -->
  <line x1="400" y1="90" x2="400" y2="115" stroke="#718096" stroke-width="2" marker-end="url(#arrowhead)"/>

  <!-- Level 0: Your App -->
  <g filter="url(#nodeShadow)">
    <rect x="325" y="120" width="150" height="50" rx="8" fill="#3182ce"/>
    <text x="400" y="145" text-anchor="middle" font-size="14" font-weight="600" fill="#fff">Your Application</text>
    <text x="400" y="162" text-anchor="middle" font-size="10" fill="#bee3f8">0 lines of code</text>
  </g>

  <!-- Connections to Level 1 -->
  <path d="M 340 170 Q 340 190 220 210" stroke="#718096" stroke-width="1.5" fill="none"/>
  <path d="M 400 170 Q 400 190 400 210" stroke="#718096" stroke-width="1.5" fill="none"/>
  <path d="M 460 170 Q 460 190 580 210" stroke="#718096" stroke-width="1.5" fill="none"/>

  <!-- Level 1: Direct Dependencies -->
  <text x="60" y="230" font-size="11" fill="#4a5568" font-weight="500">Direct Dependencies (~50)</text>

  <g filter="url(#nodeShadow)">
    <rect x="145" y="210" width="100" height="40" rx="6" fill="#48bb78"/>
    <text x="195" y="233" text-anchor="middle" font-size="11" font-weight="500" fill="#fff">react</text>
    <text x="195" y="245" text-anchor="middle" font-size="9" fill="#c6f6d5">18.2.0</text>
  </g>

  <g filter="url(#nodeShadow)">
    <rect x="260" y="210" width="100" height="40" rx="6" fill="#48bb78"/>
    <text x="310" y="233" text-anchor="middle" font-size="11" font-weight="500" fill="#fff">react-dom</text>
    <text x="310" y="245" text-anchor="middle" font-size="9" fill="#c6f6d5">18.2.0</text>
  </g>

