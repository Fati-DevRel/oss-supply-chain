<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 950 620" font-family="Libertinus Sans">
  <defs>
        <filter id="shadow" x="-10%" y="-10%" width="120%" height="130%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="2" result="blur"/>
      <feOffset in="blur" dx="1" dy="2" result="offsetBlur"/>
      <feFlood flood-color="#000000" flood-opacity="0.5" result="color"/>
      <feComposite in="color" in2="offsetBlur" operator="in" result="shadow"/>
      <feMerge>
        <feMergeNode in="shadow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="950" height="620" fill="#f7fafc"/>

  <!-- Title -->
  <text x="475" y="35" text-anchor="middle" font-size="20" font-weight="600" fill="#1a365d">
    Vulnerability Prioritization Framework
  </text>
  <text x="475" y="55" text-anchor="middle" font-size="12" fill="#718096">
    Multi-signal approach to identify which vulnerabilities require immediate action
  </text>

  <!-- The Problem with CVSS Alone -->
  <g transform="translate(50, 80)">
    <rect x="0" y="0" width="280" height="140" rx="8" fill="#fff" filter="url(#shadow)"/>
    <rect x="0" y="0" width="280" height="35" rx="8" fill="#e53e3e"/>
    <rect x="0" y="27" width="280" height="8" fill="#e53e3e"/>
    <text x="140" y="24" text-anchor="middle" font-size="12" font-weight="600" fill="#fff">The CVSS Problem</text>

    <g transform="translate(15, 50)">
      <text x="0" y="0" font-size="10" font-weight="600" fill="#c53030">~25,000+ CVEs per year</text>
      <text x="0" y="18" font-size="9" fill="#4a5568">Many rated Critical or High</text>
      <text x="0" y="36" font-size="9" fill="#4a5568">CVSS measures potential impact</text>
      <text x="0" y="50" font-size="9" fill="#c53030" font-weight="500">NOT actual exploitation likelihood</text>

      <line x1="0" y1="62" x2="250" y2="62" stroke="#e2e8f0"/>

      <text x="0" y="78" font-size="9" fill="#718096" font-style="italic">Result: Alert fatigue, misallocated resources</text>
    </g>
  </g>

  <!-- Prioritization Signals -->
  <g transform="translate(350, 80)">
    <rect x="0" y="0" width="560" height="140" rx="8" fill="#fff" filter="url(#shadow)"/>
    <text x="280" y="25" text-anchor="middle" font-size="13" font-weight="600" fill="#2d3748">Prioritization Signal Types</text>
    <line x1="20" y1="35" x2="540" y2="35" stroke="#e2e8f0"/>

    <!-- Signal boxes -->
    <g transform="translate(20, 50)">
      <rect x="0" y="0" width="120" height="75" rx="4" fill="#ebf8ff"/>
      <text x="60" y="18" text-anchor="middle" font-size="10" font-weight="600" fill="#2b6cb0">CVSS</text>
      <text x="60" y="35" text-anchor="middle" font-size="8" fill="#4a5568">How bad could</text>
      <text x="60" y="48" text-anchor="middle" font-size="8" fill="#4a5568">it be?</text>
      <text x="60" y="65" text-anchor="middle" font-size="7" fill="#718096">Technical severity</text>
    </g>
    <g transform="translate(150, 50)">
      <rect x="0" y="0" width="120" height="75" rx="4" fill="#fff5f5"/>
      <text x="60" y="18" text-anchor="middle" font-size="10" font-weight="600" fill="#c53030">KEV</text>
      <text x="60" y="35" text-anchor="middle" font-size="8" fill="#4a5568">Is it being</text>
      <text x="60" y="48" text-anchor="middle" font-size="8" fill="#4a5568">exploited NOW?</text>
      <text x="60" y="65" text-anchor="middle" font-size="7" fill="#718096">Confirmed attacks</text>
    </g>
    <g transform="translate(280, 50)">
      <rect x="0" y="0" width="120" height="75" rx="4" fill="#f0fff4"/>
      <text x="60" y="18" text-anchor="middle" font-size="10" font-weight="600" fill="#276749">EPSS</text>
      <text x="60" y="35" text-anchor="middle" font-size="8" fill="#4a5568">How likely to</text>
      <text x="60" y="48" text-anchor="middle" font-size="8" fill="#4a5568">be exploited?</text>
      <text x="60" y="65" text-anchor="middle" font-size="7" fill="#718096">Predictive probability</text>
    </g>
    <g transform="translate(410, 50)">
      <rect x="0" y="0" width="120" height="75" rx="4" fill="#faf5ff"/>
      <text x="60" y="18" text-anchor="middle" font-size="10" font-weight="600" fill="#6b46c1">SSVC</text>
      <text x="60" y="35" text-anchor="middle" font-size="8" fill="#4a5568">What should</text>
      <text x="60" y="48" text-anchor="middle" font-size="8" fill="#4a5568">we DO?</text>
      <text x="60" y="65" text-anchor="middle" font-size="7" fill="#718096">Decision framework</text>
    </g>
  </g>

  <!-- KEV Detail -->
  <g transform="translate(50, 240)">
    <rect x="0" y="0" width="280" height="170" rx="8" fill="#fff" filter="url(#shadow)"/>
    <rect x="0" y="0" width="280" height="35" rx="8" fill="#c53030"/>
    <rect x="0" y="27" width="280" height="8" fill="#c53030"/>
    <text x="140" y="24" text-anchor="middle" font-size="11" font-weight="600" fill="#fff">CISA KEV Catalog</text>

    <g transform="translate(15, 50)">
      <text x="0" y="0" font-size="9" font-weight="600" fill="#2d3748">Known Exploited Vulnerabilities</text>

      <text x="0" y="22" font-size="9" fill="#4a5568">Confirmed in-the-wild exploitation</text>
      <text x="0" y="37" font-size="9" fill="#4a5568">Federal agencies must remediate</text>
      <text x="0" y="52" font-size="9" fill="#4a5568">~1,100+ entries (and growing)</text>

      <line x1="0" y1="65" x2="250" y2="65" stroke="#e2e8f0"/>

      <text x="0" y="82" font-size="9" font-weight="600" fill="#c53030">When to use:</text>
      <text x="0" y="97" font-size="9" fill="#4a5568">Immediate priority for any KEV entry</text>
      <text x="0" y="112" font-size="9" fill="#4a5568">Attackers actively targeting these</text>
    </g>
  </g>

  <!-- EPSS Detail -->
  <g transform="translate(350, 240)">
    <rect x="0" y="0" width="280" height="170" rx="8" fill="#fff" filter="url(#shadow)"/>
    <rect x="0" y="0" width="280" height="35" rx="8" fill="#38a169"/>
    <rect x="0" y="27" width="280" height="8" fill="#38a169"/>
    <text x="140" y="24" text-anchor="middle" font-size="11" font-weight="600" fill="#fff">EPSS (FIRST)</text>

    <g transform="translate(15, 50)">
      <text x="0" y="0" font-size="9" font-weight="600" fill="#2d3748">Exploit Prediction Scoring System</text>

      <text x="0" y="22" font-size="9" fill="#4a5568">ML-based probability prediction</text>
      <text x="0" y="37" font-size="9" fill="#4a5568">30-day exploitation likelihood</text>
      <text x="0" y="52" font-size="9" fill="#4a5568">Score 0.0 to 1.0 (0% to 100%)</text>

      <line x1="0" y1="65" x2="250" y2="65" stroke="#e2e8f0"/>

      <text x="0" y="82" font-size="9" font-weight="600" fill="#276749">Interpretation:</text>
      <text x="0" y="97" font-size="9" fill="#4a5568">0.70+ = High likelihood, prioritize</text>
      <text x="0" y="112" font-size="9" fill="#4a5568">Top 5% of EPSS = ~50% of exploits</text>
    </g>
  </g>

  <!-- SSVC Detail -->
  <g transform="translate(650, 240)">
    <rect x="0" y="0" width="260" height="170" rx="8" fill="#fff" filter="url(#shadow)"/>
    <rect x="0" y="0" width="260" height="35" rx="8" fill="#805ad5"/>
    <rect x="0" y="27" width="260" height="8" fill="#805ad5"/>
    <text x="130" y="24" text-anchor="middle" font-size="11" font-weight="600" fill="#fff">SSVC (CISA/CMU)</text>

    <g transform="translate(15, 50)">
      <text x="0" y="0" font-size="9" font-weight="600" fill="#2d3748">Decision Tree Framework</text>

      <text x="0" y="22" font-size="9" fill="#4a5568">Considers your context</text>
      <text x="0" y="37" font-size="9" fill="#4a5568">Outputs: Track, Attend, Act</text>

      <line x1="0" y1="50" x2="230" y2="50" stroke="#e2e8f0"/>

      <text x="0" y="67" font-size="9" font-weight="600" fill="#6b46c1">Decision factors:</text>
      <text x="0" y="82" font-size="9" fill="#4a5568">Exploitation status</text>
      <text x="0" y="97" font-size="9" fill="#4a5568">Technical impact</text>
      <text x="0" y="112" font-size="9" fill="#4a5568">Your exposure/mission</text>
    </g>
  </g>

  <!-- Decision Flow -->
  <g transform="translate(50, 430)">
    <rect x="0" y="0" width="860" height="170" rx="8" fill="#fff" filter="url(#shadow)"/>
    <text x="430" y="25" text-anchor="middle" font-size="13" font-weight="600" fill="#2d3748">Recommended Prioritization Flow</text>
    <line x1="30" y1="35" x2="830" y2="35" stroke="#e2e8f0"/>

    <!-- Flow steps -->
    <g transform="translate(30, 50)">
      <!-- Step 1 -->
      <g transform="translate(0, 0)">
        <rect x="0" y="0" width="180" height="100" rx="6" fill="#fff5f5" stroke="#c53030" stroke-width="2"/>
        <circle cx="90" cy="-8" r="15" fill="#c53030"/>
        <text x="90" y="-4" text-anchor="middle" font-size="10" font-weight="700" fill="#fff">1</text>
        <text x="90" y="25" text-anchor="middle" font-size="10" font-weight="600" fill="#c53030">Check KEV</text>
        <text x="90" y="45" text-anchor="middle" font-size="9" fill="#4a5568">In KEV catalog?</text>
        <text x="90" y="65" text-anchor="middle" font-size="9" font-weight="600" fill="#c53030">YES = IMMEDIATE</text>
        <text x="90" y="85" text-anchor="middle" font-size="8" fill="#718096">Federal: mandatory timeline</text>
      </g>

      <!-- Arrow -->
      <text x="195" y="50" font-size="18" fill="#4a5568">&#8594;</text>

      <!-- Step 2 -->
      <g transform="translate(220, 0)">
        <rect x="0" y="0" width="180" height="100" rx="6" fill="#f0fff4" stroke="#38a169" stroke-width="2"/>
        <circle cx="90" cy="-8" r="15" fill="#38a169"/>
        <text x="90" y="-4" text-anchor="middle" font-size="10" font-weight="700" fill="#fff">2</text>
        <text x="90" y="25" text-anchor="middle" font-size="10" font-weight="600" fill="#276749">Check EPSS</text>
        <text x="90" y="45" text-anchor="middle" font-size="9" fill="#4a5568">EPSS score high?</text>
        <text x="90" y="65" text-anchor="middle" font-size="9" font-weight="600" fill="#276749">&gt;0.7 = High Priority</text>
        <text x="90" y="85" text-anchor="middle" font-size="8" fill="#718096">Likely to be exploited soon</text>
      </g>

      <!-- Arrow -->
      <text x="415" y="50" font-size="18" fill="#4a5568">&#8594;</text>

      <!-- Step 3 -->
      <g transform="translate(440, 0)">
        <rect x="0" y="0" width="180" height="100" rx="6" fill="#ebf8ff" stroke="#3182ce" stroke-width="2"/>
        <circle cx="90" cy="-8" r="15" fill="#3182ce"/>
        <text x="90" y="-4" text-anchor="middle" font-size="10" font-weight="700" fill="#fff">3</text>
        <text x="90" y="25" text-anchor="middle" font-size="10" font-weight="600" fill="#2b6cb0">Check Exposure</text>
        <text x="90" y="45" text-anchor="middle" font-size="9" fill="#4a5568">Internet-facing?</text>
        <text x="90" y="65" text-anchor="middle" font-size="9" font-weight="600" fill="#2b6cb0">Critical systems?</text>
        <text x="90" y="85" text-anchor="middle" font-size="8" fill="#718096">Context matters</text>
      </g>

      <!-- Arrow -->
      <text x="635" y="50" font-size="18" fill="#4a5568">&#8594;</text>

      <!-- Step 4 -->
      <g transform="translate(660, 0)">
        <rect x="0" y="0" width="140" height="100" rx="6" fill="#faf5ff" stroke="#805ad5" stroke-width="2"/>
        <circle cx="70" cy="-8" r="15" fill="#805ad5"/>
        <text x="70" y="-4" text-anchor="middle" font-size="10" font-weight="700" fill="#fff">4</text>
        <text x="70" y="25" text-anchor="middle" font-size="10" font-weight="600" fill="#6b46c1">Business Impact</text>
        <text x="70" y="45" text-anchor="middle" font-size="9" fill="#4a5568">Revenue?</text>
        <text x="70" y="60" text-anchor="middle" font-size="9" fill="#4a5568">Data breach?</text>
        <text x="70" y="75" text-anchor="middle" font-size="9" fill="#4a5568">Compliance?</text>
        <text x="70" y="90" text-anchor="middle" font-size="8" fill="#718096">Final prioritization</text>
      </g>
    </g>
  </g>
</svg>