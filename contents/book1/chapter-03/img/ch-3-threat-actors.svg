<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 950 650" font-family="Libertinus Sans">
  <defs>
        <filter id="cardShadow" x="-10%" y="-10%" width="120%" height="130%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="2" result="blur"/>
      <feOffset in="blur" dx="1" dy="2" result="offsetBlur"/>
      <feFlood flood-color="#000000" flood-opacity="0.5" result="color"/>
      <feComposite in="color" in2="offsetBlur" operator="in" result="shadow"/>
      <feMerge>
        <feMergeNode in="shadow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="950" height="650" fill="#f7fafc"/>

  <!-- Title -->
  <text x="475" y="35" text-anchor="middle" font-size="20" font-weight="600" fill="#1a365d">
    Supply Chain Threat Actor Profiles
  </text>
  <text x="475" y="55" text-anchor="middle" font-size="12" fill="#718096">
    Motivations, capabilities, and attack patterns by adversary type
  </text>

  <!-- Actor Cards Row 1 -->
  <!-- Nation-State -->
  <g transform="translate(30, 75)" filter="url(#cardShadow)">
    <rect x="0" y="0" width="280" height="250" rx="10" fill="#fff"/>
    <rect x="0" y="0" width="280" height="50" rx="10" fill="#c53030"/>
    <rect x="0" y="42" width="280" height="8" fill="#c53030"/>
    <text x="140" y="32" text-anchor="middle" font-size="14" font-weight="600" fill="#fff">Nation-State Actors</text>

    <g transform="translate(15, 65)">
      <text x="0" y="0" font-size="10" font-weight="600" fill="#2d3748">Motivations:</text>
      <text x="0" y="15" font-size="9" fill="#4a5568">Espionage, pre-positioning, sabotage, IP theft</text>

      <text x="0" y="35" font-size="10" font-weight="600" fill="#2d3748">Capabilities:</text>
      <text x="0" y="50" font-size="9" fill="#4a5568">Virtually unlimited resources, years of patience</text>
      <text x="0" y="63" font-size="9" fill="#4a5568">Sophisticated tradecraft, zero-day access</text>

      <text x="0" y="83" font-size="10" font-weight="600" fill="#2d3748">Attack Patterns:</text>
      <text x="0" y="98" font-size="9" fill="#4a5568">Long-term access, stealth over speed</text>
      <text x="0" y="111" font-size="9" fill="#4a5568">Strategic targeting, supply chain compromise</text>

      <text x="0" y="131" font-size="10" font-weight="600" fill="#2d3748">Examples:</text>
      <text x="0" y="146" font-size="9" fill="#718096">SolarWinds (SVR), 3CX (DPRK), XZ Utils</text>
    </g>

    <!-- Threat level indicator -->
    <g transform="translate(15, 218)">
      <text x="0" y="0" font-size="9" fill="#718096">Sophistication:</text>
      <rect x="75" y="-8" width="100" height="10" rx="3" fill="#e2e8f0"/>
      <rect x="75" y="-8" width="100" height="10" rx="3" fill="#c53030"/>
      <text x="180" y="0" font-size="9" font-weight="600" fill="#c53030">CRITICAL</text>
    </g>
  </g>

  <!-- Cybercriminals -->
  <g transform="translate(335, 75)" filter="url(#cardShadow)">
    <rect x="0" y="0" width="280" height="250" rx="10" fill="#fff"/>
    <rect x="0" y="0" width="280" height="50" rx="10" fill="#dd6b20"/>
    <rect x="0" y="42" width="280" height="8" fill="#dd6b20"/>
    <text x="140" y="32" text-anchor="middle" font-size="14" font-weight="600" fill="#fff">Cybercriminal Organizations</text>

    <g transform="translate(15, 65)">
      <text x="0" y="0" font-size="10" font-weight="600" fill="#2d3748">Motivations:</text>
      <text x="0" y="15" font-size="9" fill="#4a5568">Financial gain: ransomware, cryptomining, data theft</text>

      <text x="0" y="35" font-size="10" font-weight="600" fill="#2d3748">Capabilities:</text>
      <text x="0" y="50" font-size="9" fill="#4a5568">Professional operations, RaaS ecosystem</text>
      <text x="0" y="63" font-size="9" fill="#4a5568">Varied sophistication, exploit development</text>

      <text x="0" y="83" font-size="10" font-weight="600" fill="#2d3748">Attack Patterns:</text>
      <text x="0" y="98" font-size="9" fill="#4a5568">Speed over stealth, rapid monetization</text>
      <text x="0" y="111" font-size="9" fill="#4a5568">Opportunistic targeting, MSP compromise</text>

      <text x="0" y="131" font-size="10" font-weight="600" fill="#2d3748">Examples:</text>
      <text x="0" y="146" font-size="9" fill="#718096">Kaseya/REvil, ua-parser-js cryptominer</text>
    </g>

    <g transform="translate(15, 218)">
      <text x="0" y="0" font-size="9" fill="#718096">Sophistication:</text>
      <rect x="75" y="-8" width="100" height="10" rx="3" fill="#e2e8f0"/>
      <rect x="75" y="-8" width="80" height="10" rx="3" fill="#dd6b20"/>
      <text x="180" y="0" font-size="9" font-weight="600" fill="#dd6b20">HIGH</text>
    </g>
  </g>

  <!-- Hacktivists -->
  <g transform="translate(640, 75)" filter="url(#cardShadow)">
    <rect x="0" y="0" width="280" height="250" rx="10" fill="#fff"/>
    <rect x="0" y="0" width="280" height="50" rx="10" fill="#805ad5"/>
    <rect x="0" y="42" width="280" height="8" fill="#805ad5"/>
    <text x="140" y="32" text-anchor="middle" font-size="14" font-weight="600" fill="#fff">Hacktivists</text>

    <g transform="translate(15, 65)">
      <text x="0" y="0" font-size="10" font-weight="600" fill="#2d3748">Motivations:</text>
      <text x="0" y="15" font-size="9" fill="#4a5568">Political/ideological causes, disruption, publicity</text>

      <text x="0" y="35" font-size="10" font-weight="600" fill="#2d3748">Capabilities:</text>
      <text x="0" y="50" font-size="9" fill="#4a5568">Varied, often opportunistic</text>
      <text x="0" y="63" font-size="9" fill="#4a5568">Maintainer access (if insider)</text>

      <text x="0" y="83" font-size="10" font-weight="600" fill="#2d3748">Attack Patterns:</text>
      <text x="0" y="98" font-size="9" fill="#4a5568">Visible disruption, package sabotage</text>
      <text x="0" y="111" font-size="9" fill="#4a5568">Protest-driven timing, unpredictable</text>

      <text x="0" y="131" font-size="10" font-weight="600" fill="#2d3748">Examples:</text>
      <text x="0" y="146" font-size="9" fill="#718096">node-ipc (Ukraine), colors.js protest</text>
    </g>

    <g transform="translate(15, 218)">
      <text x="0" y="0" font-size="9" fill="#718096">Sophistication:</text>
      <rect x="75" y="-8" width="100" height="10" rx="3" fill="#e2e8f0"/>
      <rect x="75" y="-8" width="50" height="10" rx="3" fill="#805ad5"/>
      <text x="180" y="0" font-size="9" font-weight="600" fill="#805ad5">MEDIUM</text>
    </g>
  </g>

  <!-- Actor Cards Row 2 -->
  <!-- Insiders -->
  <g transform="translate(110, 345)" filter="url(#cardShadow)">
    <rect x="0" y="0" width="280" height="250" rx="10" fill="#fff"/>
    <rect x="0" y="0" width="280" height="50" rx="10" fill="#2b6cb0"/>
    <rect x="0" y="42" width="280" height="8" fill="#2b6cb0"/>
    <text x="140" y="32" text-anchor="middle" font-size="14" font-weight="600" fill="#fff">Insider Threats</text>

    <g transform="translate(15, 65)">
      <text x="0" y="0" font-size="10" font-weight="600" fill="#2d3748">Motivations:</text>
      <text x="0" y="15" font-size="9" fill="#4a5568">Disgruntlement, financial pressure, coercion</text>

      <text x="0" y="35" font-size="10" font-weight="600" fill="#2d3748">Capabilities:</text>
      <text x="0" y="50" font-size="9" fill="#4a5568">Legitimate access, bypass external controls</text>
      <text x="0" y="63" font-size="9" fill="#4a5568">Deep system knowledge</text>

      <text x="0" y="83" font-size="10" font-weight="600" fill="#2d3748">Attack Patterns:</text>
      <text x="0" y="98" font-size="9" fill="#4a5568">Abuse of trust, credential leverage</text>
      <text x="0" y="111" font-size="9" fill="#4a5568">May be recruited by external actors</text>

      <text x="0" y="131" font-size="10" font-weight="600" fill="#2d3748">Examples:</text>
      <text x="0" y="146" font-size="9" fill="#718096">XZ Utils (trust-building), event-stream transfer</text>
    </g>

    <g transform="translate(15, 218)">
      <text x="0" y="0" font-size="9" fill="#718096">Sophistication:</text>
      <rect x="75" y="-8" width="100" height="10" rx="3" fill="#e2e8f0"/>
      <rect x="75" y="-8" width="70" height="10" rx="3" fill="#2b6cb0"/>
      <text x="180" y="0" font-size="9" font-weight="600" fill="#2b6cb0">HIGH</text>
    </g>
  </g>

  <!-- Researchers/Hobbyists -->
  <g transform="translate(415, 345)" filter="url(#cardShadow)">
    <rect x="0" y="0" width="280" height="250" rx="10" fill="#fff"/>
    <rect x="0" y="0" width="280" height="50" rx="10" fill="#38a169"/>
    <rect x="0" y="42" width="280" height="8" fill="#38a169"/>
    <text x="140" y="32" text-anchor="middle" font-size="14" font-weight="600" fill="#fff">Researchers &amp; Hobbyists</text>

    <g transform="translate(15, 65)">
      <text x="0" y="0" font-size="10" font-weight="600" fill="#2d3748">Motivations:</text>
      <text x="0" y="15" font-size="9" fill="#4a5568">Security research, academic study, curiosity</text>

      <text x="0" y="35" font-size="10" font-weight="600" fill="#2d3748">Capabilities:</text>
      <text x="0" y="50" font-size="9" fill="#4a5568">Varied expertise, proof-of-concept development</text>
      <text x="0" y="63" font-size="9" fill="#4a5568">Often well-intentioned but risky</text>

      <text x="0" y="83" font-size="10" font-weight="600" fill="#2d3748">Attack Patterns:</text>
      <text x="0" y="98" font-size="9" fill="#4a5568">PoC publication, dependency confusion demos</text>
      <text x="0" y="111" font-size="9" fill="#4a5568">Accidental exposure, testing in prod</text>

      <text x="0" y="131" font-size="10" font-weight="600" fill="#2d3748">Examples:</text>
      <text x="0" y="146" font-size="9" fill="#718096">Birsan dep. confusion, typosquat research</text>
    </g>

    <g transform="translate(15, 218)">
      <text x="0" y="0" font-size="9" fill="#718096">Sophistication:</text>
      <rect x="75" y="-8" width="100" height="10" rx="3" fill="#e2e8f0"/>
      <rect x="75" y="-8" width="60" height="10" rx="3" fill="#38a169"/>
      <text x="180" y="0" font-size="9" font-weight="600" fill="#38a169">MEDIUM</text>
    </g>
  </g>

  <!-- Vandals -->
  <g transform="translate(720, 345)" filter="url(#cardShadow)">
    <rect x="0" y="0" width="200" height="250" rx="10" fill="#fff"/>
    <rect x="0" y="0" width="200" height="50" rx="10" fill="#718096"/>
    <rect x="0" y="42" width="200" height="8" fill="#718096"/>
    <text x="100" y="32" text-anchor="middle" font-size="14" font-weight="600" fill="#fff">Vandals</text>

    <g transform="translate(15, 65)">
      <text x="0" y="0" font-size="10" font-weight="600" fill="#2d3748">Motivations:</text>
      <text x="0" y="15" font-size="9" fill="#4a5568">Notoriety, chaos, testing</text>

      <text x="0" y="35" font-size="10" font-weight="600" fill="#2d3748">Capabilities:</text>
      <text x="0" y="50" font-size="9" fill="#4a5568">Low, using existing tools</text>

      <text x="0" y="70" font-size="10" font-weight="600" fill="#2d3748">Patterns:</text>
      <text x="0" y="85" font-size="9" fill="#4a5568">Defacement, disruption</text>
      <text x="0" y="98" font-size="9" fill="#4a5568">Unpredictable, short-term</text>

      <text x="0" y="118" font-size="10" font-weight="600" fill="#2d3748">Examples:</text>
      <text x="0" y="133" font-size="9" fill="#718096">Script kiddies</text>
    </g>

    <g transform="translate(15, 218)">
      <text x="0" y="0" font-size="9" fill="#718096">Sophistication:</text>
      <rect x="75" y="-8" width="60" height="10" rx="3" fill="#e2e8f0"/>
      <rect x="75" y="-8" width="20" height="10" rx="3" fill="#718096"/>
      <text x="140" y="0" font-size="9" font-weight="600" fill="#718096">LOW</text>
    </g>
  </g>

  <!-- Defense Implications -->
  <g transform="translate(30, 610)">
    <rect x="0" y="0" width="890" height="30" rx="6" fill="#fffbeb" stroke="#d97706" stroke-width="1"/>
    <text x="20" y="20" font-size="10" font-weight="600" fill="#92400e">Key Insight:</text>
    <text x="95" y="20" font-size="10" fill="#78350f">
      Defense strategy must account for all actor types. Nation-states require assume-breach resilience; criminals require rapid patching; insiders require least-privilege.
    </text>
  </g>
</svg>