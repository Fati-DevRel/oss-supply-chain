<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 950 700" font-family="Libertinus Sans">
  <defs>
        <filter id="shadow" x="-10%" y="-10%" width="120%" height="130%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="2" result="blur"/>
      <feOffset in="blur" dx="1" dy="2" result="offsetBlur"/>
      <feFlood flood-color="#000000" flood-opacity="0.5" result="color"/>
      <feComposite in="color" in2="offsetBlur" operator="in" result="shadow"/>
      <feMerge>
        <feMergeNode in="shadow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#4a5568"/>
    </marker>
    <linearGradient id="pipelineGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#4299e1"/>
      <stop offset="25%" style="stop-color:#48bb78"/>
      <stop offset="50%" style="stop-color:#ed8936"/>
      <stop offset="75%" style="stop-color:#e53e3e"/>
      <stop offset="100%" style="stop-color:#805ad5"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="950" height="700" fill="#f7fafc"/>

  <!-- Title -->
  <text x="475" y="35" text-anchor="middle" font-size="20" font-weight="600" fill="#1a365d">
    Attack Surfaces Across the Software Supply Chain
  </text>
  <text x="475" y="55" text-anchor="middle" font-size="12" fill="#718096">
    Based on SLSA framework - Each stage presents distinct threat opportunities
  </text>

  <!-- Pipeline Flow -->
  <rect x="50" y="75" width="850" height="12" rx="6" fill="url(#pipelineGrad)"/>

  <!-- Stage 1: Source -->
  <g transform="translate(50, 100)">
    <rect x="0" y="0" width="160" height="260" rx="8" fill="#fff" filter="url(#shadow)"/>
    <rect x="0" y="0" width="160" height="45" rx="8" fill="#4299e1"/>
    <rect x="0" y="37" width="160" height="8" fill="#4299e1"/>
    <text x="80" y="28" text-anchor="middle" font-size="13" font-weight="600" fill="#fff">SOURCE</text>

    <g transform="translate(10, 55)">
      <text x="0" y="0" font-size="9" font-weight="600" fill="#2d3748">Attack Vectors:</text>
      <circle cx="8" cy="15" r="3" fill="#e53e3e"/>
      <text x="15" y="18" font-size="8" fill="#4a5568">Account compromise</text>
      <circle cx="8" cy="30" r="3" fill="#e53e3e"/>
      <text x="15" y="33" font-size="8" fill="#4a5568">Malicious commits</text>
      <circle cx="8" cy="45" r="3" fill="#e53e3e"/>
      <text x="15" y="48" font-size="8" fill="#4a5568">Webhook abuse</text>
      <circle cx="8" cy="60" r="3" fill="#e53e3e"/>
      <text x="15" y="63" font-size="8" fill="#4a5568">Secret exposure</text>

      <text x="0" y="85" font-size="9" font-weight="600" fill="#2d3748">Real-World Example:</text>
      <text x="0" y="100" font-size="8" fill="#718096">Gentoo GitHub (2018)</text>
      <text x="0" y="113" font-size="8" fill="#718096">XZ Utils backdoor</text>

      <text x="0" y="135" font-size="9" font-weight="600" fill="#2d3748">Defenses:</text>
      <text x="0" y="150" font-size="8" fill="#276749">MFA, code review</text>
      <text x="0" y="163" font-size="8" fill="#276749">Branch protection</text>
      <text x="0" y="176" font-size="8" fill="#276749">Signed commits</text>
    </g>
  </g>

  <!-- Stage 2: Development -->
  <g transform="translate(225, 100)">
    <rect x="0" y="0" width="160" height="260" rx="8" fill="#fff" filter="url(#shadow)"/>
    <rect x="0" y="0" width="160" height="45" rx="8" fill="#48bb78"/>
    <rect x="0" y="37" width="160" height="8" fill="#48bb78"/>
    <text x="80" y="28" text-anchor="middle" font-size="13" font-weight="600" fill="#fff">DEVELOPMENT</text>

    <g transform="translate(10, 55)">
      <text x="0" y="0" font-size="9" font-weight="600" fill="#2d3748">Attack Vectors:</text>
      <circle cx="8" cy="15" r="3" fill="#ed8936"/>
      <text x="15" y="18" font-size="8" fill="#4a5568">IDE plugin malware</text>
      <circle cx="8" cy="30" r="3" fill="#ed8936"/>
      <text x="15" y="33" font-size="8" fill="#4a5568">Dev tool compromise</text>
      <circle cx="8" cy="45" r="3" fill="#ed8936"/>
      <text x="15" y="48" font-size="8" fill="#4a5568">Credential theft</text>
      <circle cx="8" cy="60" r="3" fill="#ed8936"/>
      <text x="15" y="63" font-size="8" fill="#4a5568">Network interception</text>

      <text x="0" y="85" font-size="9" font-weight="600" fill="#2d3748">Real-World Example:</text>
      <text x="0" y="100" font-size="8" fill="#718096">eslint-scope (2018)</text>
      <text x="0" y="113" font-size="8" fill="#718096">VS Code ext malware</text>

      <text x="0" y="135" font-size="9" font-weight="600" fill="#2d3748">Defenses:</text>
      <text x="0" y="150" font-size="8" fill="#276749">Endpoint protection</text>
      <text x="0" y="163" font-size="8" fill="#276749">Vetted extensions</text>
      <text x="0" y="176" font-size="8" fill="#276749">Secret management</text>
    </g>
  </g>

  <!-- Stage 3: Build -->
  <g transform="translate(400, 100)">
    <rect x="0" y="0" width="160" height="260" rx="8" fill="#fff" filter="url(#shadow)"/>
    <rect x="0" y="0" width="160" height="45" rx="8" fill="#ed8936"/>
    <rect x="0" y="37" width="160" height="8" fill="#ed8936"/>
    <text x="80" y="28" text-anchor="middle" font-size="13" font-weight="600" fill="#fff">BUILD</text>

    <g transform="translate(10, 55)">
      <text x="0" y="0" font-size="9" font-weight="600" fill="#2d3748">Attack Vectors:</text>
      <circle cx="8" cy="15" r="3" fill="#c53030"/>
      <text x="15" y="18" font-size="8" fill="#4a5568">Build infra compromise</text>
      <circle cx="8" cy="30" r="3" fill="#c53030"/>
      <text x="15" y="33" font-size="8" fill="#4a5568">CI/CD manipulation</text>
      <circle cx="8" cy="45" r="3" fill="#c53030"/>
      <text x="15" y="48" font-size="8" fill="#4a5568">Build script injection</text>
      <circle cx="8" cy="60" r="3" fill="#c53030"/>
      <text x="15" y="63" font-size="8" fill="#4a5568">Toolchain attacks</text>

      <text x="0" y="85" font-size="9" font-weight="600" fill="#2d3748">Real-World Example:</text>
      <text x="0" y="100" font-size="8" fill="#c53030" font-weight="600">SolarWinds (2020)</text>
      <text x="0" y="113" font-size="8" fill="#718096">Codecov (2021)</text>

      <text x="0" y="135" font-size="9" font-weight="600" fill="#2d3748">Defenses:</text>
      <text x="0" y="150" font-size="8" fill="#276749">Hermetic builds</text>
      <text x="0" y="163" font-size="8" fill="#276749">SLSA compliance</text>
      <text x="0" y="176" font-size="8" fill="#276749">Build provenance</text>
    </g>
  </g>

  <!-- Stage 4: Registry/Distribution -->
  <g transform="translate(575, 100)">
    <rect x="0" y="0" width="160" height="260" rx="8" fill="#fff" filter="url(#shadow)"/>
    <rect x="0" y="0" width="160" height="45" rx="8" fill="#e53e3e"/>
    <rect x="0" y="37" width="160" height="8" fill="#e53e3e"/>
    <text x="80" y="28" text-anchor="middle" font-size="13" font-weight="600" fill="#fff">DISTRIBUTION</text>

    <g transform="translate(10, 55)">
      <text x="0" y="0" font-size="9" font-weight="600" fill="#2d3748">Attack Vectors:</text>
      <circle cx="8" cy="15" r="3" fill="#c53030"/>
      <text x="15" y="18" font-size="8" fill="#4a5568">Account takeover</text>
      <circle cx="8" cy="30" r="3" fill="#c53030"/>
      <text x="15" y="33" font-size="8" fill="#4a5568">Typosquatting</text>
      <circle cx="8" cy="45" r="3" fill="#c53030"/>
      <text x="15" y="48" font-size="8" fill="#4a5568">Dependency confusion</text>
      <circle cx="8" cy="60" r="3" fill="#c53030"/>
      <text x="15" y="63" font-size="8" fill="#4a5568">CDN compromise</text>

      <text x="0" y="85" font-size="9" font-weight="600" fill="#2d3748">Real-World Example:</text>
      <text x="0" y="100" font-size="8" fill="#718096">ua-parser-js (2021)</text>
      <text x="0" y="113" font-size="8" fill="#c53030" font-weight="600">Polyfill.io (2024)</text>

      <text x="0" y="135" font-size="9" font-weight="600" fill="#2d3748">Defenses:</text>
      <text x="0" y="150" font-size="8" fill="#276749">MFA enforcement</text>
      <text x="0" y="163" font-size="8" fill="#276749">Package signing</text>
      <text x="0" y="176" font-size="8" fill="#276749">SRI for CDN assets</text>
    </g>
  </g>

  <!-- Stage 5: Deployment -->
  <g transform="translate(750, 100)">
    <rect x="0" y="0" width="160" height="260" rx="8" fill="#fff" filter="url(#shadow)"/>
    <rect x="0" y="0" width="160" height="45" rx="8" fill="#805ad5"/>
    <rect x="0" y="37" width="160" height="8" fill="#805ad5"/>
    <text x="80" y="28" text-anchor="middle" font-size="13" font-weight="600" fill="#fff">DEPLOYMENT</text>

    <g transform="translate(10, 55)">
      <text x="0" y="0" font-size="9" font-weight="600" fill="#2d3748">Attack Vectors:</text>
      <circle cx="8" cy="15" r="3" fill="#805ad5"/>
      <text x="15" y="18" font-size="8" fill="#4a5568">Registry compromise</text>
      <circle cx="8" cy="30" r="3" fill="#805ad5"/>
      <text x="15" y="33" font-size="8" fill="#4a5568">Update hijacking</text>
      <circle cx="8" cy="45" r="3" fill="#805ad5"/>
      <text x="15" y="48" font-size="8" fill="#4a5568">Artifact tampering</text>
      <circle cx="8" cy="60" r="3" fill="#805ad5"/>
      <text x="15" y="63" font-size="8" fill="#4a5568">Auto-update abuse</text>

      <text x="0" y="85" font-size="9" font-weight="600" fill="#2d3748">Real-World Example:</text>
      <text x="0" y="100" font-size="8" fill="#718096">ASUS ShadowHammer</text>
      <text x="0" y="113" font-size="8" fill="#718096">3CX (2023)</text>

      <text x="0" y="135" font-size="9" font-weight="600" fill="#2d3748">Defenses:</text>
      <text x="0" y="150" font-size="8" fill="#276749">Signature verification</text>
      <text x="0" y="163" font-size="8" fill="#276749">Pinned versions</text>
      <text x="0" y="176" font-size="8" fill="#276749">Update policies</text>
    </g>
  </g>

  <!-- Connecting Arrows -->
  <g stroke="#4a5568" stroke-width="2" fill="none">
    <line x1="210" y1="87" x2="225" y2="87" marker-end="url(#arrow)"/>
    <line x1="385" y1="87" x2="400" y2="87" marker-end="url(#arrow)"/>
    <line x1="560" y1="87" x2="575" y2="87" marker-end="url(#arrow)"/>
    <line x1="735" y1="87" x2="750" y2="87" marker-end="url(#arrow)"/>
  </g>

  <!-- Human/Social Layer -->
  <g transform="translate(50, 385)">
    <rect x="0" y="0" width="420" height="130" rx="8" fill="#fff" filter="url(#shadow)"/>
    <rect x="0" y="0" width="420" height="35" rx="8" fill="#2d3748"/>
    <rect x="0" y="27" width="420" height="8" fill="#2d3748"/>
    <text x="210" y="24" text-anchor="middle" font-size="12" font-weight="600" fill="#fff">HUMAN / SOCIAL ATTACK SURFACE</text>

    <g transform="translate(15, 50)">
      <g transform="translate(0, 0)">
        <rect x="0" y="0" width="120" height="65" rx="4" fill="#fef3c7"/>
        <text x="60" y="18" text-anchor="middle" font-size="9" font-weight="600" fill="#92400e">Trust Building</text>
        <text x="60" y="35" text-anchor="middle" font-size="8" fill="#78350f">Long-term contribution</text>
        <text x="60" y="48" text-anchor="middle" font-size="8" fill="#78350f">Gain maintainer access</text>
        <text x="60" y="61" text-anchor="middle" font-size="7" fill="#a16207">XZ Utils pattern</text>
      </g>
      <g transform="translate(135, 0)">
        <rect x="0" y="0" width="120" height="65" rx="4" fill="#fed7e2"/>
        <text x="60" y="18" text-anchor="middle" font-size="9" font-weight="600" fill="#97266d">Pressure Campaigns</text>
        <text x="60" y="35" text-anchor="middle" font-size="8" fill="#702459">Exploit maintainer stress</text>
        <text x="60" y="48" text-anchor="middle" font-size="8" fill="#702459">Sock puppet pressure</text>
        <text x="60" y="61" text-anchor="middle" font-size="7" fill="#97266d">Force hasty decisions</text>
      </g>
      <g transform="translate(270, 0)">
        <rect x="0" y="0" width="120" height="65" rx="4" fill="#e9d8fd"/>
        <text x="60" y="18" text-anchor="middle" font-size="9" font-weight="600" fill="#6b46c1">Impersonation</text>
        <text x="60" y="35" text-anchor="middle" font-size="8" fill="#553c9a">Phishing developers</text>
        <text x="60" y="48" text-anchor="middle" font-size="8" fill="#553c9a">Fake community members</text>
        <text x="60" y="61" text-anchor="middle" font-size="7" fill="#6b46c1">Credential theft</text>
      </g>
    </g>
  </g>

  <!-- AI/Emerging Layer -->
  <g transform="translate(490, 385)">
    <rect x="0" y="0" width="420" height="130" rx="8" fill="#fff" filter="url(#shadow)"/>
    <rect x="0" y="0" width="420" height="35" rx="8" fill="#319795"/>
    <rect x="0" y="27" width="420" height="8" fill="#319795"/>
    <text x="210" y="24" text-anchor="middle" font-size="12" font-weight="600" fill="#fff">EMERGING: AI CODING TOOLS</text>

    <g transform="translate(15, 50)">
      <g transform="translate(0, 0)">
        <rect x="0" y="0" width="120" height="65" rx="4" fill="#b2f5ea"/>
        <text x="60" y="18" text-anchor="middle" font-size="9" font-weight="600" fill="#234e52">Hallucinated Packages</text>
        <text x="60" y="35" text-anchor="middle" font-size="8" fill="#285e61">AI suggests non-existent</text>
        <text x="60" y="48" text-anchor="middle" font-size="8" fill="#285e61">packages, attackers</text>
        <text x="60" y="61" text-anchor="middle" font-size="7" fill="#234e52">register the names</text>
      </g>
      <g transform="translate(135, 0)">
        <rect x="0" y="0" width="120" height="65" rx="4" fill="#c6f6d5"/>
        <text x="60" y="18" text-anchor="middle" font-size="9" font-weight="600" fill="#22543d">Training Poisoning</text>
        <text x="60" y="35" text-anchor="middle" font-size="8" fill="#276749">Inject malicious patterns</text>
        <text x="60" y="48" text-anchor="middle" font-size="8" fill="#276749">into AI training data</text>
        <text x="60" y="61" text-anchor="middle" font-size="7" fill="#22543d">Influence suggestions</text>
      </g>
      <g transform="translate(270, 0)">
        <rect x="0" y="0" width="120" height="65" rx="4" fill="#bee3f8"/>
        <text x="60" y="18" text-anchor="middle" font-size="9" font-weight="600" fill="#2a4365">Trust Displacement</text>
        <text x="60" y="35" text-anchor="middle" font-size="8" fill="#2c5282">Developers accept AI</text>
        <text x="60" y="48" text-anchor="middle" font-size="8" fill="#2c5282">suggestions without</text>
        <text x="60" y="61" text-anchor="middle" font-size="7" fill="#2a4365">vetting dependencies</text>
      </g>
    </g>
  </g>

  <!-- Risk Assessment Guide -->
  <g transform="translate(50, 535)">
    <rect x="0" y="0" width="860" height="145" rx="8" fill="#fff" filter="url(#shadow)"/>
    <text x="430" y="25" text-anchor="middle" font-size="13" font-weight="600" fill="#1a365d">Risk Assessment Factors</text>
    <line x1="30" y1="35" x2="830" y2="35" stroke="#e2e8f0"/>

    <!-- Factor columns -->
    <g transform="translate(30, 50)">
      <g transform="translate(0, 0)">
        <rect x="0" y="0" width="190" height="75" rx="4" fill="#ebf8ff"/>
        <text x="95" y="18" text-anchor="middle" font-size="10" font-weight="600" fill="#2b6cb0">REACH</text>
        <text x="95" y="35" text-anchor="middle" font-size="9" fill="#4a5568">How many downstream</text>
        <text x="95" y="48" text-anchor="middle" font-size="9" fill="#4a5568">systems are affected?</text>
        <text x="95" y="65" text-anchor="middle" font-size="8" fill="#718096">Registry attacks = highest</text>
      </g>
      <g transform="translate(205, 0)">
        <rect x="0" y="0" width="190" height="75" rx="4" fill="#faf5ff"/>
        <text x="95" y="18" text-anchor="middle" font-size="10" font-weight="600" fill="#6b46c1">DETECTION</text>
        <text x="95" y="35" text-anchor="middle" font-size="9" fill="#4a5568">How hard to detect?</text>
        <text x="95" y="48" text-anchor="middle" font-size="9" fill="#4a5568">Build compromise = hard</text>
        <text x="95" y="65" text-anchor="middle" font-size="8" fill="#718096">Source changes = visible</text>
      </g>
      <g transform="translate(410, 0)">
        <rect x="0" y="0" width="190" height="75" rx="4" fill="#fff5f5"/>
        <text x="95" y="18" text-anchor="middle" font-size="10" font-weight="600" fill="#c53030">COMPLEXITY</text>
        <text x="95" y="35" text-anchor="middle" font-size="9" fill="#4a5568">What skills required?</text>
        <text x="95" y="48" text-anchor="middle" font-size="9" fill="#4a5568">Typosquatting = low</text>
        <text x="95" y="65" text-anchor="middle" font-size="8" fill="#718096">Build infra = high</text>
      </g>
      <g transform="translate(615, 0)">
        <rect x="0" y="0" width="190" height="75" rx="4" fill="#f0fff4"/>
        <text x="95" y="18" text-anchor="middle" font-size="10" font-weight="600" fill="#276749">CONTROL</text>
        <text x="95" y="35" text-anchor="middle" font-size="9" fill="#4a5568">Can you secure it?</text>
        <text x="95" y="48" text-anchor="middle" font-size="9" fill="#4a5568">Your CI/CD = yes</text>
        <text x="95" y="65" text-anchor="middle" font-size="8" fill="#718096">Upstream registry = no</text>
      </g>
    </g>
  </g>
</svg>