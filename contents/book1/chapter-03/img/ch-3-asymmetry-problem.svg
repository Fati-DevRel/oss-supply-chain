<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 580" font-family="Libertinus Sans">
  <defs>
        <filter id="shadow" x="-10%" y="-10%" width="120%" height="130%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="2" result="blur"/>
      <feOffset in="blur" dx="1" dy="2" result="offsetBlur"/>
      <feFlood flood-color="#000000" flood-opacity="0.5" result="color"/>
      <feComposite in="color" in2="offsetBlur" operator="in" result="shadow"/>
      <feMerge>
        <feMergeNode in="shadow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <linearGradient id="attackerGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#fc8181"/>
      <stop offset="100%" style="stop-color:#c53030"/>
    </linearGradient>
    <linearGradient id="defenderGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#90cdf4"/>
      <stop offset="100%" style="stop-color:#2b6cb0"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="900" height="580" fill="#f7fafc"/>

  <!-- Title -->
  <text x="450" y="35" text-anchor="middle" font-size="20" font-weight="600" fill="#1a365d">
    The Asymmetry Problem in Supply Chain Security
  </text>
  <text x="450" y="55" text-anchor="middle" font-size="12" fill="#718096">
    Structural advantages that favor attackers over defenders
  </text>

  <!-- Central Scale/Balance Visualization -->
  <g transform="translate(450, 170)">
    <!-- Fulcrum -->
    <polygon points="0,80 -20,120 20,120" fill="#4a5568"/>

    <!-- Balance beam (tilted toward attacker) -->
    <line x1="-180" y1="20" x2="180" y2="60" stroke="#2d3748" stroke-width="6" stroke-linecap="round"/>

    <!-- Attacker side (up = advantage) -->
    <g transform="translate(-180, 20)">
      <circle cx="0" cy="0" r="50" fill="url(#attackerGrad)"/>
      <text x="0" y="-5" text-anchor="middle" font-size="11" font-weight="600" fill="#fff">ATTACKER</text>
      <text x="0" y="10" text-anchor="middle" font-size="9" fill="#fff">Advantage</text>
    </g>

    <!-- Defender side (down = disadvantage) -->
    <g transform="translate(180, 60)">
      <circle cx="0" cy="0" r="50" fill="url(#defenderGrad)"/>
      <text x="0" y="-5" text-anchor="middle" font-size="11" font-weight="600" fill="#fff">DEFENDER</text>
      <text x="0" y="10" text-anchor="middle" font-size="9" fill="#fff">Disadvantage</text>
    </g>
  </g>

  <!-- Asymmetry Comparison Cards -->
  <!-- Row 1 -->
  <g transform="translate(40, 295)">
    <!-- Card 1: Weakest Link -->
    <rect x="0" y="0" width="195" height="130" rx="8" fill="#fff" filter="url(#shadow)"/>
    <rect x="0" y="0" width="195" height="35" rx="8" fill="#e53e3e"/>
    <rect x="0" y="27" width="195" height="8" fill="#e53e3e"/>
    <text x="97" y="24" text-anchor="middle" font-size="11" font-weight="600" fill="#fff">WEAKEST LINK</text>

    <g transform="translate(12, 45)">
      <text x="0" y="12" font-size="9" fill="#c53030" font-weight="600">Attacker:</text>
      <text x="0" y="27" font-size="9" fill="#4a5568">Find ONE weakness</text>
      <text x="0" y="40" font-size="9" fill="#4a5568">in any of 500+ deps</text>

      <line x1="0" y1="50" x2="170" y2="50" stroke="#e2e8f0"/>

      <text x="0" y="65" font-size="9" fill="#2b6cb0" font-weight="600">Defender:</text>
      <text x="0" y="80" font-size="9" fill="#4a5568">Secure EVERY component</text>
    </g>
  </g>

  <!-- Card 2: Investment -->
  <g transform="translate(250, 295)">
    <rect x="0" y="0" width="195" height="130" rx="8" fill="#fff" filter="url(#shadow)"/>
    <rect x="0" y="0" width="195" height="35" rx="8" fill="#dd6b20"/>
    <rect x="0" y="27" width="195" height="8" fill="#dd6b20"/>
    <text x="97" y="24" text-anchor="middle" font-size="11" font-weight="600" fill="#fff">INVESTMENT</text>

    <g transform="translate(12, 45)">
      <text x="0" y="12" font-size="9" fill="#c05621" font-weight="600">Attacker:</text>
      <text x="0" y="27" font-size="9" fill="#4a5568">Focus on easiest target</text>
      <text x="0" y="40" font-size="9" fill="#4a5568">Zero marginal cost/victim</text>

      <line x1="0" y1="50" x2="170" y2="50" stroke="#e2e8f0"/>

      <text x="0" y="65" font-size="9" fill="#2b6cb0" font-weight="600">Defender:</text>
      <text x="0" y="80" font-size="9" fill="#4a5568">Pay for EVERY dependency</text>
    </g>
  </g>

  <!-- Card 3: Time -->
  <g transform="translate(460, 295)">
    <rect x="0" y="0" width="195" height="130" rx="8" fill="#fff" filter="url(#shadow)"/>
    <rect x="0" y="0" width="195" height="35" rx="8" fill="#805ad5"/>
    <rect x="0" y="27" width="195" height="8" fill="#805ad5"/>
    <text x="97" y="24" text-anchor="middle" font-size="11" font-weight="600" fill="#fff">TIME</text>

    <g transform="translate(12, 45)">
      <text x="0" y="12" font-size="9" fill="#6b46c1" font-weight="600">Attacker:</text>
      <text x="0" y="27" font-size="9" fill="#4a5568">Wait for opportunity</text>
      <text x="0" y="40" font-size="9" fill="#4a5568">Years of patience (XZ)</text>

      <line x1="0" y1="50" x2="170" y2="50" stroke="#e2e8f0"/>

      <text x="0" y="65" font-size="9" fill="#2b6cb0" font-weight="600">Defender:</text>
      <text x="0" y="80" font-size="9" fill="#4a5568">Respond immediately</text>
    </g>
  </g>

  <!-- Card 4: Attribution -->
  <g transform="translate(670, 295)">
    <rect x="0" y="0" width="195" height="130" rx="8" fill="#fff" filter="url(#shadow)"/>
    <rect x="0" y="0" width="195" height="35" rx="8" fill="#319795"/>
    <rect x="0" y="27" width="195" height="8" fill="#319795"/>
    <text x="97" y="24" text-anchor="middle" font-size="11" font-weight="600" fill="#fff">ATTRIBUTION</text>

    <g transform="translate(12, 45)">
      <text x="0" y="12" font-size="9" fill="#234e52" font-weight="600">Attacker:</text>
      <text x="0" y="27" font-size="9" fill="#4a5568">Anonymity, pseudonyms</text>
      <text x="0" y="40" font-size="9" fill="#4a5568">Minimal consequences</text>

      <line x1="0" y1="50" x2="170" y2="50" stroke="#e2e8f0"/>

      <text x="0" y="65" font-size="9" fill="#2b6cb0" font-weight="600">Defender:</text>
      <text x="0" y="80" font-size="9" fill="#4a5568">Operate in the open</text>
    </g>
  </g>

  <!-- Probability Visualization -->
  <g transform="translate(40, 445)">
    <rect x="0" y="0" width="400" height="115" rx="8" fill="#fff" filter="url(#shadow)"/>
    <text x="200" y="25" text-anchor="middle" font-size="12" font-weight="600" fill="#2d3748">The Mathematics of Weak Links</text>

    <g transform="translate(20, 40)">
      <text x="0" y="15" font-size="10" fill="#4a5568">If each dependency has 99.9% chance of being secure:</text>

      <text x="0" y="40" font-size="10" fill="#4a5568">500 dependencies:</text>
      <text x="130" y="40" font-size="11" font-weight="600" fill="#c53030">~39% chance of compromise</text>

      <text x="0" y="60" font-size="10" fill="#4a5568">1,000 dependencies:</text>
      <text x="130" y="60" font-size="11" font-weight="600" fill="#c53030">~63% chance of compromise</text>

      <text x="0" y="80" font-size="9" fill="#718096" font-style="italic">Formula: 1 - (0.999)^n</text>
    </g>
  </g>

  <!-- Long Tail Visualization -->
  <g transform="translate(460, 445)">
    <rect x="0" y="0" width="400" height="115" rx="8" fill="#fff" filter="url(#shadow)"/>
    <text x="200" y="25" text-anchor="middle" font-size="12" font-weight="600" fill="#2d3748">The Long Tail of Targets</text>

    <!-- Simple bar chart representation -->
    <g transform="translate(20, 40)">
      <!-- High-profile packages -->
      <rect x="0" y="0" width="20" height="50" fill="#48bb78"/>
      <rect x="25" y="10" width="20" height="40" fill="#68d391"/>
      <rect x="50" y="20" width="20" height="30" fill="#9ae6b4"/>

      <!-- Long tail -->
      <rect x="80" y="30" width="15" height="20" fill="#e2e8f0"/>
      <rect x="100" y="32" width="15" height="18" fill="#e2e8f0"/>
      <rect x="120" y="34" width="15" height="16" fill="#e2e8f0"/>
      <rect x="140" y="36" width="15" height="14" fill="#e2e8f0"/>
      <rect x="160" y="38" width="15" height="12" fill="#e2e8f0"/>
      <rect x="180" y="40" width="15" height="10" fill="#e2e8f0"/>
      <rect x="200" y="41" width="15" height="9" fill="#e2e8f0"/>
      <rect x="220" y="42" width="15" height="8" fill="#fed7d7"/>
      <rect x="240" y="43" width="15" height="7" fill="#fed7d7"/>
      <rect x="260" y="44" width="15" height="6" fill="#fed7d7"/>

      <!-- Labels -->
      <text x="35" y="65" text-anchor="middle" font-size="8" fill="#276749">Popular</text>
      <text x="35" y="75" text-anchor="middle" font-size="7" fill="#276749">(scrutinized)</text>
      <text x="240" y="65" text-anchor="middle" font-size="8" fill="#c53030">Long tail</text>
      <text x="240" y="75" text-anchor="middle" font-size="7" fill="#c53030">(targeted)</text>

      <!-- Arrow -->
      <text x="320" y="40" font-size="9" fill="#4a5568">Attackers target</text>
      <text x="320" y="52" font-size="9" fill="#4a5568">less visible packages</text>
    </g>
  </g>
</svg>