<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 580" font-family="Libertinus Sans">
  <defs>
    <linearGradient id="aiGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#8B5CF6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#7C3AED;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="attackGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#DC2626;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#B91C1C;stop-opacity:1" />
    </linearGradient>
    <marker id="arrowPurple" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#8B5CF6"/>
    </marker>
    <marker id="arrowRed" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#DC2626"/>
    </marker>
    <marker id="arrowGray" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#64748B"/>
    </marker>
        <filter id="shadow" x="-10%" y="-10%" width="120%" height="130%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="2" result="blur"/>
      <feOffset in="blur" dx="1" dy="2" result="offsetBlur"/>
      <feFlood flood-color="#000000" flood-opacity="0.5" result="color"/>
      <feComposite in="color" in2="offsetBlur" operator="in" result="shadow"/>
      <feMerge>
        <feMergeNode in="shadow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="900" height="580" fill="#F8FAFC"/>

  <!-- Title -->
  <text x="450" y="32" text-anchor="middle" font-size="18" font-weight="bold" fill="#1E293B">Slopsquatting: AI-Enabled Package Name Attacks</text>
  <text x="450" y="52" text-anchor="middle" font-size="11" fill="#64748B">How attackers exploit AI hallucination patterns to distribute malware</text>

  <!-- Step 1: AI Hallucination -->
  <g filter="url(#shadow)">
    <rect x="50" y="80" width="180" height="140" rx="8" fill="url(#aiGrad)"/>
    <text x="140" y="105" text-anchor="middle" font-size="12" font-weight="bold" fill="white">1. AI Hallucination</text>

    <rect x="65" y="120" width="150" height="85" rx="4" fill="white" fill-opacity="0.95"/>
    <text x="75" y="140" font-size="9" fill="#475569">Developer asks:</text>
    <text x="75" y="155" font-size="9" font-style="italic" fill="#7C3AED">"Add Flask auth"</text>
    <text x="75" y="175" font-size="9" fill="#475569">AI suggests:</text>
    <text x="75" y="190" font-size="9" font-family="Libertinus Mono" fill="#DC2626">flask-auth-helper</text>
    <text x="75" y="200" font-size="8" fill="#DC2626">(doesn't exist!)</text>
  </g>

  <!-- Arrow 1->2 -->
  <path d="M 235 150 L 290 150" stroke="#8B5CF6" stroke-width="2" marker-end="url(#arrowPurple)" fill="none"/>

  <!-- Step 2: Attacker Reconnaissance -->
  <g filter="url(#shadow)">
    <rect x="300" y="80" width="180" height="140" rx="8" fill="url(#attackGrad)"/>
    <text x="390" y="105" text-anchor="middle" font-size="12" font-weight="bold" fill="white">2. Reconnaissance</text>

    <rect x="315" y="120" width="150" height="85" rx="4" fill="white" fill-opacity="0.95"/>
    <text x="325" y="138" font-size="9" fill="#475569">Attacker queries AI</text>
    <text x="325" y="152" font-size="9" fill="#475569">models systematically</text>
    <text x="325" y="170" font-size="9" fill="#475569">Collects hallucinated</text>
    <text x="325" y="184" font-size="9" fill="#475569">package names</text>
    <text x="325" y="198" font-size="9" font-weight="600" fill="#DC2626">43% repeat reliably</text>
  </g>

  <!-- Arrow 2->3 -->
  <path d="M 485 150 L 540 150" stroke="#DC2626" stroke-width="2" marker-end="url(#arrowRed)" fill="none"/>

  <!-- Step 3: Package Registration -->
  <g filter="url(#shadow)">
    <rect x="550" y="80" width="180" height="140" rx="8" fill="url(#attackGrad)"/>
    <text x="640" y="105" text-anchor="middle" font-size="12" font-weight="bold" fill="white">3. Registration</text>

    <rect x="565" y="120" width="150" height="85" rx="4" fill="white" fill-opacity="0.95"/>
    <text x="575" y="138" font-size="9" fill="#475569">Attacker registers</text>
    <text x="575" y="152" font-size="9" font-family="Libertinus Mono" fill="#DC2626">flask-auth-helper</text>
    <text x="575" y="168" font-size="9" fill="#475569">on npm/PyPI with</text>
    <text x="575" y="182" font-size="9" fill="#475569">malicious code</text>
    <text x="575" y="198" font-size="9" fill="#475569">hidden in install hooks</text>
  </g>

  <!-- Arrow 3->4 -->
  <path d="M 735 150 L 790 150" stroke="#DC2626" stroke-width="2" marker-end="url(#arrowRed)" fill="none"/>

  <!-- Step 4: Waiting -->
  <g filter="url(#shadow)">
    <rect x="750" y="80" width="120" height="140" rx="8" fill="#475569"/>
    <text x="810" y="105" text-anchor="middle" font-size="12" font-weight="bold" fill="white">4. Waiting</text>

    <rect x="760" y="120" width="100" height="85" rx="4" fill="white" fill-opacity="0.95"/>
    <text x="810" y="145" text-anchor="middle" font-size="24" fill="#475569">...</text>
    <text x="810" y="172" text-anchor="middle" font-size="9" fill="#475569">Passive attack</text>
    <text x="810" y="186" text-anchor="middle" font-size="9" fill="#475569">No targeting</text>
    <text x="810" y="200" text-anchor="middle" font-size="9" fill="#475569">needed</text>
  </g>

  <!-- Second Row: Victim Path -->

  <!-- Step 5: Developer uses AI -->
  <g filter="url(#shadow)">
    <rect x="50" y="280" width="180" height="130" rx="8" fill="#3B82F6"/>
    <text x="140" y="305" text-anchor="middle" font-size="12" font-weight="bold" fill="white">5. Developer Uses AI</text>

    <rect x="65" y="320" width="150" height="75" rx="4" fill="white" fill-opacity="0.95"/>
    <text x="75" y="340" font-size="9" fill="#475569">Later, a real developer</text>
    <text x="75" y="354" font-size="9" fill="#475569">asks same question</text>
    <text x="75" y="372" font-size="9" fill="#475569">AI suggests:</text>
    <text x="75" y="386" font-size="9" font-family="Libertinus Mono" fill="#DC2626">flask-auth-helper</text>
  </g>

  <!-- Arrow 5->6 -->
  <path d="M 235 345 L 290 345" stroke="#3B82F6" stroke-width="2" marker-end="url(#arrowGray)" fill="none"/>

  <!-- Step 6: Install -->
  <g filter="url(#shadow)">
    <rect x="300" y="280" width="180" height="130" rx="8" fill="#059669"/>
    <text x="390" y="305" text-anchor="middle" font-size="12" font-weight="bold" fill="white">6. Install Package</text>

    <rect x="315" y="320" width="150" height="75" rx="4" fill="white" fill-opacity="0.95"/>
    <text x="325" y="340" font-size="9" fill="#475569">Developer trusts AI</text>
    <text x="325" y="354" font-size="9" fill="#475569">suggestion and runs:</text>
    <text x="325" y="374" font-size="9" font-family="Libertinus Mono" fill="#1E293B">pip install</text>
    <text x="325" y="388" font-size="9" font-family="Libertinus Mono" fill="#DC2626">flask-auth-helper</text>
  </g>

  <!-- Arrow 6->7 -->
  <path d="M 485 345 L 540 345" stroke="#DC2626" stroke-width="2" marker-end="url(#arrowRed)" fill="none"/>

  <!-- Step 7: Compromised -->
  <g filter="url(#shadow)">
    <rect x="550" y="280" width="180" height="130" rx="8" fill="url(#attackGrad)"/>
    <text x="640" y="305" text-anchor="middle" font-size="12" font-weight="bold" fill="white">7. Compromised!</text>

    <rect x="565" y="320" width="150" height="75" rx="4" fill="white" fill-opacity="0.95"/>
    <text x="575" y="340" font-size="9" fill="#DC2626">Malicious code runs</text>
    <text x="575" y="356" font-size="9" fill="#475569">- Steals credentials</text>
    <text x="575" y="370" font-size="9" fill="#475569">- Exfiltrates secrets</text>
    <text x="575" y="384" font-size="9" fill="#475569">- Installs backdoor</text>
  </g>

  <!-- Arrow 7->C2 -->
  <path d="M 735 345 L 790 345" stroke="#DC2626" stroke-width="2" marker-end="url(#arrowRed)" fill="none"/>

  <!-- Step 8: C2 -->
  <g filter="url(#shadow)">
    <rect x="750" y="280" width="120" height="130" rx="8" fill="#0F172A"/>
    <text x="810" y="305" text-anchor="middle" font-size="12" font-weight="bold" fill="white">8. Exfiltration</text>

    <rect x="760" y="320" width="100" height="75" rx="4" fill="white" fill-opacity="0.95"/>
    <text x="810" y="345" text-anchor="middle" font-size="9" fill="#475569">Data sent to</text>
    <text x="810" y="360" text-anchor="middle" font-size="9" fill="#475569">attacker C2</text>
    <text x="810" y="380" text-anchor="middle" font-size="9" font-weight="600" fill="#DC2626">Attack</text>
    <text x="810" y="392" text-anchor="middle" font-size="9" font-weight="600" fill="#DC2626">complete</text>
  </g>

  <!-- Statistics Box -->
  <g filter="url(#shadow)">
    <rect x="50" y="440" width="400" height="120" rx="8" fill="white" stroke="#E2E8F0"/>
    <text x="250" y="465" text-anchor="middle" font-size="12" font-weight="bold" fill="#1E293B">Research Findings (Spracklen et al.)</text>

    <rect x="70" y="480" width="100" height="60" rx="4" fill="#FEE2E2"/>
    <text x="120" y="505" text-anchor="middle" font-size="20" font-weight="bold" fill="#DC2626">19.7%</text>
    <text x="120" y="525" text-anchor="middle" font-size="9" fill="#991B1B">of AI suggestions</text>
    <text x="120" y="535" text-anchor="middle" font-size="9" fill="#991B1B">are hallucinated</text>

    <rect x="190" y="480" width="100" height="60" rx="4" fill="#FEF3C7"/>
    <text x="240" y="505" text-anchor="middle" font-size="20" font-weight="bold" fill="#D97706">43%</text>
    <text x="240" y="525" text-anchor="middle" font-size="9" fill="#92400E">repeat in all</text>
    <text x="240" y="535" text-anchor="middle" font-size="9" fill="#92400E">10 iterations</text>

    <rect x="310" y="480" width="120" height="60" rx="4" fill="#DBEAFE"/>
    <text x="370" y="505" text-anchor="middle" font-size="20" font-weight="bold" fill="#2563EB">5.2%</text>
    <text x="370" y="525" text-anchor="middle" font-size="9" fill="#1E40AF">hallucination rate</text>
    <text x="370" y="535" text-anchor="middle" font-size="9" fill="#1E40AF">(commercial models)</text>
  </g>

  <!-- Defense Box -->
  <g filter="url(#shadow)">
    <rect x="480" y="440" width="390" height="120" rx="8" fill="#D1FAE5" stroke="#A7F3D0"/>
    <text x="675" y="465" text-anchor="middle" font-size="12" font-weight="bold" fill="#065F46">Key Defenses</text>

    <g transform="translate(500, 480)">
      <circle cx="10" cy="8" r="4" fill="#059669"/>
      <text x="20" y="12" font-size="10" fill="#065F46">Verify packages exist before installing</text>
    </g>

    <g transform="translate(500, 502)">
      <circle cx="10" cy="8" r="4" fill="#059669"/>
      <text x="20" y="12" font-size="10" fill="#065F46">Check package metadata and history</text>
    </g>

    <g transform="translate(500, 524)">
      <circle cx="10" cy="8" r="4" fill="#059669"/>
      <text x="20" y="12" font-size="10" fill="#065F46">Use curated allowlists for dependencies</text>
    </g>

    <g transform="translate(500, 546)">
      <circle cx="10" cy="8" r="4" fill="#059669"/>
      <text x="20" y="12" font-size="10" fill="#065F46">Never blindly trust AI package suggestions</text>
    </g>
  </g>
</svg>
