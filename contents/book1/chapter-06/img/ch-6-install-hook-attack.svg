<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 850 550" font-family="Libertinus Sans">
  <defs>
    <marker id="arrowGray" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#64748B"/>
    </marker>
    <marker id="arrowDanger" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#DC2626"/>
    </marker>
        <filter id="shadow" x="-10%" y="-10%" width="120%" height="130%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="2" result="blur"/>
      <feOffset in="blur" dx="1" dy="2" result="offsetBlur"/>
      <feFlood flood-color="#000000" flood-opacity="0.5" result="color"/>
      <feComposite in="color" in2="offsetBlur" operator="in" result="shadow"/>
      <feMerge>
        <feMergeNode in="shadow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="850" height="550" fill="#F8FAFC"/>

  <!-- Title -->
  <text x="425" y="32" text-anchor="middle" font-size="18" font-weight="bold" fill="#1E293B">Install Hook Attack Sequence</text>
  <text x="425" y="52" text-anchor="middle" font-size="11" fill="#64748B">How postinstall scripts enable immediate code execution</text>

  <!-- Timeline line -->
  <line x1="100" y1="100" x2="750" y2="100" stroke="#CBD5E1" stroke-width="2"/>

  <!-- Timeline markers -->
  <g>
    <circle cx="150" cy="100" r="12" fill="#3B82F6"/>
    <text x="150" y="104" text-anchor="middle" font-size="10" fill="white" font-weight="bold">1</text>
    <text x="150" y="130" text-anchor="middle" font-size="10" font-weight="600" fill="#1E293B">npm install</text>
  </g>

  <g>
    <circle cx="300" cy="100" r="12" fill="#3B82F6"/>
    <text x="300" y="104" text-anchor="middle" font-size="10" fill="white" font-weight="bold">2</text>
    <text x="300" y="130" text-anchor="middle" font-size="10" font-weight="600" fill="#1E293B">Download</text>
  </g>

  <g>
    <circle cx="450" cy="100" r="12" fill="#3B82F6"/>
    <text x="450" y="104" text-anchor="middle" font-size="10" fill="white" font-weight="bold">3</text>
    <text x="450" y="130" text-anchor="middle" font-size="10" font-weight="600" fill="#1E293B">Extract</text>
  </g>

  <g>
    <circle cx="600" cy="100" r="12" fill="#DC2626"/>
    <text x="600" y="104" text-anchor="middle" font-size="10" fill="white" font-weight="bold">4</text>
    <text x="600" y="130" text-anchor="middle" font-size="10" font-weight="600" fill="#DC2626">postinstall</text>
  </g>

  <g>
    <circle cx="700" cy="100" r="12" fill="#16A34A"/>
    <text x="700" y="104" text-anchor="middle" font-size="10" fill="white" font-weight="bold">5</text>
    <text x="700" y="130" text-anchor="middle" font-size="10" font-weight="600" fill="#1E293B">Complete</text>
  </g>

  <!-- Main sequence diagram -->
  <!-- Actors -->
  <g filter="url(#shadow)">
    <rect x="50" y="160" width="100" height="40" rx="6" fill="#3B82F6"/>
    <text x="100" y="185" text-anchor="middle" font-size="12" font-weight="600" fill="white">Developer</text>
    <line x1="100" y1="200" x2="100" y2="500" stroke="#3B82F6" stroke-width="2" stroke-dasharray="4,4"/>
  </g>

  <g filter="url(#shadow)">
    <rect x="200" y="160" width="100" height="40" rx="6" fill="#64748B"/>
    <text x="250" y="185" text-anchor="middle" font-size="12" font-weight="600" fill="white">npm CLI</text>
    <line x1="250" y1="200" x2="250" y2="500" stroke="#64748B" stroke-width="2" stroke-dasharray="4,4"/>
  </g>

  <g filter="url(#shadow)">
    <rect x="350" y="160" width="100" height="40" rx="6" fill="#8B5CF6"/>
    <text x="400" y="185" text-anchor="middle" font-size="12" font-weight="600" fill="white">Registry</text>
    <line x1="400" y1="200" x2="400" y2="500" stroke="#8B5CF6" stroke-width="2" stroke-dasharray="4,4"/>
  </g>

  <g filter="url(#shadow)">
    <rect x="500" y="160" width="100" height="40" rx="6" fill="#DC2626"/>
    <text x="550" y="185" text-anchor="middle" font-size="12" font-weight="600" fill="white">Package</text>
    <line x1="550" y1="200" x2="550" y2="500" stroke="#DC2626" stroke-width="2" stroke-dasharray="4,4"/>
  </g>

  <g filter="url(#shadow)">
    <rect x="650" y="160" width="100" height="40" rx="6" fill="#0F172A"/>
    <text x="700" y="185" text-anchor="middle" font-size="12" font-weight="600" fill="white">Attacker C2</text>
    <line x1="700" y1="200" x2="700" y2="500" stroke="#0F172A" stroke-width="2" stroke-dasharray="4,4"/>
  </g>

  <!-- Sequence messages -->
  <!-- 1. Install command -->
  <path d="M 100 230 L 240 230" stroke="#64748B" stroke-width="2" marker-end="url(#arrowGray)"/>
  <rect x="120" y="215" width="100" height="20" rx="3" fill="#F1F5F9"/>
  <text x="170" y="228" text-anchor="middle" font-size="9" fill="#475569">npm install pkg</text>

  <!-- 2. Fetch from registry -->
  <path d="M 250 260 L 390 260" stroke="#64748B" stroke-width="2" marker-end="url(#arrowGray)"/>
  <text x="320" y="253" text-anchor="middle" font-size="9" fill="#475569">Fetch package</text>

  <!-- 3. Return package -->
  <path d="M 400 290 L 260 290" stroke="#8B5CF6" stroke-width="2" marker-end="url(#arrowGray)"/>
  <text x="330" y="283" text-anchor="middle" font-size="9" fill="#475569">Package tarball</text>

  <!-- 4. Extract and execute -->
  <path d="M 250 320 L 540 320" stroke="#64748B" stroke-width="2" marker-end="url(#arrowGray)"/>
  <text x="395" y="313" text-anchor="middle" font-size="9" fill="#475569">Extract &amp; run postinstall</text>

  <!-- DANGER ZONE -->
  <rect x="520" y="340" width="200" height="130" rx="6" fill="#FEF2F2" stroke="#FECACA" stroke-width="2" stroke-dasharray="4,4"/>
  <text x="620" y="358" text-anchor="middle" font-size="10" font-weight="bold" fill="#DC2626">MALICIOUS EXECUTION</text>

  <!-- 5. Collect secrets -->
  <rect x="535" y="370" width="170" height="22" rx="3" fill="#FEE2E2"/>
  <text x="620" y="385" text-anchor="middle" font-size="9" fill="#991B1B">Harvest env vars, tokens</text>

  <!-- 6. Exfiltrate -->
  <path d="M 550 410 L 690 410" stroke="#DC2626" stroke-width="2" marker-end="url(#arrowDanger)"/>
  <text x="620" y="403" text-anchor="middle" font-size="9" fill="#DC2626">Send to C2 server</text>

  <!-- 7. Install backdoor -->
  <rect x="535" y="425" width="170" height="22" rx="3" fill="#FEE2E2"/>
  <text x="620" y="440" text-anchor="middle" font-size="9" fill="#991B1B">Install persistence</text>

  <!-- 8. Return success -->
  <path d="M 550 480 L 110 480" stroke="#16A34A" stroke-width="2" marker-end="url(#arrowGray)"/>
  <text x="330" y="473" text-anchor="middle" font-size="9" fill="#16A34A">Install complete (appears successful)</text>

  <!-- Warning callout -->
  <g transform="translate(770, 350)">
    <rect x="0" y="0" width="70" height="90" rx="4" fill="#FEF2F2" stroke="#DC2626"/>
    <text x="35" y="20" text-anchor="middle" font-size="24" fill="#DC2626">!</text>
    <text x="35" y="40" text-anchor="middle" font-size="8" fill="#991B1B">No user</text>
    <text x="35" y="52" text-anchor="middle" font-size="8" fill="#991B1B">approval</text>
    <text x="35" y="64" text-anchor="middle" font-size="8" fill="#991B1B">needed</text>
    <text x="35" y="82" text-anchor="middle" font-size="8" font-weight="bold" fill="#DC2626">Auto-runs!</text>
  </g>
</svg>
