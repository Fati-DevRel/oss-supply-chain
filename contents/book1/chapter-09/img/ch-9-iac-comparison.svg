<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" font-family="Libertinus Sans">
  <defs>
        <filter id="shadow" x="-10%" y="-10%" width="120%" height="130%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="2" result="blur"/>
      <feOffset in="blur" dx="1" dy="2" result="offsetBlur"/>
      <feFlood flood-color="#000000" flood-opacity="0.5" result="color"/>
      <feComposite in="color" in2="offsetBlur" operator="in" result="shadow"/>
      <feMerge>
        <feMergeNode in="shadow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="900" height="500" fill="#F8FAFC"/>

  <!-- Title -->
  <text x="450" y="32" text-anchor="middle" font-size="18" font-weight="bold" fill="#1E293B">Application vs. Infrastructure-as-Code Dependencies</text>
  <text x="450" y="52" text-anchor="middle" font-size="11" fill="#64748B">Comparing supply chain risks across traditional and IaC ecosystems</text>

  <!-- Table -->
  <g filter="url(#shadow)">
    <!-- Header -->
    <rect x="50" y="75" width="800" height="45" rx="6" fill="#1E293B"/>
    <text x="180" y="103" text-anchor="middle" font-size="12" font-weight="bold" fill="white">Aspect</text>
    <line x1="300" y1="80" x2="300" y2="115" stroke="#475569"/>
    <text x="450" y="103" text-anchor="middle" font-size="12" font-weight="bold" fill="white">Application (npm/PyPI)</text>
    <line x1="600" y1="80" x2="600" y2="115" stroke="#475569"/>
    <text x="750" y="103" text-anchor="middle" font-size="12" font-weight="bold" fill="white">IaC (Terraform/Ansible)</text>

    <!-- Row 1 -->
    <rect x="50" y="120" width="800" height="50" fill="white" stroke="#E2E8F0"/>
    <text x="180" y="150" text-anchor="middle" font-size="11" font-weight="600" fill="#1E293B">Central Registry</text>
    <text x="450" y="145" text-anchor="middle" font-size="10" fill="#475569">npm, PyPI, Maven Central</text>
    <text x="450" y="160" text-anchor="middle" font-size="9" fill="#64748B">Well-established security measures</text>
    <text x="750" y="145" text-anchor="middle" font-size="10" fill="#475569">Terraform Registry, Galaxy</text>
    <text x="750" y="160" text-anchor="middle" font-size="9" fill="#64748B">Newer, less mature security</text>

    <!-- Row 2 -->
    <rect x="50" y="170" width="800" height="50" fill="#F8FAFC" stroke="#E2E8F0"/>
    <text x="180" y="200" text-anchor="middle" font-size="11" font-weight="600" fill="#1E293B">Dependency Declaration</text>
    <text x="450" y="195" text-anchor="middle" font-size="10" fill="#475569">package.json, requirements.txt</text>
    <text x="450" y="210" text-anchor="middle" font-size="9" fill="#64748B">Mature tooling, clear patterns</text>
    <text x="750" y="195" text-anchor="middle" font-size="10" fill="#475569">module blocks, requirements.yml</text>
    <text x="750" y="210" text-anchor="middle" font-size="9" fill="#64748B">Less standardized</text>

    <!-- Row 3 -->
    <rect x="50" y="220" width="800" height="50" fill="white" stroke="#E2E8F0"/>
    <text x="180" y="250" text-anchor="middle" font-size="11" font-weight="600" fill="#1E293B">Version Pinning</text>
    <text x="450" y="245" text-anchor="middle" font-size="10" fill="#059669">Lockfiles with hashes</text>
    <text x="450" y="260" text-anchor="middle" font-size="9" fill="#64748B">package-lock.json, etc.</text>
    <text x="750" y="245" text-anchor="middle" font-size="10" fill="#F59E0B">.terraform.lock.hcl (newer)</text>
    <text x="750" y="260" text-anchor="middle" font-size="9" fill="#64748B">Historically weaker</text>

    <!-- Row 4 -->
    <rect x="50" y="270" width="800" height="50" fill="#F8FAFC" stroke="#E2E8F0"/>
    <text x="180" y="300" text-anchor="middle" font-size="11" font-weight="600" fill="#1E293B">Account Compromise</text>
    <text x="450" y="295" text-anchor="middle" font-size="10" fill="#DC2626">Publish malicious packages</text>
    <text x="450" y="310" text-anchor="middle" font-size="9" fill="#64748B">To application runtime</text>
    <text x="750" y="295" text-anchor="middle" font-size="10" fill="#DC2626">Publish malicious modules</text>
    <text x="750" y="310" text-anchor="middle" font-size="9" fill="#64748B">To infrastructure control</text>

    <!-- Row 5 -->
    <rect x="50" y="320" width="800" height="50" fill="white" stroke="#E2E8F0"/>
    <text x="180" y="350" text-anchor="middle" font-size="11" font-weight="600" fill="#1E293B">Execution Context</text>
    <text x="450" y="345" text-anchor="middle" font-size="10" fill="#475569">Application runtime</text>
    <text x="450" y="360" text-anchor="middle" font-size="9" fill="#64748B">App privileges only</text>
    <text x="750" y="345" text-anchor="middle" font-size="10" fill="#DC2626">Infrastructure provisioning</text>
    <text x="750" y="360" text-anchor="middle" font-size="9" fill="#DC2626">Admin/root access typical</text>

    <!-- Row 6 -->
    <rect x="50" y="370" width="800" height="50" fill="#F8FAFC" stroke="#E2E8F0"/>
    <text x="180" y="400" text-anchor="middle" font-size="11" font-weight="600" fill="#1E293B">Impact Scope</text>
    <text x="450" y="395" text-anchor="middle" font-size="10" fill="#475569">Application layer</text>
    <text x="450" y="410" text-anchor="middle" font-size="9" fill="#64748B">Runtime compromise</text>
    <text x="750" y="395" text-anchor="middle" font-size="10" fill="#DC2626">Infrastructure layer</text>
    <text x="750" y="410" text-anchor="middle" font-size="9" fill="#DC2626">Provision backdoored infra</text>
  </g>

  <!-- Key Insight Box -->
  <g filter="url(#shadow)" transform="translate(50, 435)">
    <rect x="0" y="0" width="800" height="50" rx="6" fill="#FEF2F2" stroke="#FECACA"/>
    <text x="30" y="20" font-size="10" font-weight="bold" fill="#991B1B">KEY DIFFERENCE:</text>
    <text x="30" y="38" font-size="10" fill="#DC2626">IaC dependencies run with cloud admin or root access and can provision backdoored infrastructure, create unauthorized access, or exfiltrate secrets during provisioning itself.</text>
  </g>
</svg>
