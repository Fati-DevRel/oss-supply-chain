<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 600" font-family="Libertinus Sans">
  <defs>
        <filter id="shadow" x="-10%" y="-10%" width="120%" height="130%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="2" result="blur"/>
      <feOffset in="blur" dx="1" dy="2" result="offsetBlur"/>
      <feFlood flood-color="#000000" flood-opacity="0.5" result="color"/>
      <feComposite in="color" in2="offsetBlur" operator="in" result="shadow"/>
      <feMerge>
        <feMergeNode in="shadow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <marker id="arrowRed" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#DC2626"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="900" height="600" fill="#F8FAFC"/>

  <!-- Title -->
  <text x="450" y="32" text-anchor="middle" font-size="18" font-weight="bold" fill="#1E293B">Compromised Dependency Attack Vectors</text>
  <text x="450" y="52" text-anchor="middle" font-size="11" fill="#64748B">How legitimate packages become malicious supply chain threats</text>

  <!-- Central: Your Application -->
  <g filter="url(#shadow)" transform="translate(350, 250)">
    <rect x="0" y="0" width="200" height="80" rx="12" fill="#3B82F6"/>
    <text x="100" y="35" text-anchor="middle" font-size="14" font-weight="bold" fill="white">Your Application</text>
    <text x="100" y="55" text-anchor="middle" font-size="10" fill="#DBEAFE">Dependencies imported</text>
    <text x="100" y="70" text-anchor="middle" font-size="10" fill="#DBEAFE">from various sources</text>
  </g>

  <!-- Attack Vector 1: Maintainer Account Takeover -->
  <g filter="url(#shadow)" transform="translate(50, 80)">
    <rect x="0" y="0" width="220" height="120" rx="8" fill="white" stroke="#DC2626" stroke-width="2"/>
    <rect x="0" y="0" width="220" height="35" rx="8" fill="#DC2626"/>
    <rect x="0" y="27" width="220" height="8" fill="#DC2626"/>
    <text x="110" y="24" text-anchor="middle" font-size="11" font-weight="bold" fill="white">Account Takeover</text>

    <text x="15" y="55" font-size="9" fill="#1E293B" font-weight="600">Attack:</text>
    <text x="15" y="68" font-size="9" fill="#475569">Attacker compromises</text>
    <text x="15" y="80" font-size="9" fill="#475569">maintainer credentials</text>

    <text x="15" y="98" font-size="9" fill="#1E293B" font-weight="600">Example: ua-parser-js</text>
    <text x="15" y="110" font-size="8" fill="#DC2626">npm token stolen, malware pushed</text>
  </g>
  <path d="M 275 140 L 345 260" stroke="#DC2626" stroke-width="2" stroke-dasharray="5,3" marker-end="url(#arrowRed)" fill="none"/>

  <!-- Attack Vector 2: Social Engineering -->
  <g filter="url(#shadow)" transform="translate(340, 80)">
    <rect x="0" y="0" width="220" height="120" rx="8" fill="white" stroke="#F59E0B" stroke-width="2"/>
    <rect x="0" y="0" width="220" height="35" rx="8" fill="#F59E0B"/>
    <rect x="0" y="27" width="220" height="8" fill="#F59E0B"/>
    <text x="110" y="24" text-anchor="middle" font-size="11" font-weight="bold" fill="white">Social Engineering</text>

    <text x="15" y="55" font-size="9" fill="#1E293B" font-weight="600">Attack:</text>
    <text x="15" y="68" font-size="9" fill="#475569">Gain trust over time,</text>
    <text x="15" y="80" font-size="9" fill="#475569">become co-maintainer</text>

    <text x="15" y="98" font-size="9" fill="#1E293B" font-weight="600">Example: XZ Utils</text>
    <text x="15" y="110" font-size="8" fill="#F59E0B">2+ year infiltration campaign</text>
  </g>
  <path d="M 450 205 L 450 245" stroke="#F59E0B" stroke-width="2" stroke-dasharray="5,3" marker-end="url(#arrowRed)" fill="none"/>

  <!-- Attack Vector 3: Build System Compromise -->
  <g filter="url(#shadow)" transform="translate(630, 80)">
    <rect x="0" y="0" width="220" height="120" rx="8" fill="white" stroke="#8B5CF6" stroke-width="2"/>
    <rect x="0" y="0" width="220" height="35" rx="8" fill="#8B5CF6"/>
    <rect x="0" y="27" width="220" height="8" fill="#8B5CF6"/>
    <text x="110" y="24" text-anchor="middle" font-size="11" font-weight="bold" fill="white">Build System Attack</text>

    <text x="15" y="55" font-size="9" fill="#1E293B" font-weight="600">Attack:</text>
    <text x="15" y="68" font-size="9" fill="#475569">Compromise CI/CD or</text>
    <text x="15" y="80" font-size="9" fill="#475569">build infrastructure</text>

    <text x="15" y="98" font-size="9" fill="#1E293B" font-weight="600">Example: SolarWinds</text>
    <text x="15" y="110" font-size="8" fill="#8B5CF6">Build server injected malware</text>
  </g>
  <path d="M 625 140 L 555 260" stroke="#8B5CF6" stroke-width="2" stroke-dasharray="5,3" marker-end="url(#arrowRed)" fill="none"/>

  <!-- Attack Vector 4: Abandoned Package Hijack -->
  <g filter="url(#shadow)" transform="translate(50, 400)">
    <rect x="0" y="0" width="220" height="120" rx="8" fill="white" stroke="#059669" stroke-width="2"/>
    <rect x="0" y="0" width="220" height="35" rx="8" fill="#059669"/>
    <rect x="0" y="27" width="220" height="8" fill="#059669"/>
    <text x="110" y="24" text-anchor="middle" font-size="11" font-weight="bold" fill="white">Ownership Transfer</text>

    <text x="15" y="55" font-size="9" fill="#1E293B" font-weight="600">Attack:</text>
    <text x="15" y="68" font-size="9" fill="#475569">Request transfer of</text>
    <text x="15" y="80" font-size="9" fill="#475569">abandoned popular packages</text>

    <text x="15" y="98" font-size="9" fill="#1E293B" font-weight="600">Example: event-stream</text>
    <text x="15" y="110" font-size="8" fill="#059669">New maintainer added malware</text>
  </g>
  <path d="M 275 460 L 345 330" stroke="#059669" stroke-width="2" stroke-dasharray="5,3" marker-end="url(#arrowRed)" fill="none"/>

  <!-- Attack Vector 5: Transitive Dependencies -->
  <g filter="url(#shadow)" transform="translate(340, 400)">
    <rect x="0" y="0" width="220" height="120" rx="8" fill="white" stroke="#EC4899" stroke-width="2"/>
    <rect x="0" y="0" width="220" height="35" rx="8" fill="#EC4899"/>
    <rect x="0" y="27" width="220" height="8" fill="#EC4899"/>
    <text x="110" y="24" text-anchor="middle" font-size="11" font-weight="bold" fill="white">Transitive Compromise</text>

    <text x="15" y="55" font-size="9" fill="#1E293B" font-weight="600">Attack:</text>
    <text x="15" y="68" font-size="9" fill="#475569">Compromise a deep dependency</text>
    <text x="15" y="80" font-size="9" fill="#475569">many projects rely on indirectly</text>

    <text x="15" y="98" font-size="9" fill="#1E293B" font-weight="600">Impact:</text>
    <text x="15" y="110" font-size="8" fill="#EC4899">Affects all upstream consumers</text>
  </g>
  <path d="M 450 395 L 450 335" stroke="#EC4899" stroke-width="2" stroke-dasharray="5,3" marker-end="url(#arrowRed)" fill="none"/>

  <!-- Attack Vector 6: Registry Compromise -->
  <g filter="url(#shadow)" transform="translate(630, 400)">
    <rect x="0" y="0" width="220" height="120" rx="8" fill="white" stroke="#0F172A" stroke-width="2"/>
    <rect x="0" y="0" width="220" height="35" rx="8" fill="#0F172A"/>
    <rect x="0" y="27" width="220" height="8" fill="#0F172A"/>
    <text x="110" y="24" text-anchor="middle" font-size="11" font-weight="bold" fill="white">Registry Attack</text>

    <text x="15" y="55" font-size="9" fill="#1E293B" font-weight="600">Attack:</text>
    <text x="15" y="68" font-size="9" fill="#475569">Compromise registry infra or</text>
    <text x="15" y="80" font-size="9" fill="#475569">man-in-the-middle packages</text>

    <text x="15" y="98" font-size="9" fill="#1E293B" font-weight="600">Example: Various</text>
    <text x="15" y="110" font-size="8" fill="#64748B">DNS hijacking, CDN compromise</text>
  </g>
  <path d="M 625 460 L 555 330" stroke="#0F172A" stroke-width="2" stroke-dasharray="5,3" marker-end="url(#arrowRed)" fill="none"/>

  <!-- Legend -->
  <g transform="translate(50, 550)">
    <rect x="0" y="0" width="800" height="35" rx="6" fill="#F1F5F9" stroke="#E2E8F0"/>
    <text x="20" y="22" font-size="10" font-weight="600" fill="#1E293B">Key Insight:</text>
    <text x="100" y="22" font-size="10" fill="#475569">Legitimate packages with existing trust are compromised - making detection far harder than new malicious packages</text>
  </g>
</svg>
