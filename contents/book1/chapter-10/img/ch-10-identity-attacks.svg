<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 600" font-family="Libertinus Sans">
  <defs>
        <filter id="shadow" x="-10%" y="-10%" width="120%" height="130%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="2" result="blur"/>
      <feOffset in="blur" dx="1" dy="2" result="offsetBlur"/>
      <feFlood flood-color="#000000" flood-opacity="0.5" result="color"/>
      <feComposite in="color" in2="offsetBlur" operator="in" result="shadow"/>
      <feMerge>
        <feMergeNode in="shadow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <marker id="arrowRed" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#DC2626"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="900" height="600" fill="#F8FAFC"/>

  <!-- Title -->
  <text x="450" y="32" text-anchor="middle" font-size="18" font-weight="bold" fill="#1E293B">Identity and Ownership Hijacking Attacks</text>
  <text x="450" y="52" text-anchor="middle" font-size="11" fill="#64748B">Exploiting trust infrastructure rather than code vulnerabilities</text>

  <!-- Attack Type Grid -->

  <!-- Row 1 -->
  <!-- Attack 1: Account Takeover -->
  <g filter="url(#shadow)" transform="translate(50, 80)">
    <rect x="0" y="0" width="260" height="130" rx="8" fill="white" stroke="#DC2626" stroke-width="2"/>
    <rect x="0" y="0" width="260" height="35" rx="8" fill="#DC2626"/>
    <rect x="0" y="27" width="260" height="8" fill="#DC2626"/>
    <text x="130" y="24" text-anchor="middle" font-size="11" font-weight="bold" fill="white">Account Takeover</text>

    <text x="15" y="55" font-size="9" font-weight="600" fill="#1E293B">Attack:</text>
    <text x="15" y="70" font-size="9" fill="#475569">Credential stuffing, phishing,</text>
    <text x="15" y="83" font-size="9" fill="#475569">or session hijacking</text>

    <text x="15" y="103" font-size="9" font-weight="600" fill="#1E293B">Example:</text>
    <text x="70" y="103" font-size="9" fill="#DC2626">ua-parser-js</text>
    <text x="15" y="118" font-size="8" fill="#64748B">7.9M weekly downloads compromised</text>
  </g>

  <!-- Attack 2: Domain Resurrection -->
  <g filter="url(#shadow)" transform="translate(320, 80)">
    <rect x="0" y="0" width="260" height="130" rx="8" fill="white" stroke="#F59E0B" stroke-width="2"/>
    <rect x="0" y="0" width="260" height="35" rx="8" fill="#F59E0B"/>
    <rect x="0" y="27" width="260" height="8" fill="#F59E0B"/>
    <text x="130" y="24" text-anchor="middle" font-size="11" font-weight="bold" fill="white">Domain Resurrection</text>

    <text x="15" y="55" font-size="9" font-weight="600" fill="#1E293B">Attack:</text>
    <text x="15" y="70" font-size="9" fill="#475569">Register expired domain of</text>
    <text x="15" y="83" font-size="9" fill="#475569">maintainer email for password reset</text>

    <text x="15" y="103" font-size="9" font-weight="600" fill="#1E293B">Defense:</text>
    <text x="65" y="103" font-size="9" fill="#F59E0B">PyPI domain blocking</text>
    <text x="15" y="118" font-size="8" fill="#64748B">Proactive blocking of expired domains</text>
  </g>

  <!-- Attack 3: Social Engineering -->
  <g filter="url(#shadow)" transform="translate(590, 80)">
    <rect x="0" y="0" width="260" height="130" rx="8" fill="white" stroke="#8B5CF6" stroke-width="2"/>
    <rect x="0" y="0" width="260" height="35" rx="8" fill="#8B5CF6"/>
    <rect x="0" y="27" width="260" height="8" fill="#8B5CF6"/>
    <text x="130" y="24" text-anchor="middle" font-size="11" font-weight="bold" fill="white">Long-Con Infiltration</text>

    <text x="15" y="55" font-size="9" font-weight="600" fill="#1E293B">Attack:</text>
    <text x="15" y="70" font-size="9" fill="#475569">Build trust over years, become</text>
    <text x="15" y="83" font-size="9" fill="#475569">co-maintainer, then insert backdoor</text>

    <text x="15" y="103" font-size="9" font-weight="600" fill="#1E293B">Example:</text>
    <text x="70" y="103" font-size="9" fill="#8B5CF6">XZ Utils (2024)</text>
    <text x="15" y="118" font-size="8" fill="#64748B">2+ year infiltration, "Jia Tan"</text>
  </g>

  <!-- Row 2 -->
  <!-- Attack 4: Namespace Hijacking -->
  <g filter="url(#shadow)" transform="translate(50, 225)">
    <rect x="0" y="0" width="260" height="130" rx="8" fill="white" stroke="#059669" stroke-width="2"/>
    <rect x="0" y="0" width="260" height="35" rx="8" fill="#059669"/>
    <rect x="0" y="27" width="260" height="8" fill="#059669"/>
    <text x="130" y="24" text-anchor="middle" font-size="11" font-weight="bold" fill="white">Namespace Hijacking</text>

    <text x="15" y="55" font-size="9" font-weight="600" fill="#1E293B">Attack:</text>
    <text x="15" y="70" font-size="9" fill="#475569">Register available names similar</text>
    <text x="15" y="83" font-size="9" fill="#475569">to popular packages or orgs</text>

    <text x="15" y="103" font-size="9" font-weight="600" fill="#1E293B">Variants:</text>
    <text x="15" y="118" font-size="8" fill="#64748B">Case sensitivity, Unicode, deleted names</text>
  </g>

  <!-- Attack 5: Ownership Transfer -->
  <g filter="url(#shadow)" transform="translate(320, 225)">
    <rect x="0" y="0" width="260" height="130" rx="8" fill="white" stroke="#EC4899" stroke-width="2"/>
    <rect x="0" y="0" width="260" height="35" rx="8" fill="#EC4899"/>
    <rect x="0" y="27" width="260" height="8" fill="#EC4899"/>
    <text x="130" y="24" text-anchor="middle" font-size="11" font-weight="bold" fill="white">Ownership Transfer</text>

    <text x="15" y="55" font-size="9" font-weight="600" fill="#1E293B">Attack:</text>
    <text x="15" y="70" font-size="9" fill="#475569">Request transfer of abandoned</text>
    <text x="15" y="83" font-size="9" fill="#475569">packages from burned-out maintainers</text>

    <text x="15" y="103" font-size="9" font-weight="600" fill="#1E293B">Example:</text>
    <text x="70" y="103" font-size="9" fill="#EC4899">event-stream</text>
    <text x="15" y="118" font-size="8" fill="#64748B">New maintainer added malware</text>
  </g>

  <!-- Attack 6: Repository Transfer -->
  <g filter="url(#shadow)" transform="translate(590, 225)">
    <rect x="0" y="0" width="260" height="130" rx="8" fill="white" stroke="#0F172A" stroke-width="2"/>
    <rect x="0" y="0" width="260" height="35" rx="8" fill="#0F172A"/>
    <rect x="0" y="27" width="260" height="8" fill="#0F172A"/>
    <text x="130" y="24" text-anchor="middle" font-size="11" font-weight="bold" fill="white">Repository Transfer</text>

    <text x="15" y="55" font-size="9" font-weight="600" fill="#1E293B">Attack:</text>
    <text x="15" y="70" font-size="9" fill="#475569">Compromise org accounts to</text>
    <text x="15" y="83" font-size="9" fill="#475569">transfer repo ownership</text>

    <text x="15" y="103" font-size="9" font-weight="600" fill="#1E293B">Risk:</text>
    <text x="15" y="118" font-size="8" fill="#64748B">Old paths may remain available</text>
  </g>

  <!-- XZ Utils Timeline (abbreviated) -->
  <g filter="url(#shadow)" transform="translate(50, 380)">
    <rect x="0" y="0" width="800" height="100" rx="8" fill="white" stroke="#E2E8F0"/>
    <text x="400" y="25" text-anchor="middle" font-size="13" font-weight="bold" fill="#1E293B">XZ Utils Backdoor: Anatomy of a Long-Con Attack</text>

    <!-- Timeline -->
    <line x1="50" y1="60" x2="750" y2="60" stroke="#8B5CF6" stroke-width="3"/>

    <g transform="translate(50, 60)">
      <circle cx="0" cy="0" r="8" fill="#8B5CF6"/>
      <text x="0" y="25" text-anchor="middle" font-size="8" fill="#475569">2021</text>
      <text x="0" y="-15" text-anchor="middle" font-size="7" fill="#6D28D9">First</text>
      <text x="0" y="-5" text-anchor="middle" font-size="7" fill="#6D28D9">contact</text>
    </g>

    <g transform="translate(200, 60)">
      <circle cx="0" cy="0" r="8" fill="#8B5CF6"/>
      <text x="0" y="25" text-anchor="middle" font-size="8" fill="#475569">2022</text>
      <text x="0" y="-15" text-anchor="middle" font-size="7" fill="#6D28D9">Build</text>
      <text x="0" y="-5" text-anchor="middle" font-size="7" fill="#6D28D9">trust</text>
    </g>

    <g transform="translate(350, 60)">
      <circle cx="0" cy="0" r="8" fill="#8B5CF6"/>
      <text x="0" y="25" text-anchor="middle" font-size="8" fill="#475569">2023</text>
      <text x="0" y="-15" text-anchor="middle" font-size="7" fill="#6D28D9">Become</text>
      <text x="0" y="-5" text-anchor="middle" font-size="7" fill="#6D28D9">co-maintainer</text>
    </g>

    <g transform="translate(500, 60)">
      <circle cx="0" cy="0" r="8" fill="#F59E0B"/>
      <text x="0" y="25" text-anchor="middle" font-size="8" fill="#475569">Early 2024</text>
      <text x="0" y="-15" text-anchor="middle" font-size="7" fill="#D97706">Insert</text>
      <text x="0" y="-5" text-anchor="middle" font-size="7" fill="#D97706">backdoor</text>
    </g>

    <g transform="translate(650, 60)">
      <circle cx="0" cy="0" r="8" fill="#DC2626"/>
      <text x="0" y="25" text-anchor="middle" font-size="8" fill="#475569">Mar 2024</text>
      <text x="0" y="-15" text-anchor="middle" font-size="7" fill="#DC2626">Discovered</text>
      <text x="0" y="-5" text-anchor="middle" font-size="7" fill="#DC2626">by accident</text>
    </g>

    <g transform="translate(750, 60)">
      <circle cx="0" cy="0" r="6" fill="#059669"/>
    </g>
  </g>

  <!-- Defenses -->
  <g filter="url(#shadow)" transform="translate(50, 500)">
    <rect x="0" y="0" width="800" height="80" rx="8" fill="#D1FAE5" stroke="#A7F3D0"/>
    <text x="400" y="22" text-anchor="middle" font-size="12" font-weight="bold" fill="#065F46">Key Defenses Against Identity Attacks</text>

    <g transform="translate(30, 40)">
      <circle cx="6" cy="6" r="4" fill="#059669"/>
      <text x="18" y="10" font-size="9" fill="#047857">Mandatory 2FA for maintainers</text>
    </g>

    <g transform="translate(200, 40)">
      <circle cx="6" cy="6" r="4" fill="#059669"/>
      <text x="18" y="10" font-size="9" fill="#047857">Commit signing (GPG/SSH)</text>
    </g>

    <g transform="translate(370, 40)">
      <circle cx="6" cy="6" r="4" fill="#059669"/>
      <text x="18" y="10" font-size="9" fill="#047857">Monitor ownership changes</text>
    </g>

    <g transform="translate(560, 40)">
      <circle cx="6" cy="6" r="4" fill="#059669"/>
      <text x="18" y="10" font-size="9" fill="#047857">Verify package provenance</text>
    </g>

    <g transform="translate(30, 62)">
      <circle cx="6" cy="6" r="4" fill="#059669"/>
      <text x="18" y="10" font-size="9" fill="#047857">Support open source sustainability</text>
    </g>

    <g transform="translate(250, 62)">
      <circle cx="6" cy="6" r="4" fill="#059669"/>
      <text x="18" y="10" font-size="9" fill="#047857">Be skeptical of "helpful strangers"</text>
    </g>

    <g transform="translate(480, 62)">
      <circle cx="6" cy="6" r="4" fill="#059669"/>
      <text x="18" y="10" font-size="9" fill="#047857">Document succession plans</text>
    </g>
  </g>
</svg>
