<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 520" font-family="Libertinus Sans">
  <defs>
        <filter id="shadow" x="-10%" y="-10%" width="120%" height="130%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="2" result="blur"/>
      <feOffset in="blur" dx="1" dy="2" result="offsetBlur"/>
      <feFlood flood-color="#000000" flood-opacity="0.5" result="color"/>
      <feComposite in="color" in2="offsetBlur" operator="in" result="shadow"/>
      <feMerge>
        <feMergeNode in="shadow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="900" height="520" fill="#F8FAFC"/>

  <!-- Title -->
  <text x="450" y="32" text-anchor="middle" font-size="18" font-weight="bold" fill="#1E293B">AI Coding Tools: Security Considerations</text>
  <text x="450" y="52" text-anchor="middle" font-size="11" fill="#64748B">Comparing supply chain security implications of AI-assisted development</text>

  <!-- Table Header -->
  <g filter="url(#shadow)">
    <rect x="50" y="75" width="800" height="40" rx="6" fill="#1E293B"/>
    <text x="130" y="100" text-anchor="middle" font-size="11" font-weight="bold" fill="white">Tool</text>
    <line x1="200" y1="80" x2="200" y2="110" stroke="#475569"/>
    <text x="295" y="100" text-anchor="middle" font-size="11" font-weight="bold" fill="white">Data Retention</text>
    <line x1="390" y1="80" x2="390" y2="110" stroke="#475569"/>
    <text x="480" y="100" text-anchor="middle" font-size="11" font-weight="bold" fill="white">Training on Input</text>
    <line x1="570" y1="80" x2="570" y2="110" stroke="#475569"/>
    <text x="660" y="100" text-anchor="middle" font-size="11" font-weight="bold" fill="white">Enterprise Controls</text>
    <line x1="750" y1="80" x2="750" y2="110" stroke="#475569"/>
    <text x="825" y="100" text-anchor="middle" font-size="11" font-weight="bold" fill="white">Provenance</text>
  </g>

  <!-- Row 1: GitHub Copilot -->
  <g filter="url(#shadow)">
    <rect x="50" y="120" width="800" height="55" fill="white" stroke="#E2E8F0"/>
    <rect x="55" y="125" width="140" height="45" rx="4" fill="#0D1117"/>
    <text x="125" y="148" text-anchor="middle" font-size="11" font-weight="600" fill="white">GitHub Copilot</text>
    <text x="125" y="162" text-anchor="middle" font-size="8" fill="#8B949E">Microsoft/OpenAI</text>

    <text x="295" y="148" text-anchor="middle" font-size="10" fill="#059669">No storage (Enterprise)</text>
    <text x="295" y="162" text-anchor="middle" font-size="8" fill="#64748B">Configurable per plan</text>

    <text x="480" y="148" text-anchor="middle" font-size="10" fill="#059669">Opt-out available</text>
    <text x="480" y="162" text-anchor="middle" font-size="8" fill="#64748B">Enterprise excludes by default</text>

    <text x="660" y="148" text-anchor="middle" font-size="10" fill="#059669">Comprehensive</text>
    <text x="660" y="162" text-anchor="middle" font-size="8" fill="#64748B">SSO, audit, policies</text>

    <text x="825" y="148" text-anchor="middle" font-size="10" fill="#F59E0B">Partial</text>
    <text x="825" y="162" text-anchor="middle" font-size="8" fill="#64748B">License hints</text>
  </g>

  <!-- Row 2: Amazon CodeWhisperer -->
  <g filter="url(#shadow)">
    <rect x="50" y="180" width="800" height="55" fill="#F8FAFC" stroke="#E2E8F0"/>
    <rect x="55" y="185" width="140" height="45" rx="4" fill="#232F3E"/>
    <text x="125" y="208" text-anchor="middle" font-size="11" font-weight="600" fill="white">CodeWhisperer</text>
    <text x="125" y="222" text-anchor="middle" font-size="8" fill="#8B949E">Amazon</text>

    <text x="295" y="208" text-anchor="middle" font-size="10" fill="#059669">No storage (Pro)</text>
    <text x="295" y="222" text-anchor="middle" font-size="8" fill="#64748B">Professional tier</text>

    <text x="480" y="208" text-anchor="middle" font-size="10" fill="#059669">Pro excludes training</text>
    <text x="480" y="222" text-anchor="middle" font-size="8" fill="#64748B">Free tier different</text>

    <text x="660" y="208" text-anchor="middle" font-size="10" fill="#059669">IAM integration</text>
    <text x="660" y="222" text-anchor="middle" font-size="8" fill="#64748B">AWS organization</text>

    <text x="825" y="208" text-anchor="middle" font-size="10" fill="#059669">Good</text>
    <text x="825" y="222" text-anchor="middle" font-size="8" fill="#64748B">Reference tracking</text>
  </g>

  <!-- Row 3: Claude/ChatGPT -->
  <g filter="url(#shadow)">
    <rect x="50" y="240" width="800" height="55" fill="white" stroke="#E2E8F0"/>
    <rect x="55" y="245" width="140" height="45" rx="4" fill="#6366F1"/>
    <text x="125" y="268" text-anchor="middle" font-size="11" font-weight="600" fill="white">ChatGPT/Claude</text>
    <text x="125" y="282" text-anchor="middle" font-size="8" fill="#E0E7FF">General-purpose</text>

    <text x="295" y="268" text-anchor="middle" font-size="10" fill="#F59E0B">Varies by tier</text>
    <text x="295" y="282" text-anchor="middle" font-size="8" fill="#64748B">Check terms carefully</text>

    <text x="480" y="268" text-anchor="middle" font-size="10" fill="#F59E0B">Opt-out varies</text>
    <text x="480" y="282" text-anchor="middle" font-size="8" fill="#64748B">API vs. web interface</text>

    <text x="660" y="268" text-anchor="middle" font-size="10" fill="#F59E0B">Limited</text>
    <text x="660" y="282" text-anchor="middle" font-size="8" fill="#64748B">Enterprise options</text>

    <text x="825" y="268" text-anchor="middle" font-size="10" fill="#DC2626">None</text>
    <text x="825" y="282" text-anchor="middle" font-size="8" fill="#64748B">No tracking</text>
  </g>

  <!-- Row 4: Self-hosted models -->
  <g filter="url(#shadow)">
    <rect x="50" y="300" width="800" height="55" fill="#F8FAFC" stroke="#E2E8F0"/>
    <rect x="55" y="305" width="140" height="45" rx="4" fill="#059669"/>
    <text x="125" y="328" text-anchor="middle" font-size="11" font-weight="600" fill="white">Self-Hosted</text>
    <text x="125" y="342" text-anchor="middle" font-size="8" fill="#D1FAE5">Code Llama, etc.</text>

    <text x="295" y="328" text-anchor="middle" font-size="10" fill="#059669">Full control</text>
    <text x="295" y="342" text-anchor="middle" font-size="8" fill="#64748B">On-premises</text>

    <text x="480" y="328" text-anchor="middle" font-size="10" fill="#059669">No external training</text>
    <text x="480" y="342" text-anchor="middle" font-size="8" fill="#64748B">Data stays local</text>

    <text x="660" y="328" text-anchor="middle" font-size="10" fill="#059669">Customizable</text>
    <text x="660" y="342" text-anchor="middle" font-size="8" fill="#64748B">Define your own</text>

    <text x="825" y="328" text-anchor="middle" font-size="10" fill="#F59E0B">Depends</text>
    <text x="825" y="342" text-anchor="middle" font-size="8" fill="#64748B">Model-specific</text>
  </g>

  <!-- Key Security Considerations -->
  <g filter="url(#shadow)" transform="translate(50, 375)">
    <rect x="0" y="0" width="800" height="125" rx="8" fill="white" stroke="#E2E8F0"/>
    <text x="400" y="25" text-anchor="middle" font-size="13" font-weight="bold" fill="#1E293B">Key Security Considerations for AI Coding Tools</text>

    <g transform="translate(30, 45)">
      <rect x="0" y="0" width="230" height="65" rx="4" fill="#FEE2E2" stroke="#FECACA"/>
      <text x="115" y="18" text-anchor="middle" font-size="10" font-weight="600" fill="#991B1B">Data Leakage Risks</text>
      <text x="10" y="35" font-size="8" fill="#DC2626">- Secrets in code context</text>
      <text x="10" y="48" font-size="8" fill="#DC2626">- Proprietary algorithms exposed</text>
      <text x="10" y="61" font-size="8" fill="#DC2626">- Training data inclusion</text>
    </g>

    <g transform="translate(285, 45)">
      <rect x="0" y="0" width="230" height="65" rx="4" fill="#FEF3C7" stroke="#FDE68A"/>
      <text x="115" y="18" text-anchor="middle" font-size="10" font-weight="600" fill="#92400E">Code Quality Risks</text>
      <text x="10" y="35" font-size="8" fill="#D97706">- Vulnerable patterns suggested</text>
      <text x="10" y="48" font-size="8" fill="#D97706">- Outdated library versions</text>
      <text x="10" y="61" font-size="8" fill="#D97706">- Non-existent packages</text>
    </g>

    <g transform="translate(540, 45)">
      <rect x="0" y="0" width="230" height="65" rx="4" fill="#DBEAFE" stroke="#93C5FD"/>
      <text x="115" y="18" text-anchor="middle" font-size="10" font-weight="600" fill="#1E40AF">Supply Chain Risks</text>
      <text x="10" y="35" font-size="8" fill="#2563EB">- Hallucinated dependencies</text>
      <text x="10" y="48" font-size="8" fill="#2563EB">- License compliance issues</text>
      <text x="10" y="61" font-size="8" fill="#2563EB">- Unvetted code patterns</text>
    </g>
  </g>
</svg>
