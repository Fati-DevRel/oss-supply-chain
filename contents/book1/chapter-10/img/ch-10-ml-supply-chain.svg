<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 550" font-family="Libertinus Sans">
  <defs>
        <filter id="shadow" x="-10%" y="-10%" width="120%" height="130%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="2" result="blur"/>
      <feOffset in="blur" dx="1" dy="2" result="offsetBlur"/>
      <feFlood flood-color="#000000" flood-opacity="0.5" result="color"/>
      <feComposite in="color" in2="offsetBlur" operator="in" result="shadow"/>
      <feMerge>
        <feMergeNode in="shadow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <linearGradient id="hfGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#FFD21E;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#F59E0B;stop-opacity:1" />
    </linearGradient>
    <marker id="arrowRed" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#DC2626"/>
    </marker>
    <marker id="arrowBlue" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#3B82F6"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="900" height="550" fill="#F8FAFC"/>

  <!-- Title -->
  <text x="450" y="32" text-anchor="middle" font-size="18" font-weight="bold" fill="#1E293B">ML Model Supply Chain Risks</text>
  <text x="450" y="52" text-anchor="middle" font-size="11" fill="#64748B">When AI/ML models become supply chain dependencies</text>

  <!-- Main Flow Diagram -->
  <!-- Model Registry -->
  <g filter="url(#shadow)" transform="translate(50, 80)">
    <rect x="0" y="0" width="200" height="100" rx="8" fill="url(#hfGrad)"/>
    <text x="100" y="30" text-anchor="middle" font-size="13" font-weight="bold" fill="#1E293B">Model Registry</text>
    <text x="100" y="48" text-anchor="middle" font-size="10" fill="#92400E">Hugging Face Hub</text>
    <text x="100" y="65" text-anchor="middle" font-size="9" fill="#92400E">1M+ models</text>
    <text x="100" y="80" text-anchor="middle" font-size="9" fill="#92400E">35M+ monthly downloads</text>
  </g>

  <!-- Arrow -->
  <path d="M 255 130 L 295 130" stroke="#3B82F6" stroke-width="2" marker-end="url(#arrowBlue)" fill="none"/>
  <text x="275" y="122" text-anchor="middle" font-size="8" fill="#3B82F6">Download</text>

  <!-- Developer -->
  <g filter="url(#shadow)" transform="translate(305, 80)">
    <rect x="0" y="0" width="150" height="100" rx="8" fill="#3B82F6"/>
    <text x="75" y="35" text-anchor="middle" font-size="13" font-weight="bold" fill="white">Developer</text>
    <text x="75" y="55" text-anchor="middle" font-size="9" fill="#DBEAFE">Loads model</text>
    <text x="75" y="70" text-anchor="middle" font-size="9" fill="#DBEAFE">Fine-tunes</text>
    <text x="75" y="85" text-anchor="middle" font-size="9" fill="#DBEAFE">Deploys</text>
  </g>

  <!-- Arrow -->
  <path d="M 460 130 L 500 130" stroke="#3B82F6" stroke-width="2" marker-end="url(#arrowBlue)" fill="none"/>

  <!-- Production -->
  <g filter="url(#shadow)" transform="translate(510, 80)">
    <rect x="0" y="0" width="150" height="100" rx="8" fill="#059669"/>
    <text x="75" y="35" text-anchor="middle" font-size="13" font-weight="bold" fill="white">Production</text>
    <text x="75" y="55" text-anchor="middle" font-size="9" fill="#D1FAE5">Inference API</text>
    <text x="75" y="70" text-anchor="middle" font-size="9" fill="#D1FAE5">User requests</text>
    <text x="75" y="85" text-anchor="middle" font-size="9" fill="#D1FAE5">Business logic</text>
  </g>

  <!-- Risk Boxes -->
  <!-- Risk 1: Pickle Vulnerability -->
  <g filter="url(#shadow)" transform="translate(50, 210)">
    <rect x="0" y="0" width="260" height="130" rx="8" fill="#FEE2E2" stroke="#DC2626" stroke-width="2"/>
    <rect x="0" y="0" width="260" height="30" rx="8" fill="#DC2626"/>
    <rect x="0" y="22" width="260" height="8" fill="#DC2626"/>
    <text x="130" y="21" text-anchor="middle" font-size="11" font-weight="bold" fill="white">Pickle Serialization</text>

    <text x="15" y="50" font-size="9" font-weight="600" fill="#DC2626">CRITICAL: Arbitrary code execution</text>
    <text x="15" y="68" font-size="9" fill="#475569">Loading a .pkl, .pt, .pth file can</text>
    <text x="15" y="82" font-size="9" fill="#475569">execute embedded malicious code</text>

    <rect x="15" y="95" width="230" height="25" rx="4" fill="#D1FAE5"/>
    <text x="130" y="112" text-anchor="middle" font-size="9" font-weight="600" fill="#059669">Use SafeTensors format instead</text>
  </g>
  <path d="M 180 208 L 180 185" stroke="#DC2626" stroke-width="2" stroke-dasharray="4,3" marker-end="url(#arrowRed)" fill="none"/>

  <!-- Risk 2: Model Poisoning -->
  <g filter="url(#shadow)" transform="translate(320, 210)">
    <rect x="0" y="0" width="260" height="130" rx="8" fill="#FEF3C7" stroke="#F59E0B" stroke-width="2"/>
    <rect x="0" y="0" width="260" height="30" rx="8" fill="#F59E0B"/>
    <rect x="0" y="22" width="260" height="8" fill="#F59E0B"/>
    <text x="130" y="21" text-anchor="middle" font-size="11" font-weight="bold" fill="white">Model Poisoning/Backdoors</text>

    <text x="15" y="50" font-size="9" font-weight="600" fill="#D97706">Malicious behavior in trained model</text>
    <text x="15" y="68" font-size="9" fill="#475569">Triggers on specific inputs</text>
    <text x="15" y="82" font-size="9" fill="#475569">Normal behavior otherwise</text>

    <text x="15" y="100" font-size="8" fill="#475569">Examples: BadNets, Trojans,</text>
    <text x="15" y="112" font-size="8" fill="#475569">Clean-label attacks</text>
  </g>
  <path d="M 450 208 L 450 185" stroke="#F59E0B" stroke-width="2" stroke-dasharray="4,3" marker-end="url(#arrowRed)" fill="none"/>

  <!-- Risk 3: Dataset Poisoning -->
  <g filter="url(#shadow)" transform="translate(590, 210)">
    <rect x="0" y="0" width="260" height="130" rx="8" fill="#E0E7FF" stroke="#6366F1" stroke-width="2"/>
    <rect x="0" y="0" width="260" height="30" rx="8" fill="#6366F1"/>
    <rect x="0" y="22" width="260" height="8" fill="#6366F1"/>
    <text x="130" y="21" text-anchor="middle" font-size="11" font-weight="bold" fill="white">Training Data Integrity</text>

    <text x="15" y="50" font-size="9" font-weight="600" fill="#4338CA">Manipulated training data</text>
    <text x="15" y="68" font-size="9" fill="#475569">Public datasets can be modified</text>
    <text x="15" y="82" font-size="9" fill="#475569">Wikipedia, web crawls, GitHub</text>

    <text x="15" y="100" font-size="8" fill="#475569">LLM outputs reflect poisoned</text>
    <text x="15" y="112" font-size="8" fill="#475569">training data</text>
  </g>

  <!-- Comparison Table -->
  <g filter="url(#shadow)" transform="translate(50, 365)">
    <rect x="0" y="0" width="800" height="165" rx="8" fill="white" stroke="#E2E8F0"/>
    <text x="400" y="25" text-anchor="middle" font-size="13" font-weight="bold" fill="#1E293B">Model Registry vs Package Registry Comparison</text>

    <!-- Table header -->
    <rect x="20" y="40" width="760" height="30" rx="4" fill="#1E293B"/>
    <text x="150" y="60" text-anchor="middle" font-size="10" font-weight="bold" fill="white">Aspect</text>
    <text x="400" y="60" text-anchor="middle" font-size="10" font-weight="bold" fill="white">npm/PyPI</text>
    <text x="650" y="60" text-anchor="middle" font-size="10" font-weight="bold" fill="white">Hugging Face</text>

    <!-- Row 1 -->
    <text x="150" y="90" text-anchor="middle" font-size="9" fill="#475569">Pre-publication review</text>
    <text x="400" y="90" text-anchor="middle" font-size="9" fill="#F59E0B">Limited/none</text>
    <text x="650" y="90" text-anchor="middle" font-size="9" fill="#F59E0B">Limited/none</text>

    <!-- Row 2 -->
    <text x="150" y="110" text-anchor="middle" font-size="9" fill="#475569">Vulnerability scanning</text>
    <text x="400" y="110" text-anchor="middle" font-size="9" fill="#059669">Yes (some)</text>
    <text x="650" y="110" text-anchor="middle" font-size="9" fill="#F59E0B">Emerging</text>

    <!-- Row 3 -->
    <text x="150" y="130" text-anchor="middle" font-size="9" fill="#475569">Signing/verification</text>
    <text x="400" y="130" text-anchor="middle" font-size="9" fill="#F59E0B">Emerging</text>
    <text x="650" y="130" text-anchor="middle" font-size="9" fill="#DC2626">Limited</text>

    <!-- Row 4 -->
    <text x="150" y="150" text-anchor="middle" font-size="9" fill="#475569">Execution risk</text>
    <text x="400" y="150" text-anchor="middle" font-size="9" fill="#DC2626">Install scripts</text>
    <text x="650" y="150" text-anchor="middle" font-size="9" fill="#DC2626">Pickle deserialization</text>
  </g>
</svg>
