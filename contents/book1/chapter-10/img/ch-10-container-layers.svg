<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 550" font-family="Libertinus Sans">
  <defs>
        <filter id="shadow" x="-10%" y="-10%" width="120%" height="130%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="2" result="blur"/>
      <feOffset in="blur" dx="1" dy="2" result="offsetBlur"/>
      <feFlood flood-color="#000000" flood-opacity="0.5" result="color"/>
      <feComposite in="color" in2="offsetBlur" operator="in" result="shadow"/>
      <feMerge>
        <feMergeNode in="shadow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <linearGradient id="layer1" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1E40AF;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1E3A8A;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="layer2" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#3B82F6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2563EB;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="layer3" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#60A5FA;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#3B82F6;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="layer4" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#93C5FD;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#60A5FA;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="900" height="550" fill="#F8FAFC"/>

  <!-- Title -->
  <text x="450" y="32" text-anchor="middle" font-size="18" font-weight="bold" fill="#1E293B">Container Image Layered Architecture</text>
  <text x="450" y="52" text-anchor="middle" font-size="11" fill="#64748B">Understanding accumulated supply chain risk in container images</text>

  <!-- Container Stack Visualization -->
  <g transform="translate(100, 80)">
    <!-- Layer 4: Application Code (top) -->
    <g filter="url(#shadow)">
      <rect x="0" y="0" width="350" height="70" rx="6" fill="url(#layer4)"/>
      <text x="175" y="28" text-anchor="middle" font-size="13" font-weight="bold" fill="#1E293B">Application Code</text>
      <text x="175" y="48" text-anchor="middle" font-size="10" fill="#1E40AF">COPY app.js, WORKDIR, CMD</text>
      <text x="175" y="62" text-anchor="middle" font-size="9" fill="#3B82F6">Your code and configs</text>
    </g>

    <!-- Layer 3: Dependencies -->
    <g filter="url(#shadow)">
      <rect x="0" y="80" width="350" height="70" rx="6" fill="url(#layer3)"/>
      <text x="175" y="108" text-anchor="middle" font-size="13" font-weight="bold" fill="white">Application Dependencies</text>
      <text x="175" y="128" text-anchor="middle" font-size="10" fill="#DBEAFE">npm install, pip install</text>
      <text x="175" y="142" text-anchor="middle" font-size="9" fill="#BFDBFE">Package ecosystem risks here</text>
    </g>

    <!-- Layer 2: Runtime -->
    <g filter="url(#shadow)">
      <rect x="0" y="160" width="350" height="70" rx="6" fill="url(#layer2)"/>
      <text x="175" y="188" text-anchor="middle" font-size="13" font-weight="bold" fill="white">Language Runtime</text>
      <text x="175" y="208" text-anchor="middle" font-size="10" fill="#DBEAFE">Node.js, Python, JVM</text>
      <text x="175" y="222" text-anchor="middle" font-size="9" fill="#BFDBFE">Runtime vulnerabilities</text>
    </g>

    <!-- Layer 1: Base OS (bottom) -->
    <g filter="url(#shadow)">
      <rect x="0" y="240" width="350" height="70" rx="6" fill="url(#layer1)"/>
      <text x="175" y="268" text-anchor="middle" font-size="13" font-weight="bold" fill="white">Base OS Image</text>
      <text x="175" y="288" text-anchor="middle" font-size="10" fill="#DBEAFE">Ubuntu, Alpine, Debian</text>
      <text x="175" y="302" text-anchor="middle" font-size="9" fill="#BFDBFE">System package vulnerabilities</text>
    </g>

    <!-- Arrows showing inheritance -->
    <path d="M 175 70 L 175 80" stroke="#64748B" stroke-width="2"/>
    <path d="M 175 150 L 175 160" stroke="#64748B" stroke-width="2"/>
    <path d="M 175 230 L 175 240" stroke="#64748B" stroke-width="2"/>

    <!-- Inheritance label -->
    <text x="-40" y="175" font-size="9" fill="#64748B" transform="rotate(-90, -40, 175)">Inherits from below</text>
  </g>

  <!-- Right side: Risk Accumulation -->
  <g transform="translate(500, 80)">
    <rect x="0" y="0" width="350" height="310" rx="8" fill="white" stroke="#E2E8F0" filter="url(#shadow)"/>
    <text x="175" y="28" text-anchor="middle" font-size="13" font-weight="bold" fill="#1E293B">Cumulative Vulnerability Count</text>

    <!-- Risk bars -->
    <g transform="translate(30, 50)">
      <text x="0" y="15" font-size="10" fill="#475569">Base OS Only</text>
      <rect x="100" y="0" width="60" height="20" rx="3" fill="#FEE2E2"/>
      <text x="135" y="14" text-anchor="middle" font-size="9" font-weight="600" fill="#DC2626">15</text>
    </g>

    <g transform="translate(30, 85)">
      <text x="0" y="15" font-size="10" fill="#475569">+ Runtime</text>
      <rect x="100" y="0" width="100" height="20" rx="3" fill="#FEE2E2"/>
      <text x="155" y="14" text-anchor="middle" font-size="9" font-weight="600" fill="#DC2626">25</text>
    </g>

    <g transform="translate(30, 120)">
      <text x="0" y="15" font-size="10" fill="#475569">+ Dependencies</text>
      <rect x="100" y="0" width="180" height="20" rx="3" fill="#FEE2E2"/>
      <text x="195" y="14" text-anchor="middle" font-size="9" font-weight="600" fill="#DC2626">45</text>
    </g>

    <g transform="translate(30, 155)">
      <text x="0" y="15" font-size="10" fill="#475569">+ App Code</text>
      <rect x="100" y="0" width="200" height="20" rx="3" fill="#DC2626"/>
      <text x="205" y="14" text-anchor="middle" font-size="9" font-weight="600" fill="white">50</text>
    </g>

    <!-- Statistics -->
    <line x1="30" y1="195" x2="290" y2="195" stroke="#E2E8F0"/>

    <text x="30" y="220" font-size="10" fill="#1E293B" font-weight="600">Industry Statistics:</text>
    <text x="30" y="240" font-size="9" fill="#475569">- 60%+ of production images have high/critical CVEs</text>
    <text x="30" y="255" font-size="9" fill="#475569">- Average image: 30+ high-severity vulnerabilities</text>
    <text x="30" y="270" font-size="9" fill="#475569">- Many vulnerabilities in unused components</text>

    <rect x="30" y="285" width="260" height="20" rx="3" fill="#D1FAE5"/>
    <text x="160" y="299" text-anchor="middle" font-size="9" font-weight="600" fill="#059669">Distroless images reduce 80%+ of CVEs</text>
  </g>

  <!-- Bottom: Recommendations -->
  <g filter="url(#shadow)" transform="translate(100, 420)">
    <rect x="0" y="0" width="700" height="110" rx="8" fill="white" stroke="#E2E8F0"/>
    <text x="350" y="25" text-anchor="middle" font-size="13" font-weight="bold" fill="#1E293B">Best Practices for Container Supply Chain Security</text>

    <g transform="translate(20, 45)">
      <circle cx="8" cy="8" r="5" fill="#059669"/>
      <text x="20" y="12" font-size="10" fill="#475569">Use minimal base images (Alpine, Distroless)</text>
    </g>

    <g transform="translate(20, 68)">
      <circle cx="8" cy="8" r="5" fill="#059669"/>
      <text x="20" y="12" font-size="10" fill="#475569">Multi-stage builds - exclude build tools</text>
    </g>

    <g transform="translate(20, 91)">
      <circle cx="8" cy="8" r="5" fill="#059669"/>
      <text x="20" y="12" font-size="10" fill="#475569">Pin images by digest, not tag</text>
    </g>

    <g transform="translate(360, 45)">
      <circle cx="8" cy="8" r="5" fill="#059669"/>
      <text x="20" y="12" font-size="10" fill="#475569">Scan at build, push, and runtime</text>
    </g>

    <g transform="translate(360, 68)">
      <circle cx="8" cy="8" r="5" fill="#059669"/>
      <text x="20" y="12" font-size="10" fill="#475569">Sign images with cosign/Notary</text>
    </g>

    <g transform="translate(360, 91)">
      <circle cx="8" cy="8" r="5" fill="#059669"/>
      <text x="20" y="12" font-size="10" fill="#475569">Maintain base image update cadence</text>
    </g>
  </g>
</svg>
