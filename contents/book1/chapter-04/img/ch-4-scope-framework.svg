<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 700" font-family="Libertinus Sans">
  <defs>
        <filter id="shadow" x="-10%" y="-10%" width="120%" height="130%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="2" result="blur"/>
      <feOffset in="blur" dx="1" dy="2" result="offsetBlur"/>
      <feFlood flood-color="#000000" flood-opacity="0.5" result="color"/>
      <feComposite in="color" in2="offsetBlur" operator="in" result="shadow"/>
      <feMerge>
        <feMergeNode in="shadow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <linearGradient id="depthGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#c53030"/>
      <stop offset="50%" style="stop-color:#dd6b20"/>
      <stop offset="100%" style="stop-color:#d69e2e"/>
    </linearGradient>
    <marker id="arrowBlue" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#3182ce"/>
    </marker>
    <marker id="arrowGray" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#718096"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="900" height="700" fill="#f7fafc"/>

  <!-- Title -->
  <text x="450" y="35" text-anchor="middle" font-size="20" font-weight="600" fill="#1a365d">
    Scope Definition Framework for Supply Chain Threat Modeling
  </text>
  <text x="450" y="55" text-anchor="middle" font-size="12" fill="#718096">
    Three dimensions to consider when defining what to model
  </text>

  <!-- Dimension 1: DEPTH -->
  <g transform="translate(50, 80)">
    <rect x="0" y="0" width="800" height="185" rx="8" fill="#fff" filter="url(#shadow)"/>
    <rect x="0" y="0" width="800" height="35" rx="8" fill="#c53030"/>
    <rect x="0" y="27" width="800" height="8" fill="#c53030"/>
    <text x="400" y="24" text-anchor="middle" font-size="13" font-weight="600" fill="#fff">DEPTH: How Far Into the Dependency Graph?</text>

    <!-- Dependency chain visualization -->
    <g transform="translate(40, 55)">
      <!-- Your App -->
      <rect x="0" y="15" width="100" height="50" rx="6" fill="#2b6cb0"/>
      <text x="50" y="45" text-anchor="middle" font-size="10" font-weight="600" fill="#fff">Your App</text>

      <!-- Arrow -->
      <line x1="105" y1="40" x2="150" y2="40" stroke="#718096" stroke-width="2" marker-end="url(#arrowGray)"/>

      <!-- Direct Deps -->
      <rect x="160" y="0" width="140" height="80" rx="6" fill="#c53030" opacity="0.9"/>
      <text x="230" y="25" text-anchor="middle" font-size="10" font-weight="600" fill="#fff">Direct Dependencies</text>
      <text x="230" y="45" text-anchor="middle" font-size="9" fill="#fed7d7">Model individually</text>
      <text x="230" y="60" text-anchor="middle" font-size="9" fill="#fed7d7">Full analysis</text>

      <!-- Arrow -->
      <line x1="305" y1="40" x2="350" y2="40" stroke="#718096" stroke-width="2" marker-end="url(#arrowGray)"/>

      <!-- Transitive Deps Level 1 -->
      <rect x="360" y="0" width="140" height="80" rx="6" fill="#dd6b20" opacity="0.9"/>
      <text x="430" y="25" text-anchor="middle" font-size="10" font-weight="600" fill="#fff">Transitive (L1)</text>
      <text x="430" y="45" text-anchor="middle" font-size="9" fill="#feebc8">Aggregate risk</text>
      <text x="430" y="60" text-anchor="middle" font-size="9" fill="#feebc8">Critical sampling</text>

      <!-- Arrow -->
      <line x1="505" y1="40" x2="550" y2="40" stroke="#718096" stroke-width="2" marker-end="url(#arrowGray)"/>

      <!-- Transitive Deps Level 2+ -->
      <rect x="560" y="0" width="140" height="80" rx="6" fill="#d69e2e" opacity="0.9"/>
      <text x="630" y="25" text-anchor="middle" font-size="10" font-weight="600" fill="#fff">Transitive (L2+)</text>
      <text x="630" y="45" text-anchor="middle" font-size="9" fill="#fffff0">Risk aggregation</text>
      <text x="630" y="60" text-anchor="middle" font-size="9" fill="#fffff0">Focus on elevated privilege</text>

      <!-- Dotted extension -->
      <line x1="705" y1="40" x2="740" y2="40" stroke="#718096" stroke-width="2" stroke-dasharray="4,3"/>
      <text x="720" y="60" font-size="16" fill="#718096">...</text>
    </g>

    <!-- Practical approaches -->
    <g transform="translate(40, 145)">
      <text x="0" y="0" font-size="9" font-weight="600" fill="#2d3748">Practical Approaches:</text>
      <text x="120" y="0" font-size="9" fill="#4a5568">Model direct individually | Sample critical transitives | Focus on elevated privilege (build-time, network, fs)</text>
    </g>
  </g>

  <!-- Dimension 2: BREADTH -->
  <g transform="translate(50, 280)">
    <rect x="0" y="0" width="800" height="200" rx="8" fill="#fff" filter="url(#shadow)"/>
    <rect x="0" y="0" width="800" height="35" rx="8" fill="#3182ce"/>
    <rect x="0" y="27" width="800" height="8" fill="#3182ce"/>
    <text x="400" y="24" text-anchor="middle" font-size="13" font-weight="600" fill="#fff">BREADTH: Which Aspects of the Supply Chain?</text>

    <!-- Pipeline stages -->
    <g transform="translate(30, 55)">
      <!-- Development -->
      <g transform="translate(0, 0)">
        <rect x="0" y="0" width="130" height="90" rx="6" fill="#ebf8ff"/>
        <rect x="0" y="0" width="130" height="25" rx="6" fill="#3182ce"/>
        <rect x="0" y="17" width="130" height="8" fill="#3182ce"/>
        <text x="65" y="17" text-anchor="middle" font-size="9" font-weight="600" fill="#fff">Development</text>
        <text x="10" y="42" font-size="8" fill="#2c5282">- IDEs, linters</text>
        <text x="10" y="55" font-size="8" fill="#2c5282">- Formatters</text>
        <text x="10" y="68" font-size="8" fill="#2c5282">- Code dependencies</text>
      </g>

      <!-- Arrow -->
      <line x1="135" y1="45" x2="155" y2="45" stroke="#3182ce" stroke-width="2" marker-end="url(#arrowBlue)"/>

      <!-- Build -->
      <g transform="translate(160, 0)">
        <rect x="0" y="0" width="130" height="90" rx="6" fill="#ebf8ff"/>
        <rect x="0" y="0" width="130" height="25" rx="6" fill="#3182ce"/>
        <rect x="0" y="17" width="130" height="8" fill="#3182ce"/>
        <text x="65" y="17" text-anchor="middle" font-size="9" font-weight="600" fill="#fff">Build</text>
        <text x="10" y="42" font-size="8" fill="#2c5282">- CI/CD systems</text>
        <text x="10" y="55" font-size="8" fill="#2c5282">- Compilers, build tools</text>
        <text x="10" y="68" font-size="8" fill="#2c5282">- Build environments</text>
      </g>

      <!-- Arrow -->
      <line x1="295" y1="45" x2="315" y2="45" stroke="#3182ce" stroke-width="2" marker-end="url(#arrowBlue)"/>

      <!-- Distribution -->
      <g transform="translate(320, 0)">
        <rect x="0" y="0" width="130" height="90" rx="6" fill="#ebf8ff"/>
        <rect x="0" y="0" width="130" height="25" rx="6" fill="#3182ce"/>
        <rect x="0" y="17" width="130" height="8" fill="#3182ce"/>
        <text x="65" y="17" text-anchor="middle" font-size="9" font-weight="600" fill="#fff">Distribution</text>
        <text x="10" y="42" font-size="8" fill="#2c5282">- Package registries</text>
        <text x="10" y="55" font-size="8" fill="#2c5282">- CDNs, mirrors</text>
        <text x="10" y="68" font-size="8" fill="#2c5282">- Artifact repos</text>
      </g>

      <!-- Arrow -->
      <line x1="455" y1="45" x2="475" y2="45" stroke="#3182ce" stroke-width="2" marker-end="url(#arrowBlue)"/>

      <!-- Deployment -->
      <g transform="translate(480, 0)">
        <rect x="0" y="0" width="130" height="90" rx="6" fill="#ebf8ff"/>
        <rect x="0" y="0" width="130" height="25" rx="6" fill="#3182ce"/>
        <rect x="0" y="17" width="130" height="8" fill="#3182ce"/>
        <text x="65" y="17" text-anchor="middle" font-size="9" font-weight="600" fill="#fff">Deployment</text>
        <text x="10" y="42" font-size="8" fill="#2c5282">- Container registries</text>
        <text x="10" y="55" font-size="8" fill="#2c5282">- Orchestration</text>
        <text x="10" y="68" font-size="8" fill="#2c5282">- Config management</text>
      </g>

      <!-- Arrow -->
      <line x1="615" y1="45" x2="635" y2="45" stroke="#3182ce" stroke-width="2" marker-end="url(#arrowBlue)"/>

      <!-- Operations -->
      <g transform="translate(640, 0)">
        <rect x="0" y="0" width="120" height="90" rx="6" fill="#ebf8ff"/>
        <rect x="0" y="0" width="120" height="25" rx="6" fill="#3182ce"/>
        <rect x="0" y="17" width="120" height="8" fill="#3182ce"/>
        <text x="60" y="17" text-anchor="middle" font-size="9" font-weight="600" fill="#fff">Operations</text>
        <text x="10" y="42" font-size="8" fill="#2c5282">- Cloud providers</text>
        <text x="10" y="55" font-size="8" fill="#2c5282">- DNS, CAs</text>
        <text x="10" y="68" font-size="8" fill="#2c5282">- Runtime deps</text>
      </g>
    </g>

    <!-- Recommendation -->
    <g transform="translate(40, 160)">
      <rect x="0" y="0" width="720" height="25" rx="4" fill="#f0fff4"/>
      <text x="10" y="17" font-size="9" font-weight="600" fill="#276749">Recommendation:</text>
      <text x="110" y="17" font-size="9" fill="#22543d">Start with code dependencies. Expand to build/deployment as capability matures.</text>
    </g>
  </g>

  <!-- Dimension 3: ORGANIZATIONAL BOUNDARIES -->
  <g transform="translate(50, 500)">
    <rect x="0" y="0" width="800" height="185" rx="8" fill="#fff" filter="url(#shadow)"/>
    <rect x="0" y="0" width="800" height="35" rx="8" fill="#805ad5"/>
    <rect x="0" y="27" width="800" height="8" fill="#805ad5"/>
    <text x="400" y="24" text-anchor="middle" font-size="13" font-weight="600" fill="#fff">ORGANIZATIONAL BOUNDARIES: Who Controls What?</text>

    <!-- Three boundary types -->
    <g transform="translate(30, 55)">
      <!-- Internal -->
      <g transform="translate(0, 0)" filter="url(#shadow)">
        <rect x="0" y="0" width="240" height="110" rx="6" fill="#c6f6d5"/>
        <rect x="0" y="0" width="240" height="28" rx="6" fill="#38a169"/>
        <rect x="0" y="20" width="240" height="8" fill="#38a169"/>
        <text x="120" y="20" text-anchor="middle" font-size="11" font-weight="600" fill="#fff">Internal Dependencies</text>
        <g transform="translate(15, 40)">
          <text x="0" y="0" font-size="9" font-weight="600" fill="#22543d">Visibility: Full</text>
          <text x="0" y="18" font-size="9" font-weight="600" fill="#22543d">Control: Full</text>
          <text x="0" y="36" font-size="9" fill="#2f855a">Apply traditional threat</text>
          <text x="0" y="50" font-size="9" fill="#2f855a">modeling approaches</text>
        </g>
        <text x="180" y="95" font-size="8" fill="#276749" font-style="italic">Libraries, services you own</text>
      </g>

      <!-- Partner -->
      <g transform="translate(270, 0)" filter="url(#shadow)">
        <rect x="0" y="0" width="240" height="110" rx="6" fill="#feebc8"/>
        <rect x="0" y="0" width="240" height="28" rx="6" fill="#dd6b20"/>
        <rect x="0" y="20" width="240" height="8" fill="#dd6b20"/>
        <text x="120" y="20" text-anchor="middle" font-size="11" font-weight="600" fill="#fff">Partner Dependencies</text>
        <g transform="translate(15, 40)">
          <text x="0" y="0" font-size="9" font-weight="600" fill="#744210">Visibility: Contractual</text>
          <text x="0" y="18" font-size="9" font-weight="600" fill="#744210">Control: Limited</text>
          <text x="0" y="36" font-size="9" fill="#975a16">Contracts, audits, SLAs</text>
          <text x="0" y="50" font-size="9" fill="#975a16">provide some assurance</text>
        </g>
        <text x="175" y="95" font-size="8" fill="#975a16" font-style="italic">Commercial SDKs, vendors</text>
      </g>

      <!-- Community -->
      <g transform="translate(540, 0)" filter="url(#shadow)">
        <rect x="0" y="0" width="230" height="110" rx="6" fill="#fed7d7"/>
        <rect x="0" y="0" width="230" height="28" rx="6" fill="#c53030"/>
        <rect x="0" y="20" width="230" height="8" fill="#c53030"/>
        <text x="115" y="20" text-anchor="middle" font-size="11" font-weight="600" fill="#fff">Community Open Source</text>
        <g transform="translate(15, 40)">
          <text x="0" y="0" font-size="9" font-weight="600" fill="#742a2a">Visibility: Public only</text>
          <text x="0" y="18" font-size="9" font-weight="600" fill="#742a2a">Control: None</text>
          <text x="0" y="36" font-size="9" fill="#9b2c2c">Must evaluate public info,</text>
          <text x="0" y="50" font-size="9" fill="#9b2c2c">model with uncertainty</text>
        </g>
        <text x="170" y="95" font-size="8" fill="#9b2c2c" font-style="italic">npm, PyPI packages</text>
      </g>
    </g>
  </g>
</svg>