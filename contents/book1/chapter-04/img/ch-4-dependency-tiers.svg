<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 620" font-family="Libertinus Sans">
  <defs>
        <filter id="shadow" x="-10%" y="-10%" width="120%" height="130%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="2" result="blur"/>
      <feOffset in="blur" dx="1" dy="2" result="offsetBlur"/>
      <feFlood flood-color="#000000" flood-opacity="0.5" result="color"/>
      <feComposite in="color" in2="offsetBlur" operator="in" result="shadow"/>
      <feMerge>
        <feMergeNode in="shadow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <linearGradient id="tier1Grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#c53030"/>
      <stop offset="100%" style="stop-color:#9b2c2c"/>
    </linearGradient>
    <linearGradient id="tier2Grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#dd6b20"/>
      <stop offset="100%" style="stop-color:#c05621"/>
    </linearGradient>
    <linearGradient id="tier3Grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#d69e2e"/>
      <stop offset="100%" style="stop-color:#b7791f"/>
    </linearGradient>
    <linearGradient id="tier4Grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#48bb78"/>
      <stop offset="100%" style="stop-color:#38a169"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="900" height="620" fill="#f7fafc"/>

  <!-- Title -->
  <text x="450" y="35" text-anchor="middle" font-size="20" font-weight="600" fill="#1a365d">
    Dependency Criticality Tiers
  </text>
  <text x="450" y="55" text-anchor="middle" font-size="12" fill="#718096">
    A risk-based framework for prioritizing supply chain security investment
  </text>

  <!-- Pyramid Visualization -->
  <g transform="translate(50, 80)">
    <!-- Tier 1: Top of pyramid (smallest, highest priority) -->
    <polygon points="200,0 300,80 100,80" fill="url(#tier1Grad)" filter="url(#shadow)"/>
    <text x="200" y="50" text-anchor="middle" font-size="14" font-weight="700" fill="#fff">TIER 1</text>
    <text x="200" y="70" text-anchor="middle" font-size="10" fill="#fed7d7">Crown Jewels</text>

    <!-- Tier 2 -->
    <polygon points="100,85 300,85 350,165 50,165" fill="url(#tier2Grad)" filter="url(#shadow)"/>
    <text x="200" y="115" text-anchor="middle" font-size="14" font-weight="700" fill="#fff">TIER 2</text>
    <text x="200" y="140" text-anchor="middle" font-size="10" fill="#feebc8">Important</text>

    <!-- Tier 3 -->
    <polygon points="50,170 350,170 420,260 -20,260" fill="url(#tier3Grad)" filter="url(#shadow)"/>
    <text x="200" y="200" text-anchor="middle" font-size="14" font-weight="700" fill="#fff">TIER 3</text>
    <text x="200" y="230" text-anchor="middle" font-size="10" fill="#fffff0">Standard</text>

    <!-- Tier 4: Base of pyramid (largest, lowest priority) -->
    <polygon points="-20,265 420,265 500,370 -100,370" fill="url(#tier4Grad)" filter="url(#shadow)"/>
    <text x="200" y="300" text-anchor="middle" font-size="14" font-weight="700" fill="#fff">TIER 4</text>
    <text x="200" y="330" text-anchor="middle" font-size="10" fill="#c6f6d5">Low Priority</text>

    <!-- Volume indicator -->
    <text x="500" y="50" font-size="10" fill="#c53030" font-style="italic">Few dependencies</text>
    <text x="500" y="320" font-size="10" fill="#276749" font-style="italic">Many dependencies</text>
    <line x1="490" y1="60" x2="490" y2="300" stroke="#718096" stroke-width="1" stroke-dasharray="4,2"/>
    <polygon points="485,300 495,300 490,310" fill="#718096"/>
  </g>

  <!-- Tier Details -->
  <!-- Tier 1 Details -->
  <g transform="translate(530, 80)">
    <rect x="0" y="0" width="330" height="115" rx="8" fill="#fff" filter="url(#shadow)"/>
    <rect x="0" y="0" width="330" height="30" rx="8" fill="#c53030"/>
    <rect x="0" y="22" width="330" height="8" fill="#c53030"/>
    <text x="165" y="20" text-anchor="middle" font-size="11" font-weight="600" fill="#fff">TIER 1: Crown Jewels (Highest Priority)</text>

    <g transform="translate(12, 40)">
      <text x="0" y="12" font-size="9" font-weight="600" fill="#2d3748">Criteria:</text>
      <text x="50" y="12" font-size="9" fill="#4a5568">Crypto, auth, serialization, production runtime</text>

      <text x="0" y="32" font-size="9" font-weight="600" fill="#2d3748">Actions:</text>
      <text x="50" y="32" font-size="9" fill="#4a5568">Thorough evaluation, monitor advisories actively</text>
      <text x="50" y="46" font-size="9" fill="#4a5568">Patch critical vulns in days, consider audits</text>

      <text x="0" y="66" font-size="9" font-weight="600" fill="#2d3748">SLA:</text>
      <text x="50" y="66" font-size="9" fill="#c53030" font-weight="600">Critical patches: 1-3 days</text>
    </g>
  </g>

  <!-- Tier 2 Details -->
  <g transform="translate(530, 205)">
    <rect x="0" y="0" width="330" height="95" rx="8" fill="#fff" filter="url(#shadow)"/>
    <rect x="0" y="0" width="330" height="30" rx="8" fill="#dd6b20"/>
    <rect x="0" y="22" width="330" height="8" fill="#dd6b20"/>
    <text x="165" y="20" text-anchor="middle" font-size="11" font-weight="600" fill="#fff">TIER 2: Important (Elevated Priority)</text>

    <g transform="translate(12, 40)">
      <text x="0" y="12" font-size="9" font-weight="600" fill="#2d3748">Criteria:</text>
      <text x="50" y="12" font-size="9" fill="#4a5568">Elevated privileges, common mode failure risks</text>

      <text x="0" y="32" font-size="9" font-weight="600" fill="#2d3748">Actions:</text>
      <text x="50" y="32" font-size="9" fill="#4a5568">Standard eval, monitor advisories, review major updates</text>

      <text x="0" y="52" font-size="9" font-weight="600" fill="#2d3748">SLA:</text>
      <text x="50" y="52" font-size="9" fill="#c05621" font-weight="600">Critical patches: 1-2 weeks</text>
    </g>
  </g>

  <!-- Tier 3 Details -->
  <g transform="translate(530, 310)">
    <rect x="0" y="0" width="330" height="95" rx="8" fill="#fff" filter="url(#shadow)"/>
    <rect x="0" y="0" width="330" height="30" rx="8" fill="#d69e2e"/>
    <rect x="0" y="22" width="330" height="8" fill="#d69e2e"/>
    <text x="165" y="20" text-anchor="middle" font-size="11" font-weight="600" fill="#fff">TIER 3: Standard (Normal Priority)</text>

    <g transform="translate(12, 40)">
      <text x="0" y="12" font-size="9" font-weight="600" fill="#2d3748">Criteria:</text>
      <text x="50" y="12" font-size="9" fill="#4a5568">Limited privilege, well-maintained, replaceable</text>

      <text x="0" y="32" font-size="9" font-weight="600" fill="#2d3748">Actions:</text>
      <text x="50" y="32" font-size="9" fill="#4a5568">Standard dep. management, regular update cadence</text>

      <text x="0" y="52" font-size="9" font-weight="600" fill="#2d3748">SLA:</text>
      <text x="50" y="52" font-size="9" fill="#b7791f" font-weight="600">Critical patches: Monthly</text>
    </g>
  </g>

  <!-- Tier 4 Details -->
  <g transform="translate(530, 415)">
    <rect x="0" y="0" width="330" height="95" rx="8" fill="#fff" filter="url(#shadow)"/>
    <rect x="0" y="0" width="330" height="30" rx="8" fill="#48bb78"/>
    <rect x="0" y="22" width="330" height="8" fill="#48bb78"/>
    <text x="165" y="20" text-anchor="middle" font-size="11" font-weight="600" fill="#fff">TIER 4: Low Priority</text>

    <g transform="translate(12, 40)">
      <text x="0" y="12" font-size="9" font-weight="600" fill="#2d3748">Criteria:</text>
      <text x="50" y="12" font-size="9" fill="#4a5568">Dev-only, test utilities, transitive of Tier 3</text>

      <text x="0" y="32" font-size="9" font-weight="600" fill="#2d3748">Actions:</text>
      <text x="50" y="32" font-size="9" fill="#4a5568">Regular update cycles, high-severity only</text>

      <text x="0" y="52" font-size="9" font-weight="600" fill="#2d3748">SLA:</text>
      <text x="50" y="52" font-size="9" fill="#276749" font-weight="600">High-severity: Quarterly</text>
    </g>
  </g>

  <!-- Criticality Factors -->
  <g transform="translate(50, 470)">
    <rect x="0" y="0" width="450" height="130" rx="8" fill="#fff" filter="url(#shadow)"/>
    <text x="225" y="22" text-anchor="middle" font-size="12" font-weight="600" fill="#2d3748">Criticality Assessment Factors</text>
    <line x1="20" y1="32" x2="430" y2="32" stroke="#e2e8f0"/>

    <g transform="translate(20, 45)">
      <g transform="translate(0, 0)">
        <rect x="0" y="0" width="95" height="70" rx="4" fill="#ebf8ff"/>
        <text x="47" y="16" text-anchor="middle" font-size="9" font-weight="600" fill="#2b6cb0">Functional</text>
        <text x="47" y="32" text-anchor="middle" font-size="8" fill="#4a5568">Core to app?</text>
        <text x="47" y="45" text-anchor="middle" font-size="8" fill="#4a5568">Security controls?</text>
        <text x="47" y="58" text-anchor="middle" font-size="8" fill="#4a5568">Code coverage?</text>
      </g>
      <g transform="translate(105, 0)">
        <rect x="0" y="0" width="95" height="70" rx="4" fill="#faf5ff"/>
        <text x="47" y="16" text-anchor="middle" font-size="9" font-weight="600" fill="#6b46c1">Privilege</text>
        <text x="47" y="32" text-anchor="middle" font-size="8" fill="#4a5568">Network access?</text>
        <text x="47" y="45" text-anchor="middle" font-size="8" fill="#4a5568">File system?</text>
        <text x="47" y="58" text-anchor="middle" font-size="8" fill="#4a5568">Credentials?</text>
      </g>
      <g transform="translate(210, 0)">
        <rect x="0" y="0" width="95" height="70" rx="4" fill="#f0fff4"/>
        <text x="47" y="16" text-anchor="middle" font-size="9" font-weight="600" fill="#276749">Exposure</text>
        <text x="47" y="32" text-anchor="middle" font-size="8" fill="#4a5568">Production?</text>
        <text x="47" y="45" text-anchor="middle" font-size="8" fill="#4a5568">Build-time?</text>
        <text x="47" y="58" text-anchor="middle" font-size="8" fill="#4a5568">Dev-only?</text>
      </g>
      <g transform="translate(315, 0)">
        <rect x="0" y="0" width="95" height="70" rx="4" fill="#fff5f5"/>
        <text x="47" y="16" text-anchor="middle" font-size="9" font-weight="600" fill="#c53030">Replaceability</text>
        <text x="47" y="32" text-anchor="middle" font-size="8" fill="#4a5568">Alternatives?</text>
        <text x="47" y="45" text-anchor="middle" font-size="8" fill="#4a5568">Lock-in level?</text>
        <text x="47" y="58" text-anchor="middle" font-size="8" fill="#4a5568">Migration cost?</text>
      </g>
    </g>
  </g>

  <!-- Key Insight -->
  <g transform="translate(50, 545)">
    <rect x="0" y="0" width="810" height="55" rx="6" fill="#fffbeb" stroke="#d97706" stroke-width="1"/>
    <text x="20" y="20" font-size="10" font-weight="600" fill="#92400e">Prioritization Principle:</text>
    <text x="150" y="20" font-size="10" fill="#78350f">
      Not all dependencies deserve equal scrutiny. The goal is proportional investment:
    </text>
    <text x="20" y="40" font-size="10" fill="#78350f">
      intensive analysis for crown jewels (crypto, auth), automated updates for low-risk dev tools. This enables sustainable security.
    </text>
  </g>
</svg>