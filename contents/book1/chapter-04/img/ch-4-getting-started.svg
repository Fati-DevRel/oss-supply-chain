<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 520" font-family="Libertinus Sans">
  <defs>
        <filter id="shadow" x="-10%" y="-10%" width="120%" height="130%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="2" result="blur"/>
      <feOffset in="blur" dx="1" dy="2" result="offsetBlur"/>
      <feFlood flood-color="#000000" flood-opacity="0.5" result="color"/>
      <feComposite in="color" in2="offsetBlur" operator="in" result="shadow"/>
      <feMerge>
        <feMergeNode in="shadow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <linearGradient id="stepGrad1" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#3182ce"/>
      <stop offset="100%" style="stop-color:#2b6cb0"/>
    </linearGradient>
    <linearGradient id="stepGrad2" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#dd6b20"/>
      <stop offset="100%" style="stop-color:#c05621"/>
    </linearGradient>
    <linearGradient id="stepGrad3" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#d69e2e"/>
      <stop offset="100%" style="stop-color:#b7791f"/>
    </linearGradient>
    <linearGradient id="stepGrad4" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#805ad5"/>
      <stop offset="100%" style="stop-color:#6b46c1"/>
    </linearGradient>
    <linearGradient id="stepGrad5" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#38a169"/>
      <stop offset="100%" style="stop-color:#276749"/>
    </linearGradient>
    <marker id="arrowGray" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#718096"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="900" height="520" fill="#f7fafc"/>

  <!-- Title -->
  <text x="450" y="35" text-anchor="middle" font-size="20" font-weight="600" fill="#1a365d">
    Getting Started with Supply Chain Threat Modeling
  </text>
  <text x="450" y="55" text-anchor="middle" font-size="12" fill="#718096">
    A focused 5-step workflow for organizations new to supply chain threat modeling
  </text>

  <!-- Connecting line (curved path through all steps) -->
  <path d="M 130 200 C 200 200, 200 200, 270 200
           C 340 200, 340 200, 410 200
           C 480 200, 480 200, 550 200
           C 620 200, 620 200, 690 200
           C 760 200, 760 200, 830 200"
        stroke="#e2e8f0" stroke-width="8" fill="none"/>

  <!-- Arrow indicators between steps -->
  <line x1="175" y1="200" x2="195" y2="200" stroke="#718096" stroke-width="2" marker-end="url(#arrowGray)"/>
  <line x1="315" y1="200" x2="335" y2="200" stroke="#718096" stroke-width="2" marker-end="url(#arrowGray)"/>
  <line x1="455" y1="200" x2="475" y2="200" stroke="#718096" stroke-width="2" marker-end="url(#arrowGray)"/>
  <line x1="595" y1="200" x2="615" y2="200" stroke="#718096" stroke-width="2" marker-end="url(#arrowGray)"/>
  <line x1="735" y1="200" x2="755" y2="200" stroke="#718096" stroke-width="2" marker-end="url(#arrowGray)"/>

  <!-- Step 1: Enumerate Dependencies -->
  <g transform="translate(50, 100)" filter="url(#shadow)">
    <rect x="0" y="0" width="135" height="200" rx="10" fill="#fff"/>
    <circle cx="67" cy="100" r="55" fill="url(#stepGrad1)"/>
    <text x="67" y="95" text-anchor="middle" font-size="36" font-weight="700" fill="#fff">1</text>
    <text x="67" y="120" text-anchor="middle" font-size="9" fill="#bee3f8">STEP</text>

    <g transform="translate(10, 165)">
      <text x="57" y="0" text-anchor="middle" font-size="10" font-weight="600" fill="#2b6cb0">Enumerate</text>
      <text x="57" y="14" text-anchor="middle" font-size="10" font-weight="600" fill="#2b6cb0">Dependencies</text>
    </g>
  </g>

  <!-- Step 1 Details -->
  <g transform="translate(50, 315)">
    <rect x="0" y="0" width="135" height="120" rx="6" fill="#ebf8ff" stroke="#3182ce"/>
    <g transform="translate(10, 15)">
      <text x="0" y="0" font-size="8" font-weight="600" fill="#2b6cb0">Focus on:</text>
      <text x="0" y="18" font-size="8" fill="#4a5568">- Critical application</text>
      <text x="0" y="32" font-size="8" fill="#4a5568">- Or service</text>

      <text x="0" y="55" font-size="8" font-weight="600" fill="#2b6cb0">Direct deps only:</text>
      <text x="0" y="73" font-size="8" fill="#4a5568">- package.json</text>
      <text x="0" y="87" font-size="8" fill="#4a5568">- requirements.txt</text>
      <text x="0" y="101" font-size="8" fill="#4a5568">- go.mod, etc.</text>
    </g>
  </g>

  <!-- Step 2: Map Build Pipeline -->
  <g transform="translate(190, 100)" filter="url(#shadow)">
    <rect x="0" y="0" width="135" height="200" rx="10" fill="#fff"/>
    <circle cx="67" cy="100" r="55" fill="url(#stepGrad2)"/>
    <text x="67" y="95" text-anchor="middle" font-size="36" font-weight="700" fill="#fff">2</text>
    <text x="67" y="120" text-anchor="middle" font-size="9" fill="#feebc8">STEP</text>

    <g transform="translate(10, 165)">
      <text x="57" y="0" text-anchor="middle" font-size="10" font-weight="600" fill="#c05621">Map Build</text>
      <text x="57" y="14" text-anchor="middle" font-size="10" font-weight="600" fill="#c05621">Pipeline</text>
    </g>
  </g>

  <!-- Step 2 Details -->
  <g transform="translate(190, 315)">
    <rect x="0" y="0" width="135" height="120" rx="6" fill="#feebc8" stroke="#dd6b20"/>
    <g transform="translate(10, 15)">
      <text x="0" y="0" font-size="8" font-weight="600" fill="#c05621">Trace the path:</text>
      <text x="0" y="18" font-size="8" fill="#4a5568">Source commit</text>
      <text x="0" y="32" font-size="8" fill="#4a5568">to production deploy</text>

      <text x="0" y="55" font-size="8" font-weight="600" fill="#c05621">Document:</text>
      <text x="0" y="73" font-size="8" fill="#4a5568">- CI/CD system</text>
      <text x="0" y="87" font-size="8" fill="#4a5568">- Build tools</text>
      <text x="0" y="101" font-size="8" fill="#4a5568">- Artifact storage</text>
    </g>
  </g>

  <!-- Step 3: Identify Trust Boundaries -->
  <g transform="translate(330, 100)" filter="url(#shadow)">
    <rect x="0" y="0" width="135" height="200" rx="10" fill="#fff"/>
    <circle cx="67" cy="100" r="55" fill="url(#stepGrad3)"/>
    <text x="67" y="95" text-anchor="middle" font-size="36" font-weight="700" fill="#fff">3</text>
    <text x="67" y="120" text-anchor="middle" font-size="9" fill="#fffff0">STEP</text>

    <g transform="translate(10, 165)">
      <text x="57" y="0" text-anchor="middle" font-size="10" font-weight="600" fill="#b7791f">Identify Trust</text>
      <text x="57" y="14" text-anchor="middle" font-size="10" font-weight="600" fill="#b7791f">Boundaries</text>
    </g>
  </g>

  <!-- Step 3 Details -->
  <g transform="translate(330, 315)">
    <rect x="0" y="0" width="135" height="120" rx="6" fill="#fffff0" stroke="#d69e2e"/>
    <g transform="translate(10, 15)">
      <text x="0" y="0" font-size="8" font-weight="600" fill="#b7791f">Mark where:</text>
      <text x="0" y="18" font-size="8" fill="#4a5568">External inputs enter</text>
      <text x="0" y="32" font-size="8" fill="#4a5568">the pipeline</text>

      <text x="0" y="55" font-size="8" font-weight="600" fill="#b7791f">Key points:</text>
      <text x="0" y="73" font-size="8" fill="#4a5568">- Registry fetches</text>
      <text x="0" y="87" font-size="8" fill="#4a5568">- Build inputs</text>
      <text x="0" y="101" font-size="8" fill="#4a5568">- Deploy targets</text>
    </g>
  </g>

  <!-- Step 4: List Assets at Risk -->
  <g transform="translate(470, 100)" filter="url(#shadow)">
    <rect x="0" y="0" width="135" height="200" rx="10" fill="#fff"/>
    <circle cx="67" cy="100" r="55" fill="url(#stepGrad4)"/>
    <text x="67" y="95" text-anchor="middle" font-size="36" font-weight="700" fill="#fff">4</text>
    <text x="67" y="120" text-anchor="middle" font-size="9" fill="#e9d8fd">STEP</text>

    <g transform="translate(10, 165)">
      <text x="57" y="0" text-anchor="middle" font-size="10" font-weight="600" fill="#6b46c1">List Assets</text>
      <text x="57" y="14" text-anchor="middle" font-size="10" font-weight="600" fill="#6b46c1">at Risk</text>
    </g>
  </g>

  <!-- Step 4 Details -->
  <g transform="translate(470, 315)">
    <rect x="0" y="0" width="135" height="120" rx="6" fill="#faf5ff" stroke="#805ad5"/>
    <g transform="translate(10, 15)">
      <text x="0" y="0" font-size="8" font-weight="600" fill="#6b46c1">If compromised:</text>
      <text x="0" y="18" font-size="8" fill="#4a5568">What would be at</text>
      <text x="0" y="32" font-size="8" fill="#4a5568">risk?</text>

      <text x="0" y="55" font-size="8" font-weight="600" fill="#6b46c1">Consider:</text>
      <text x="0" y="73" font-size="8" fill="#4a5568">- Software integrity</text>
      <text x="0" y="87" font-size="8" fill="#4a5568">- Secrets/credentials</text>
      <text x="0" y="101" font-size="8" fill="#4a5568">- User data/trust</text>
    </g>
  </g>

  <!-- Step 5: Apply STRIDE -->
  <g transform="translate(610, 100)" filter="url(#shadow)">
    <rect x="0" y="0" width="135" height="200" rx="10" fill="#fff"/>
    <circle cx="67" cy="100" r="55" fill="url(#stepGrad5)"/>
    <text x="67" y="95" text-anchor="middle" font-size="36" font-weight="700" fill="#fff">5</text>
    <text x="67" y="120" text-anchor="middle" font-size="9" fill="#c6f6d5">STEP</text>

    <g transform="translate(10, 165)">
      <text x="57" y="0" text-anchor="middle" font-size="10" font-weight="600" fill="#276749">Apply STRIDE</text>
      <text x="57" y="14" text-anchor="middle" font-size="10" font-weight="600" fill="#276749">Framework</text>
    </g>
  </g>

  <!-- Step 5 Details -->
  <g transform="translate(610, 315)">
    <rect x="0" y="0" width="135" height="120" rx="6" fill="#f0fff4" stroke="#38a169"/>
    <g transform="translate(10, 15)">
      <text x="0" y="0" font-size="8" font-weight="600" fill="#276749">At each boundary:</text>
      <text x="0" y="18" font-size="8" fill="#4a5568">Apply STRIDE threats</text>
      <text x="0" y="32" font-size="8" fill="#4a5568">(see Section 4.2)</text>

      <text x="0" y="55" font-size="8" font-weight="600" fill="#276749">STRIDE:</text>
      <text x="0" y="73" font-size="8" fill="#4a5568">Spoofing, Tampering</text>
      <text x="0" y="87" font-size="8" fill="#4a5568">Repudiation, Info Disc</text>
      <text x="0" y="101" font-size="8" fill="#4a5568">DoS, Elev. Privilege</text>
    </g>
  </g>

  <!-- Outcome Arrow -->
  <g transform="translate(760, 100)">
    <path d="M 0 100 L 80 100" stroke="#1a365d" stroke-width="4" marker-end="url(#arrowGray)"/>
  </g>

  <!-- Outcome Box -->
  <g transform="translate(760, 150)" filter="url(#shadow)">
    <rect x="0" y="0" width="120" height="100" rx="8" fill="#1a365d"/>
    <text x="60" y="30" text-anchor="middle" font-size="11" font-weight="600" fill="#fff">Foundation</text>
    <text x="60" y="48" text-anchor="middle" font-size="11" font-weight="600" fill="#fff">for Deeper</text>
    <text x="60" y="66" text-anchor="middle" font-size="11" font-weight="600" fill="#fff">Analysis</text>
    <text x="60" y="88" text-anchor="middle" font-size="8" fill="#a0aec0">Expand from here</text>
  </g>

  <!-- Bottom callout -->
  <g transform="translate(50, 455)">
    <rect x="0" y="0" width="800" height="50" rx="6" fill="#ebf8ff" stroke="#3182ce" stroke-width="1"/>
    <text x="20" y="20" font-size="10" font-weight="600" fill="#2b6cb0">Key Principle:</text>
    <text x="110" y="20" font-size="10" fill="#2c5282">
      Start focused, then iterate. This initial exercise produces a foundation that can be expanded and refined.
    </text>
    <text x="20" y="38" font-size="10" fill="#2c5282">
      Subsequent sections provide frameworks for systematic threat enumeration, risk prioritization, and practical application.
    </text>
  </g>
</svg>