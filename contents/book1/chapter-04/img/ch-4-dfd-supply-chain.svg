<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 950 750" font-family="Libertinus Sans">
  <defs>
        <filter id="shadow" x="-10%" y="-10%" width="120%" height="130%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="2" result="blur"/>
      <feOffset in="blur" dx="1" dy="2" result="offsetBlur"/>
      <feFlood flood-color="#000000" flood-opacity="0.5" result="color"/>
      <feComposite in="color" in2="offsetBlur" operator="in" result="shadow"/>
      <feMerge>
        <feMergeNode in="shadow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <marker id="arrowBlue" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#3182ce"/>
    </marker>
    <marker id="arrowOrange" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#dd6b20"/>
    </marker>
    <marker id="arrowGreen" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#38a169"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="950" height="750" fill="#f7fafc"/>

  <!-- Title -->
  <text x="475" y="32" text-anchor="middle" font-size="20" font-weight="600" fill="#1a365d">
    Data Flow Diagram for Build and Deployment Pipeline
  </text>
  <text x="475" y="52" text-anchor="middle" font-size="12" fill="#718096">
    Supply chain DFD extending traditional application modeling to include build and deployment flows
  </text>

  <!-- Legend -->
  <g transform="translate(720, 70)">
    <rect x="0" y="0" width="210" height="175" rx="6" fill="#fff" filter="url(#shadow)"/>
    <text x="105" y="20" text-anchor="middle" font-size="10" font-weight="600" fill="#2d3748">DFD Element Legend</text>
    <line x1="15" y1="30" x2="195" y2="30" stroke="#e2e8f0"/>

    <!-- External Entity -->
    <rect x="15" y="40" width="40" height="25" rx="0" fill="#fed7d7" stroke="#c53030"/>
    <text x="65" y="55" font-size="8" fill="#4a5568">External Entity (Untrusted)</text>

    <!-- Process -->
    <circle cx="35" cy="82" r="15" fill="#ebf8ff" stroke="#3182ce"/>
    <text x="65" y="85" font-size="8" fill="#4a5568">Process</text>

    <!-- Data Store -->
    <g transform="translate(15, 105)">
      <line x1="0" y1="0" x2="40" y2="0" stroke="#38a169" stroke-width="2"/>
      <line x1="0" y1="20" x2="40" y2="20" stroke="#38a169" stroke-width="2"/>
      <text x="20" y="15" text-anchor="middle" font-size="7" fill="#276749">D1</text>
    </g>
    <text x="65" y="120" font-size="8" fill="#4a5568">Data Store</text>

    <!-- Trust Boundary -->
    <line x1="15" y1="140" x2="55" y2="140" stroke="#805ad5" stroke-width="2" stroke-dasharray="5,3"/>
    <text x="65" y="143" font-size="8" fill="#4a5568">Trust Boundary</text>

    <!-- Verification Point -->
    <rect x="20" y="155" width="25" height="12" rx="2" fill="#48bb78"/>
    <text x="33" y="164" text-anchor="middle" font-size="6" fill="#fff">VER</text>
    <text x="65" y="165" font-size="8" fill="#4a5568">Verification Point</text>
  </g>

  <!-- Main DFD Area -->
  <!-- External Trust Boundary -->
  <rect x="30" y="85" width="680" height="640" rx="10" fill="none" stroke="#805ad5" stroke-width="3" stroke-dasharray="10,5"/>
  <text x="50" y="105" font-size="10" font-weight="600" fill="#805ad5">EXTERNAL TRUST BOUNDARY</text>

  <!-- Internal Trust Boundary (Build/Deploy) -->
  <rect x="220" y="250" width="470" height="350" rx="8" fill="none" stroke="#3182ce" stroke-width="2" stroke-dasharray="8,4"/>
  <text x="240" y="270" font-size="9" font-weight="600" fill="#3182ce">BUILD AND DEPLOYMENT ENVIRONMENT</text>

  <!-- External Entity 1: Package Registries -->
  <g transform="translate(50, 130)">
    <rect x="0" y="0" width="130" height="80" rx="0" fill="#fed7d7" stroke="#c53030" stroke-width="2" filter="url(#shadow)"/>
    <text x="65" y="25" text-anchor="middle" font-size="10" font-weight="600" fill="#9b2c2c">Package Registries</text>
    <text x="65" y="42" text-anchor="middle" font-size="8" fill="#742a2a">npm, PyPI, Maven</text>
    <text x="65" y="58" text-anchor="middle" font-size="8" fill="#742a2a">Crates, NuGet</text>
    <rect x="5" y="62" width="120" height="12" rx="2" fill="#9b2c2c"/>
    <text x="65" y="72" text-anchor="middle" font-size="7" fill="#fff">EXTERNAL | UNTRUSTED</text>
  </g>

  <!-- External Entity 2: Source Repository -->
  <g transform="translate(50, 350)">
    <rect x="0" y="0" width="130" height="70" rx="0" fill="#feebc8" stroke="#dd6b20" stroke-width="2" filter="url(#shadow)"/>
    <text x="65" y="25" text-anchor="middle" font-size="10" font-weight="600" fill="#c05621">Source Repository</text>
    <text x="65" y="42" text-anchor="middle" font-size="8" fill="#975a16">GitHub, GitLab</text>
    <rect x="5" y="50" width="120" height="12" rx="2" fill="#c05621"/>
    <text x="65" y="60" text-anchor="middle" font-size="7" fill="#fff">PARTNER | MEDIUM TRUST</text>
  </g>

  <!-- External Entity 3: Container Registry -->
  <g transform="translate(50, 530)">
    <rect x="0" y="0" width="130" height="70" rx="0" fill="#feebc8" stroke="#dd6b20" stroke-width="2" filter="url(#shadow)"/>
    <text x="65" y="25" text-anchor="middle" font-size="10" font-weight="600" fill="#c05621">Container Registry</text>
    <text x="65" y="42" text-anchor="middle" font-size="8" fill="#975a16">DockerHub, ECR, GCR</text>
    <rect x="5" y="50" width="120" height="12" rx="2" fill="#c05621"/>
    <text x="65" y="60" text-anchor="middle" font-size="7" fill="#fff">PARTNER | MEDIUM TRUST</text>
  </g>

  <!-- Process 1: Dependency Resolution -->
  <g transform="translate(250, 130)">
    <circle cx="50" cy="45" r="45" fill="#ebf8ff" stroke="#3182ce" stroke-width="2" filter="url(#shadow)"/>
    <text x="50" y="38" text-anchor="middle" font-size="9" font-weight="600" fill="#2b6cb0">Dependency</text>
    <text x="50" y="52" text-anchor="middle" font-size="9" font-weight="600" fill="#2b6cb0">Resolution</text>
    <text x="50" y="70" text-anchor="middle" font-size="7" fill="#4a5568">P1</text>
  </g>

  <!-- Data flow: Registry to Dependency Resolution -->
  <line x1="180" y1="170" x2="205" y2="170" stroke="#3182ce" stroke-width="2" marker-end="url(#arrowBlue)"/>
  <text x="192" y="162" text-anchor="middle" font-size="7" fill="#3182ce">packages</text>

  <!-- Verification Point after Dep Resolution -->
  <g transform="translate(345, 155)">
    <rect x="0" y="0" width="50" height="25" rx="4" fill="#48bb78"/>
    <text x="25" y="10" text-anchor="middle" font-size="6" font-weight="600" fill="#fff">VERIFY</text>
    <text x="25" y="19" text-anchor="middle" font-size="5" fill="#c6f6d5">Checksums</text>
  </g>

  <!-- Process 2: Build Environment -->
  <g transform="translate(420, 300)">
    <circle cx="55" cy="55" r="55" fill="#faf5ff" stroke="#805ad5" stroke-width="2" filter="url(#shadow)"/>
    <text x="55" y="40" text-anchor="middle" font-size="9" font-weight="600" fill="#6b46c1">Build</text>
    <text x="55" y="55" text-anchor="middle" font-size="9" font-weight="600" fill="#6b46c1">Environment</text>
    <text x="55" y="70" text-anchor="middle" font-size="7" fill="#4a5568">CI/CD, Compilers</text>
    <text x="55" y="85" text-anchor="middle" font-size="7" fill="#805ad5">P2</text>
  </g>

  <!-- Data flow: Dependency Resolution to Build -->
  <path d="M 345 175 Q 400 200 420 290" stroke="#3182ce" stroke-width="2" fill="none" marker-end="url(#arrowBlue)"/>
  <text x="400" y="230" font-size="7" fill="#3182ce">resolved deps</text>

  <!-- Data flow: Source to Build -->
  <line x1="180" y1="385" x2="415" y2="350" stroke="#dd6b20" stroke-width="2" marker-end="url(#arrowOrange)"/>
  <text x="290" y="358" font-size="7" fill="#dd6b20">source code</text>

  <!-- Data Store: Secrets -->
  <g transform="translate(580, 290)">
    <rect x="0" y="0" width="90" height="35" fill="#fff5f5" stroke="#c53030" stroke-width="2"/>
    <line x1="0" y1="0" x2="90" y2="0" stroke="#c53030" stroke-width="3"/>
    <text x="45" y="15" text-anchor="middle" font-size="8" font-weight="600" fill="#c53030">Secrets</text>
    <text x="45" y="28" text-anchor="middle" font-size="7" fill="#742a2a">D1</text>
  </g>

  <!-- Data flow: Secrets to Build -->
  <line x1="580" y1="307" x2="530" y2="335" stroke="#c53030" stroke-width="1.5"/>
  <text x="560" y="318" font-size="6" fill="#c53030">credentials</text>

  <!-- Verification Point: Build integrity -->
  <g transform="translate(485, 400)">
    <rect x="0" y="0" width="60" height="25" rx="4" fill="#48bb78"/>
    <text x="30" y="10" text-anchor="middle" font-size="6" font-weight="600" fill="#fff">VERIFY</text>
    <text x="30" y="19" text-anchor="middle" font-size="5" fill="#c6f6d5">SLSA Provenance</text>
  </g>

  <!-- Data Store: Artifact Storage -->
  <g transform="translate(400, 470)">
    <rect x="0" y="0" width="110" height="45" fill="#f0fff4" stroke="#38a169" stroke-width="2"/>
    <line x1="0" y1="0" x2="110" y2="0" stroke="#38a169" stroke-width="3"/>
    <text x="55" y="18" text-anchor="middle" font-size="9" font-weight="600" fill="#276749">Artifact Storage</text>
    <text x="55" y="32" text-anchor="middle" font-size="7" fill="#22543d">Signed Binaries</text>
    <text x="55" y="42" text-anchor="middle" font-size="7" fill="#38a169">D2</text>
  </g>

  <!-- Data flow: Build to Artifact Storage -->
  <line x1="475" y1="410" x2="455" y2="465" stroke="#38a169" stroke-width="2" marker-end="url(#arrowGreen)"/>
  <text x="480" y="445" font-size="7" fill="#38a169">artifacts</text>

  <!-- Process 3: Deployment Pipeline -->
  <g transform="translate(560, 520)">
    <circle cx="50" cy="50" r="50" fill="#f0fff4" stroke="#38a169" stroke-width="2" filter="url(#shadow)"/>
    <text x="50" y="40" text-anchor="middle" font-size="9" font-weight="600" fill="#276749">Deployment</text>
    <text x="50" y="55" text-anchor="middle" font-size="9" font-weight="600" fill="#276749">Pipeline</text>
    <text x="50" y="75" text-anchor="middle" font-size="7" fill="#38a169">P3</text>
  </g>

  <!-- Data flow: Artifact Storage to Deployment -->
  <line x1="510" y1="495" x2="555" y2="525" stroke="#38a169" stroke-width="2" marker-end="url(#arrowGreen)"/>
  <text x="540" y="503" font-size="7" fill="#38a169">verified artifacts</text>

  <!-- Data flow: Container Registry to Deployment -->
  <line x1="180" y1="565" x2="510" y2="565" stroke="#dd6b20" stroke-width="2" marker-end="url(#arrowOrange)"/>
  <text x="345" y="557" font-size="7" fill="#dd6b20">base images</text>

  <!-- Verification Point: Deployment -->
  <g transform="translate(640, 580)">
    <rect x="0" y="0" width="60" height="25" rx="4" fill="#48bb78"/>
    <text x="30" y="10" text-anchor="middle" font-size="6" font-weight="600" fill="#fff">VERIFY</text>
    <text x="30" y="19" text-anchor="middle" font-size="5" fill="#c6f6d5">Signatures</text>
  </g>

  <!-- External Entity: Production Environment -->
  <g transform="translate(560, 640)">
    <rect x="0" y="0" width="130" height="70" rx="0" fill="#c6f6d5" stroke="#38a169" stroke-width="2" filter="url(#shadow)"/>
    <text x="65" y="25" text-anchor="middle" font-size="10" font-weight="600" fill="#276749">Production</text>
    <text x="65" y="42" text-anchor="middle" font-size="10" font-weight="600" fill="#276749">Environment</text>
    <rect x="5" y="50" width="120" height="12" rx="2" fill="#38a169"/>
    <text x="65" y="60" text-anchor="middle" font-size="7" fill="#fff">INTERNAL | HIGH TRUST</text>
  </g>

  <!-- Data flow: Deployment to Production -->
  <line x1="610" y1="620" x2="625" y2="635" stroke="#38a169" stroke-width="2" marker-end="url(#arrowGreen)"/>
  <text x="650" y="630" font-size="7" fill="#38a169">deploy</text>

  <!-- Annotation Panel -->
  <g transform="translate(720, 260)">
    <rect x="0" y="0" width="210" height="290" rx="6" fill="#fffbeb" stroke="#d97706" stroke-width="1"/>
    <text x="105" y="22" text-anchor="middle" font-size="10" font-weight="600" fill="#92400e">DFD Annotations</text>
    <line x1="15" y1="32" x2="195" y2="32" stroke="#d97706" stroke-opacity="0.5"/>

    <g transform="translate(15, 45)">
      <text x="0" y="0" font-size="8" font-weight="600" fill="#78350f">Each element should note:</text>

      <rect x="0" y="15" width="180" height="50" rx="4" fill="#fff"/>
      <text x="10" y="30" font-size="7" fill="#4a5568">1. Trust level applied</text>
      <text x="10" y="42" font-size="7" fill="#718096">(internal, partner, external, untrusted)</text>
      <text x="10" y="56" font-size="7" fill="#4a5568">2. Data crossing boundaries</text>

      <rect x="0" y="75" width="180" height="50" rx="4" fill="#fff"/>
      <text x="10" y="90" font-size="7" fill="#4a5568">3. Credentials/secrets accessed</text>
      <text x="10" y="102" font-size="7" fill="#718096">(signing keys, tokens, API keys)</text>
      <text x="10" y="114" font-size="7" fill="#4a5568">4. Verification at boundaries</text>

      <line x1="0" y1="140" x2="180" y2="140" stroke="#d97706" stroke-opacity="0.3"/>

      <text x="0" y="158" font-size="8" font-weight="600" fill="#92400e">Supply Chain Extension:</text>
      <text x="0" y="175" font-size="7" fill="#78350f">Traditional DFDs focus on runtime.</text>
      <text x="0" y="190" font-size="7" fill="#78350f">Supply chain DFDs must include:</text>
      <text x="0" y="210" font-size="7" fill="#4a5568">- External package sources</text>
      <text x="0" y="225" font-size="7" fill="#4a5568">- Dependency resolution process</text>
      <text x="0" y="240" font-size="7" fill="#4a5568">- Build environment details</text>
      <text x="0" y="255" font-size="7" fill="#4a5568">- Artifact storage and flow</text>
      <text x="0" y="270" font-size="7" fill="#4a5568">- Deployment pipeline</text>
    </g>
  </g>

  <!-- Resource Reference -->
  <g transform="translate(720, 560)">
    <rect x="0" y="0" width="210" height="70" rx="6" fill="#ebf8ff" stroke="#3182ce"/>
    <text x="105" y="18" text-anchor="middle" font-size="9" font-weight="600" fill="#2b6cb0">Resources</text>
    <text x="15" y="38" font-size="7" fill="#2c5282">Microsoft SDL threat modeling guide</text>
    <text x="15" y="52" font-size="7" fill="#2c5282">OWASP threat modeling resources</text>
    <text x="15" y="65" font-size="7" fill="#2c5282">SLSA framework documentation</text>
  </g>
</svg>