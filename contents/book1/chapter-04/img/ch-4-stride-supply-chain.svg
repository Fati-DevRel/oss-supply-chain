<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 950 700" font-family="Libertinus Sans">
  <defs>
        <filter id="shadow" x="-10%" y="-10%" width="120%" height="130%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="2" result="blur"/>
      <feOffset in="blur" dx="1" dy="2" result="offsetBlur"/>
      <feFlood flood-color="#000000" flood-opacity="0.5" result="color"/>
      <feComposite in="color" in2="offsetBlur" operator="in" result="shadow"/>
      <feMerge>
        <feMergeNode in="shadow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="950" height="700" fill="#f7fafc"/>

  <!-- Title -->
  <text x="475" y="35" text-anchor="middle" font-size="20" font-weight="600" fill="#1a365d">
    STRIDE Threat Model for Software Supply Chain
  </text>
  <text x="475" y="55" text-anchor="middle" font-size="12" fill="#718096">
    Adapting Microsoft's framework to supply chain attack scenarios
  </text>

  <!-- STRIDE Letters across top -->
  <g transform="translate(50, 80)">
    <rect x="0" y="0" width="140" height="40" rx="6" fill="#e53e3e"/>
    <text x="70" y="26" text-anchor="middle" font-size="16" font-weight="700" fill="#fff">S</text>
  </g>
  <g transform="translate(200, 80)">
    <rect x="0" y="0" width="140" height="40" rx="6" fill="#dd6b20"/>
    <text x="70" y="26" text-anchor="middle" font-size="16" font-weight="700" fill="#fff">T</text>
  </g>
  <g transform="translate(350, 80)">
    <rect x="0" y="0" width="140" height="40" rx="6" fill="#d69e2e"/>
    <text x="70" y="26" text-anchor="middle" font-size="16" font-weight="700" fill="#fff">R</text>
  </g>
  <g transform="translate(500, 80)">
    <rect x="0" y="0" width="140" height="40" rx="6" fill="#38a169"/>
    <text x="70" y="26" text-anchor="middle" font-size="16" font-weight="700" fill="#fff">I</text>
  </g>
  <g transform="translate(650, 80)">
    <rect x="0" y="0" width="140" height="40" rx="6" fill="#3182ce"/>
    <text x="70" y="26" text-anchor="middle" font-size="16" font-weight="700" fill="#fff">D</text>
  </g>
  <g transform="translate(800, 80)">
    <rect x="0" y="0" width="140" height="40" rx="6" fill="#805ad5"/>
    <text x="70" y="26" text-anchor="middle" font-size="16" font-weight="700" fill="#fff">E</text>
  </g>

  <!-- Card Row -->
  <!-- Spoofing -->
  <g transform="translate(50, 135)" filter="url(#shadow)">
    <rect x="0" y="0" width="140" height="250" rx="8" fill="#fff"/>
    <rect x="0" y="0" width="140" height="35" rx="8" fill="#e53e3e"/>
    <rect x="0" y="27" width="140" height="8" fill="#e53e3e"/>
    <text x="70" y="24" text-anchor="middle" font-size="11" font-weight="600" fill="#fff">Spoofing</text>

    <g transform="translate(8, 45)">
      <text x="0" y="0" font-size="8" font-weight="600" fill="#2d3748">Definition:</text>
      <text x="0" y="12" font-size="7.5" fill="#4a5568">Impersonating another</text>
      <text x="0" y="22" font-size="7.5" fill="#4a5568">entity or package</text>

      <text x="0" y="42" font-size="8" font-weight="600" fill="#2d3748">Supply Chain:</text>
      <text x="0" y="54" font-size="7.5" fill="#4a5568">- Typosquatting</text>
      <text x="0" y="66" font-size="7.5" fill="#4a5568">- Brandjacking</text>
      <text x="0" y="78" font-size="7.5" fill="#4a5568">- Account takeover</text>
      <text x="0" y="90" font-size="7.5" fill="#4a5568">- Fake contributors</text>

      <text x="0" y="110" font-size="8" font-weight="600" fill="#2d3748">Defenses:</text>
      <text x="0" y="122" font-size="7.5" fill="#276749">MFA, signing, name</text>
      <text x="0" y="134" font-size="7.5" fill="#276749">reservation, verification</text>

      <text x="0" y="154" font-size="8" font-weight="600" fill="#2d3748">Example:</text>
      <text x="0" y="166" font-size="7" fill="#718096">colors.js/colours.js</text>
      <text x="0" y="178" font-size="7" fill="#718096">Dep. confusion</text>
    </g>
  </g>

  <!-- Tampering -->
  <g transform="translate(200, 135)" filter="url(#shadow)">
    <rect x="0" y="0" width="140" height="250" rx="8" fill="#fff"/>
    <rect x="0" y="0" width="140" height="35" rx="8" fill="#dd6b20"/>
    <rect x="0" y="27" width="140" height="8" fill="#dd6b20"/>
    <text x="70" y="24" text-anchor="middle" font-size="11" font-weight="600" fill="#fff">Tampering</text>

    <g transform="translate(8, 45)">
      <text x="0" y="0" font-size="8" font-weight="600" fill="#2d3748">Definition:</text>
      <text x="0" y="12" font-size="7.5" fill="#4a5568">Unauthorized mod</text>
      <text x="0" y="22" font-size="7.5" fill="#4a5568">of code/config</text>

      <text x="0" y="42" font-size="8" font-weight="600" fill="#2d3748">Supply Chain:</text>
      <text x="0" y="54" font-size="7.5" fill="#4a5568">- Malicious commits</text>
      <text x="0" y="66" font-size="7.5" fill="#4a5568">- Build tampering</text>
      <text x="0" y="78" font-size="7.5" fill="#4a5568">- Registry modification</text>
      <text x="0" y="90" font-size="7.5" fill="#4a5568">- CDN compromise</text>

      <text x="0" y="110" font-size="8" font-weight="600" fill="#2d3748">Defenses:</text>
      <text x="0" y="122" font-size="7.5" fill="#276749">Code signing, SRI,</text>
      <text x="0" y="134" font-size="7.5" fill="#276749">provenance, review</text>

      <text x="0" y="154" font-size="8" font-weight="600" fill="#2d3748">Example:</text>
      <text x="0" y="166" font-size="7" fill="#c53030">SolarWinds build</text>
      <text x="0" y="178" font-size="7" fill="#c53030">injection</text>
    </g>
  </g>

  <!-- Repudiation -->
  <g transform="translate(350, 135)" filter="url(#shadow)">
    <rect x="0" y="0" width="140" height="250" rx="8" fill="#fff"/>
    <rect x="0" y="0" width="140" height="35" rx="8" fill="#d69e2e"/>
    <rect x="0" y="27" width="140" height="8" fill="#d69e2e"/>
    <text x="70" y="24" text-anchor="middle" font-size="11" font-weight="600" fill="#fff">Repudiation</text>

    <g transform="translate(8, 45)">
      <text x="0" y="0" font-size="8" font-weight="600" fill="#2d3748">Definition:</text>
      <text x="0" y="12" font-size="7.5" fill="#4a5568">Denying actions</text>
      <text x="0" y="22" font-size="7.5" fill="#4a5568">without proof</text>

      <text x="0" y="42" font-size="8" font-weight="600" fill="#2d3748">Supply Chain:</text>
      <text x="0" y="54" font-size="7.5" fill="#4a5568">- Unsigned packages</text>
      <text x="0" y="66" font-size="7.5" fill="#4a5568">- Missing audit logs</text>
      <text x="0" y="78" font-size="7.5" fill="#4a5568">- No provenance</text>
      <text x="0" y="90" font-size="7.5" fill="#4a5568">- Anon contributions</text>

      <text x="0" y="110" font-size="8" font-weight="600" fill="#2d3748">Defenses:</text>
      <text x="0" y="122" font-size="7.5" fill="#276749">Signed commits,</text>
      <text x="0" y="134" font-size="7.5" fill="#276749">SLSA provenance</text>

      <text x="0" y="154" font-size="8" font-weight="600" fill="#2d3748">Example:</text>
      <text x="0" y="166" font-size="7" fill="#718096">Maintainer changes</text>
      <text x="0" y="178" font-size="7" fill="#718096">without attribution</text>
    </g>
  </g>

  <!-- Information Disclosure -->
  <g transform="translate(500, 135)" filter="url(#shadow)">
    <rect x="0" y="0" width="140" height="250" rx="8" fill="#fff"/>
    <rect x="0" y="0" width="140" height="35" rx="8" fill="#38a169"/>
    <rect x="0" y="27" width="140" height="8" fill="#38a169"/>
    <text x="70" y="24" text-anchor="middle" font-size="11" font-weight="600" fill="#fff">Info Disclosure</text>

    <g transform="translate(8, 45)">
      <text x="0" y="0" font-size="8" font-weight="600" fill="#2d3748">Definition:</text>
      <text x="0" y="12" font-size="7.5" fill="#4a5568">Exposing sensitive</text>
      <text x="0" y="22" font-size="7.5" fill="#4a5568">information</text>

      <text x="0" y="42" font-size="8" font-weight="600" fill="#2d3748">Supply Chain:</text>
      <text x="0" y="54" font-size="7.5" fill="#4a5568">- Secret exfiltration</text>
      <text x="0" y="66" font-size="7.5" fill="#4a5568">- Source code theft</text>
      <text x="0" y="78" font-size="7.5" fill="#4a5568">- Build log leaks</text>
      <text x="0" y="90" font-size="7.5" fill="#4a5568">- Env var exposure</text>

      <text x="0" y="110" font-size="8" font-weight="600" fill="#2d3748">Defenses:</text>
      <text x="0" y="122" font-size="7.5" fill="#276749">Secret scanning,</text>
      <text x="0" y="134" font-size="7.5" fill="#276749">least privilege</text>

      <text x="0" y="154" font-size="8" font-weight="600" fill="#2d3748">Example:</text>
      <text x="0" y="166" font-size="7" fill="#c53030">Codecov script</text>
      <text x="0" y="178" font-size="7" fill="#c53030">exfiltrating secrets</text>
    </g>
  </g>

  <!-- Denial of Service -->
  <g transform="translate(650, 135)" filter="url(#shadow)">
    <rect x="0" y="0" width="140" height="250" rx="8" fill="#fff"/>
    <rect x="0" y="0" width="140" height="35" rx="8" fill="#3182ce"/>
    <rect x="0" y="27" width="140" height="8" fill="#3182ce"/>
    <text x="70" y="24" text-anchor="middle" font-size="11" font-weight="600" fill="#fff">DoS</text>

    <g transform="translate(8, 45)">
      <text x="0" y="0" font-size="8" font-weight="600" fill="#2d3748">Definition:</text>
      <text x="0" y="12" font-size="7.5" fill="#4a5568">Making systems</text>
      <text x="0" y="22" font-size="7.5" fill="#4a5568">unavailable</text>

      <text x="0" y="42" font-size="8" font-weight="600" fill="#2d3748">Supply Chain:</text>
      <text x="0" y="54" font-size="7.5" fill="#4a5568">- Registry outages</text>
      <text x="0" y="66" font-size="7.5" fill="#4a5568">- Package deletion</text>
      <text x="0" y="78" font-size="7.5" fill="#4a5568">- Intentional breakage</text>
      <text x="0" y="90" font-size="7.5" fill="#4a5568">- Build resource abuse</text>

      <text x="0" y="110" font-size="8" font-weight="600" fill="#2d3748">Defenses:</text>
      <text x="0" y="122" font-size="7.5" fill="#276749">Caching, mirrors,</text>
      <text x="0" y="134" font-size="7.5" fill="#276749">version pinning</text>

      <text x="0" y="154" font-size="8" font-weight="600" fill="#2d3748">Example:</text>
      <text x="0" y="166" font-size="7" fill="#718096">left-pad removal,</text>
      <text x="0" y="178" font-size="7" fill="#718096">colors.js sabotage</text>
    </g>
  </g>

  <!-- Elevation of Privilege -->
  <g transform="translate(800, 135)" filter="url(#shadow)">
    <rect x="0" y="0" width="140" height="250" rx="8" fill="#fff"/>
    <rect x="0" y="0" width="140" height="35" rx="8" fill="#805ad5"/>
    <rect x="0" y="27" width="140" height="8" fill="#805ad5"/>
    <text x="70" y="24" text-anchor="middle" font-size="11" font-weight="600" fill="#fff">Elev. Privilege</text>

    <g transform="translate(8, 45)">
      <text x="0" y="0" font-size="8" font-weight="600" fill="#2d3748">Definition:</text>
      <text x="0" y="12" font-size="7.5" fill="#4a5568">Gaining unauthorized</text>
      <text x="0" y="22" font-size="7.5" fill="#4a5568">access/capabilities</text>

      <text x="0" y="42" font-size="8" font-weight="600" fill="#2d3748">Supply Chain:</text>
      <text x="0" y="54" font-size="7.5" fill="#4a5568">- RCE via packages</text>
      <text x="0" y="66" font-size="7.5" fill="#4a5568">- Build script abuse</text>
      <text x="0" y="78" font-size="7.5" fill="#4a5568">- Container escapes</text>
      <text x="0" y="90" font-size="7.5" fill="#4a5568">- CI/CD hijacking</text>

      <text x="0" y="110" font-size="8" font-weight="600" fill="#2d3748">Defenses:</text>
      <text x="0" y="122" font-size="7.5" fill="#276749">Sandboxing, least</text>
      <text x="0" y="134" font-size="7.5" fill="#276749">privilege builds</text>

      <text x="0" y="154" font-size="8" font-weight="600" fill="#2d3748">Example:</text>
      <text x="0" y="166" font-size="7" fill="#c53030">XZ Utils backdoor</text>
      <text x="0" y="178" font-size="7" fill="#c53030">targeting SSH</text>
    </g>
  </g>

  <!-- Security Property Mapping -->
  <g transform="translate(50, 405)">
    <rect x="0" y="0" width="850" height="125" rx="8" fill="#fff" filter="url(#shadow)"/>
    <text x="425" y="25" text-anchor="middle" font-size="13" font-weight="600" fill="#2d3748">STRIDE Threat to Security Property Mapping</text>
    <line x1="30" y1="35" x2="820" y2="35" stroke="#e2e8f0"/>

    <!-- Headers -->
    <text x="80" y="55" text-anchor="middle" font-size="10" font-weight="600" fill="#2d3748">Threat</text>
    <text x="220" y="55" text-anchor="middle" font-size="10" font-weight="600" fill="#2d3748">Violated Property</text>
    <text x="430" y="55" text-anchor="middle" font-size="10" font-weight="600" fill="#2d3748">Key Question</text>
    <text x="700" y="55" text-anchor="middle" font-size="10" font-weight="600" fill="#2d3748">Supply Chain Focus</text>

    <!-- Data rows -->
    <g transform="translate(30, 65)">
      <rect x="0" y="0" width="60" height="15" rx="3" fill="#e53e3e"/>
      <text x="30" y="11" text-anchor="middle" font-size="8" fill="#fff">Spoofing</text>
      <text x="140" y="11" font-size="9" fill="#4a5568">Authentication</text>
      <text x="280" y="11" font-size="9" fill="#4a5568">Is this actually who they claim to be?</text>
      <text x="600" y="11" font-size="9" fill="#718096">Package, maintainer identity</text>
    </g>
    <g transform="translate(30, 85)">
      <rect x="0" y="0" width="60" height="15" rx="3" fill="#dd6b20"/>
      <text x="30" y="11" text-anchor="middle" font-size="8" fill="#fff">Tampering</text>
      <text x="140" y="11" font-size="9" fill="#4a5568">Integrity</text>
      <text x="280" y="11" font-size="9" fill="#4a5568">Has this been modified?</text>
      <text x="600" y="11" font-size="9" fill="#718096">Code, artifacts, builds</text>
    </g>
    <g transform="translate(30, 105)">
      <rect x="0" y="0" width="60" height="15" rx="3" fill="#d69e2e"/>
      <text x="30" y="11" text-anchor="middle" font-size="8" fill="#fff">Repudiation</text>
      <text x="140" y="11" font-size="9" fill="#4a5568">Non-repudiation</text>
      <text x="280" y="11" font-size="9" fill="#4a5568">Can we prove who did what?</text>
      <text x="600" y="11" font-size="9" fill="#718096">Commit/publish attribution</text>
    </g>
  </g>

  <!-- Continued mapping -->
  <g transform="translate(50, 545)">
    <rect x="0" y="0" width="850" height="85" rx="8" fill="#fff" filter="url(#shadow)"/>
    <g transform="translate(30, 15)">
      <rect x="0" y="0" width="60" height="15" rx="3" fill="#38a169"/>
      <text x="30" y="11" text-anchor="middle" font-size="8" fill="#fff">Info Disc</text>
      <text x="140" y="11" font-size="9" fill="#4a5568">Confidentiality</text>
      <text x="280" y="11" font-size="9" fill="#4a5568">Is sensitive data protected?</text>
      <text x="600" y="11" font-size="9" fill="#718096">Secrets, source code, configs</text>
    </g>
    <g transform="translate(30, 35)">
      <rect x="0" y="0" width="60" height="15" rx="3" fill="#3182ce"/>
      <text x="30" y="11" text-anchor="middle" font-size="8" fill="#fff">DoS</text>
      <text x="140" y="11" font-size="9" fill="#4a5568">Availability</text>
      <text x="280" y="11" font-size="9" fill="#4a5568">Can we access what we need?</text>
      <text x="600" y="11" font-size="9" fill="#718096">Registry, package, build infra</text>
    </g>
    <g transform="translate(30, 55)">
      <rect x="0" y="0" width="60" height="15" rx="3" fill="#805ad5"/>
      <text x="30" y="11" text-anchor="middle" font-size="8" fill="#fff">EoP</text>
      <text x="140" y="11" font-size="9" fill="#4a5568">Authorization</text>
      <text x="280" y="11" font-size="9" fill="#4a5568">Can they do what they're trying?</text>
      <text x="600" y="11" font-size="9" fill="#718096">Code execution context</text>
    </g>
  </g>

  <!-- Key Insight -->
  <g transform="translate(50, 645)">
    <rect x="0" y="0" width="850" height="40" rx="6" fill="#ebf8ff" stroke="#3182ce" stroke-width="1"/>
    <text x="30" y="25" font-size="10" font-weight="600" fill="#2b6cb0">Key Insight:</text>
    <text x="110" y="25" font-size="10" fill="#2c5282">
      Apply STRIDE to each trust boundary: source control, build system, registry, deployment. The most damaging attacks span multiple categories.
    </text>
  </g>
</svg>