<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 850 600" font-family="Libertinus Sans">
  <defs>
        <filter id="shadow" x="-10%" y="-10%" width="120%" height="130%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="2" result="blur"/>
      <feOffset in="blur" dx="1" dy="2" result="offsetBlur"/>
      <feFlood flood-color="#000000" flood-opacity="0.5" result="color"/>
      <feComposite in="color" in2="offsetBlur" operator="in" result="shadow"/>
      <feMerge>
        <feMergeNode in="shadow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <linearGradient id="shieldGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#2b6cb0"/>
      <stop offset="100%" style="stop-color:#1a365d"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="850" height="600" fill="#f7fafc"/>

  <!-- Title -->
  <text x="425" y="35" text-anchor="middle" font-size="20" font-weight="600" fill="#1a365d">
    Supply Chain Asset Categories
  </text>
  <text x="425" y="55" text-anchor="middle" font-size="12" fill="#718096">
    What are you protecting in supply chain threat modeling?
  </text>

  <!-- Central Shield/Hub -->
  <g transform="translate(345, 220)">
    <path d="M 80,0 L 160,30 L 160,90 C 160,140 80,170 80,170 C 80,170 0,140 0,90 L 0,30 Z"
          fill="url(#shieldGrad)" filter="url(#shadow)"/>
    <text x="80" y="70" text-anchor="middle" font-size="11" font-weight="600" fill="#fff">Protected</text>
    <text x="80" y="87" text-anchor="middle" font-size="11" font-weight="600" fill="#fff">Assets</text>
    <text x="80" y="110" text-anchor="middle" font-size="9" fill="#bee3f8">Supply Chain</text>
  </g>

  <!-- Asset 1: Software Integrity (Top, Primary) -->
  <g transform="translate(300, 70)" filter="url(#shadow)">
    <rect x="0" y="0" width="250" height="120" rx="8" fill="#fff"/>
    <rect x="0" y="0" width="250" height="35" rx="8" fill="#c53030"/>
    <rect x="0" y="27" width="250" height="8" fill="#c53030"/>
    <circle cx="25" cy="17" r="12" fill="#fff"/>
    <text x="25" y="22" text-anchor="middle" font-size="14" font-weight="700" fill="#c53030">1</text>
    <text x="140" y="23" text-anchor="middle" font-size="11" font-weight="600" fill="#fff">Integrity of Delivered Software</text>

    <g transform="translate(15, 45)">
      <text x="0" y="0" font-size="9" font-weight="600" fill="#c53030">PRIMARY ASSET</text>
      <text x="0" y="18" font-size="9" fill="#4a5568">Ensuring what you deploy matches</text>
      <text x="0" y="32" font-size="9" fill="#4a5568">what you intended to deploy</text>
      <text x="0" y="52" font-size="9" fill="#718096" font-style="italic">Threats: Backdoors, tampering, malicious code</text>
    </g>
  </g>
  <!-- Connector line to shield -->
  <line x1="425" y1="190" x2="425" y2="220" stroke="#c53030" stroke-width="2"/>

  <!-- Asset 2: Build/Deployment Secrets (Left) -->
  <g transform="translate(30, 175)" filter="url(#shadow)">
    <rect x="0" y="0" width="250" height="130" rx="8" fill="#fff"/>
    <rect x="0" y="0" width="250" height="35" rx="8" fill="#dd6b20"/>
    <rect x="0" y="27" width="250" height="8" fill="#dd6b20"/>
    <circle cx="25" cy="17" r="12" fill="#fff"/>
    <text x="25" y="22" text-anchor="middle" font-size="14" font-weight="700" fill="#dd6b20">2</text>
    <text x="140" y="23" text-anchor="middle" font-size="11" font-weight="600" fill="#fff">Build and Deployment Secrets</text>

    <g transform="translate(15, 45)">
      <text x="0" y="0" font-size="9" font-weight="600" fill="#dd6b20">HIGH VALUE TARGETS</text>
      <text x="0" y="18" font-size="9" fill="#4a5568">Credentials that enable supply chain</text>
      <text x="0" y="32" font-size="9" fill="#4a5568">attacks when compromised</text>
      <text x="0" y="52" font-size="9" fill="#718096">- Signing keys</text>
      <text x="0" y="66" font-size="9" fill="#718096">- Registry credentials</text>
      <text x="0" y="80" font-size="9" fill="#718096">- Cloud access tokens, CI/CD secrets</text>
    </g>
  </g>
  <!-- Connector line to shield -->
  <line x1="280" y1="240" x2="345" y2="280" stroke="#dd6b20" stroke-width="2"/>

  <!-- Asset 3: Developer Credentials (Left Bottom) -->
  <g transform="translate(30, 340)" filter="url(#shadow)">
    <rect x="0" y="0" width="250" height="130" rx="8" fill="#fff"/>
    <rect x="0" y="0" width="250" height="35" rx="8" fill="#805ad5"/>
    <rect x="0" y="27" width="250" height="8" fill="#805ad5"/>
    <circle cx="25" cy="17" r="12" fill="#fff"/>
    <text x="25" y="22" text-anchor="middle" font-size="14" font-weight="700" fill="#805ad5">3</text>
    <text x="140" y="23" text-anchor="middle" font-size="11" font-weight="600" fill="#fff">Developer Credentials</text>

    <g transform="translate(15, 45)">
      <text x="0" y="0" font-size="9" font-weight="600" fill="#805ad5">ENTRY POINTS</text>
      <text x="0" y="18" font-size="9" fill="#4a5568">Developer environments provide</text>
      <text x="0" y="32" font-size="9" fill="#4a5568">paths to supply chain compromise</text>
      <text x="0" y="52" font-size="9" fill="#718096">- Compromised dev machines</text>
      <text x="0" y="66" font-size="9" fill="#718096">- Credential phishing</text>
      <text x="0" y="80" font-size="9" fill="#718096">- Token-stealing packages</text>
    </g>
  </g>
  <!-- Connector line to shield -->
  <line x1="280" y1="370" x2="345" y2="330" stroke="#805ad5" stroke-width="2"/>

  <!-- Asset 4: Availability (Right) -->
  <g transform="translate(570, 175)" filter="url(#shadow)">
    <rect x="0" y="0" width="250" height="130" rx="8" fill="#fff"/>
    <rect x="0" y="0" width="250" height="35" rx="8" fill="#3182ce"/>
    <rect x="0" y="27" width="250" height="8" fill="#3182ce"/>
    <circle cx="25" cy="17" r="12" fill="#fff"/>
    <text x="25" y="22" text-anchor="middle" font-size="14" font-weight="700" fill="#3182ce">4</text>
    <text x="140" y="23" text-anchor="middle" font-size="11" font-weight="600" fill="#fff">Supply Chain Availability</text>

    <g transform="translate(15, 45)">
      <text x="0" y="0" font-size="9" font-weight="600" fill="#3182ce">OPERATIONAL CONTINUITY</text>
      <text x="0" y="18" font-size="9" fill="#4a5568">Ability to build, deploy, and</text>
      <text x="0" y="32" font-size="9" fill="#4a5568">operate when supply chain disrupted</text>
      <text x="0" y="52" font-size="9" fill="#718096">- Registry outages</text>
      <text x="0" y="66" font-size="9" fill="#718096">- Package removal (left-pad)</text>
      <text x="0" y="80" font-size="9" fill="#718096">- Build failures, CDN issues</text>
    </g>
  </g>
  <!-- Connector line to shield -->
  <line x1="570" y1="240" x2="505" y2="280" stroke="#3182ce" stroke-width="2"/>

  <!-- Asset 5: Reputation and Trust (Right Bottom) -->
  <g transform="translate(570, 340)" filter="url(#shadow)">
    <rect x="0" y="0" width="250" height="130" rx="8" fill="#fff"/>
    <rect x="0" y="0" width="250" height="35" rx="8" fill="#38a169"/>
    <rect x="0" y="27" width="250" height="8" fill="#38a169"/>
    <circle cx="25" cy="17" r="12" fill="#fff"/>
    <text x="25" y="22" text-anchor="middle" font-size="14" font-weight="700" fill="#38a169">5</text>
    <text x="140" y="23" text-anchor="middle" font-size="11" font-weight="600" fill="#fff">Reputation and Trust</text>

    <g transform="translate(15, 45)">
      <text x="0" y="0" font-size="9" font-weight="600" fill="#38a169">FOR SOFTWARE PUBLISHERS</text>
      <text x="0" y="18" font-size="9" fill="#4a5568">Trust with downstream users that</text>
      <text x="0" y="32" font-size="9" fill="#4a5568">may take years to rebuild if lost</text>
      <text x="0" y="52" font-size="9" fill="#718096">- Brand damage from compromise</text>
      <text x="0" y="66" font-size="9" fill="#718096">- User/customer trust erosion</text>
      <text x="0" y="80" font-size="9" fill="#718096">- Regulatory implications</text>
    </g>
  </g>
  <!-- Connector line to shield -->
  <line x1="570" y1="370" x2="505" y2="330" stroke="#38a169" stroke-width="2"/>

  <!-- Context Note -->
  <g transform="translate(100, 500)">
    <rect x="0" y="0" width="650" height="80" rx="6" fill="#fffbeb" stroke="#d97706" stroke-width="1"/>
    <text x="20" y="22" font-size="10" font-weight="600" fill="#92400e">Context Matters:</text>
    <text x="120" y="22" font-size="10" fill="#78350f">
      Not every organization faces the same asset exposure
    </text>
    <text x="20" y="45" font-size="9" fill="#78350f">
      A dev tool company publishing packages faces different risks than an enterprise consuming OSS internally.
    </text>
    <text x="20" y="62" font-size="9" fill="#78350f">
      Identify assets specific to your context to focus threat modeling on what matters most to you.
    </text>
  </g>
</svg>