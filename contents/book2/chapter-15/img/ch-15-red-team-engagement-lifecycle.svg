<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 600">
  <defs>
        <filter id="shadow" x="-10%" y="-10%" width="120%" height="130%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="2" result="blur"/>
      <feOffset in="blur" dx="1" dy="2" result="offsetBlur"/>
      <feFlood flood-color="#000000" flood-opacity="0.5" result="color"/>
      <feComposite in="color" in2="offsetBlur" operator="in" result="shadow"/>
      <feMerge>
        <feMergeNode in="shadow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <linearGradient id="phaseGrad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3B82F6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1D4ED8;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="phaseGrad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8B5CF6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#6D28D9;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="phaseGrad3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#EF4444;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#B91C1C;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="phaseGrad4" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#F59E0B;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#D97706;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="phaseGrad5" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#10B981;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#059669;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="900" height="600" fill="#F8FAFC"/>

  <!-- Title -->
  <text x="450" y="40" font-family="Libertinus Sans" font-size="24" font-weight="bold" fill="#1E293B" text-anchor="middle">Red Team Engagement Lifecycle</text>
  <text x="450" y="65" font-family="Libertinus Sans" font-size="14" fill="#64748B" text-anchor="middle">Supply Chain Security Assessment Phases</text>

  <!-- Circular flow arrows background -->
  <path d="M 450 300 m -180 0 a 180 180 0 1 1 360 0 a 180 180 0 1 1 -360 0"
        fill="none" stroke="#E2E8F0" stroke-width="40" stroke-dasharray="5,5"/>

  <!-- Phase 1: Scoping -->
  <g filter="url(#shadow)">
    <circle cx="450" cy="120" r="55" fill="url(#phaseGrad1)"/>
    <text x="450" y="115" font-family="Libertinus Sans" font-size="13" font-weight="bold" fill="white" text-anchor="middle">PHASE 1</text>
    <text x="450" y="132" font-family="Libertinus Sans" font-size="12" fill="white" text-anchor="middle">Scoping</text>
  </g>

  <!-- Phase 2: Reconnaissance -->
  <g filter="url(#shadow)">
    <circle cx="620" cy="220" r="55" fill="url(#phaseGrad2)"/>
    <text x="620" y="215" font-family="Libertinus Sans" font-size="13" font-weight="bold" fill="white" text-anchor="middle">PHASE 2</text>
    <text x="620" y="232" font-family="Libertinus Sans" font-size="11" fill="white" text-anchor="middle">Reconnaissance</text>
  </g>

  <!-- Phase 3: Exploitation -->
  <g filter="url(#shadow)">
    <circle cx="620" cy="380" r="55" fill="url(#phaseGrad3)"/>
    <text x="620" y="375" font-family="Libertinus Sans" font-size="13" font-weight="bold" fill="white" text-anchor="middle">PHASE 3</text>
    <text x="620" y="392" font-family="Libertinus Sans" font-size="11" fill="white" text-anchor="middle">Exploitation</text>
  </g>

  <!-- Phase 4: Post-Exploitation -->
  <g filter="url(#shadow)">
    <circle cx="450" cy="480" r="55" fill="url(#phaseGrad4)"/>
    <text x="450" y="470" font-family="Libertinus Sans" font-size="13" font-weight="bold" fill="white" text-anchor="middle">PHASE 4</text>
    <text x="450" y="487" font-family="Libertinus Sans" font-size="10" fill="white" text-anchor="middle">Post-</text>
    <text x="450" y="500" font-family="Libertinus Sans" font-size="10" fill="white" text-anchor="middle">Exploitation</text>
  </g>

  <!-- Phase 5: Reporting -->
  <g filter="url(#shadow)">
    <circle cx="280" cy="380" r="55" fill="url(#phaseGrad5)"/>
    <text x="280" y="375" font-family="Libertinus Sans" font-size="13" font-weight="bold" fill="white" text-anchor="middle">PHASE 5</text>
    <text x="280" y="392" font-family="Libertinus Sans" font-size="11" fill="white" text-anchor="middle">Reporting</text>
  </g>

  <!-- Connecting arrows -->
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#64748B"/>
    </marker>
  </defs>

  <!-- Arrow 1->2 -->
  <path d="M 495 145 Q 550 170 585 195" fill="none" stroke="#64748B" stroke-width="2" marker-end="url(#arrowhead)"/>
  <!-- Arrow 2->3 -->
  <path d="M 620 275 L 620 320" fill="none" stroke="#64748B" stroke-width="2" marker-end="url(#arrowhead)"/>
  <!-- Arrow 3->4 -->
  <path d="M 575 405 Q 520 440 495 455" fill="none" stroke="#64748B" stroke-width="2" marker-end="url(#arrowhead)"/>
  <!-- Arrow 4->5 -->
  <path d="M 405 455 Q 350 430 325 405" fill="none" stroke="#64748B" stroke-width="2" marker-end="url(#arrowhead)"/>

  <!-- Detail boxes -->
  <!-- Phase 1 details -->
  <g filter="url(#shadow)">
    <rect x="50" y="90" width="170" height="90" rx="8" fill="white" stroke="#3B82F6" stroke-width="2"/>
    <text x="135" y="112" font-family="Libertinus Sans" font-size="11" font-weight="bold" fill="#3B82F6" text-anchor="middle">Scoping Activities</text>
    <text x="60" y="130" font-family="Libertinus Sans" font-size="10" fill="#475569">- Define objectives</text>
    <text x="60" y="145" font-family="Libertinus Sans" font-size="10" fill="#475569">- Set rules of engagement</text>
    <text x="60" y="160" font-family="Libertinus Sans" font-size="10" fill="#475569">- Identify target systems</text>
    <text x="60" y="175" font-family="Libertinus Sans" font-size="10" fill="#475569">- Establish comms</text>
  </g>

  <!-- Phase 2 details -->
  <g filter="url(#shadow)">
    <rect x="700" y="165" width="180" height="105" rx="8" fill="white" stroke="#8B5CF6" stroke-width="2"/>
    <text x="790" y="187" font-family="Libertinus Sans" font-size="11" font-weight="bold" fill="#8B5CF6" text-anchor="middle">Reconnaissance</text>
    <text x="710" y="205" font-family="Libertinus Sans" font-size="10" fill="#475569">- Map dependencies</text>
    <text x="710" y="220" font-family="Libertinus Sans" font-size="10" fill="#475569">- Analyze build systems</text>
    <text x="710" y="235" font-family="Libertinus Sans" font-size="10" fill="#475569">- Review CI/CD configs</text>
    <text x="710" y="250" font-family="Libertinus Sans" font-size="10" fill="#475569">- Identify registries</text>
    <text x="710" y="265" font-family="Libertinus Sans" font-size="10" fill="#475569">- Find weak links</text>
  </g>

  <!-- Phase 3 details -->
  <g filter="url(#shadow)">
    <rect x="700" y="325" width="180" height="105" rx="8" fill="white" stroke="#EF4444" stroke-width="2"/>
    <text x="790" y="347" font-family="Libertinus Sans" font-size="11" font-weight="bold" fill="#EF4444" text-anchor="middle">Exploitation</text>
    <text x="710" y="365" font-family="Libertinus Sans" font-size="10" fill="#475569">- Dependency confusion</text>
    <text x="710" y="380" font-family="Libertinus Sans" font-size="10" fill="#475569">- Typosquatting attempts</text>
    <text x="710" y="395" font-family="Libertinus Sans" font-size="10" fill="#475569">- CI/CD pipeline attacks</text>
    <text x="710" y="410" font-family="Libertinus Sans" font-size="10" fill="#475569">- Build tampering</text>
    <text x="710" y="425" font-family="Libertinus Sans" font-size="10" fill="#475569">- Secret extraction</text>
  </g>

  <!-- Phase 4 details -->
  <g filter="url(#shadow)">
    <rect x="520" y="510" width="180" height="75" rx="8" fill="white" stroke="#F59E0B" stroke-width="2"/>
    <text x="610" y="532" font-family="Libertinus Sans" font-size="11" font-weight="bold" fill="#F59E0B" text-anchor="middle">Post-Exploitation</text>
    <text x="530" y="550" font-family="Libertinus Sans" font-size="10" fill="#475569">- Lateral movement</text>
    <text x="530" y="565" font-family="Libertinus Sans" font-size="10" fill="#475569">- Persistence mechanisms</text>
    <text x="530" y="580" font-family="Libertinus Sans" font-size="10" fill="#475569">- Impact demonstration</text>
  </g>

  <!-- Phase 5 details -->
  <g filter="url(#shadow)">
    <rect x="20" y="325" width="180" height="105" rx="8" fill="white" stroke="#10B981" stroke-width="2"/>
    <text x="110" y="347" font-family="Libertinus Sans" font-size="11" font-weight="bold" fill="#10B981" text-anchor="middle">Reporting</text>
    <text x="30" y="365" font-family="Libertinus Sans" font-size="10" fill="#475569">- Document findings</text>
    <text x="30" y="380" font-family="Libertinus Sans" font-size="10" fill="#475569">- Risk prioritization</text>
    <text x="30" y="395" font-family="Libertinus Sans" font-size="10" fill="#475569">- Remediation guidance</text>
    <text x="30" y="410" font-family="Libertinus Sans" font-size="10" fill="#475569">- Executive summary</text>
    <text x="30" y="425" font-family="Libertinus Sans" font-size="10" fill="#475569">- Lessons learned</text>
  </g>

  <!-- Feedback loop indicator -->
  <path d="M 280 325 Q 350 280 420 245 Q 440 235 450 175" fill="none" stroke="#94A3B8" stroke-width="1.5" stroke-dasharray="5,5"/>
  <text x="350" y="250" font-family="Libertinus Sans" font-size="9" fill="#94A3B8" font-style="italic">Continuous improvement</text>
</svg>
