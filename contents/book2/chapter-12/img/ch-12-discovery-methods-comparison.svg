<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 850 480" font-family="Libertinus Sans">
  <defs>
        <filter id="discShadow" x="-10%" y="-10%" width="120%" height="130%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="2" result="blur"/>
      <feOffset in="blur" dx="1" dy="2" result="offsetBlur"/>
      <feFlood flood-color="#000000" flood-opacity="0.5" result="color"/>
      <feComposite in="color" in2="offsetBlur" operator="in" result="shadow"/>
      <feMerge>
        <feMergeNode in="shadow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <linearGradient id="sourceGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1"/>
      <stop offset="100%" style="stop-color:#4f46e5"/>
    </linearGradient>
    <linearGradient id="buildGrad2" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#f59e0b"/>
      <stop offset="100%" style="stop-color:#d97706"/>
    </linearGradient>
    <linearGradient id="runtimeGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#10b981"/>
      <stop offset="100%" style="stop-color:#059669"/>
    </linearGradient>
  </defs>

  <!-- Title -->
  <text x="425" y="35" text-anchor="middle" font-size="20" font-weight="600" fill="#1e293b">Dependency Discovery Methods Comparison</text>
  <text x="425" y="55" text-anchor="middle" font-size="13" fill="#64748b">Different approaches for visibility into software components</text>

  <!-- Timeline bar -->
  <rect x="60" y="85" width="730" height="35" rx="6" fill="#f1f5f9" stroke="#e2e8f0" stroke-width="1"/>
  <text x="425" y="108" text-anchor="middle" font-size="12" font-weight="500" fill="#475569">Software Lifecycle Stages</text>

  <!-- Timeline markers -->
  <circle cx="150" cy="140" r="5" fill="#6366f1"/>
  <text x="150" y="160" text-anchor="middle" font-size="10" fill="#4f46e5" font-weight="500">Development</text>

  <circle cx="425" cy="140" r="5" fill="#f59e0b"/>
  <text x="425" y="160" text-anchor="middle" font-size="10" fill="#d97706" font-weight="500">Build/CI</text>

  <circle cx="700" cy="140" r="5" fill="#10b981"/>
  <text x="700" y="160" text-anchor="middle" font-size="10" fill="#059669" font-weight="500">Production</text>

  <line x1="155" y1="140" x2="420" y2="140" stroke="#e2e8f0" stroke-width="2"/>
  <line x1="430" y1="140" x2="695" y2="140" stroke="#e2e8f0" stroke-width="2"/>

  <!-- Source Scanning Card -->
  <g filter="url(#discShadow)">
    <rect x="60" y="185" width="230" height="280" rx="10" fill="white" stroke="#6366f1" stroke-width="2"/>
    <rect x="60" y="185" width="230" height="50" rx="10" fill="url(#sourceGrad)"/>
    <rect x="60" y="227" width="230" height="8" fill="url(#sourceGrad)"/>
    <text x="175" y="215" text-anchor="middle" font-size="15" font-weight="600" fill="white">Source Scanning</text>
  </g>

  <text x="80" y="265" font-size="11" font-weight="600" fill="#4338ca">Coverage:</text>
  <text x="150" y="265" font-size="11" fill="#334155">Declared dependencies</text>

  <text x="80" y="290" font-size="11" font-weight="600" fill="#4338ca">Accuracy:</text>
  <rect x="150" y="278" width="80" height="16" rx="3" fill="#fef3c7"/>
  <text x="190" y="290" text-anchor="middle" font-size="10" font-weight="500" fill="#92400e">Medium</text>

  <text x="80" y="315" font-size="11" font-weight="600" fill="#4338ca">Timing:</text>
  <text x="150" y="315" font-size="11" fill="#334155">Pre-deployment</text>

  <text x="80" y="340" font-size="11" font-weight="600" fill="#4338ca">Complexity:</text>
  <rect x="150" y="328" width="50" height="16" rx="3" fill="#d1fae5"/>
  <text x="175" y="340" text-anchor="middle" font-size="10" font-weight="500" fill="#047857">Low</text>

  <line x1="80" y1="360" x2="270" y2="360" stroke="#e2e8f0" stroke-width="1"/>
  <text x="80" y="380" font-size="10" fill="#64748b">Analyzes manifests:</text>
  <text x="80" y="395" font-size="9" font-family="Libertinus Mono" fill="#6366f1">package.json, pom.xml</text>
  <text x="80" y="410" font-size="9" font-family="Libertinus Mono" fill="#6366f1">requirements.txt</text>

  <rect x="80" y="425" width="190" height="25" rx="4" fill="#eef2ff"/>
  <text x="175" y="442" text-anchor="middle" font-size="10" fill="#4338ca">Early visibility, dev feedback</text>

  <!-- Build Analysis Card -->
  <g filter="url(#discShadow)">
    <rect x="310" y="185" width="230" height="280" rx="10" fill="white" stroke="#f59e0b" stroke-width="2"/>
    <rect x="310" y="185" width="230" height="50" rx="10" fill="url(#buildGrad2)"/>
    <rect x="310" y="227" width="230" height="8" fill="url(#buildGrad2)"/>
    <text x="425" y="215" text-anchor="middle" font-size="15" font-weight="600" fill="white">Build Analysis</text>
  </g>

  <text x="330" y="265" font-size="11" font-weight="600" fill="#92400e">Coverage:</text>
  <text x="400" y="265" font-size="11" fill="#334155">Built dependencies</text>

  <text x="330" y="290" font-size="11" font-weight="600" fill="#92400e">Accuracy:</text>
  <rect x="400" y="278" width="50" height="16" rx="3" fill="#dbeafe"/>
  <text x="425" y="290" text-anchor="middle" font-size="10" font-weight="500" fill="#1d4ed8">High</text>

  <text x="330" y="315" font-size="11" font-weight="600" fill="#92400e">Timing:</text>
  <text x="400" y="315" font-size="11" fill="#334155">Build time</text>

  <text x="330" y="340" font-size="11" font-weight="600" fill="#92400e">Complexity:</text>
  <rect x="400" y="328" width="60" height="16" rx="3" fill="#fef3c7"/>
  <text x="430" y="340" text-anchor="middle" font-size="10" font-weight="500" fill="#92400e">Medium</text>

  <line x1="330" y1="360" x2="520" y2="360" stroke="#e2e8f0" stroke-width="1"/>
  <text x="330" y="380" font-size="10" fill="#64748b">Hooks into build systems:</text>
  <text x="330" y="395" font-size="9" font-family="Libertinus Mono" fill="#f59e0b">Maven, Gradle, webpack</text>
  <text x="330" y="410" font-size="9" font-family="Libertinus Mono" fill="#f59e0b">CI/CD integration</text>

  <rect x="330" y="425" width="190" height="25" rx="4" fill="#fffbeb"/>
  <text x="425" y="442" text-anchor="middle" font-size="10" fill="#92400e">Accurate artifact inventory</text>

  <!-- Runtime Detection Card -->
  <g filter="url(#discShadow)">
    <rect x="560" y="185" width="230" height="280" rx="10" fill="white" stroke="#10b981" stroke-width="2"/>
    <rect x="560" y="185" width="230" height="50" rx="10" fill="url(#runtimeGrad)"/>
    <rect x="560" y="227" width="230" height="8" fill="url(#runtimeGrad)"/>
    <text x="675" y="215" text-anchor="middle" font-size="15" font-weight="600" fill="white">Runtime Detection</text>
  </g>

  <text x="580" y="265" font-size="11" font-weight="600" fill="#047857">Coverage:</text>
  <text x="650" y="265" font-size="11" fill="#334155">Running dependencies</text>

  <text x="580" y="290" font-size="11" font-weight="600" fill="#047857">Accuracy:</text>
  <rect x="650" y="278" width="60" height="16" rx="3" fill="#d1fae5"/>
  <text x="680" y="290" text-anchor="middle" font-size="10" font-weight="500" fill="#047857">Highest</text>

  <text x="580" y="315" font-size="11" font-weight="600" fill="#047857">Timing:</text>
  <text x="650" y="315" font-size="11" fill="#334155">Production</text>

  <text x="580" y="340" font-size="11" font-weight="600" fill="#047857">Complexity:</text>
  <rect x="650" y="328" width="50" height="16" rx="3" fill="#fee2e2"/>
  <text x="675" y="340" text-anchor="middle" font-size="10" font-weight="500" fill="#b91c1c">High</text>

  <line x1="580" y1="360" x2="770" y2="360" stroke="#e2e8f0" stroke-width="1"/>
  <text x="580" y="380" font-size="10" fill="#64748b">Monitors production:</text>
  <text x="580" y="395" font-size="9" font-family="Libertinus Mono" fill="#10b981">Running processes</text>
  <text x="580" y="410" font-size="9" font-family="Libertinus Mono" fill="#10b981">Loaded libraries, containers</text>

  <rect x="580" y="425" width="190" height="25" rx="4" fill="#ecfdf5"/>
  <text x="675" y="442" text-anchor="middle" font-size="10" fill="#047857">Ground truth verification</text>
</svg>