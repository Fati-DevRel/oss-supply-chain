<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 950 700">
  <defs>
        <filter id="shadow" x="-10%" y="-10%" width="120%" height="130%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="2" result="blur"/>
      <feOffset in="blur" dx="1" dy="2" result="offsetBlur"/>
      <feFlood flood-color="#000000" flood-opacity="0.5" result="color"/>
      <feComposite in="color" in2="offsetBlur" operator="in" result="shadow"/>
      <feMerge>
        <feMergeNode in="shadow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#64748B"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="950" height="700" fill="#F8FAFC"/>

  <!-- Title -->
  <text x="475" y="35" font-family="Libertinus Sans" font-size="22" font-weight="bold" fill="#1E293B" text-anchor="middle">Supply Chain Incident Response Workflow</text>
  <text x="475" y="55" font-family="Libertinus Sans" font-size="13" fill="#64748B" text-anchor="middle">From detection through recovery and lessons learned</text>

  <!-- Phase 1: Detection -->
  <g filter="url(#shadow)">
    <rect x="50" y="90" width="180" height="120" rx="10" fill="#3B82F6"/>
    <text x="140" y="120" font-family="Libertinus Sans" font-size="14" font-weight="bold" fill="white" text-anchor="middle">1. DETECTION</text>
    <text x="60" y="145" font-family="Libertinus Sans" font-size="10" fill="#DBEAFE">- External intelligence</text>
    <text x="60" y="160" font-family="Libertinus Sans" font-size="10" fill="#DBEAFE">- Community alerts</text>
    <text x="60" y="175" font-family="Libertinus Sans" font-size="10" fill="#DBEAFE">- Internal monitoring</text>
    <text x="60" y="190" font-family="Libertinus Sans" font-size="10" fill="#DBEAFE">- Behavioral anomalies</text>
  </g>

  <!-- Arrow -->
  <line x1="235" y1="150" x2="285" y2="150" stroke="#64748B" stroke-width="2" marker-end="url(#arrowhead)"/>

  <!-- Phase 2: Triage -->
  <g filter="url(#shadow)">
    <rect x="290" y="90" width="180" height="120" rx="10" fill="#8B5CF6"/>
    <text x="380" y="120" font-family="Libertinus Sans" font-size="14" font-weight="bold" fill="white" text-anchor="middle">2. TRIAGE</text>
    <text x="300" y="145" font-family="Libertinus Sans" font-size="10" fill="#E9D5FF">- Exposure assessment</text>
    <text x="300" y="160" font-family="Libertinus Sans" font-size="10" fill="#E9D5FF">- Version correlation</text>
    <text x="300" y="175" font-family="Libertinus Sans" font-size="10" fill="#E9D5FF">- Deployment scope</text>
    <text x="300" y="190" font-family="Libertinus Sans" font-size="10" fill="#E9D5FF">- Evidence search</text>
  </g>

  <!-- Arrow -->
  <line x1="475" y1="150" x2="525" y2="150" stroke="#64748B" stroke-width="2" marker-end="url(#arrowhead)"/>

  <!-- Phase 3: Containment -->
  <g filter="url(#shadow)">
    <rect x="530" y="90" width="180" height="120" rx="10" fill="#EF4444"/>
    <text x="620" y="120" font-family="Libertinus Sans" font-size="14" font-weight="bold" fill="white" text-anchor="middle">3. CONTAINMENT</text>
    <text x="540" y="145" font-family="Libertinus Sans" font-size="10" fill="#FEE2E2">- Stop deployments</text>
    <text x="540" y="160" font-family="Libertinus Sans" font-size="10" fill="#FEE2E2">- Revoke secrets</text>
    <text x="540" y="175" font-family="Libertinus Sans" font-size="10" fill="#FEE2E2">- Network isolation</text>
    <text x="540" y="190" font-family="Libertinus Sans" font-size="10" fill="#FEE2E2">- Preserve evidence</text>
  </g>

  <!-- Arrow -->
  <line x1="715" y1="150" x2="765" y2="150" stroke="#64748B" stroke-width="2" marker-end="url(#arrowhead)"/>

  <!-- Phase 4: Investigation -->
  <g filter="url(#shadow)">
    <rect x="770" y="90" width="130" height="120" rx="10" fill="#F59E0B"/>
    <text x="835" y="120" font-family="Libertinus Sans" font-size="13" font-weight="bold" fill="white" text-anchor="middle">4. INVESTIGATE</text>
    <text x="780" y="145" font-family="Libertinus Sans" font-size="10" fill="#FEF3C7">- Root cause</text>
    <text x="780" y="160" font-family="Libertinus Sans" font-size="10" fill="#FEF3C7">- Impact scope</text>
    <text x="780" y="175" font-family="Libertinus Sans" font-size="10" fill="#FEF3C7">- Timeline</text>
    <text x="780" y="190" font-family="Libertinus Sans" font-size="10" fill="#FEF3C7">- Attribution</text>
  </g>

  <!-- Arrow down -->
  <line x1="835" y1="215" x2="835" y2="265" stroke="#64748B" stroke-width="2" marker-end="url(#arrowhead)"/>

  <!-- Phase 5: Remediation -->
  <g filter="url(#shadow)">
    <rect x="720" y="270" width="180" height="120" rx="10" fill="#10B981"/>
    <text x="810" y="300" font-family="Libertinus Sans" font-size="14" font-weight="bold" fill="white" text-anchor="middle">5. REMEDIATION</text>
    <text x="730" y="325" font-family="Libertinus Sans" font-size="10" fill="#D1FAE5">- Remove malicious code</text>
    <text x="730" y="340" font-family="Libertinus Sans" font-size="10" fill="#D1FAE5">- Patch vulnerabilities</text>
    <text x="730" y="355" font-family="Libertinus Sans" font-size="10" fill="#D1FAE5">- Rebuild clean artifacts</text>
    <text x="730" y="370" font-family="Libertinus Sans" font-size="10" fill="#D1FAE5">- Rotate credentials</text>
  </g>

  <!-- Arrow left -->
  <line x1="715" y1="330" x2="565" y2="330" stroke="#64748B" stroke-width="2" marker-end="url(#arrowhead)"/>

  <!-- Phase 6: Communication -->
  <g filter="url(#shadow)">
    <rect x="380" y="270" width="180" height="120" rx="10" fill="#6366F1"/>
    <text x="470" y="295" font-family="Libertinus Sans" font-size="13" font-weight="bold" fill="white" text-anchor="middle">6. COMMUNICATION</text>
    <text x="390" y="320" font-family="Libertinus Sans" font-size="10" fill="#E0E7FF">- Internal stakeholders</text>
    <text x="390" y="335" font-family="Libertinus Sans" font-size="10" fill="#E0E7FF">- Executive briefing</text>
    <text x="390" y="350" font-family="Libertinus Sans" font-size="10" fill="#E0E7FF">- Customer notification</text>
    <text x="390" y="365" font-family="Libertinus Sans" font-size="10" fill="#E0E7FF">- Regulatory reporting</text>
    <text x="390" y="380" font-family="Libertinus Sans" font-size="10" fill="#E0E7FF">- Community disclosure</text>
  </g>

  <!-- Arrow left -->
  <line x1="375" y1="330" x2="225" y2="330" stroke="#64748B" stroke-width="2" marker-end="url(#arrowhead)"/>

  <!-- Phase 7: Recovery -->
  <g filter="url(#shadow)">
    <rect x="50" y="270" width="170" height="120" rx="10" fill="#0EA5E9"/>
    <text x="135" y="300" font-family="Libertinus Sans" font-size="14" font-weight="bold" fill="white" text-anchor="middle">7. RECOVERY</text>
    <text x="60" y="325" font-family="Libertinus Sans" font-size="10" fill="#E0F2FE">- Deploy clean builds</text>
    <text x="60" y="340" font-family="Libertinus Sans" font-size="10" fill="#E0F2FE">- Verify integrity</text>
    <text x="60" y="355" font-family="Libertinus Sans" font-size="10" fill="#E0F2FE">- Resume operations</text>
    <text x="60" y="370" font-family="Libertinus Sans" font-size="10" fill="#E0F2FE">- Enhanced monitoring</text>
  </g>

  <!-- Arrow down -->
  <line x1="135" y1="395" x2="135" y2="445" stroke="#64748B" stroke-width="2" marker-end="url(#arrowhead)"/>

  <!-- Phase 8: Lessons Learned -->
  <g filter="url(#shadow)">
    <rect x="50" y="450" width="450" height="100" rx="10" fill="#1E293B"/>
    <text x="275" y="480" font-family="Libertinus Sans" font-size="14" font-weight="bold" fill="white" text-anchor="middle">8. LESSONS LEARNED AND IMPROVEMENT</text>
    <text x="70" y="510" font-family="Libertinus Sans" font-size="10" fill="#94A3B8">- Post-incident review</text>
    <text x="70" y="525" font-family="Libertinus Sans" font-size="10" fill="#94A3B8">- Document timeline</text>
    <text x="70" y="540" font-family="Libertinus Sans" font-size="10" fill="#94A3B8">- Identify gaps</text>
    <text x="270" y="510" font-family="Libertinus Sans" font-size="10" fill="#94A3B8">- Update playbooks</text>
    <text x="270" y="525" font-family="Libertinus Sans" font-size="10" fill="#94A3B8">- Improve detection</text>
    <text x="270" y="540" font-family="Libertinus Sans" font-size="10" fill="#94A3B8">- Train team</text>
  </g>

  <!-- Feedback loop -->
  <path d="M 500 500 Q 600 500 600 150 Q 600 90 540 90" fill="none" stroke="#94A3B8" stroke-width="1.5" stroke-dasharray="6,4"/>
  <text x="610" y="300" font-family="Libertinus Sans" font-size="10" fill="#94A3B8" font-style="italic">Continuous</text>
  <text x="610" y="315" font-family="Libertinus Sans" font-size="10" fill="#94A3B8" font-style="italic">Improvement</text>

  <!-- Key metrics box -->
  <g filter="url(#shadow)">
    <rect x="550" y="450" width="350" height="100" rx="8" fill="white" stroke="#CBD5E1" stroke-width="1"/>
    <text x="725" y="475" font-family="Libertinus Sans" font-size="12" font-weight="bold" fill="#1E293B" text-anchor="middle">Key Response Metrics</text>
    <text x="570" y="500" font-family="Libertinus Sans" font-size="10" fill="#475569">MTTD: Mean Time to Detect</text>
    <text x="570" y="515" font-family="Libertinus Sans" font-size="10" fill="#475569">MTTC: Mean Time to Contain</text>
    <text x="570" y="530" font-family="Libertinus Sans" font-size="10" fill="#475569">MTTR: Mean Time to Recover</text>
    <text x="740" y="500" font-family="Libertinus Sans" font-size="10" fill="#475569">Scope: Systems affected</text>
    <text x="740" y="515" font-family="Libertinus Sans" font-size="10" fill="#475569">Impact: Business disruption</text>
    <text x="740" y="530" font-family="Libertinus Sans" font-size="10" fill="#475569">Lessons: Process improvements</text>
  </g>

  <!-- Case study examples -->
  <rect x="50" y="580" width="850" height="60" rx="6" fill="#FEF3C7" stroke="#FCD34D" stroke-width="1"/>
  <text x="70" y="605" font-family="Libertinus Sans" font-size="11" font-weight="bold" fill="#92400E">Real-World Detection Examples:</text>
  <text x="270" y="605" font-family="Libertinus Sans" font-size="10" fill="#78350F">Codecov - Integrity verification | SolarWinds - Auth anomaly | XZ Utils - Performance anomaly</text>
  <text x="70" y="625" font-family="Libertinus Sans" font-size="10" fill="#78350F">event-stream - Code review | ua-parser-js - Automated scanning</text>
</svg>
