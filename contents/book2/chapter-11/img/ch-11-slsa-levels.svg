<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 850 420" font-family="Libertinus Sans">
  <defs>
        <filter id="slsaShadow" x="-10%" y="-10%" width="120%" height="130%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="2" result="blur"/>
      <feOffset in="blur" dx="1" dy="2" result="offsetBlur"/>
      <feFlood flood-color="#000000" flood-opacity="0.5" result="color"/>
      <feComposite in="color" in2="offsetBlur" operator="in" result="shadow"/>
      <feMerge>
        <feMergeNode in="shadow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <linearGradient id="level0Grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#94a3b8"/>
      <stop offset="100%" style="stop-color:#64748b"/>
    </linearGradient>
    <linearGradient id="level1Grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#fbbf24"/>
      <stop offset="100%" style="stop-color:#f59e0b"/>
    </linearGradient>
    <linearGradient id="level2Grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#34d399"/>
      <stop offset="100%" style="stop-color:#10b981"/>
    </linearGradient>
    <linearGradient id="level3Grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#60a5fa"/>
      <stop offset="100%" style="stop-color:#3b82f6"/>
    </linearGradient>
    <marker id="progressArrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#10b981"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="425" y="35" text-anchor="middle" font-size="20" font-weight="600" fill="#1e293b">SLSA Security Levels</text>
  <text x="425" y="55" text-anchor="middle" font-size="13" fill="#64748b">Supply-chain Levels for Software Artifacts (Build Track)</text>

  <!-- Progress arrow -->
  <line x1="80" y1="380" x2="770" y2="380" stroke="#10b981" stroke-width="3" marker-end="url(#progressArrow)"/>
  <text x="425" y="405" text-anchor="middle" font-size="12" font-weight="500" fill="#047857">Increasing Security Assurance</text>

  <!-- Level 0 -->
  <g filter="url(#slsaShadow)">
    <rect x="60" y="90" width="170" height="270" rx="10" fill="white" stroke="#94a3b8" stroke-width="2"/>
    <rect x="60" y="90" width="170" height="55" rx="10" fill="url(#level0Grad)"/>
    <rect x="60" y="137" width="170" height="8" fill="url(#level0Grad)"/>
    <text x="145" y="115" text-anchor="middle" font-size="24" font-weight="700" fill="white">L0</text>
    <text x="145" y="135" text-anchor="middle" font-size="11" fill="rgba(255,255,255,0.9)">No Guarantees</text>
  </g>
  <text x="145" y="175" text-anchor="middle" font-size="13" font-weight="600" fill="#475569">Baseline</text>
  <line x1="80" y1="185" x2="210" y2="185" stroke="#e2e8f0" stroke-width="1"/>
  <text x="145" y="210" text-anchor="middle" font-size="11" fill="#64748b">No SLSA</text>
  <text x="145" y="228" text-anchor="middle" font-size="11" fill="#64748b">requirements</text>
  <text x="145" y="260" text-anchor="middle" font-size="10" fill="#94a3b8">No provenance</text>
  <text x="145" y="278" text-anchor="middle" font-size="10" fill="#94a3b8">No verification</text>
  <text x="145" y="296" text-anchor="middle" font-size="10" fill="#94a3b8">Unknown origin</text>
  <rect x="85" y="320" width="120" height="24" rx="4" fill="#f1f5f9"/>
  <text x="145" y="337" text-anchor="middle" font-size="10" fill="#64748b">Starting point</text>

  <!-- Level 1 -->
  <g filter="url(#slsaShadow)">
    <rect x="255" y="90" width="170" height="270" rx="10" fill="white" stroke="#f59e0b" stroke-width="2"/>
    <rect x="255" y="90" width="170" height="55" rx="10" fill="url(#level1Grad)"/>
    <rect x="255" y="137" width="170" height="8" fill="url(#level1Grad)"/>
    <text x="340" y="115" text-anchor="middle" font-size="24" font-weight="700" fill="white">L1</text>
    <text x="340" y="135" text-anchor="middle" font-size="11" fill="rgba(255,255,255,0.9)">Provenance Exists</text>
  </g>
  <text x="340" y="175" text-anchor="middle" font-size="13" font-weight="600" fill="#92400e">Documentation</text>
  <line x1="275" y1="185" x2="405" y2="185" stroke="#fef3c7" stroke-width="1"/>
  <text x="340" y="210" text-anchor="middle" font-size="11" fill="#64748b">Build metadata</text>
  <text x="340" y="228" text-anchor="middle" font-size="11" fill="#64748b">exists</text>
  <circle cx="285" cy="255" r="5" fill="#f59e0b"/>
  <text x="300" y="259" font-size="10" fill="#78350f">Package source</text>
  <circle cx="285" cy="278" r="5" fill="#f59e0b"/>
  <text x="300" y="282" font-size="10" fill="#78350f">Build process</text>
  <circle cx="285" cy="301" r="5" fill="#f59e0b"/>
  <text x="300" y="305" font-size="10" fill="#78350f">Dependencies</text>
  <rect x="280" y="320" width="120" height="24" rx="4" fill="#fef3c7"/>
  <text x="340" y="337" text-anchor="middle" font-size="10" fill="#92400e">Know the origin</text>

  <!-- Level 2 -->
  <g filter="url(#slsaShadow)">
    <rect x="450" y="90" width="170" height="270" rx="10" fill="white" stroke="#10b981" stroke-width="2"/>
    <rect x="450" y="90" width="170" height="55" rx="10" fill="url(#level2Grad)"/>
    <rect x="450" y="137" width="170" height="8" fill="url(#level2Grad)"/>
    <text x="535" y="115" text-anchor="middle" font-size="24" font-weight="700" fill="white">L2</text>
    <text x="535" y="135" text-anchor="middle" font-size="11" fill="rgba(255,255,255,0.9)">Signed Provenance</text>
  </g>
  <text x="535" y="175" text-anchor="middle" font-size="13" font-weight="600" fill="#047857">Attestation</text>
  <line x1="470" y1="185" x2="600" y2="185" stroke="#d1fae5" stroke-width="1"/>
  <text x="535" y="210" text-anchor="middle" font-size="11" fill="#64748b">Hosted build</text>
  <text x="535" y="228" text-anchor="middle" font-size="11" fill="#64748b">service signs</text>
  <circle cx="480" cy="255" r="5" fill="#10b981"/>
  <text x="495" y="259" font-size="10" fill="#065f46">Cryptographic sig</text>
  <circle cx="480" cy="278" r="5" fill="#10b981"/>
  <text x="495" y="282" font-size="10" fill="#065f46">Build service ID</text>
  <circle cx="480" cy="301" r="5" fill="#10b981"/>
  <text x="495" y="305" font-size="10" fill="#065f46">Tamper detection</text>
  <rect x="475" y="320" width="120" height="24" rx="4" fill="#d1fae5"/>
  <text x="535" y="337" text-anchor="middle" font-size="10" fill="#047857">Verify authenticity</text>

  <!-- Level 3 -->
  <g filter="url(#slsaShadow)">
    <rect x="645" y="90" width="170" height="270" rx="10" fill="white" stroke="#3b82f6" stroke-width="2"/>
    <rect x="645" y="90" width="170" height="55" rx="10" fill="url(#level3Grad)"/>
    <rect x="645" y="137" width="170" height="8" fill="url(#level3Grad)"/>
    <text x="730" y="115" text-anchor="middle" font-size="24" font-weight="700" fill="white">L3</text>
    <text x="730" y="135" text-anchor="middle" font-size="11" fill="rgba(255,255,255,0.9)">Hardened Build</text>
  </g>
  <text x="730" y="175" text-anchor="middle" font-size="13" font-weight="600" fill="#1d4ed8">Non-Forgeable</text>
  <line x1="665" y1="185" x2="795" y2="185" stroke="#dbeafe" stroke-width="1"/>
  <text x="730" y="210" text-anchor="middle" font-size="11" fill="#64748b">Hardened build</text>
  <text x="730" y="228" text-anchor="middle" font-size="11" fill="#64748b">platform</text>
  <circle cx="675" cy="255" r="5" fill="#3b82f6"/>
  <text x="690" y="259" font-size="10" fill="#1e40af">Isolated builds</text>
  <circle cx="675" cy="278" r="5" fill="#3b82f6"/>
  <text x="690" y="282" font-size="10" fill="#1e40af">Ephemeral env</text>
  <circle cx="675" cy="301" r="5" fill="#3b82f6"/>
  <text x="690" y="305" font-size="10" fill="#1e40af">Hermetic builds</text>
  <rect x="670" y="320" width="120" height="24" rx="4" fill="#dbeafe"/>
  <text x="730" y="337" text-anchor="middle" font-size="10" fill="#1d4ed8">Maximum trust</text>
</svg>