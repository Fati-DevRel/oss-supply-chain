<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 750">
  <defs>
        <filter id="shadow" x="-10%" y="-10%" width="120%" height="130%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="2" result="blur"/>
      <feOffset in="blur" dx="1" dy="2" result="offsetBlur"/>
      <feFlood flood-color="#000000" flood-opacity="0.5" result="color"/>
      <feComposite in="color" in2="offsetBlur" operator="in" result="shadow"/>
      <feMerge>
        <feMergeNode in="shadow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="900" height="750" fill="#F8FAFC"/>

  <!-- Title -->
  <text x="450" y="35" font-family="Libertinus Sans" font-size="22" font-weight="bold" fill="#1E293B" text-anchor="middle">Anatomy of an Effective Security Advisory</text>
  <text x="450" y="55" font-family="Libertinus Sans" font-size="13" fill="#64748B" text-anchor="middle">Essential elements and structure for clear vulnerability communication</text>

  <!-- Advisory document representation -->
  <g filter="url(#shadow)">
    <rect x="50" y="80" width="520" height="620" rx="8" fill="white" stroke="#E2E8F0" stroke-width="2"/>

    <!-- Header bar -->
    <rect x="50" y="80" width="520" height="40" rx="8" fill="#1E293B"/>
    <rect x="50" y="110" width="520" height="10" fill="#1E293B"/>
    <text x="310" y="107" font-family="Libertinus Mono" font-size="12" font-weight="bold" fill="white" text-anchor="middle">SECURITY ADVISORY</text>

    <!-- Advisory sections -->
    <!-- Title -->
    <rect x="70" y="135" width="480" height="35" rx="4" fill="#EFF6FF"/>
    <text x="80" y="158" font-family="Libertinus Sans" font-size="12" font-weight="bold" fill="#1E40AF">ImageMagick: Heap Buffer Overflow in PNG Processing</text>

    <!-- Metadata -->
    <rect x="70" y="180" width="480" height="60" rx="4" fill="#F1F5F9"/>
    <text x="80" y="198" font-family="Libertinus Mono" font-size="10" fill="#475569">CVE: CVE-2024-12345</text>
    <text x="280" y="198" font-family="Libertinus Mono" font-size="10" fill="#475569">Published: 2024-03-15</text>
    <text x="80" y="215" font-family="Libertinus Mono" font-size="10" fill="#475569">Advisory: IMGK-2024-001</text>
    <text x="280" y="215" font-family="Libertinus Mono" font-size="10" fill="#DC2626" font-weight="bold">Severity: HIGH (CVSS 8.1)</text>

    <!-- Summary -->
    <text x="80" y="265" font-family="Libertinus Sans" font-size="11" font-weight="bold" fill="#1E293B">Summary</text>
    <rect x="70" y="275" width="480" height="50" rx="4" fill="#FEFCE8"/>
    <text x="80" y="295" font-family="Libertinus Sans" font-size="10" fill="#475569">A heap buffer overflow in ImageMagick's PNG processing allows</text>
    <text x="80" y="310" font-family="Libertinus Sans" font-size="10" fill="#475569">remote code execution via maliciously crafted PNG files.</text>

    <!-- Affected Versions -->
    <text x="80" y="350" font-family="Libertinus Sans" font-size="11" font-weight="bold" fill="#1E293B">Affected Versions</text>
    <rect x="70" y="360" width="230" height="50" rx="4" fill="#FEE2E2"/>
    <text x="80" y="380" font-family="Libertinus Mono" font-size="10" fill="#7F1D1D">7.1.0-0 through 7.1.1-28</text>
    <text x="80" y="395" font-family="Libertinus Mono" font-size="10" fill="#7F1D1D">6.9.12-0 through 6.9.12-98</text>

    <!-- Fixed Versions -->
    <text x="320" y="350" font-family="Libertinus Sans" font-size="11" font-weight="bold" fill="#1E293B">Fixed Versions</text>
    <rect x="310" y="360" width="240" height="50" rx="4" fill="#D1FAE5"/>
    <text x="320" y="380" font-family="Libertinus Mono" font-size="10" fill="#166534">7.1.1-29 or later</text>
    <text x="320" y="395" font-family="Libertinus Mono" font-size="10" fill="#166534">6.9.12-99 or later</text>

    <!-- Impact -->
    <text x="80" y="435" font-family="Libertinus Sans" font-size="11" font-weight="bold" fill="#1E293B">Impact</text>
    <rect x="70" y="445" width="480" height="55" rx="4" fill="#FEF2F2"/>
    <text x="80" y="465" font-family="Libertinus Sans" font-size="10" fill="#475569">Attackers can achieve arbitrary code execution by causing a</text>
    <text x="80" y="480" font-family="Libertinus Sans" font-size="10" fill="#475569">vulnerable installation to process a crafted PNG image (web apps,</text>
    <text x="80" y="495" font-family="Libertinus Sans" font-size="10" fill="#475569">email systems, document pipelines).</text>

    <!-- Remediation -->
    <text x="80" y="525" font-family="Libertinus Sans" font-size="11" font-weight="bold" fill="#1E293B">Remediation</text>
    <rect x="70" y="535" width="480" height="75" rx="4" fill="#F0FDF4"/>
    <text x="80" y="555" font-family="Libertinus Sans" font-size="10" font-weight="bold" fill="#166534">Upgrade (Recommended):</text>
    <text x="80" y="570" font-family="Libertinus Mono" font-size="9" fill="#166534">apt-get update && apt-get install imagemagick</text>
    <text x="80" y="590" font-family="Libertinus Sans" font-size="10" font-weight="bold" fill="#92400E">Workaround (if upgrade not possible):</text>
    <text x="80" y="605" font-family="Libertinus Mono" font-size="9" fill="#92400E">&lt;policy domain="coder" rights="none" pattern="PNG" /&gt;</text>

    <!-- Timeline and Credit -->
    <rect x="70" y="625" width="230" height="60" rx="4" fill="#F1F5F9"/>
    <text x="80" y="645" font-family="Libertinus Sans" font-size="10" font-weight="bold" fill="#475569">Timeline</text>
    <text x="80" y="660" font-family="Libertinus Sans" font-size="9" fill="#64748B">2024-02-01: Reported</text>
    <text x="80" y="673" font-family="Libertinus Sans" font-size="9" fill="#64748B">2024-03-15: Fixed</text>

    <rect x="310" y="625" width="240" height="60" rx="4" fill="#F1F5F9"/>
    <text x="320" y="645" font-family="Libertinus Sans" font-size="10" font-weight="bold" fill="#475569">Credit</text>
    <text x="320" y="660" font-family="Libertinus Sans" font-size="9" fill="#64748B">Discovered by Jane Smith</text>
    <text x="320" y="673" font-family="Libertinus Sans" font-size="9" fill="#64748B">Example Security Research</text>
  </g>

  <!-- Annotations on right side -->
  <!-- Annotation 1: Title -->
  <line x1="550" y1="152" x2="610" y2="152" stroke="#3B82F6" stroke-width="2"/>
  <g filter="url(#shadow)">
    <rect x="620" y="130" width="250" height="50" rx="6" fill="#EFF6FF" stroke="#3B82F6" stroke-width="1"/>
    <text x="635" y="150" font-family="Libertinus Sans" font-size="10" font-weight="bold" fill="#1E40AF">1. Clear, Descriptive Title</text>
    <text x="635" y="167" font-family="Libertinus Sans" font-size="9" fill="#475569">Product + vulnerability type + affected</text>
    <text x="635" y="179" font-family="Libertinus Sans" font-size="9" fill="#475569">component for quick identification</text>
  </g>

  <!-- Annotation 2: Metadata -->
  <line x1="550" y1="205" x2="610" y2="205" stroke="#8B5CF6" stroke-width="2"/>
  <g filter="url(#shadow)">
    <rect x="620" y="188" width="250" height="45" rx="6" fill="#F3E8FF" stroke="#8B5CF6" stroke-width="1"/>
    <text x="635" y="208" font-family="Libertinus Sans" font-size="10" font-weight="bold" fill="#7C3AED">2. Identifiers and Severity</text>
    <text x="635" y="223" font-family="Libertinus Sans" font-size="9" fill="#475569">CVE + CVSS score for triage/tracking</text>
  </g>

  <!-- Annotation 3: Versions -->
  <line x1="550" y1="385" x2="610" y2="385" stroke="#EF4444" stroke-width="2"/>
  <g filter="url(#shadow)">
    <rect x="620" y="360" width="250" height="55" rx="6" fill="#FEF2F2" stroke="#EF4444" stroke-width="1"/>
    <text x="635" y="380" font-family="Libertinus Sans" font-size="10" font-weight="bold" fill="#DC2626">3. Precise Version Ranges</text>
    <text x="635" y="395" font-family="Libertinus Sans" font-size="9" fill="#475569">Unambiguous affected/fixed versions</text>
    <text x="635" y="407" font-family="Libertinus Sans" font-size="9" fill="#475569">Users can immediately check exposure</text>
  </g>

  <!-- Annotation 4: Remediation -->
  <line x1="550" y1="570" x2="610" y2="570" stroke="#10B981" stroke-width="2"/>
  <g filter="url(#shadow)">
    <rect x="620" y="545" width="250" height="60" rx="6" fill="#F0FDF4" stroke="#10B981" stroke-width="1"/>
    <text x="635" y="565" font-family="Libertinus Sans" font-size="10" font-weight="bold" fill="#059669">4. Actionable Remediation</text>
    <text x="635" y="580" font-family="Libertinus Sans" font-size="9" fill="#475569">Specific commands, not vague guidance</text>
    <text x="635" y="592" font-family="Libertinus Sans" font-size="9" fill="#475569">Include workarounds for those who</text>
    <text x="635" y="604" font-family="Libertinus Sans" font-size="9" fill="#475569">cannot upgrade immediately</text>
  </g>

  <!-- Bottom comparison -->
  <rect x="50" y="705" width="410" height="35" rx="4" fill="#FEE2E2" stroke="#FECACA" stroke-width="1"/>
  <text x="60" y="725" font-family="Libertinus Sans" font-size="10" font-weight="bold" fill="#DC2626">Ineffective:</text>
  <text x="120" y="725" font-family="Libertinus Sans" font-size="10" fill="#7F1D1D">"We fixed a security issue. Please upgrade."</text>

  <rect x="470" y="705" width="400" height="35" rx="4" fill="#D1FAE5" stroke="#86EFAC" stroke-width="1"/>
  <text x="480" y="725" font-family="Libertinus Sans" font-size="10" font-weight="bold" fill="#059669">Effective:</text>
  <text x="535" y="725" font-family="Libertinus Sans" font-size="10" fill="#166534">Complete details enabling rapid response</text>
</svg>
