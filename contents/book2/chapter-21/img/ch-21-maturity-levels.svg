<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 700">
  <defs>
    <linearGradient id="level1Grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#fed7d7;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#feb2b2;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="level2Grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#feebc8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#fbd38d;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="level3Grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#fefcbf;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#faf089;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="level4Grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#c6f6d5;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#9ae6b4;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="level5Grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#bee3f8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#90cdf4;stop-opacity:1" />
    </linearGradient>
        <filter id="shadow" x="-10%" y="-10%" width="120%" height="130%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="2" result="blur"/>
      <feOffset in="blur" dx="1" dy="2" result="offsetBlur"/>
      <feFlood flood-color="#000000" flood-opacity="0.5" result="color"/>
      <feComposite in="color" in2="offsetBlur" operator="in" result="shadow"/>
      <feMerge>
        <feMergeNode in="shadow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="900" height="700" fill="#f7fafc"/>

  <!-- Title -->
  <text x="450" y="35" text-anchor="middle" font-family="Libertinus Sans" font-size="22" font-weight="bold" fill="#1a202c">Supply Chain Security Maturity Model</text>
  <text x="450" y="55" text-anchor="middle" font-family="Libertinus Sans" font-size="12" fill="#718096">Five levels of organizational capability progression</text>

  <!-- Staircase visualization -->
  <g transform="translate(50, 90)">

    <!-- Level 1: Initial -->
    <g transform="translate(0, 450)">
      <rect x="0" y="0" width="160" height="100" rx="6" fill="url(#level1Grad)" stroke="#c53030" stroke-width="2" filter="url(#shadow)"/>
      <rect x="0" y="0" width="160" height="28" rx="6" fill="#c53030"/>
      <rect x="0" y="22" width="160" height="6" fill="#c53030"/>
      <text x="80" y="18" text-anchor="middle" font-family="Libertinus Sans" font-size="12" font-weight="bold" fill="white">Level 1: Initial</text>
      <text x="80" y="48" text-anchor="middle" font-family="Libertinus Sans" font-size="9" fill="#742a2a">Ad-hoc practices</text>
      <text x="80" y="62" text-anchor="middle" font-family="Libertinus Sans" font-size="9" fill="#742a2a">Reactive response</text>
      <text x="80" y="76" text-anchor="middle" font-family="Libertinus Sans" font-size="9" fill="#742a2a">No formal program</text>
      <text x="80" y="90" text-anchor="middle" font-family="Libertinus Sans" font-size="9" fill="#742a2a">No SBOM capability</text>
    </g>

    <!-- Level 2: Developing -->
    <g transform="translate(145, 360)">
      <rect x="0" y="0" width="160" height="100" rx="6" fill="url(#level2Grad)" stroke="#c05621" stroke-width="2" filter="url(#shadow)"/>
      <rect x="0" y="0" width="160" height="28" rx="6" fill="#c05621"/>
      <rect x="0" y="22" width="160" height="6" fill="#c05621"/>
      <text x="80" y="18" text-anchor="middle" font-family="Libertinus Sans" font-size="12" font-weight="bold" fill="white">Level 2: Developing</text>
      <text x="80" y="48" text-anchor="middle" font-family="Libertinus Sans" font-size="9" fill="#7b341e">Basic tooling deployed</text>
      <text x="80" y="62" text-anchor="middle" font-family="Libertinus Sans" font-size="9" fill="#7b341e">Manual processes</text>
      <text x="80" y="76" text-anchor="middle" font-family="Libertinus Sans" font-size="9" fill="#7b341e">Inconsistent coverage</text>
      <text x="80" y="90" text-anchor="middle" font-family="Libertinus Sans" font-size="9" fill="#7b341e">Some scanning</text>
    </g>

    <!-- Level 3: Defined -->
    <g transform="translate(290, 270)">
      <rect x="0" y="0" width="160" height="100" rx="6" fill="url(#level3Grad)" stroke="#b7791f" stroke-width="2" filter="url(#shadow)"/>
      <rect x="0" y="0" width="160" height="28" rx="6" fill="#b7791f"/>
      <rect x="0" y="22" width="160" height="6" fill="#b7791f"/>
      <text x="80" y="18" text-anchor="middle" font-family="Libertinus Sans" font-size="12" font-weight="bold" fill="white">Level 3: Defined</text>
      <text x="80" y="48" text-anchor="middle" font-family="Libertinus Sans" font-size="9" fill="#744210">Standardized processes</text>
      <text x="80" y="62" text-anchor="middle" font-family="Libertinus Sans" font-size="9" fill="#744210">Automated scanning</text>
      <text x="80" y="76" text-anchor="middle" font-family="Libertinus Sans" font-size="9" fill="#744210">Policy-driven</text>
      <text x="80" y="90" text-anchor="middle" font-family="Libertinus Sans" font-size="9" fill="#744210">SBOM for releases</text>
    </g>

    <!-- Level 4: Managed -->
    <g transform="translate(435, 180)">
      <rect x="0" y="0" width="160" height="100" rx="6" fill="url(#level4Grad)" stroke="#276749" stroke-width="2" filter="url(#shadow)"/>
      <rect x="0" y="0" width="160" height="28" rx="6" fill="#276749"/>
      <rect x="0" y="22" width="160" height="6" fill="#276749"/>
      <text x="80" y="18" text-anchor="middle" font-family="Libertinus Sans" font-size="12" font-weight="bold" fill="white">Level 4: Managed</text>
      <text x="80" y="48" text-anchor="middle" font-family="Libertinus Sans" font-size="9" fill="#22543d">Comprehensive coverage</text>
      <text x="80" y="62" text-anchor="middle" font-family="Libertinus Sans" font-size="9" fill="#22543d">Metrics-driven</text>
      <text x="80" y="76" text-anchor="middle" font-family="Libertinus Sans" font-size="9" fill="#22543d">Proactive risk mgmt</text>
      <text x="80" y="90" text-anchor="middle" font-family="Libertinus Sans" font-size="9" fill="#22543d">Provenance verification</text>
    </g>

    <!-- Level 5: Optimizing -->
    <g transform="translate(580, 90)">
      <rect x="0" y="0" width="160" height="100" rx="6" fill="url(#level5Grad)" stroke="#2b6cb0" stroke-width="2" filter="url(#shadow)"/>
      <rect x="0" y="0" width="160" height="28" rx="6" fill="#2b6cb0"/>
      <rect x="0" y="22" width="160" height="6" fill="#2b6cb0"/>
      <text x="80" y="18" text-anchor="middle" font-family="Libertinus Sans" font-size="12" font-weight="bold" fill="white">Level 5: Optimizing</text>
      <text x="80" y="48" text-anchor="middle" font-family="Libertinus Sans" font-size="9" fill="#2a4365">Continuous improvement</text>
      <text x="80" y="62" text-anchor="middle" font-family="Libertinus Sans" font-size="9" fill="#2a4365">Advanced automation</text>
      <text x="80" y="76" text-anchor="middle" font-family="Libertinus Sans" font-size="9" fill="#2a4365">Industry leadership</text>
      <text x="80" y="90" text-anchor="middle" font-family="Libertinus Sans" font-size="9" fill="#2a4365">Predictive analysis</text>
    </g>

    <!-- Connecting arrows -->
    <path d="M160,500 L170,480 L145,460" stroke="#718096" stroke-width="2" fill="none" marker-end="url(#arrowGray)"/>
    <path d="M305,410 L315,390 L290,370" stroke="#718096" stroke-width="2" fill="none"/>
    <path d="M450,320 L460,300 L435,280" stroke="#718096" stroke-width="2" fill="none"/>
    <path d="M595,230 L605,210 L580,190" stroke="#718096" stroke-width="2" fill="none"/>

    <!-- Progress arrow on side -->
    <g transform="translate(760, 100)">
      <rect x="0" y="0" width="30" height="450" fill="none" stroke="#cbd5e0" stroke-width="1" rx="15"/>
      <defs>
        <linearGradient id="progressGrad" x1="0%" y1="100%" x2="0%" y2="0%">
          <stop offset="0%" style="stop-color:#feb2b2"/>
          <stop offset="25%" style="stop-color:#fbd38d"/>
          <stop offset="50%" style="stop-color:#faf089"/>
          <stop offset="75%" style="stop-color:#9ae6b4"/>
          <stop offset="100%" style="stop-color:#90cdf4"/>
        </linearGradient>
      </defs>
      <rect x="5" y="5" width="20" height="440" rx="10" fill="url(#progressGrad)"/>
      <text x="15" y="-10" text-anchor="middle" font-family="Libertinus Sans" font-size="10" font-weight="bold" fill="#4a5568">MATURITY</text>
      <text x="45" y="440" text-anchor="start" font-family="Libertinus Sans" font-size="9" fill="#718096">Low</text>
      <text x="45" y="15" text-anchor="start" font-family="Libertinus Sans" font-size="9" fill="#718096">High</text>
    </g>
  </g>

  <!-- Key capabilities section -->
  <g transform="translate(50, 615)">
    <rect x="0" y="0" width="800" height="70" rx="6" fill="white" stroke="#e2e8f0" stroke-width="1" filter="url(#shadow)"/>
    <text x="400" y="20" text-anchor="middle" font-family="Libertinus Sans" font-size="11" font-weight="bold" fill="#2d3748">Key Maturity Indicators</text>

    <g transform="translate(30, 35)">
      <circle cx="8" cy="8" r="6" fill="#c53030"/>
      <text x="20" y="12" font-family="Libertinus Sans" font-size="9" fill="#4a5568">No scanning</text>
    </g>
    <g transform="translate(130, 35)">
      <circle cx="8" cy="8" r="6" fill="#c05621"/>
      <text x="20" y="12" font-family="Libertinus Sans" font-size="9" fill="#4a5568">Basic scanning</text>
    </g>
    <g transform="translate(250, 35)">
      <circle cx="8" cy="8" r="6" fill="#b7791f"/>
      <text x="20" y="12" font-family="Libertinus Sans" font-size="9" fill="#4a5568">CI/CD integrated</text>
    </g>
    <g transform="translate(380, 35)">
      <circle cx="8" cy="8" r="6" fill="#276749"/>
      <text x="20" y="12" font-family="Libertinus Sans" font-size="9" fill="#4a5568">SBOM + provenance</text>
    </g>
    <g transform="translate(530, 35)">
      <circle cx="8" cy="8" r="6" fill="#2b6cb0"/>
      <text x="20" y="12" font-family="Libertinus Sans" font-size="9" fill="#4a5568">Self-healing + predictive</text>
    </g>

    <g transform="translate(30, 55)">
      <rect x="0" y="0" width="12" height="12" rx="2" fill="#c53030"/>
      <text x="18" y="10" font-family="Libertinus Sans" font-size="8" fill="#718096">Reactive</text>
    </g>
    <g transform="translate(130, 55)">
      <rect x="0" y="0" width="12" height="12" rx="2" fill="#c05621"/>
      <text x="18" y="10" font-family="Libertinus Sans" font-size="8" fill="#718096">Manual</text>
    </g>
    <g transform="translate(250, 55)">
      <rect x="0" y="0" width="12" height="12" rx="2" fill="#b7791f"/>
      <text x="18" y="10" font-family="Libertinus Sans" font-size="8" fill="#718096">Automated</text>
    </g>
    <g transform="translate(380, 55)">
      <rect x="0" y="0" width="12" height="12" rx="2" fill="#276749"/>
      <text x="18" y="10" font-family="Libertinus Sans" font-size="8" fill="#718096">Policy-as-code</text>
    </g>
    <g transform="translate(530, 55)">
      <rect x="0" y="0" width="12" height="12" rx="2" fill="#2b6cb0"/>
      <text x="18" y="10" font-family="Libertinus Sans" font-size="8" fill="#718096">Continuous improvement</text>
    </g>
  </g>
</svg>