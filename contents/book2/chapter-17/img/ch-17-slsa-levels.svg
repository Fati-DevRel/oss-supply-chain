<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 600">
  <defs>
        <filter id="shadow" x="-10%" y="-10%" width="120%" height="130%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="2" result="blur"/>
      <feOffset in="blur" dx="1" dy="2" result="offsetBlur"/>
      <feFlood flood-color="#000000" flood-opacity="0.5" result="color"/>
      <feComposite in="color" in2="offsetBlur" operator="in" result="shadow"/>
      <feMerge>
        <feMergeNode in="shadow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <linearGradient id="l0Grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#94A3B8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#64748B;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="l1Grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#F59E0B;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#D97706;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="l2Grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#3B82F6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2563EB;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="l3Grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#10B981;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#059669;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="900" height="600" fill="#F8FAFC"/>

  <!-- Title -->
  <text x="450" y="35" font-family="Libertinus Sans" font-size="22" font-weight="bold" fill="#1E293B" text-anchor="middle">SLSA Build Levels</text>
  <text x="450" y="55" font-family="Libertinus Sans" font-size="13" fill="#64748B" text-anchor="middle">Supply-chain Levels for Software Artifacts - Progressive security requirements</text>

  <!-- Stair-step visualization -->
  <!-- Level 0 -->
  <g filter="url(#shadow)">
    <rect x="100" y="450" width="180" height="80" rx="4" fill="url(#l0Grad)"/>
    <text x="190" y="485" font-family="Libertinus Sans" font-size="24" font-weight="bold" fill="white" text-anchor="middle">L0</text>
    <text x="190" y="510" font-family="Libertinus Sans" font-size="12" fill="white" text-anchor="middle">No Guarantees</text>
  </g>

  <!-- Level 1 -->
  <g filter="url(#shadow)">
    <rect x="290" y="360" width="180" height="170" rx="4" fill="url(#l1Grad)"/>
    <text x="380" y="395" font-family="Libertinus Sans" font-size="24" font-weight="bold" fill="white" text-anchor="middle">L1</text>
    <text x="380" y="420" font-family="Libertinus Sans" font-size="12" fill="white" text-anchor="middle">Provenance Exists</text>
  </g>

  <!-- Level 2 -->
  <g filter="url(#shadow)">
    <rect x="480" y="260" width="180" height="270" rx="4" fill="url(#l2Grad)"/>
    <text x="570" y="295" font-family="Libertinus Sans" font-size="24" font-weight="bold" fill="white" text-anchor="middle">L2</text>
    <text x="570" y="320" font-family="Libertinus Sans" font-size="12" fill="white" text-anchor="middle">Hosted Build</text>
  </g>

  <!-- Level 3 -->
  <g filter="url(#shadow)">
    <rect x="670" y="150" width="180" height="380" rx="4" fill="url(#l3Grad)"/>
    <text x="760" y="185" font-family="Libertinus Sans" font-size="24" font-weight="bold" fill="white" text-anchor="middle">L3</text>
    <text x="760" y="210" font-family="Libertinus Sans" font-size="12" fill="white" text-anchor="middle">Hardened Builds</text>
  </g>

  <!-- Level Details - boxes on left side -->
  <!-- L0 Details -->
  <g filter="url(#shadow)">
    <rect x="50" y="80" width="200" height="70" rx="6" fill="white" stroke="#64748B" stroke-width="2"/>
    <text x="150" y="102" font-family="Libertinus Sans" font-size="12" font-weight="bold" fill="#64748B" text-anchor="middle">Level 0</text>
    <text x="60" y="122" font-family="Libertinus Sans" font-size="10" fill="#475569">- No provenance</text>
    <text x="60" y="137" font-family="Libertinus Sans" font-size="10" fill="#475569">- No verification possible</text>
  </g>
  <line x1="150" y1="150" x2="150" y2="200" stroke="#64748B" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="150" y1="200" x2="190" y2="450" stroke="#64748B" stroke-width="1" stroke-dasharray="4,3"/>

  <!-- L1 Details -->
  <g filter="url(#shadow)">
    <rect x="260" y="80" width="200" height="90" rx="6" fill="white" stroke="#F59E0B" stroke-width="2"/>
    <text x="360" y="102" font-family="Libertinus Sans" font-size="12" font-weight="bold" fill="#F59E0B" text-anchor="middle">Level 1</text>
    <text x="270" y="122" font-family="Libertinus Sans" font-size="10" fill="#475569">- Provenance exists</text>
    <text x="270" y="137" font-family="Libertinus Sans" font-size="10" fill="#475569">- Follows SLSA format</text>
    <text x="270" y="152" font-family="Libertinus Sans" font-size="10" fill="#475569">- Can be unsigned</text>
  </g>
  <line x1="360" y1="170" x2="380" y2="360" stroke="#F59E0B" stroke-width="1" stroke-dasharray="4,3"/>

  <!-- L2 Details -->
  <g filter="url(#shadow)">
    <rect x="470" y="80" width="200" height="105" rx="6" fill="white" stroke="#3B82F6" stroke-width="2"/>
    <text x="570" y="102" font-family="Libertinus Sans" font-size="12" font-weight="bold" fill="#3B82F6" text-anchor="middle">Level 2</text>
    <text x="480" y="122" font-family="Libertinus Sans" font-size="10" fill="#475569">+ Hosted build platform</text>
    <text x="480" y="137" font-family="Libertinus Sans" font-size="10" fill="#475569">+ Signed provenance</text>
    <text x="480" y="152" font-family="Libertinus Sans" font-size="10" fill="#475569">+ Authenticated builder</text>
    <text x="480" y="167" font-family="Libertinus Sans" font-size="10" fill="#475569">+ Service-generated</text>
  </g>
  <line x1="570" y1="185" x2="570" y2="260" stroke="#3B82F6" stroke-width="1" stroke-dasharray="4,3"/>

  <!-- L3 Details -->
  <g filter="url(#shadow)">
    <rect x="680" y="80" width="200" height="60" rx="6" fill="white" stroke="#10B981" stroke-width="2"/>
    <text x="780" y="102" font-family="Libertinus Sans" font-size="12" font-weight="bold" fill="#10B981" text-anchor="middle">Level 3</text>
    <text x="690" y="122" font-family="Libertinus Sans" font-size="10" fill="#475569">+ Isolated builds</text>
    <text x="690" y="137" font-family="Libertinus Sans" font-size="10" fill="#475569">+ Non-falsifiable provenance</text>
  </g>
  <line x1="780" y1="140" x2="760" y2="150" stroke="#10B981" stroke-width="1" stroke-dasharray="4,3"/>

  <!-- Requirements cumulative indicator -->
  <rect x="100" y="540" width="750" height="8" rx="4" fill="#E2E8F0"/>
  <rect x="100" y="540" width="90" height="8" rx="4" fill="#64748B"/>
  <rect x="190" y="540" width="190" height="8" rx="4" fill="#F59E0B"/>
  <rect x="380" y="540" width="190" height="8" rx="4" fill="#3B82F6"/>
  <rect x="570" y="540" width="280" height="8" rx="4" fill="#10B981"/>

  <!-- Labels under progress bar -->
  <text x="145" y="565" font-family="Libertinus Sans" font-size="9" fill="#64748B" text-anchor="middle">None</text>
  <text x="285" y="565" font-family="Libertinus Sans" font-size="9" fill="#F59E0B" text-anchor="middle">Basic</text>
  <text x="475" y="565" font-family="Libertinus Sans" font-size="9" fill="#3B82F6" text-anchor="middle">Verified</text>
  <text x="710" y="565" font-family="Libertinus Sans" font-size="9" fill="#10B981" text-anchor="middle">Hardened</text>

  <!-- Trust model labels on stairs -->
  <text x="190" y="495" font-family="Libertinus Sans" font-size="8" fill="rgba(255,255,255,0.7)" text-anchor="middle" font-style="italic">Trust: None</text>

  <text x="380" y="455" font-family="Libertinus Sans" font-size="8" fill="rgba(255,255,255,0.7)" text-anchor="middle" font-style="italic">Trust: Provenance gen</text>

  <text x="570" y="405" font-family="Libertinus Sans" font-size="8" fill="rgba(255,255,255,0.7)" text-anchor="middle" font-style="italic">Trust: Build service</text>

  <text x="760" y="345" font-family="Libertinus Sans" font-size="8" fill="rgba(255,255,255,0.7)" text-anchor="middle" font-style="italic">Trust: Hardened platform</text>

  <!-- Bottom note -->
  <rect x="150" y="575" width="600" height="22" rx="4" fill="#F0FDF4" stroke="#86EFAC" stroke-width="1"/>
  <text x="450" y="590" font-family="Libertinus Sans" font-size="10" fill="#166534" text-anchor="middle">Each level builds on the previous, with L3 providing the strongest supply chain integrity guarantees</text>
</svg>
