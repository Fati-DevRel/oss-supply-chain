<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 650">
  <defs>
        <filter id="shadow" x="-10%" y="-10%" width="120%" height="130%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="2" result="blur"/>
      <feOffset in="blur" dx="1" dy="2" result="offsetBlur"/>
      <feFlood flood-color="#000000" flood-opacity="0.5" result="color"/>
      <feComposite in="color" in2="offsetBlur" operator="in" result="shadow"/>
      <feMerge>
        <feMergeNode in="shadow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#64748B"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="1000" height="650" fill="#F8FAFC"/>

  <!-- Title -->
  <text x="500" y="35" font-family="Libertinus Sans" font-size="22" font-weight="bold" fill="#1E293B" text-anchor="middle">CI/CD Pipeline Attack Surface</text>
  <text x="500" y="55" font-family="Libertinus Sans" font-size="13" fill="#64748B" text-anchor="middle">Potential attack vectors across the continuous integration and deployment pipeline</text>

  <!-- Pipeline flow background -->
  <rect x="50" y="180" width="900" height="120" rx="10" fill="#F1F5F9" stroke="#CBD5E1" stroke-width="1"/>

  <!-- Pipeline stages -->
  <!-- Source -->
  <g filter="url(#shadow)">
    <rect x="70" y="200" width="120" height="80" rx="8" fill="#3B82F6"/>
    <text x="130" y="235" font-family="Libertinus Sans" font-size="14" font-weight="bold" fill="white" text-anchor="middle">Source</text>
    <text x="130" y="255" font-family="Libertinus Sans" font-size="10" fill="#DBEAFE" text-anchor="middle">Code Repository</text>
  </g>

  <!-- Arrow -->
  <line x1="195" y1="240" x2="235" y2="240" stroke="#64748B" stroke-width="2" marker-end="url(#arrowhead)"/>

  <!-- Build -->
  <g filter="url(#shadow)">
    <rect x="240" y="200" width="120" height="80" rx="8" fill="#8B5CF6"/>
    <text x="300" y="235" font-family="Libertinus Sans" font-size="14" font-weight="bold" fill="white" text-anchor="middle">Build</text>
    <text x="300" y="255" font-family="Libertinus Sans" font-size="10" fill="#E9D5FF" text-anchor="middle">Compile/Package</text>
  </g>

  <!-- Arrow -->
  <line x1="365" y1="240" x2="405" y2="240" stroke="#64748B" stroke-width="2" marker-end="url(#arrowhead)"/>

  <!-- Test -->
  <g filter="url(#shadow)">
    <rect x="410" y="200" width="120" height="80" rx="8" fill="#F59E0B"/>
    <text x="470" y="235" font-family="Libertinus Sans" font-size="14" font-weight="bold" fill="white" text-anchor="middle">Test</text>
    <text x="470" y="255" font-family="Libertinus Sans" font-size="10" fill="#FEF3C7" text-anchor="middle">Verify/Validate</text>
  </g>

  <!-- Arrow -->
  <line x1="535" y1="240" x2="575" y2="240" stroke="#64748B" stroke-width="2" marker-end="url(#arrowhead)"/>

  <!-- Publish -->
  <g filter="url(#shadow)">
    <rect x="580" y="200" width="120" height="80" rx="8" fill="#10B981"/>
    <text x="640" y="235" font-family="Libertinus Sans" font-size="14" font-weight="bold" fill="white" text-anchor="middle">Publish</text>
    <text x="640" y="255" font-family="Libertinus Sans" font-size="10" fill="#D1FAE5" text-anchor="middle">Registry/Store</text>
  </g>

  <!-- Arrow -->
  <line x1="705" y1="240" x2="745" y2="240" stroke="#64748B" stroke-width="2" marker-end="url(#arrowhead)"/>

  <!-- Deploy -->
  <g filter="url(#shadow)">
    <rect x="750" y="200" width="120" height="80" rx="8" fill="#EF4444"/>
    <text x="810" y="235" font-family="Libertinus Sans" font-size="14" font-weight="bold" fill="white" text-anchor="middle">Deploy</text>
    <text x="810" y="255" font-family="Libertinus Sans" font-size="10" fill="#FEE2E2" text-anchor="middle">Production</text>
  </g>

  <!-- Attack vectors - Source -->
  <g filter="url(#shadow)">
    <rect x="40" y="330" width="180" height="110" rx="6" fill="white" stroke="#3B82F6" stroke-width="2"/>
    <text x="130" y="350" font-family="Libertinus Sans" font-size="11" font-weight="bold" fill="#3B82F6" text-anchor="middle">Source Attacks</text>
    <text x="55" y="370" font-family="Libertinus Sans" font-size="10" fill="#475569">- Malicious commits</text>
    <text x="55" y="385" font-family="Libertinus Sans" font-size="10" fill="#475569">- Compromised accounts</text>
    <text x="55" y="400" font-family="Libertinus Sans" font-size="10" fill="#475569">- Branch protection bypass</text>
    <text x="55" y="415" font-family="Libertinus Sans" font-size="10" fill="#475569">- Webhook manipulation</text>
    <text x="55" y="430" font-family="Libertinus Sans" font-size="10" fill="#475569">- PR injection</text>
  </g>
  <line x1="130" y1="280" x2="130" y2="325" stroke="#3B82F6" stroke-width="1.5" stroke-dasharray="4,3"/>

  <!-- Attack vectors - Build -->
  <g filter="url(#shadow)">
    <rect x="210" y="80" width="180" height="110" rx="6" fill="white" stroke="#8B5CF6" stroke-width="2"/>
    <text x="300" y="100" font-family="Libertinus Sans" font-size="11" font-weight="bold" fill="#8B5CF6" text-anchor="middle">Build Attacks</text>
    <text x="225" y="120" font-family="Libertinus Sans" font-size="10" fill="#475569">- Dependency confusion</text>
    <text x="225" y="135" font-family="Libertinus Sans" font-size="10" fill="#475569">- Malicious dependencies</text>
    <text x="225" y="150" font-family="Libertinus Sans" font-size="10" fill="#475569">- Build script injection</text>
    <text x="225" y="165" font-family="Libertinus Sans" font-size="10" fill="#475569">- Compiler attacks</text>
    <text x="225" y="180" font-family="Libertinus Sans" font-size="10" fill="#475569">- Cache poisoning</text>
  </g>
  <line x1="300" y1="190" x2="300" y2="195" stroke="#8B5CF6" stroke-width="1.5" stroke-dasharray="4,3"/>

  <!-- Attack vectors - Test -->
  <g filter="url(#shadow)">
    <rect x="380" y="330" width="180" height="110" rx="6" fill="white" stroke="#F59E0B" stroke-width="2"/>
    <text x="470" y="350" font-family="Libertinus Sans" font-size="11" font-weight="bold" fill="#F59E0B" text-anchor="middle">Test Attacks</text>
    <text x="395" y="370" font-family="Libertinus Sans" font-size="10" fill="#475569">- Disabled security tests</text>
    <text x="395" y="385" font-family="Libertinus Sans" font-size="10" fill="#475569">- Test bypass techniques</text>
    <text x="395" y="400" font-family="Libertinus Sans" font-size="10" fill="#475569">- Mocked security controls</text>
    <text x="395" y="415" font-family="Libertinus Sans" font-size="10" fill="#475569">- Compromised test envs</text>
    <text x="395" y="430" font-family="Libertinus Sans" font-size="10" fill="#475569">- Fixture manipulation</text>
  </g>
  <line x1="470" y1="280" x2="470" y2="325" stroke="#F59E0B" stroke-width="1.5" stroke-dasharray="4,3"/>

  <!-- Attack vectors - Publish -->
  <g filter="url(#shadow)">
    <rect x="550" y="80" width="180" height="110" rx="6" fill="white" stroke="#10B981" stroke-width="2"/>
    <text x="640" y="100" font-family="Libertinus Sans" font-size="11" font-weight="bold" fill="#10B981" text-anchor="middle">Publish Attacks</text>
    <text x="565" y="120" font-family="Libertinus Sans" font-size="10" fill="#475569">- Registry compromise</text>
    <text x="565" y="135" font-family="Libertinus Sans" font-size="10" fill="#475569">- Credential theft</text>
    <text x="565" y="150" font-family="Libertinus Sans" font-size="10" fill="#475569">- Package replacement</text>
    <text x="565" y="165" font-family="Libertinus Sans" font-size="10" fill="#475569">- Signing key theft</text>
    <text x="565" y="180" font-family="Libertinus Sans" font-size="10" fill="#475569">- Version hijacking</text>
  </g>
  <line x1="640" y1="190" x2="640" y2="195" stroke="#10B981" stroke-width="1.5" stroke-dasharray="4,3"/>

  <!-- Attack vectors - Deploy -->
  <g filter="url(#shadow)">
    <rect x="720" y="330" width="180" height="110" rx="6" fill="white" stroke="#EF4444" stroke-width="2"/>
    <text x="810" y="350" font-family="Libertinus Sans" font-size="11" font-weight="bold" fill="#EF4444" text-anchor="middle">Deploy Attacks</text>
    <text x="735" y="370" font-family="Libertinus Sans" font-size="10" fill="#475569">- Deployment hijacking</text>
    <text x="735" y="385" font-family="Libertinus Sans" font-size="10" fill="#475569">- Environment takeover</text>
    <text x="735" y="400" font-family="Libertinus Sans" font-size="10" fill="#475569">- Secrets extraction</text>
    <text x="735" y="415" font-family="Libertinus Sans" font-size="10" fill="#475569">- Config manipulation</text>
    <text x="735" y="430" font-family="Libertinus Sans" font-size="10" fill="#475569">- Rollback attacks</text>
  </g>
  <line x1="810" y1="280" x2="810" y2="325" stroke="#EF4444" stroke-width="1.5" stroke-dasharray="4,3"/>

  <!-- Cross-cutting concerns -->
  <g filter="url(#shadow)">
    <rect x="250" y="480" width="500" height="100" rx="8" fill="#FEF2F2" stroke="#DC2626" stroke-width="2"/>
    <text x="500" y="505" font-family="Libertinus Sans" font-size="13" font-weight="bold" fill="#DC2626" text-anchor="middle">Cross-Cutting Attack Vectors</text>
    <g>
      <text x="280" y="530" font-family="Libertinus Sans" font-size="10" fill="#7F1D1D">- Secrets in environment variables</text>
      <text x="280" y="545" font-family="Libertinus Sans" font-size="10" fill="#7F1D1D">- Runner/agent compromise</text>
      <text x="280" y="560" font-family="Libertinus Sans" font-size="10" fill="#7F1D1D">- Log exfiltration</text>
    </g>
    <g>
      <text x="510" y="530" font-family="Libertinus Sans" font-size="10" fill="#7F1D1D">- Pipeline code injection</text>
      <text x="510" y="545" font-family="Libertinus Sans" font-size="10" fill="#7F1D1D">- Action/plugin supply chain</text>
      <text x="510" y="560" font-family="Libertinus Sans" font-size="10" fill="#7F1D1D">- OIDC token abuse</text>
    </g>
  </g>

  <!-- Legend -->
  <rect x="50" y="600" width="900" height="40" rx="6" fill="#F1F5F9"/>
  <text x="70" y="625" font-family="Libertinus Sans" font-size="11" font-weight="bold" fill="#475569">Key Insight:</text>
  <text x="155" y="625" font-family="Libertinus Sans" font-size="11" fill="#475569">Every stage of the CI/CD pipeline presents unique attack opportunities. Defense requires security controls at each stage plus cross-cutting protections.</text>
</svg>
