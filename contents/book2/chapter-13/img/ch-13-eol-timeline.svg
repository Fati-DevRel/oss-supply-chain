<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 380" font-family="Libertinus Sans">
  <defs>
        <filter id="timelineShadow" x="-10%" y="-10%" width="120%" height="130%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="2" result="blur"/>
      <feOffset in="blur" dx="1" dy="2" result="offsetBlur"/>
      <feFlood flood-color="#000000" flood-opacity="0.5" result="color"/>
      <feComposite in="color" in2="offsetBlur" operator="in" result="shadow"/>
      <feMerge>
        <feMergeNode in="shadow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <marker id="timeArrow" markerWidth="10" markerHeight="10" refX="5" refY="5" orient="auto">
      <polygon points="0 0, 10 5, 0 10" fill="#64748b"/>
    </marker>
    <linearGradient id="safeZone" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#10b981;stop-opacity:0.2"/>
      <stop offset="100%" style="stop-color:#10b981;stop-opacity:0.05"/>
    </linearGradient>
    <linearGradient id="warningZone" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#f59e0b;stop-opacity:0.2"/>
      <stop offset="100%" style="stop-color:#f59e0b;stop-opacity:0.05"/>
    </linearGradient>
    <linearGradient id="dangerZone" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ef4444;stop-opacity:0.2"/>
      <stop offset="100%" style="stop-color:#ef4444;stop-opacity:0.4"/>
    </linearGradient>
  </defs>

  <!-- Title -->
  <text x="450" y="35" text-anchor="middle" font-size="20" font-weight="600" fill="#1e293b">The EOL Timeline Problem</text>
  <text x="450" y="55" text-anchor="middle" font-size="13" fill="#64748b">Critical window for migration before security exposure</text>

  <!-- Zone backgrounds -->
  <rect x="120" y="140" width="200" height="60" rx="4" fill="url(#safeZone)"/>
  <rect x="320" y="140" width="250" height="60" rx="4" fill="url(#warningZone)"/>
  <rect x="570" y="140" width="220" height="60" rx="4" fill="url(#dangerZone)"/>

  <!-- Main timeline -->
  <line x1="80" y1="170" x2="830" y2="170" stroke="#475569" stroke-width="3" marker-end="url(#timeArrow)"/>

  <!-- Milestone 1: EOL Announced -->
  <g filter="url(#timelineShadow)">
    <circle cx="120" cy="170" r="12" fill="#10b981" stroke="white" stroke-width="3"/>
    <line x1="120" y1="158" x2="120" y2="100" stroke="#10b981" stroke-width="2"/>
    <rect x="50" y="70" width="140" height="30" rx="6" fill="#10b981"/>
    <text x="120" y="90" text-anchor="middle" font-size="12" font-weight="600" fill="white">EOL Announced</text>
  </g>

  <!-- Milestone 2: EOL Date -->
  <g filter="url(#timelineShadow)">
    <circle cx="320" cy="170" r="12" fill="#f59e0b" stroke="white" stroke-width="3"/>
    <line x1="320" y1="158" x2="320" y2="100" stroke="#f59e0b" stroke-width="2"/>
    <rect x="250" y="70" width="140" height="30" rx="6" fill="#f59e0b"/>
    <text x="320" y="90" text-anchor="middle" font-size="12" font-weight="600" fill="white">EOL Date</text>
  </g>

  <!-- Milestone 3: Vulnerability Found -->
  <g filter="url(#timelineShadow)">
    <circle cx="570" cy="170" r="12" fill="#ef4444" stroke="white" stroke-width="3"/>
    <line x1="570" y1="158" x2="570" y2="100" stroke="#ef4444" stroke-width="2"/>
    <rect x="490" y="70" width="160" height="30" rx="6" fill="#ef4444"/>
    <text x="570" y="90" text-anchor="middle" font-size="12" font-weight="600" fill="white">New Vuln Found</text>
  </g>

  <!-- Milestone 4: Exploited -->
  <g filter="url(#timelineShadow)">
    <circle cx="790" cy="170" r="14" fill="#7f1d1d" stroke="white" stroke-width="3"/>
    <line x1="790" y1="156" x2="790" y2="100" stroke="#7f1d1d" stroke-width="2"/>
    <rect x="710" y="70" width="160" height="30" rx="6" fill="#7f1d1d"/>
    <text x="790" y="90" text-anchor="middle" font-size="12" font-weight="600" fill="white">You're Exploited</text>
  </g>

  <!-- Migration window bracket -->
  <path d="M 120 200 L 120 230 L 560 230 L 560 200" fill="none" stroke="#10b981" stroke-width="2"/>
  <rect x="260" y="240" width="200" height="35" rx="6" fill="#ecfdf5" stroke="#10b981" stroke-width="1.5"/>
  <text x="360" y="263" text-anchor="middle" font-size="13" font-weight="600" fill="#047857">Migration Window</text>

  <!-- Unpredictable gap indicator -->
  <path d="M 320 200 L 320 280 L 560 280 L 560 200" fill="none" stroke="#f59e0b" stroke-width="1.5" stroke-dasharray="5,3"/>
  <rect x="360" y="290" width="160" height="30" rx="4" fill="#fffbeb" stroke="#f59e0b" stroke-width="1"/>
  <text x="440" y="310" text-anchor="middle" font-size="11" fill="#92400e">Unpredictable interval</text>

  <!-- Labels below timeline -->
  <text x="120" y="215" text-anchor="middle" font-size="10" fill="#10b981" font-weight="500">Planning begins</text>
  <text x="320" y="215" text-anchor="middle" font-size="10" fill="#f59e0b" font-weight="500">No more patches</text>
  <text x="570" y="215" text-anchor="middle" font-size="10" fill="#ef4444" font-weight="500">Attackers aware</text>
  <text x="790" y="215" text-anchor="middle" font-size="10" fill="#7f1d1d" font-weight="500">Active attack</text>

  <!-- Zone labels at top -->
  <text x="220" y="135" text-anchor="middle" font-size="10" font-weight="600" fill="#10b981">SAFE ZONE</text>
  <text x="220" y="147" text-anchor="middle" font-size="9" fill="#059669">Time to plan migration</text>

  <text x="445" y="135" text-anchor="middle" font-size="10" font-weight="600" fill="#f59e0b">WARNING ZONE</text>
  <text x="445" y="147" text-anchor="middle" font-size="9" fill="#d97706">Running without patches</text>

  <text x="680" y="135" text-anchor="middle" font-size="10" font-weight="600" fill="#ef4444">DANGER ZONE</text>
  <text x="680" y="147" text-anchor="middle" font-size="9" fill="#dc2626">Known vulnerability, no fix</text>

  <!-- Key insight box -->
  <rect x="80" y="335" width="740" height="40" rx="6" fill="#fef2f2" stroke="#fca5a5" stroke-width="1"/>
  <text x="100" y="358" font-size="12" font-weight="600" fill="#991b1b">Key Insight:</text>
  <text x="190" y="358" font-size="12" fill="#7f1d1d">The window between EOL and "vulnerability in the wild" is unpredictable but usually shorter than migration timelines.</text>
</svg>