<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 700" font-family="Libertinus Sans">
  <defs>
        <filter id="gpShadow" x="-10%" y="-10%" width="120%" height="130%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="2" result="blur"/>
      <feOffset in="blur" dx="1" dy="2" result="offsetBlur"/>
      <feFlood flood-color="#000000" flood-opacity="0.5" result="color"/>
      <feComposite in="color" in2="offsetBlur" operator="in" result="shadow"/>
      <feMerge>
        <feMergeNode in="shadow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <marker id="gpArrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#3b82f6"/>
    </marker>
    <marker id="stepArrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#64748b"/>
    </marker>
    <linearGradient id="devActionGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1"/>
      <stop offset="100%" style="stop-color:#4f46e5"/>
    </linearGradient>
    <linearGradient id="platformGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#10b981"/>
      <stop offset="100%" style="stop-color:#059669"/>
    </linearGradient>
    <linearGradient id="securityGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6"/>
      <stop offset="100%" style="stop-color:#1d4ed8"/>
    </linearGradient>
  </defs>

  <!-- Title -->
  <text x="450" y="35" text-anchor="middle" font-size="20" font-weight="600" fill="#1e293b">Golden Path: Secure Service Creation</text>
  <text x="450" y="55" text-anchor="middle" font-size="13" fill="#64748b">Developer actions with automatic platform security responses</text>

  <!-- Column headers -->
  <rect x="60" y="75" width="280" height="35" rx="6" fill="url(#devActionGrad)"/>
  <text x="200" y="98" text-anchor="middle" font-size="13" font-weight="600" fill="white">Developer Action</text>

  <rect x="560" y="75" width="280" height="35" rx="6" fill="url(#platformGrad)"/>
  <text x="700" y="98" text-anchor="middle" font-size="13" font-weight="600" fill="white">Platform Response</text>

  <!-- Step 1 -->
  <g filter="url(#gpShadow)">
    <rect x="60" y="125" width="280" height="70" rx="8" fill="#eef2ff" stroke="#6366f1" stroke-width="2"/>
    <circle cx="90" cy="160" r="18" fill="#6366f1"/>
    <text x="90" y="165" text-anchor="middle" font-size="14" font-weight="600" fill="white">1</text>
    <text x="115" y="152" font-size="13" font-weight="500" fill="#1e293b">"Create new service"</text>
    <text x="115" y="172" font-size="11" fill="#64748b">Developer initiates project</text>
  </g>

  <line x1="340" y1="160" x2="555" y2="160" stroke="#3b82f6" stroke-width="2" marker-end="url(#gpArrow)"/>

  <g filter="url(#gpShadow)">
    <rect x="560" y="125" width="280" height="70" rx="8" fill="#ecfdf5" stroke="#10b981" stroke-width="2"/>
    <text x="580" y="150" font-size="12" font-weight="500" fill="#047857">Prompt for service type,</text>
    <text x="580" y="168" font-size="12" fill="#065f46">owner, dependencies</text>
    <text x="580" y="186" font-size="10" fill="#10b981" font-style="italic">Interactive onboarding</text>
  </g>

  <!-- Arrow down -->
  <line x1="200" y1="195" x2="200" y2="225" stroke="#64748b" stroke-width="1.5" marker-end="url(#stepArrow)"/>

  <!-- Step 2 -->
  <g filter="url(#gpShadow)">
    <rect x="60" y="230" width="280" height="70" rx="8" fill="#eef2ff" stroke="#6366f1" stroke-width="2"/>
    <circle cx="90" cy="265" r="18" fill="#6366f1"/>
    <text x="90" y="270" text-anchor="middle" font-size="14" font-weight="600" fill="white">2</text>
    <text x="115" y="257" font-size="13" font-weight="500" fill="#1e293b">Select "API Service"</text>
    <text x="115" y="277" font-size="11" fill="#64748b">Choose service type</text>
  </g>

  <line x1="340" y1="265" x2="555" y2="265" stroke="#3b82f6" stroke-width="2" marker-end="url(#gpArrow)"/>

  <g filter="url(#gpShadow)">
    <rect x="560" y="215" width="280" height="100" rx="8" fill="#ecfdf5" stroke="#10b981" stroke-width="2"/>
    <text x="580" y="238" font-size="12" font-weight="500" fill="#047857">Generate repository with:</text>
    <circle cx="590" cy="258" r="4" fill="#10b981"/>
    <text x="600" y="262" font-size="11" fill="#065f46">Approved base image</text>
    <circle cx="590" cy="278" r="4" fill="#10b981"/>
    <text x="600" y="282" font-size="11" fill="#065f46">CI/CD pipeline</text>
    <circle cx="590" cy="298" r="4" fill="#3b82f6"/>
    <text x="600" y="302" font-size="11" fill="#1d4ed8">Dependency scanning + SBOM</text>
  </g>

  <!-- Security badge -->
  <rect x="770" y="250" width="65" height="45" rx="4" fill="#dbeafe" stroke="#3b82f6" stroke-width="1"/>
  <text x="802" y="270" text-anchor="middle" font-size="9" font-weight="600" fill="#1d4ed8">SECURITY</text>
  <text x="802" y="285" text-anchor="middle" font-size="9" fill="#1d4ed8">BUILT-IN</text>

  <!-- Arrow down -->
  <line x1="200" y1="300" x2="200" y2="335" stroke="#64748b" stroke-width="1.5" marker-end="url(#stepArrow)"/>

  <!-- Step 3 -->
  <g filter="url(#gpShadow)">
    <rect x="60" y="340" width="280" height="70" rx="8" fill="#eef2ff" stroke="#6366f1" stroke-width="2"/>
    <circle cx="90" cy="375" r="18" fill="#6366f1"/>
    <text x="90" y="380" text-anchor="middle" font-size="14" font-weight="600" fill="white">3</text>
    <text x="115" y="367" font-size="13" font-weight="500" fill="#1e293b">Write application code</text>
    <text x="115" y="387" font-size="11" fill="#64748b">Developer focuses on logic</text>
  </g>

  <line x1="340" y1="375" x2="555" y2="375" stroke="#3b82f6" stroke-width="2" marker-end="url(#gpArrow)"/>

  <g filter="url(#gpShadow)">
    <rect x="560" y="340" width="280" height="70" rx="8" fill="#ecfdf5" stroke="#10b981" stroke-width="2"/>
    <text x="580" y="365" font-size="12" font-weight="500" fill="#047857">Automatic scanning on</text>
    <text x="580" y="383" font-size="12" fill="#065f46">each commit</text>
    <rect x="580" y="392" width="80" height="15" rx="3" fill="#dbeafe"/>
    <text x="620" y="403" text-anchor="middle" font-size="9" fill="#1d4ed8">CONTINUOUS</text>
  </g>

  <!-- Arrow down -->
  <line x1="200" y1="410" x2="200" y2="445" stroke="#64748b" stroke-width="1.5" marker-end="url(#stepArrow)"/>

  <!-- Step 4 -->
  <g filter="url(#gpShadow)">
    <rect x="60" y="450" width="280" height="70" rx="8" fill="#eef2ff" stroke="#6366f1" stroke-width="2"/>
    <circle cx="90" cy="485" r="18" fill="#6366f1"/>
    <text x="90" y="490" text-anchor="middle" font-size="14" font-weight="600" fill="white">4</text>
    <text x="115" y="477" font-size="13" font-weight="500" fill="#1e293b">"Deploy to staging"</text>
    <text x="115" y="497" font-size="11" fill="#64748b">Request deployment</text>
  </g>

  <line x1="340" y1="485" x2="555" y2="485" stroke="#3b82f6" stroke-width="2" marker-end="url(#gpArrow)"/>

  <g filter="url(#gpShadow)">
    <rect x="560" y="445" width="280" height="80" rx="8" fill="#dbeafe" stroke="#3b82f6" stroke-width="2"/>
    <text x="580" y="468" font-size="12" font-weight="500" fill="#1d4ed8">Admission control verifies:</text>
    <circle cx="590" cy="488" r="4" fill="#3b82f6"/>
    <text x="600" y="492" font-size="11" fill="#1e40af">Image signed</text>
    <circle cx="590" cy="508" r="4" fill="#3b82f6"/>
    <text x="600" y="512" font-size="11" fill="#1e40af">No critical vulns + Policy OK</text>
  </g>

  <!-- Arrow down -->
  <line x1="200" y1="520" x2="200" y2="555" stroke="#64748b" stroke-width="1.5" marker-end="url(#stepArrow)"/>

  <!-- Step 5 -->
  <g filter="url(#gpShadow)">
    <rect x="60" y="560" width="280" height="70" rx="8" fill="#eef2ff" stroke="#6366f1" stroke-width="2"/>
    <circle cx="90" cy="595" r="18" fill="#6366f1"/>
    <text x="90" y="600" text-anchor="middle" font-size="14" font-weight="600" fill="white">5</text>
    <text x="115" y="587" font-size="13" font-weight="500" fill="#1e293b">"Deploy to production"</text>
    <text x="115" y="607" font-size="11" fill="#64748b">Final deployment request</text>
  </g>

  <line x1="340" y1="595" x2="555" y2="595" stroke="#3b82f6" stroke-width="2" marker-end="url(#gpArrow)"/>

  <g filter="url(#gpShadow)">
    <rect x="560" y="555" width="280" height="80" rx="8" fill="#dbeafe" stroke="#3b82f6" stroke-width="2"/>
    <text x="580" y="578" font-size="12" font-weight="500" fill="#1d4ed8">Additional gates:</text>
    <circle cx="590" cy="598" r="4" fill="#3b82f6"/>
    <text x="600" y="602" font-size="11" fill="#1e40af">Security approval (if needed)</text>
    <circle cx="590" cy="618" r="4" fill="#3b82f6"/>
    <text x="600" y="622" font-size="11" fill="#1e40af">Change management</text>
  </g>

  <!-- Key message -->
  <rect x="60" y="655" width="780" height="35" rx="6" fill="#f0fdf4" stroke="#10b981" stroke-width="1"/>
  <text x="450" y="678" text-anchor="middle" font-size="13" fill="#047857" font-weight="500">Developer focuses on application logic. Platform handles security automatically at every step.</text>
</svg>