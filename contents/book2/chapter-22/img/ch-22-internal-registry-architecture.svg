<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 620" font-family="Libertinus Sans">
  <defs>
        <filter id="regShadow" x="-10%" y="-10%" width="120%" height="130%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="2" result="blur"/>
      <feOffset in="blur" dx="1" dy="2" result="offsetBlur"/>
      <feFlood flood-color="#000000" flood-opacity="0.5" result="color"/>
      <feComposite in="color" in2="offsetBlur" operator="in" result="shadow"/>
      <feMerge>
        <feMergeNode in="shadow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <marker id="regArrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#3b82f6"/>
    </marker>
    <marker id="approvedArrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#10b981"/>
    </marker>
    <marker id="pendingArrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#f59e0b"/>
    </marker>
    <marker id="blockedArrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#ef4444"/>
    </marker>
    <linearGradient id="devGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1"/>
      <stop offset="100%" style="stop-color:#4f46e5"/>
    </linearGradient>
    <linearGradient id="registryGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6"/>
      <stop offset="100%" style="stop-color:#1d4ed8"/>
    </linearGradient>
    <linearGradient id="filterGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#0891b2"/>
      <stop offset="100%" style="stop-color:#0e7490"/>
    </linearGradient>
    <pattern id="gridPattern" width="20" height="20" patternUnits="userSpaceOnUse">
      <path d="M 20 0 L 0 0 0 20" fill="none" stroke="#f1f5f9" stroke-width="1"/>
    </pattern>
  </defs>

  <!-- Title -->
  <text x="400" y="35" text-anchor="middle" font-size="20" font-weight="600" fill="#1e293b">Curated Internal Registry Architecture</text>
  <text x="400" y="55" text-anchor="middle" font-size="13" fill="#64748b">Controlling package access through approved lists and security filtering</text>

  <!-- Developer Workstation -->
  <g filter="url(#regShadow)">
    <rect x="250" y="80" width="300" height="80" rx="10" fill="white" stroke="#6366f1" stroke-width="2"/>
    <rect x="250" y="80" width="300" height="35" rx="10" fill="url(#devGrad)"/>
    <rect x="250" y="107" width="300" height="8" fill="url(#devGrad)"/>
    <text x="400" y="103" text-anchor="middle" font-size="14" font-weight="600" fill="white">Developer Workstation</text>
    <rect x="310" y="128" width="180" height="24" rx="4" fill="#1e293b"/>
    <text x="400" y="145" text-anchor="middle" font-size="12" font-family="Libertinus Mono" fill="#10b981">npm install package</text>
  </g>

  <!-- Arrow to registry -->
  <line x1="400" y1="160" x2="400" y2="195" stroke="#3b82f6" stroke-width="3" marker-end="url(#regArrow)"/>
  <text x="420" y="180" font-size="11" fill="#64748b">request</text>

  <!-- Internal Registry container -->
  <g filter="url(#regShadow)">
    <rect x="100" y="200" width="600" height="400" rx="12" fill="white" stroke="#3b82f6" stroke-width="2"/>
    <rect x="100" y="200" width="600" height="45" rx="12" fill="url(#registryGrad)"/>
    <rect x="100" y="237" width="600" height="8" fill="url(#registryGrad)"/>
    <text x="400" y="230" text-anchor="middle" font-size="15" font-weight="600" fill="white">Internal Registry (Artifactory/Nexus)</text>
  </g>

  <!-- Request Filter -->
  <g filter="url(#regShadow)">
    <rect x="150" y="270" width="500" height="120" rx="8" fill="white" stroke="#0891b2" stroke-width="2"/>
    <rect x="150" y="270" width="500" height="32" rx="8" fill="url(#filterGrad)"/>
    <rect x="150" y="294" width="500" height="8" fill="url(#filterGrad)"/>
    <text x="400" y="292" text-anchor="middle" font-size="13" font-weight="600" fill="white">Request Filter</text>
  </g>

  <!-- Filter actions -->
  <g>
    <circle cx="200" cy="330" r="8" fill="#10b981"/>
    <text x="220" y="335" font-size="12" fill="#334155">Check against approved list</text>
  </g>
  <g>
    <circle cx="200" cy="355" r="8" fill="#ef4444"/>
    <text x="220" y="360" font-size="12" fill="#334155">Block known-malicious packages</text>
  </g>
  <g>
    <circle cx="200" cy="380" r="8" fill="#f59e0b"/>
    <text x="220" y="385" font-size="12" fill="#334155">Quarantine unknown for review</text>
  </g>

  <!-- Decision arrows from filter -->
  <line x1="250" y1="400" x2="250" y2="450" stroke="#10b981" stroke-width="2" marker-end="url(#approvedArrow)"/>
  <text x="240" y="430" font-size="10" fill="#10b981" font-weight="500">approved</text>

  <line x1="400" y1="400" x2="400" y2="450" stroke="#f59e0b" stroke-width="2" marker-end="url(#pendingArrow)"/>
  <text x="390" y="430" font-size="10" fill="#f59e0b" font-weight="500">unknown</text>

  <line x1="550" y1="400" x2="550" y2="450" stroke="#ef4444" stroke-width="2" marker-end="url(#blockedArrow)"/>
  <text x="545" y="430" font-size="10" fill="#ef4444" font-weight="500">blocked</text>

  <!-- Approved Cache -->
  <g filter="url(#regShadow)">
    <rect x="170" y="460" width="160" height="100" rx="8" fill="#ecfdf5" stroke="#10b981" stroke-width="2"/>
    <text x="250" y="490" text-anchor="middle" font-size="13" font-weight="600" fill="#047857">Approved Cache</text>
    <text x="250" y="510" text-anchor="middle" font-size="11" fill="#065f46">Vetted packages</text>
    <text x="250" y="528" text-anchor="middle" font-size="11" fill="#065f46">Fast delivery</text>
    <text x="250" y="546" text-anchor="middle" font-size="11" fill="#065f46">Version locked</text>
  </g>

  <!-- Pending Review -->
  <g filter="url(#regShadow)">
    <rect x="320" y="460" width="160" height="100" rx="8" fill="#fffbeb" stroke="#f59e0b" stroke-width="2"/>
    <text x="400" y="490" text-anchor="middle" font-size="13" font-weight="600" fill="#92400e">Pending Review</text>
    <text x="400" y="510" text-anchor="middle" font-size="11" fill="#78350f">Security analysis</text>
    <text x="400" y="528" text-anchor="middle" font-size="11" fill="#78350f">License check</text>
    <text x="400" y="546" text-anchor="middle" font-size="11" fill="#78350f">Manual approval</text>
  </g>

  <!-- Blocked -->
  <g filter="url(#regShadow)">
    <rect x="470" y="460" width="160" height="100" rx="8" fill="#fef2f2" stroke="#ef4444" stroke-width="2"/>
    <text x="550" y="490" text-anchor="middle" font-size="13" font-weight="600" fill="#991b1b">Blocked</text>
    <text x="550" y="510" text-anchor="middle" font-size="11" fill="#7f1d1d">Known malicious</text>
    <text x="550" y="528" text-anchor="middle" font-size="11" fill="#7f1d1d">Policy violation</text>
    <text x="550" y="546" text-anchor="middle" font-size="11" fill="#7f1d1d">Logged + alerted</text>
  </g>

  <!-- Return arrow to developer -->
  <path d="M 250 460 L 250 420 L 100 420 L 100 140 L 245 140" fill="none" stroke="#10b981" stroke-width="2" stroke-dasharray="5,3" marker-end="url(#approvedArrow)"/>
  <rect x="80" y="265" width="80" height="25" rx="4" fill="#d1fae5"/>
  <text x="120" y="282" text-anchor="middle" font-size="10" font-weight="500" fill="#047857">delivered</text>

  <!-- Block indicator -->
  <line x1="550" y1="560" x2="550" y2="590" stroke="#ef4444" stroke-width="2"/>
  <rect x="490" y="590" width="120" height="25" rx="4" fill="#fef2f2" stroke="#ef4444"/>
  <text x="550" y="607" text-anchor="middle" font-size="11" font-weight="500" fill="#991b1b">Install fails</text>
</svg>