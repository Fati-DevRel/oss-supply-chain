<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 580" font-family="Libertinus Sans">
  <defs>
        <filter id="ssShadow" x="-10%" y="-10%" width="120%" height="130%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="2" result="blur"/>
      <feOffset in="blur" dx="1" dy="2" result="offsetBlur"/>
      <feFlood flood-color="#000000" flood-opacity="0.5" result="color"/>
      <feComposite in="color" in2="offsetBlur" operator="in" result="shadow"/>
      <feMerge>
        <feMergeNode in="shadow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <linearGradient id="guardrailGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6"/>
      <stop offset="100%" style="stop-color:#1d4ed8"/>
    </linearGradient>
    <linearGradient id="selfServiceGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#10b981"/>
      <stop offset="100%" style="stop-color:#059669"/>
    </linearGradient>
    <pattern id="borderPattern" width="10" height="10" patternUnits="userSpaceOnUse">
      <circle cx="5" cy="5" r="1" fill="#3b82f6"/>
    </pattern>
  </defs>

  <!-- Title -->
  <text x="400" y="35" text-anchor="middle" font-size="20" font-weight="600" fill="#1e293b">Self-Service Security Model</text>
  <text x="400" y="55" text-anchor="middle" font-size="13" fill="#64748b">Balancing developer autonomy with security guardrails</text>

  <!-- Outer container - Guardrail Boundaries -->
  <g filter="url(#ssShadow)">
    <rect x="60" y="80" width="680" height="485" rx="12" fill="white" stroke="#3b82f6" stroke-width="3"/>
    <rect x="60" y="80" width="680" height="45" rx="12" fill="url(#guardrailGrad)"/>
    <rect x="60" y="117" width="680" height="8" fill="url(#guardrailGrad)"/>
    <text x="400" y="108" text-anchor="middle" font-size="15" font-weight="600" fill="white">Guardrail Boundaries</text>
  </g>

  <!-- Self-Service Zone -->
  <g filter="url(#ssShadow)">
    <rect x="100" y="150" width="600" height="260" rx="10" fill="#ecfdf5" stroke="#10b981" stroke-width="2"/>
    <rect x="100" y="150" width="600" height="40" rx="10" fill="url(#selfServiceGrad)"/>
    <rect x="100" y="182" width="600" height="8" fill="url(#selfServiceGrad)"/>
    <text x="400" y="176" text-anchor="middle" font-size="14" font-weight="600" fill="white">Self-Service Zone</text>
    <text x="400" y="208" text-anchor="middle" font-size="12" fill="#047857" font-weight="500">Developers can do this autonomously</text>
  </g>

  <!-- Self-service items -->
  <g>
    <circle cx="145" cy="245" r="8" fill="#10b981"/>
    <text x="165" y="250" font-size="13" fill="#1e293b">Create services from approved templates</text>
  </g>
  <g>
    <circle cx="145" cy="275" r="8" fill="#10b981"/>
    <text x="165" y="280" font-size="13" fill="#1e293b">Add approved dependencies from curated registry</text>
  </g>
  <g>
    <circle cx="145" cy="305" r="8" fill="#10b981"/>
    <text x="165" y="310" font-size="13" fill="#1e293b">Deploy to non-production environments</text>
  </g>
  <g>
    <circle cx="145" cy="335" r="8" fill="#10b981"/>
    <text x="165" y="340" font-size="13" fill="#1e293b">Access secrets for owned services</text>
  </g>
  <g>
    <circle cx="145" cy="365" r="8" fill="#10b981"/>
    <text x="165" y="370" font-size="13" fill="#1e293b">View security findings for owned code</text>
  </g>
  <g>
    <circle cx="145" cy="395" r="8" fill="#10b981"/>
    <text x="165" y="400" font-size="13" fill="#1e293b">Accept low-risk findings with justification</text>
  </g>

  <!-- Benefits callout -->
  <rect x="520" y="235" width="160" height="80" rx="6" fill="white" stroke="#059669" stroke-width="1"/>
  <text x="600" y="255" text-anchor="middle" font-size="11" font-weight="600" fill="#047857">Benefits</text>
  <text x="600" y="275" text-anchor="middle" font-size="10" fill="#065f46">Fast iteration</text>
  <text x="600" y="290" text-anchor="middle" font-size="10" fill="#065f46">No waiting on security</text>
  <text x="600" y="305" text-anchor="middle" font-size="10" fill="#065f46">Developer ownership</text>

  <!-- Divider -->
  <line x1="100" y1="430" x2="700" y2="430" stroke="#94a3b8" stroke-width="1" stroke-dasharray="8,4"/>
  <rect x="320" y="420" width="160" height="20" rx="4" fill="white"/>
  <text x="400" y="435" text-anchor="middle" font-size="11" font-weight="500" fill="#64748b">BOUNDARY</text>

  <!-- Outside Self-Service Zone -->
  <rect x="100" y="450" width="600" height="100" rx="8" fill="#fef2f2" stroke="#ef4444" stroke-width="1.5" stroke-dasharray="5,3"/>
  <text x="400" y="475" text-anchor="middle" font-size="13" font-weight="600" fill="#991b1b">Outside Self-Service (Requires Security Involvement)</text>

  <!-- Outside items -->
  <g>
    <circle cx="145" cy="500" r="6" fill="#ef4444"/>
    <text x="160" y="504" font-size="11" fill="#7f1d1d">Production deployment with critical vulnerabilities</text>
  </g>
  <g>
    <circle cx="420" cy="500" r="6" fill="#ef4444"/>
    <text x="435" y="504" font-size="11" fill="#7f1d1d">Non-approved dependencies</text>
  </g>
  <g>
    <circle cx="145" cy="525" r="6" fill="#ef4444"/>
    <text x="160" y="529" font-size="11" fill="#7f1d1d">Exceptions to security policies</text>
  </g>
  <g>
    <circle cx="420" cy="525" r="6" fill="#ef4444"/>
    <text x="435" y="529" font-size="11" fill="#7f1d1d">Sensitive production secrets</text>
  </g>

  <!-- Legend -->
  <rect x="60" y="570" width="300" height="30" rx="4" fill="#f8fafc"/>
  <circle cx="85" cy="585" r="6" fill="#10b981"/>
  <text x="100" y="590" font-size="11" fill="#475569">Self-service (autonomous)</text>
  <circle cx="230" cy="585" r="6" fill="#ef4444"/>
  <text x="245" y="590" font-size="11" fill="#475569">Requires security team</text>
</svg>